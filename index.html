// INVENTARIO ASISTIDO POR IA — foto → conteo automático
// ══════════════════════════════════════════════════════════════════════════════
function InventarioIA({ marca, config }) {
  const m = MARCAS[marca] || MARCAS[Object.keys(MARCAS)[0]] || { color: "#6C63FF", bg: "#F0EEFF", emoji: "🌭", textColor: "#fff", nombre: "—" };
  const localesMarca = LOCALES_POR_MARCA[marca] || LOCALES;
  const [local, setLocal]     = useState(localesMarca[0]);
  const [fecha, setFecha]     = useState(today());
  const [imgB64, setImgB64]   = useState(null);
  const [imgPrev, setImgPrev] = useState(null);
  const [loading, setLoading] = useState(false);
  const [items, setItems]     = useState([]); // [{ producto, cantidad, categoria, nota }]
  const [editIdx, setEditIdx] = useState(null);
  const [saved, setSaved]     = useState(false);
  const [mode, setMode]       = useState("foto"); // foto | manual | historial
  const [inventarios, setInventarios] = useStorage("horreo_inventarios_ia", []);

  const handleImagen = async e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const dataUrl = ev.target.result;
      setImgPrev(dataUrl);
      setImgB64(dataUrl.split(",")[1]);
    };
    reader.readAsDataURL(file);
  };

  const analizarConIA = async () => {
    if (!imgB64) return;
    const apiKey = config?.anthropicKey || "";
    if (!apiKey) {
      setItems([{ producto: "⚠️ Configura tu API key de Anthropic en Config → Conexiones", cantidad: 0, unidad: "", categoria: "otros" }]);
      return;
    }
    setLoading(true); setItems([]);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 1500,
          messages: [{
            role: "user",
            content: [
              {
                type: "image",
                source: { type: "base64", media_type: "image/jpeg", data: imgB64 }
              },
              {
                type: "text",
                text: "Eres un sistema de conteo de inventario para restaurantes de comida rapida en Chile (" + m.nombre + ").\n" +
"Analiza esta imagen e identifica TODOS los productos visibles con sus cantidades.\n" +
"Responde SOLO en JSON valido, sin texto adicional, con este formato exacto: " +
'{"items":[{"producto":"nombre","cantidad":0,"unidad":"unid/kg/lt/paq","categoria":"bebidas|alimentos|insumos|envases|otros"}],"observaciones":"nota opcional"}' +
"\nSi no puedes identificar un producto con certeza, agrega (aprox) al nombre.\n" +
"Se especifico: Pan de hamburguesa x12, no solo pan. Incluye marcas si son visibles."
              }
            ]
          }]
        })
      });
      const data = await res.json();
      const text = data.content?.map(i => i.text || "").join("").trim()
                       .replace(/\x60\x60\x60json|\x60\x60\x60/g, "").trim();
      const parsed = JSON.parse(text);
      setItems(parsed.items || []);
      if (parsed.observaciones) setItems(prev => prev.map((it,i) => i===0 ? {...it, _obs: parsed.observaciones} : it));
    } catch(e) {
      setItems([{ producto: "Error al analizar: " + e.message, cantidad: 0, unidad: "", categoria: "otros" }]);
    }
    setLoading(false);
  };

  const handleSave = () => {
    const reg = { id: uid(), marca, local, fecha, items: items.filter(i=>i.cantidad>0), ts: new Date().toISOString(), metodo: "ia" };
    setInventarios(prev => [...prev, reg]);
    setSaved(true);
    setTimeout(() => setSaved(false), 2500);
    setItems([]); setImgPrev(null); setImgB64(null);
  };

  const historial = inventarios.filter(i => i.marca === marca).sort((a,b)=>b.ts>a.ts?1:-1).slice(0,20);
  const CATEGORIA_COLOR = { bebidas:"#06B6D4", alimentos:"#22C55E", insumos:"#F59E0B", envases:"#8B5CF6", otros:"#94A3B8" };

  return (
    <div className="fade" style={{ paddingBottom: 90 }}>
      <LogoHeader marca={marca} />
      <SectionTitle color={m.color}>📦 Inventario con IA</SectionTitle>

      <div style={{ display:"flex", gap:6, marginBottom:14 }}>
        {[["foto","📷 Tomar foto"],["manual","✏️ Manual"],["historial","📋 Historial"]].map(([k,l])=>(
          <Btn key={k} onClick={()=>setMode(k)} color={m.color} outline={mode!==k} small>{l}</Btn>
        ))}
      </div>

      {mode === "foto" && (
        <>
          <Card style={{ marginBottom:12 }}>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:12 }}>
              <Field label="Local"><select value={local} onChange={e=>setLocal(e.target.value)}>{localesMarca.map(l=><option key={l}>{l}</option>)}</select></Field>
              <Field label="Fecha"><input type="date" value={fecha} onChange={e=>setFecha(e.target.value)}/></Field>
            </div>
            <div style={{ border:`2px dashed ${m.color}55`, borderRadius:12, overflow:"hidden", position:"relative", background:m.color+"08", cursor:"pointer", minHeight:180 }}>
              <input type="file" accept="image/*" capture="environment" onChange={handleImagen}
                style={{ position:"absolute", inset:0, opacity:0, cursor:"pointer", width:"100%", height:"100%" }}/>
              {imgPrev
                ? <img src={imgPrev} style={{ width:"100%", maxHeight:280, objectFit:"contain" }} alt="inventario"/>
                : <div style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:24, textAlign:"center" }}>
                    <div style={{ fontSize:48, marginBottom:8 }}>📷</div>
                    <div style={{ fontSize:13, fontWeight:700, color:m.color, fontFamily:"Nunito" }}>Toca para fotografiar el inventario</div>
                    <div style={{ fontSize:11, color:"#94A3B8", marginTop:4 }}>La IA identificará productos y cantidades automáticamente</div>
                  </div>
              }
            </div>
            {imgPrev && (
              <div style={{ marginTop:12, display:"flex", gap:8 }}>
                <Btn color={loading?"#94A3B8":m.color} onClick={analizarConIA} disabled={loading} full>
                  {loading ? <span className="pulse">🤖 Analizando imagen...</span> : "🤖 Analizar con IA"}
                </Btn>
              </div>
            )}
          </Card>

          {items.length > 0 && (
            <>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:14 }}>
                  {items.length} productos detectados
                </div>
                <Btn color="#22C55E" small onClick={()=>setItems(prev=>[...prev,{producto:"",cantidad:0,unidad:"unid",categoria:"otros"}])}>+ Agregar</Btn>
              </div>
              {items[0]?._obs && <div style={{ fontSize:11, color:"#64748B", marginBottom:8, fontStyle:"italic" }}>📝 {items[0]._obs}</div>}
              {items.map((item, idx) => (
                <Card key={idx} style={{ marginBottom:8, border:`1px solid ${(CATEGORIA_COLOR[item.categoria]||"#E2E8F0")}44` }}>
                  {editIdx === idx ? (
                    <div>
                      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:8 }}>
                        <Field label="Producto" col={2}><input value={item.producto} onChange={e=>setItems(p=>p.map((x,i)=>i===idx?{...x,producto:e.target.value}:x))}/></Field>
                        <Field label="Cantidad"><input type="number" step="0.1" value={item.cantidad} onChange={e=>setItems(p=>p.map((x,i)=>i===idx?{...x,cantidad:parseFloat(e.target.value)||0}:x))}/></Field>
                        <Field label="Unidad"><select value={item.unidad} onChange={e=>setItems(p=>p.map((x,i)=>i===idx?{...x,unidad:e.target.value}:x))}>
                          {["unid","kg","lt","paq","caja","bolsa"].map(u=><option key={u}>{u}</option>)}
                        </select></Field>
                        <Field label="Categoría" col={2}><select value={item.categoria} onChange={e=>setItems(p=>p.map((x,i)=>i===idx?{...x,categoria:e.target.value}:x))}>
                          {Object.keys(CATEGORIA_COLOR).map(c=><option key={c}>{c}</option>)}
                        </select></Field>
                      </div>
                      <div style={{ display:"flex", gap:8 }}>
                        <Btn color="#22C55E" small onClick={()=>setEditIdx(null)}>✅ Listo</Btn>
                        <Btn color="#EF4444" outline small onClick={()=>setItems(p=>p.filter((_,i)=>i!==idx))}>🗑️ Quitar</Btn>
                      </div>
                    </div>
                  ) : (
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }} onClick={()=>setEditIdx(idx)}>
                      <div style={{ flex:1 }}>
                        <div style={{ fontSize:12, fontWeight:700 }}>{item.producto}</div>
                        <span style={{ background:(CATEGORIA_COLOR[item.categoria]||"#94A3B8")+"20", color:CATEGORIA_COLOR[item.categoria]||"#94A3B8", borderRadius:4, padding:"1px 6px", fontSize:9, fontWeight:700 }}>{item.categoria}</span>
                      </div>
                      <div style={{ textAlign:"right" }}>
                        <div style={{ fontSize:20, fontWeight:900, fontFamily:"Nunito", color:m.color }}>{item.cantidad}</div>
                        <div style={{ fontSize:10, color:"#94A3B8" }}>{item.unidad}</div>
                      </div>
                    </div>
                  )}
                </Card>
              ))}
              <Btn color={saved?"#22C55E":m.color} full onClick={handleSave}>
                {saved ? "✅ Inventario guardado" : "💾 Guardar inventario"}
              </Btn>
            </>
          )}
        </>
      )}

      {mode === "manual" && (
        <Card>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:12 }}>
            <Field label="Local"><select value={local} onChange={e=>setLocal(e.target.value)}>{localesMarca.map(l=><option key={l}>{l}</option>)}</select></Field>
            <Field label="Fecha"><input type="date" value={fecha} onChange={e=>setFecha(e.target.value)}/></Field>
          </div>
          <Btn color={m.color} full onClick={()=>setItems(prev=>[...prev,{producto:"",cantidad:0,unidad:"unid",categoria:"alimentos"}])}>+ Agregar producto</Btn>
          <div style={{ marginTop:10 }}>
            {items.map((item,idx)=>(
              <div key={idx} style={{ display:"grid", gridTemplateColumns:"2fr 1fr 1fr auto", gap:6, marginBottom:6, alignItems:"end" }}>
                <Field label={idx===0?"Producto":""}><input placeholder="Producto" value={item.producto} onChange={e=>setItems(p=>p.map((x,i)=>i===idx?{...x,producto:e.target.value}:x))}/></Field>
                <Field label={idx===0?"Cantidad":""}><input type="number" value={item.cantidad} onChange={e=>setItems(p=>p.map((x,i)=>i===idx?{...x,cantidad:parseFloat(e.target.value)||0}:x))}/></Field>
                <Field label={idx===0?"Unidad":""}><select value={item.unidad} onChange={e=>setItems(p=>p.map((x,i)=>i===idx?{...x,unidad:e.target.value}:x))}>
                  {["unid","kg","lt","paq"].map(u=><option key={u}>{u}</option>)}
                </select></Field>
                <div style={{ paddingBottom:2 }}><DeleteBtn onDelete={()=>setItems(p=>p.filter((_,i)=>i!==idx))}/></div>
              </div>
            ))}
          </div>
          {items.length > 0 && <Btn color={saved?"#22C55E":m.color} full onClick={handleSave} style={{marginTop:12}}>{saved?"✅ Guardado":"💾 Guardar inventario"}</Btn>}
        </Card>
      )}

      {mode === "historial" && (
        <>
          <div style={{ fontSize:11, color:"#94A3B8", marginBottom:10 }}>{historial.length} inventarios registrados</div>
          {historial.length === 0
            ? <Card><div style={{ textAlign:"center", color:"#94A3B8", padding:20 }}>Sin inventarios aún</div></Card>
            : historial.map(inv => (
              <details key={inv.id} style={{ marginBottom:8 }}>
                <summary style={{ background:"#F8FAFC", border:"1px solid #E2E8F0", borderRadius:12, padding:"10px 14px", cursor:"pointer", listStyle:"none", display:"flex", justifyContent:"space-between" }}>
                  <div>
                    <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:13 }}>{nombreCortoLocal(inv.local)}</div>
                    <div style={{ fontSize:10, color:"#94A3B8" }}>{inv.fecha} · {inv.items.length} productos · {inv.metodo==="ia"?"🤖 IA":"✏️ Manual"}</div>
                  </div>
                  <Badge text={inv.items.reduce((s,i)=>s+i.cantidad,0).toFixed(0)+" unid"} color={m.color} small/>
                </summary>
                <div style={{ background:"#fff", border:"1px solid #E2E8F0", borderTop:"none", borderRadius:"0 0 12px 12px", padding:"8px 14px" }}>
                  {Object.entries(
                    inv.items.reduce((g,i)=>{ const c=i.categoria||"otros"; if(!g[c])g[c]=[]; g[c].push(i); return g; },{})
                  ).map(([cat,prods])=>(
                    <div key={cat} style={{ marginBottom:8 }}>
                      <div style={{ fontSize:9, color:CATEGORIA_COLOR[cat]||"#94A3B8", fontWeight:700, textTransform:"uppercase", letterSpacing:.8, marginBottom:4 }}>{cat}</div>
                      {prods.map((p,pi)=>(
                        <div key={pi} style={{ display:"flex", justifyContent:"space-between", fontSize:11, padding:"2px 0", borderBottom:"1px solid #F8FAFC" }}>
                          <span>{p.producto}</span>
                          <span style={{ fontWeight:700, color:m.color }}>{p.cantidad} {p.unidad}</span>
                        </div>
                      ))}
                    </div>
                  ))}
                </div>
              </details>
            ))
          }
        </>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// NAV — incluye Metas, scrollable horizontal
// ══════════════════════════════════════════════════════════════════════════════

// ══════════════════════════════════════════════════════════════════════════════
// HORAS EXTRA — solicitudes y registro
// ══════════════════════════════════════════════════════════════════════════════
const HorasExtra = React.memo(function HorasExtra({ ventas, marca, solicitudes, setSolicitudes, session, config, syncLog, setSyncLog }) {
  const esAdmin = session?.rol === "admin";
  const m = MARCAS[marca] || MARCAS[Object.keys(MARCAS)[0]] || { color: "#6C63FF", bg: "#F0EEFF", emoji: "🌭", textColor: "#fff", nombre: "—" };
  const localesMarca = LOCALES_POR_MARCA[marca] || LOCALES;
  const [form, setForm] = useState({ fecha: today(), local: localesMarca[0], usuario: "", horas: "", motivo: "", turno: TURNOS[0] });
  const [tab, setTab] = useState("nueva");
  const [saved, setSaved] = useState(false);
  const [syncing, setSyncing] = useState(false);
  const [syncErr, setSyncErr] = useState(false);
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  useEffect(() => { setForm(f => ({ ...f, local: (LOCALES_POR_MARCA[marca] || LOCALES)[0] })); }, [marca]);

  // ── KPIs basados en solicitudes (no en formulario ventas) ──────────────────
  const mes = today().slice(0, 7);
  const solMarca = useMemo(() => solicitudes.filter(s => s.marca === marca), [solicitudes, marca]);
  const solMes   = useMemo(() => solMarca.filter(s => s.fecha.slice(0,7) === mes), [solMarca, mes]);

  const heTotalMes = useMemo(() =>
    solMes.filter(s => s.estado !== "rechazada").reduce((sum, s) => sum + parseFloat(s.horas || 0), 0),
    [solMes]);
  const heCostoMes = useMemo(() =>
    solMes.filter(s => s.estado !== "rechazada").reduce((sum, s) => sum + parseFloat(s.costo_estimado || 0), 0),
    [solMes]);

  // Historial completo = todas las solicitudes de esta marca ordenadas por fecha
  const heHistorial = useMemo(() =>
    [...solMarca].sort((a, b) => b.fecha > a.fecha ? 1 : -1),
    [solMarca]);



  // Valor hora extra = valor hora del cargo × recargo HE (desde config Labor)
  const laborValores  = (() => { try { return JSON.parse(localStorage.getItem("horreo_labor_valores") || "{}"); } catch { return {}; } })();
  const laborRecargos = (() => { try { return JSON.parse(localStorage.getItem("horreo_labor_recargos") || "{}"); } catch { return {}; } })();
  const recHE = laborRecargos.horasextra?.activo ? (1 + (laborRecargos.horasextra?.pct || 50) / 100) : 1.5;
  const valorHE = (() => {
    // Find cargo of employee from semanas
    const emp = getEmpleadosDeMarca(marca).find(e => e.nombre === form.usuario);
    const cargo = emp?.cargo || "";
    const vc = laborValores[cargo] || {};
    if (vc.hora > 0) return vc.hora * recHE;
    // Fallback: highest valor hora × recargo
    const vals = Object.values(laborValores).map(v => parseFloat(v.hora || 0)).filter(v => v > 0);
    return vals.length ? Math.max(...vals) * recHE : 0;
  })();
  const costoEstimado = parseFloat(form.horas || 0) * valorHE;

  const handleSave = async () => {
    const sol = { id: uid(), marca, ...form, costo_estimado: costoEstimado, estado: "pendiente", ts: new Date().toISOString() };
    setSolicitudes(s => [...s, sol]);
    setSaved(true);
    // Show mail modal
    const cuerpo = `SOLICITUD HORAS EXTRA
====================
Marca   : ${m.nombre}
Local   : ${sol.local}
Fecha   : ${sol.fecha}  Turno: ${sol.turno}
Usuario : ${sol.usuario || "-"}

Horas extra solicitadas : ${sol.horas}h
Costo estimado          : ${costoEstimado > 0 ? "$" + Math.round(costoEstimado).toLocaleString("es-CL") : "Sin valor hora configurado"}
Motivo: ${sol.motivo || "-"}

---
El Hórreo · Adm. Franquicias`;
    showMailModal(`[El Hórreo] Solicitud HE ${m.nombre} — ${sol.local} — ${sol.fecha}`, cuerpo);
    if (config?.appsScriptUrl && config.appsScriptUrl !== APPS_SCRIPT_URL_DEFAULT) {
      setSyncing(true);
      const res = await syncToSheets("Form_HorasExtra", [sol], config.appsScriptUrl);
      setSyncing(false);
      if (res.ok) { const ts = new Date().toLocaleTimeString("es-CL", { hour: "2-digit", minute: "2-digit" }); setSyncLog && setSyncLog(l => [...l, { tabla: "Form_HorasExtra", ts, ok: true }]); }
      else setSyncErr(true);
    }
    setTimeout(() => { setSaved(false); setSyncErr(false); }, 4000);
    setForm(f => ({ ...f, horas: "", motivo: "", usuario: "" }));
    setTab("solicitudes");
  };

  // Re-intentar sincronización Supabase para solicitudes pendientes
  const handleReSync = async () => {
    setSyncing(true); setSyncErr(false);
    try {
      const sb = window._sbInstance || (typeof getSB === 'function' ? getSB() : null);
      if (!sb) { setSyncErr(true); setSyncing(false); return; }
      const pendientes = solicitudes.filter(s => s.marca === marca);
      if (pendientes.length === 0) { setSyncing(false); return; }
      const { error } = await sb.from("he_solicitudes").upsert(
        pendientes.map(s => ({ ...s, empleados: undefined })),
        { onConflict: "id" }
      );
      if (error) { console.warn("[HE reSync]", error.message); setSyncErr(true); }
      else { console.log("[HE reSync] OK", pendientes.length, "solicitudes"); }
    } catch(e) { console.warn("[HE reSync exception]", e.message); setSyncErr(true); }
    setSyncing(false);
  };

  const g2 = { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 };

  return (
    <div className="fade" style={{ paddingBottom: 90 }}>
      <LogoHeader marca={marca} />
      <SectionTitle color={m.color}>⏱️ Horas Extra</SectionTitle>

      {/* Banner sync error */}
      {syncErr && (
        <div style={{ marginBottom:10, padding:"10px 14px", borderRadius:10, background:"#FEF2F2", border:"1.5px solid #FECACA", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <div>
            <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:12, color:"#DC2626" }}>⚠️ Error al sincronizar con la nube</div>
            <div style={{ fontFamily:"Nunito", fontSize:10, color:"#64748B" }}>Los datos se guardaron localmente. Intenta sincronizar manualmente.</div>
          </div>
          <button onClick={handleReSync} disabled={syncing}
            style={{ background:"#EF4444", color:"#fff", border:"none", borderRadius:8, padding:"6px 12px", fontFamily:"Nunito", fontWeight:800, fontSize:11, cursor:syncing?"not-allowed":"pointer" }}>
            {syncing ? "⏳" : "🔄 Reintentar"}
          </button>
        </div>
      )}
      {syncing && !syncErr && (
        <div style={{ marginBottom:10, padding:"8px 14px", borderRadius:10, background:"#EFF6FF", border:"1px solid #BFDBFE", fontFamily:"Nunito", fontSize:12, color:"#1D4ED8", fontWeight:700 }}>
          ⏳ Sincronizando solicitudes con la nube...
        </div>
      )}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 14 }}>
        <Card style={{ position: "relative", overflow: "hidden" }}>
          <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 3, background: "#F59E0B" }} />
          <div style={{ fontSize: 10, color: "#94A3B8", textTransform: "uppercase", letterSpacing: .8, fontWeight: 700 }}>HE mes actual</div>
          <div style={{ fontSize: 26, fontFamily: "Nunito", fontWeight: 900, color: "#F59E0B" }}>{heTotalMes.toFixed(1)}h</div>
          {heCostoMes > 0
            ? <div style={{ fontSize: 12, color: "#EF4444", fontWeight: 800, fontFamily: "Nunito" }}>{fmtCLP(heCostoMes)}</div>
            : heTotalMes > 0 && <div style={{ fontSize: 10, color: "#94A3B8" }}>Configura valor/hora en Metas</div>}
        </Card>
        <Card style={{ position: "relative", overflow: "hidden" }}>
          <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 3, background: "#EF4444" }} />
          <div style={{ fontSize: 10, color: "#94A3B8", textTransform: "uppercase", letterSpacing: .8, fontWeight: 700 }}>Solicitudes pendientes</div>
          <div style={{ fontSize: 26, fontFamily: "Nunito", fontWeight: 900, color: "#EF4444" }}>{solicitudes.filter(s => s.estado === "pendiente").length}</div>
          <div style={{ fontSize: 11, color: "#94A3B8" }}>{solicitudes.length} total</div>
        </Card>
      </div>

      {/* Tabla HE por local */}


      {/* Tabs */}
      <div style={{ display: "flex", gap: 6, marginBottom: 14 }}>
        {[["nueva","➕ Nueva solicitud"],["solicitudes","📋 Solicitudes"],["historial","📅 Historial"]].map(([k,l]) => (
          <Btn key={k} onClick={() => setTab(k)} color={m.color} outline={tab !== k} small>{l}
            {k === "solicitudes" && solicitudes.filter(s => s.estado === "pendiente").length > 0 &&
              <span style={{ marginLeft: 4, background: "#EF4444", color: "#fff", borderRadius: 10, padding: "1px 6px", fontSize: 9 }}>{solicitudes.filter(s => s.estado === "pendiente").length}</span>}
          </Btn>
        ))}
      </div>

      {tab === "nueva" && (
        <Card>
          <div style={{ ...g2, marginBottom: 12 }}>
            <Field label="Fecha"><input type="date" value={form.fecha} onChange={e => set("fecha", e.target.value)} /></Field>
            <Field label="Local"><select value={form.local} onChange={e => set("local", e.target.value)}>{localesMarca.map(l => <option key={l}>{l}</option>)}</select></Field>
            <Field label="Turno"><select value={form.turno} onChange={e => set("turno", e.target.value)}>{TURNOS.map(t => <option key={t}>{t}</option>)}</select></Field>
            <Field label="Trabajador">
            <EmpleadoSelector marca={marca} value={form.usuario} onChange={v=>set("usuario",v)} placeholder="Seleccionar trabajador"/>
          </Field>
          </div>
          <Field label="N° Horas Extra">
            <input type="number" step="0.5" placeholder="0" value={form.horas} onChange={e => set("horas", e.target.value)} style={{ fontSize: 18, fontWeight: 700 }} />
          </Field>
          {form.horas > 0 && (
            <div style={{ background: "#FFF8E7", border: "1px solid #FDE68A", borderRadius: 10, padding: "8px 12px", marginTop: 8, marginBottom: 8 }}>
              <span style={{ fontSize: 12, color: "#92400E" }}>
                {valorHE > 0
                  ? <>Costo estimado: <strong>{fmtCLP(costoEstimado)}</strong> ({fmtCLP(valorHE)}/h)</>
                  : "⚠️ Configura el valor hora extra en Metas para ver el costo"}
              </span>
            </div>
          )}
          <Field label="Motivo / Justificación">
            <textarea rows={3} placeholder="Ej: Alta demanda fin de semana, cobertura turno enfermo..." value={form.motivo} onChange={e => set("motivo", e.target.value)} style={{ resize: "none" }} />
          </Field>
          <div style={{ marginTop: 14 }}>
            <Btn onClick={handleSave} color={saved ? "#22C55E" : m.color} disabled={!form.horas} full>
              {saved ? "✅ Solicitud enviada" : "📤 Enviar Solicitud"}
            </Btn>
            {(syncing || syncErr || (syncLog||[]).some(s=>s.tabla==="Form_HorasExtra"&&s.ok)) && (
              <div style={{ marginTop: 6 }}>
                <SyncBadge syncing={syncing} error={syncErr} lastSync={(syncLog||[]).filter(s=>s.tabla==="Form_HorasExtra"&&s.ok).slice(-1)[0]?.ts} />
              </div>
            )}
          </div>
          <div style={{ fontSize: 10, color: "#94A3B8", marginTop: 8, textAlign: "center" }}>
            Al enviar se abrirá el modal para seleccionar destinatario y copiar
          </div>
        </Card>
      )}

      {tab === "solicitudes" && (
        solicitudes.length === 0
          ? <Card><div style={{ textAlign: "center", color: "#94A3B8", padding: 30 }}>Sin solicitudes aún</div></Card>
          : solicitudes.map(sol => (
            <Card key={sol.id} style={{ marginBottom: 10, border: `1.5px solid ${sol.estado === "aprobada" ? "#86EFAC" : sol.estado === "rechazada" ? "#FECACA" : "#FDE68A"}` }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8, alignItems: "center" }}>
                <div>
                  <div style={{ fontFamily: "Nunito", fontWeight: 800, fontSize: 13 }}>{sol.local}</div>
                  <div style={{ fontSize: 11, color: "#94A3B8" }}>{sol.fecha} · {sol.turno} · {sol.usuario || "-"}</div>
                </div>
                <Badge text={sol.estado === "aprobada" ? "✅ Aprobada" : sol.estado === "rechazada" ? "❌ Rechazada" : "⏳ Pendiente"}
                  color={sol.estado === "aprobada" ? "#22C55E" : sol.estado === "rechazada" ? "#EF4444" : "#F59E0B"} small />
              </div>
              <div style={{ display: "flex", gap: 16, marginBottom: sol.motivo ? 8 : 0 }}>
                <div><div style={{ fontSize: 10, color: "#94A3B8" }}>Horas</div><div style={{ fontSize: 18, fontWeight: 900, fontFamily: "Nunito", color: "#F59E0B" }}>{sol.horas}h</div></div>
                {sol.costo_estimado > 0 && <div><div style={{ fontSize: 10, color: "#94A3B8" }}>Costo est.</div><div style={{ fontSize: 18, fontWeight: 900, fontFamily: "Nunito", color: "#EF4444" }}>{fmtCLP(sol.costo_estimado)}</div></div>}
              </div>
              {sol.motivo && <div style={{ fontSize: 11, color: "#64748B", background: "#F8FAFC", borderRadius: 8, padding: "6px 10px", marginBottom: 8 }}>{sol.motivo}</div>}
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap", alignItems: "center" }}>
                {esAdmin ? (<>
                  <Btn color="#22C55E" small onClick={() => setSolicitudes(ss => ss.map(s => s.id === sol.id ? { ...s, estado: "aprobada" } : s))}>✅ Aprobar</Btn>
                  <Btn color="#EF4444" outline small onClick={() => setSolicitudes(ss => ss.map(s => s.id === sol.id ? { ...s, estado: "rechazada" } : s))}>❌ Rechazar</Btn>
                </>) : (
                  <span style={{ fontSize:11, fontFamily:"Nunito", fontWeight:700, color: sol.estado==="aprobada"?"#16A34A":sol.estado==="rechazada"?"#DC2626":"#D97706", background: sol.estado==="aprobada"?"#F0FDF4":sol.estado==="rechazada"?"#FEF2F2":"#FFFBEB", padding:"4px 10px", borderRadius:8 }}>
                    {sol.estado==="aprobada"?"✅ Aprobada":sol.estado==="rechazada"?"❌ Rechazada":"⏳ Pendiente aprobación"}
                  </span>
                )}
                <Btn color={m.color} outline small onClick={() => {
                  const cuerpo = `Solicitud HE — ${sol.local} — ${sol.fecha}\nHoras: ${sol.horas}h${sol.costo_estimado > 0 ? "  Costo: " + fmtCLP(sol.costo_estimado) : ""}\nMotivo: ${sol.motivo || "-"}\nEstado: ${sol.estado}`;
                  showMailModal(`[El Hórreo] Solicitud HE ${m.nombre} — ${sol.local} — ${sol.fecha}`, cuerpo);
                }}>📧 Mail</Btn>
                {esAdmin && <DeleteBtn onDelete={() => setSolicitudes(ss => ss.filter(s => s.id !== sol.id))} />}
              </div>
            </Card>
          ))
      )}

      {tab === "historial" && (
        <>
          <div style={{ fontSize: 11, color: "#94A3B8", marginBottom: 10 }}>
            {heHistorial.length} solicitud{heHistorial.length !== 1 ? "es" : ""} registrada{heHistorial.length !== 1 ? "s" : ""}
          </div>
          {heHistorial.length === 0
            ? <Card><div style={{ textAlign: "center", color: "#94A3B8", padding: 20 }}>Sin solicitudes de HE aún</div></Card>
            : heHistorial.map(sol => {
              const estadoColor = sol.estado === "aprobada" ? "#22C55E" : sol.estado === "rechazada" ? "#EF4444" : "#F59E0B";
              return (
                <Card key={sol.id} style={{ marginBottom: 8, border:`1.5px solid ${estadoColor}33` }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 12, fontWeight: 700, fontFamily: "Nunito" }}>
                        {sol.usuario || "Sin nombre"}
                      </div>
                      <div style={{ fontSize: 10, color: "#94A3B8" }}>
                        {nombreCortoLocal(sol.local)} · {sol.fecha} · {sol.turno || ""}
                      </div>
                      {sol.motivo && <div style={{ fontSize: 10, color: "#64748B", marginTop: 2, fontStyle: "italic" }}>{sol.motivo}</div>}
                    </div>
                    <div style={{ textAlign: "right", flexShrink: 0, marginLeft: 8 }}>
                      <div style={{ fontSize: 20, fontWeight: 900, fontFamily: "Nunito", color: "#F59E0B" }}>{parseFloat(sol.horas || 0).toFixed(1)}h</div>
                      {parseFloat(sol.costo_estimado || 0) > 0 && <div style={{ fontSize: 12, color: "#EF4444", fontWeight: 800 }}>{fmtCLP(sol.costo_estimado)}</div>}
                      <Badge text={sol.estado === "aprobada" ? "✅ Aprobada" : sol.estado === "rechazada" ? "❌ Rechazada" : "⏳ Pendiente"} color={estadoColor} small />
                    </div>
                  </div>
                </Card>
              );
            })
          }
        </>
      )}
    </div>
  );
}); // end React.memo

// ══════════════════════════════════════════════════════════════════════════════
// BOLETA DE HONORARIOS — registro y historial de boletas a emitir
// ══════════════════════════════════════════════════════════════════════════════
function BoletaHonorarios({ marca, session }) {
  const esAdmin = session?.rol === "admin" || session?.rol === "gerente";
  const m = MARCAS[marca] || MARCAS[Object.keys(MARCAS)[0]] || { color:"#6C63FF", bg:"#F0EEFF", emoji:"🌭", textColor:"#fff", nombre:"—" };
  const localesMarca = LOCALES_POR_MARCA[marca] || LOCALES;

  const EMPTY_FORM = {
    nombre:"", rut:"", banco:"", tipoCuenta:"Cuenta Corriente", numeroCuenta:"",
    direccion:"", local: localesMarca[0]||"", fecha: today(),
    horasNormal:0, valorHora:0, descripcion:"", obs:""
  };

  const [boletas, setBoletas] = useSupabase("horreo_boletas_honorarios", []);
  const [form, setForm] = useState(EMPTY_FORM);
  const [tab, setTab] = useState("nueva");
  const [saved, setSaved] = useState(false);
  const [filtroMes, setFiltroMes] = useState(today().slice(0,7));
  const [expandedId, setExpandedId] = useState(null);
  const [confirmDel, setConfirmDel] = useState(null);
  // Modal de envío multicontacto
  const [envioModal, setEnvioModal] = useState(null); // boleta a enviar
  const [selContacts, setSelContacts] = useState([]);  // índices seleccionados

  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  useEffect(() => { set("local", (LOCALES_POR_MARCA[marca]||LOCALES)[0]||""); }, [marca]);

  const fmtRUT = (v) => {
    const clean = v.replace(/[^0-9kK]/g,"");
    if (clean.length < 2) return clean;
    const body = clean.slice(0,-1).replace(/\B(?=(\d{3})+(?!\d))/g,".");
    return body + "-" + clean.slice(-1).toUpperCase();
  };

  const totalBruto = Math.round((parseFloat(form.horasNormal)||0) * (parseFloat(form.valorHora)||0));
  const retencion  = Math.round(totalBruto * 0.105);
  const totalNeto  = totalBruto - retencion;

  const buildBoletaTxt = (b) => `BOLETA A HONORARIOS
===================
Fecha      : ${b.fecha}
Emisor     : ${b.nombre}
RUT        : ${b.rut}
Dirección  : ${b.direccion || "—"}
Banco      : ${b.banco || "—"} · ${b.tipoCuenta || ""} · ${b.numeroCuenta || "—"}
Local      : ${nombreCortoLocal(b.local)}

Descripción: ${b.descripcion || "Servicios prestados"}
Horas      : ${b.horasNormal}h × ${fmtCLP(b.valorHora)}/h
Monto bruto: ${fmtCLP(b.totalBruto)}
Retención  : -${fmtCLP(b.retencion)} (10.75%)
Monto neto : ${fmtCLP(b.totalNeto)}${b.obs ? "\nObservaciones: " + b.obs : ""}`;

  const handleGuardar = () => {
    if (!form.nombre.trim() || !form.rut.trim()) { return; }
    const nueva = {
      id: uid(), marca,
      ...form,
      totalBruto, retencion, totalNeto,
      ts: new Date().toISOString(),
      estado: "pendiente",
      solicitante: session?.nombre || "—"
    };
    setBoletas(prev => [...prev, nueva]);
    setSaved(true);
    // Notificar a administración automáticamente
    const txt = buildBoletaTxt(nueva);
    showMailModal(`[El Hórreo] Solicitud Boleta — ${nueva.nombre} — ${nueva.fecha}`, txt);
    setForm({ ...EMPTY_FORM, local: form.local });
    setTimeout(()=>setSaved(false), 2500);
    setTab("historial");
  };

  const handleAprobar = (b) => {
    setBoletas(prev => prev.map(x => x.id===b.id ? {...x, estado:"aprobada", aprobadoPor: session?.nombre||"Admin", tsAprobacion: new Date().toISOString()} : x));
    // Notificar aprobación
    const txt = `BOLETA APROBADA ✅
==================
Nombre : ${b.nombre}
RUT    : ${b.rut}
Monto neto : ${fmtCLP(b.totalNeto)}
Fecha  : ${b.fecha}
Aprobado por: ${session?.nombre||"Admin"}

El pago será procesado según calendario habitual.`;
    showMailModal(`[El Hórreo] ✅ Boleta Aprobada — ${b.nombre}`, txt);
  };

  const handleRechazar = (b, motivo) => {
    setBoletas(prev => prev.map(x => x.id===b.id ? {...x, estado:"rechazada", motivoRechazo: motivo||"Sin especificar", rechazadoPor: session?.nombre||"Admin"} : x));
    const txt = `BOLETA RECHAZADA ❌
===================
Nombre : ${b.nombre}
Fecha  : ${b.fecha}
Monto  : ${fmtCLP(b.totalBruto)}
Motivo : ${motivo||"Sin especificar"}
Rechazado por: ${session?.nombre||"Admin"}`;
    showMailModal(`[El Hórreo] ❌ Boleta Rechazada — ${b.nombre}`, txt);
  };

  // Abrir modal multicontacto
  const abrirEnvio = (b) => {
    const todos = getContactos();
    setEnvioModal(b);
    setSelContacts(todos.map((_,i)=>i)); // todos seleccionados por defecto
  };

  const enviarSeleccionados = () => {
    if (!envioModal) return;
    const todos = getContactos();
    const txt = buildBoletaTxt(envioModal);
    const asunto = `[El Hórreo] Boleta Honorarios — ${envioModal.nombre} — ${envioModal.fecha}`;
    if (selContacts.length === 0) { showMailModal(asunto, txt); setEnvioModal(null); return; }
    // Enviar al primero via MailModal, los demás se abren en WA/Mail directo
    showMailModal(asunto, txt);
    // Abrir WA/mail para los seleccionados (con delay para no bloquear)
    selContacts.forEach((idx, i) => {
      const c = todos[idx];
      if (!c) return;
      setTimeout(() => {
        if (c.telefono) {
          const url = `https://wa.me/${c.telefono}?text=${encodeURIComponent(asunto+"\n\n"+txt)}`;
          window.open(url, "_blank");
        } else if (c.email) {
          window.open(`mailto:${c.email}?subject=${encodeURIComponent(asunto)}&body=${encodeURIComponent(txt)}`, "_blank");
        }
      }, i * 600);
    });
    setEnvioModal(null);
  };

  const boletasMarca = useMemo(()=>
    [...boletas].filter(b=>b.marca===marca).sort((a,b)=>b.ts>a.ts?1:-1),
  [boletas, marca]);

  const boletasMes = useMemo(()=>
    boletasMarca.filter(b=>(b.fecha||"").slice(0,7)===filtroMes),
  [boletasMarca, filtroMes]);

  const pendientesMarca = boletasMarca.filter(b=>b.estado==="pendiente").length;
  const totalMes   = boletasMes.reduce((s,b)=>s+(b.totalBruto||0), 0);
  const netaMes    = boletasMes.reduce((s,b)=>s+(b.totalNeto||0), 0);

  const estadoColor = { pendiente:"#F59E0B", aprobada:"#22C55E", rechazada:"#EF4444" };
  const estadoLabel = { pendiente:"⏳ Pendiente aprobación", aprobada:"✅ Aprobada", rechazada:"❌ Rechazada" };

  // Modal de rechazo con motivo
  const [rechazarModal, setRechazarModal] = useState(null);
  const [motivoRechazo, setMotivoRechazo] = useState("");

  return (
    <div className="fade" style={{ paddingBottom:90 }}>
      <LogoHeader marca={marca} />
      <SectionTitle color={m.color}>🧾 Boletas de Honorarios</SectionTitle>

      {/* KPIs del mes */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:14 }}>
        <Card style={{ position:"relative", overflow:"hidden" }}>
          <div style={{ position:"absolute", top:0, left:0, right:0, height:3, background:m.color }}/>
          <div style={{ fontSize:9, color:"#94A3B8", textTransform:"uppercase", fontWeight:700, letterSpacing:.8 }}>Bruto mes</div>
          <div style={{ fontSize:22, fontFamily:"Nunito", fontWeight:900, color:m.color }}>{fmtCLP(totalMes)}</div>
          <div style={{ fontSize:10, color:"#94A3B8" }}>{boletasMes.length} boleta{boletasMes.length!==1?"s":""}</div>
        </Card>
        <Card style={{ position:"relative", overflow:"hidden" }}>
          <div style={{ position:"absolute", top:0, left:0, right:0, height:3, background:"#22C55E" }}/>
          <div style={{ fontSize:9, color:"#94A3B8", textTransform:"uppercase", fontWeight:700, letterSpacing:.8 }}>Neto a pagar</div>
          <div style={{ fontSize:22, fontFamily:"Nunito", fontWeight:900, color:"#22C55E" }}>{fmtCLP(netaMes)}</div>
          <div style={{ fontSize:10, color:"#94A3B8" }}>después retención 10.75%</div>
        </Card>
      </div>

      {/* Badge pendientes (para admin) */}
      {esAdmin && pendientesMarca > 0 && (
        <div onClick={()=>setTab("historial")} style={{ cursor:"pointer", background:"#FEF9C3", border:"1.5px solid #FDE047", borderRadius:10, padding:"8px 14px", marginBottom:12, display:"flex", alignItems:"center", gap:8 }}>
          <span style={{ fontSize:18 }}>🔔</span>
          <div>
            <div style={{ fontFamily:"Nunito", fontWeight:900, fontSize:12, color:"#854D0E" }}>{pendientesMarca} boleta{pendientesMarca!==1?"s":""} pendiente{pendientesMarca!==1?"s":""} de aprobación</div>
            <div style={{ fontFamily:"Nunito", fontSize:10, color:"#A16207" }}>Toca para revisar</div>
          </div>
        </div>
      )}

      {/* Tabs */}
      <div style={{ display:"flex", gap:6, marginBottom:14 }}>
        {[["nueva","➕ Nueva boleta"],["historial","📋 Historial"]].map(([k,l])=>(
          <button key={k} onClick={()=>setTab(k)}
            style={{ flex:1, background:tab===k?m.color:"#F1F5F9", color:tab===k?"#fff":"#64748B", border:"none", borderRadius:10, padding:"10px 0", fontFamily:"Nunito", fontWeight:800, fontSize:12, cursor:"pointer", position:"relative" }}>
            {l}
            {k==="historial" && pendientesMarca>0 && (
              <span style={{ position:"absolute", top:-5, right:-5, background:"#EF4444", color:"#fff", borderRadius:10, padding:"1px 6px", fontSize:9, fontWeight:800 }}>{pendientesMarca}</span>
            )}
          </button>
        ))}
      </div>

      {/* ── TAB NUEVA ── */}
      {tab === "nueva" && (
        <Card>
          <div style={{ fontFamily:"Nunito", fontWeight:900, fontSize:14, color:m.color, marginBottom:14 }}>
            🧾 Datos de la boleta
          </div>

          {/* Datos del prestador */}
          <div style={{ background:"#F8FAFC", borderRadius:10, padding:"10px 12px", marginBottom:12 }}>
            <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:11, color:"#475569", marginBottom:8, textTransform:"uppercase", letterSpacing:.5 }}>👤 Datos del prestador</div>
            <Field label="Nombre completo">
              <input placeholder="Nombre Apellido" value={form.nombre} onChange={e=>set("nombre",e.target.value)}/>
            </Field>
            <Field label="RUT">
              <input placeholder="12.345.678-9" value={form.rut}
                onChange={e=>set("rut", fmtRUT(e.target.value))}/>
            </Field>
            <Field label="Dirección">
              <input placeholder="Calle 123, Punta Arenas" value={form.direccion} onChange={e=>set("direccion",e.target.value)}/>
            </Field>
          </div>

          {/* Datos bancarios */}
          <div style={{ background:"#F0FDF4", borderRadius:10, padding:"10px 12px", marginBottom:12, border:"1px solid #86EFAC" }}>
            <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:11, color:"#166534", marginBottom:8, textTransform:"uppercase", letterSpacing:.5 }}>🏦 Datos bancarios</div>
            <Field label="Banco">
              <select value={form.banco} onChange={e=>set("banco",e.target.value)}>
                {["","BancoEstado","Banco de Chile","Santander","BCI","Itaú","Scotiabank","Falabella","Ripley","Mercado Pago","Otro"].map(b=><option key={b} value={b}>{b||"— Seleccionar —"}</option>)}
              </select>
            </Field>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
              <Field label="Tipo de cuenta">
                <select value={form.tipoCuenta} onChange={e=>set("tipoCuenta",e.target.value)}>
                  {["Cuenta Corriente","Cuenta Vista","Cuenta Ahorro","Cuenta RUT","Chequera Electrónica"].map(t=><option key={t}>{t}</option>)}
                </select>
              </Field>
              <Field label="N° de cuenta">
                <input placeholder="123456789" value={form.numeroCuenta} onChange={e=>set("numeroCuenta",e.target.value.replace(/\D/g,""))}/>
              </Field>
            </div>
          </div>

          {/* Datos del servicio */}
          <div style={{ background:"#EFF6FF", borderRadius:10, padding:"10px 12px", marginBottom:12, border:"1px solid #BFDBFE" }}>
            <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:11, color:"#1D4ED8", marginBottom:8, textTransform:"uppercase", letterSpacing:.5 }}>📋 Servicio prestado</div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
              <Field label="Fecha"><input type="date" value={form.fecha} onChange={e=>set("fecha",e.target.value)}/></Field>
              <Field label="Local">
                <select value={form.local} onChange={e=>set("local",e.target.value)}>
                  {localesMarca.map(l=><option key={l} value={l}>{nombreCortoLocal(l)}</option>)}
                </select>
              </Field>
              <Field label="Horas trabajadas">
                <input type="number" min="0" step="0.5" placeholder="0" value={form.horasNormal||""} onChange={e=>set("horasNormal",parseFloat(e.target.value)||0)}/>
              </Field>
              <Field label="Valor hora $">
                <input type="number" min="0" step="100" placeholder="0" value={form.valorHora||""} onChange={e=>set("valorHora",parseFloat(e.target.value)||0)}/>
              </Field>
            </div>
            <Field label="Descripción del servicio">
              <input placeholder="ej: Servicios de apoyo en cocina" value={form.descripcion} onChange={e=>set("descripcion",e.target.value)}/>
            </Field>
            <Field label="Observaciones (opcional)">
              <input placeholder="Notas adicionales" value={form.obs} onChange={e=>set("obs",e.target.value)}/>
            </Field>
          </div>

          {/* Resumen de monto */}
          {totalBruto > 0 && (
            <div style={{ background:"linear-gradient(135deg,#1A1D2E,#2D1F3D)", borderRadius:12, padding:"14px 16px", marginBottom:14 }}>
              <div style={{ fontFamily:"Nunito", fontWeight:900, fontSize:12, color:"rgba(255,255,255,0.6)", marginBottom:8 }}>RESUMEN DE LIQUIDACIÓN</div>
              {[
                ["Monto bruto", fmtCLP(totalBruto), "#fff"],
                ["Retención 10.75%", "-"+fmtCLP(retencion), "#FCA5A5"],
                ["Monto neto a pagar", fmtCLP(totalNeto), "#6EE7B7"],
              ].map(([l,v,c])=>(
                <div key={l} style={{ display:"flex", justifyContent:"space-between", marginBottom:4 }}>
                  <span style={{ fontFamily:"Nunito", fontSize:11, color:"rgba(255,255,255,0.7)" }}>{l}</span>
                  <span style={{ fontFamily:"Nunito", fontWeight:900, fontSize:13, color:c }}>{v}</span>
                </div>
              ))}
            </div>
          )}

          {(!form.nombre.trim() || !form.rut.trim()) && (
            <div style={{ background:"#FFF8E7", border:"1px solid #FDE68A", borderRadius:8, padding:"8px 12px", marginBottom:10, fontFamily:"Nunito", fontSize:11, color:"#92400E" }}>
              ⚠️ Completa nombre y RUT para guardar.
            </div>
          )}

          <Btn color={saved?"#22C55E":m.color} full onClick={handleGuardar} disabled={!form.nombre.trim()||!form.rut.trim()}>
            {saved ? "✅ Boleta guardada" : "💾 Guardar boleta"}
          </Btn>
        </Card>
      )}

      {/* ── TAB HISTORIAL ── */}
      {tab === "historial" && (
        <div>
          {confirmDel && (
            <ConfirmModal
              msg={`¿Eliminar boleta de ${confirmDel.nombre}?`}
              detalle={`${confirmDel.fecha} · ${fmtCLP(confirmDel.totalBruto)}`}
              onConfirm={() => { setBoletas(prev=>prev.filter(b=>b.id!==confirmDel.id)); setConfirmDel(null); }}
              onCancel={() => setConfirmDel(null)}
            />
          )}

          {/* Filtro de mes */}
          <div style={{ display:"flex", gap:8, marginBottom:14, alignItems:"center" }}>
            <span style={{ fontFamily:"Nunito", fontSize:11, color:"#64748B", fontWeight:700 }}>Mes:</span>

                      <div style={{ display:"inline-flex", alignItems:"center", gap:5, background:estadoColor[b.estado]+"18", border:`1px solid ${estadoColor[b.estado]}44`, borderRadius:8, padding:"4px 10px", marginBottom:10 }}>
                        <span style={{ fontFamily:"Nunito", fontWeight:800, fontSize:11, color:estadoColor[b.estado] }}>{estadoLabel[b.estado]}</span>
                      </div>

                      {/* Acciones de aprobación (solo admin, solo si pendiente) */}

          <div onClick={e=>e.stopPropagation()} style={{ background:"#fff", borderRadius:"20px 20px 0 0", padding:20, width:"100%", maxWidth:480 }}>

// MENSAJES IMPORTANTES — admin envía avisos a las tiendas (visible en dashboard)
// ══════════════════════════════════════════════════════════════════════════════
function useMensajesImportantes() {
  return useStorage("horreo_mensajes_importantes", []);
}

function MensajesImportantesPanel({ session, marca }) {
  // Solo admin puede crear mensajes; todos los usuarios los ven si van dirigidos a su marca
  const esAdmin = session?.rol === "admin" || session?.rol === "gerente";
  const [mensajes, setMensajes] = useMensajesImportantes();
  const [form, setForm] = useState({ titulo:"", cuerpo:"", destino:"todas", prioridad:"normal", expira:"" });
  const [showForm, setShowForm] = useState(false);
  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  const marcasDisp = ["todas", ...Object.keys(MARCAS)];

  const handleGuardar = () => {
    if (!form.titulo.trim() || !form.cuerpo.trim()) return;
    const msg = { id:uid(), ...form, autor: session?.nombre||"Admin", ts: new Date().toISOString(), leido_por: [] };
    setMensajes(prev=>[msg, ...prev]);
    setForm({ titulo:"", cuerpo:"", destino:"todas", prioridad:"normal", expira:"" });
    setShowForm(false);
  };

  // Filtrar mensajes visibles para la marca actual
  const hoy = today();
  const visibles = useMemo(()=>
    mensajes.filter(m => {
      if (m.expira && m.expira < hoy) return false; // expirado
      if (m.destino === "todas") return true;
      return m.destino === marca;
    }).sort((a,b)=>b.ts>a.ts?1:-1),
  [mensajes, marca, hoy]);

  const prioColor = { urgente:"#EF4444", normal:"#6C63FF", info:"#22C55E" };
  const prioLabel = { urgente:"🔴 Urgente", normal:"🔵 Información", info:"🟢 Aviso" };

  if (visibles.length === 0 && !esAdmin) return null;

  return (
    <div style={{ marginBottom:14 }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
        <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:12, color:"#1A1D2E", display:"flex", alignItems:"center", gap:6 }}>
          📣 Mensajes importantes
          {visibles.length > 0 && (
            <span style={{ background:"#EF4444", color:"#fff", borderRadius:10, padding:"1px 7px", fontSize:9, fontWeight:800 }}>{visibles.length}</span>
          )}
        </div>
        {esAdmin && (
          <button onClick={()=>setShowForm(s=>!s)}
            style={{ background:"#6C63FF", color:"#fff", border:"none", borderRadius:8, padding:"5px 10px", fontFamily:"Nunito", fontWeight:800, fontSize:10, cursor:"pointer" }}>
            {showForm ? "✕ Cerrar" : "✏️ Nuevo mensaje"}
          </button>
        )}
      </div>

      {/* Form de redacción (solo admin) */}
      {esAdmin && showForm && (
        <Card style={{ marginBottom:10, border:"2px solid #6C63FF44", background:"#F5F3FF" }}>
          <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:12, color:"#6C63FF", marginBottom:10 }}>📝 Redactar mensaje a tiendas</div>
          <Field label="Título del mensaje">
            <input placeholder="ej: Cierre anticipado viernes" value={form.titulo} onChange={e=>set("titulo",e.target.value)}/>
          </Field>
          <Field label="Contenido">
            <textarea placeholder="Detalle del aviso o instrucción..." value={form.cuerpo} onChange={e=>set("cuerpo",e.target.value)}
              style={{ width:"100%", minHeight:80, border:"1.5px solid #E2E8F0", borderRadius:10, padding:"8px 10px", fontFamily:"Nunito", fontSize:12, resize:"vertical", boxSizing:"border-box" }}/>
          </Field>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8 }}>
            <Field label="Dirigido a">
              <select value={form.destino} onChange={e=>set("destino",e.target.value)}>
                <option value="todas">Todas las tiendas</option>
                {Object.entries(MARCAS).map(([k,m])=><option key={k} value={k}>{m.emoji} {m.nombre}</option>)}
              </select>
            </Field>
            <Field label="Prioridad">
              <select value={form.prioridad} onChange={e=>set("prioridad",e.target.value)}>
                <option value="urgente">🔴 Urgente</option>
                <option value="normal">🔵 Normal</option>
                <option value="info">🟢 Informativo</option>
              </select>
            </Field>
            <Field label="Expira (opcional)">
              <input type="date" value={form.expira} onChange={e=>set("expira",e.target.value)}/>
            </Field>
          </div>
          <div style={{ display:"flex", gap:8, marginTop:8 }}>
            <Btn color="#6C63FF" full onClick={handleGuardar} disabled={!form.titulo.trim()||!form.cuerpo.trim()}>📣 Publicar mensaje</Btn>
            <Btn color="#94A3B8" outline small onClick={()=>setShowForm(false)}>Cancelar</Btn>
          </div>
        </Card>
      )}

      {/* Lista de mensajes */}
      {visibles.map(msg => (
        <div key={msg.id} style={{
          background: msg.prioridad==="urgente" ? "#FEF2F2" : msg.prioridad==="info" ? "#F0FDF4" : "#EFF6FF",
          border:`1.5px solid ${prioColor[msg.prioridad]||"#6C63FF"}44`,
          borderLeft:`4px solid ${prioColor[msg.prioridad]||"#6C63FF"}`,
          borderRadius:10, padding:"10px 14px", marginBottom:8
        }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
            <div style={{ flex:1 }}>
              <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:3 }}>
                <span style={{ fontFamily:"Nunito", fontWeight:900, fontSize:12, color:"#1A1D2E" }}>{msg.titulo}</span>
                <span style={{ fontSize:9, background:prioColor[msg.prioridad]+"22", color:prioColor[msg.prioridad], borderRadius:4, padding:"1px 6px", fontWeight:800 }}>
                  {prioLabel[msg.prioridad]}
                </span>
                {msg.destino !== "todas" && MARCAS[msg.destino] && (
                  <span style={{ fontSize:9, color:"#94A3B8" }}>{MARCAS[msg.destino].emoji} {MARCAS[msg.destino].nombre}</span>
                )}
              </div>
              <div style={{ fontFamily:"Nunito", fontSize:11, color:"#475569", lineHeight:1.5 }}>{msg.cuerpo}</div>
              <div style={{ fontFamily:"Nunito", fontSize:9, color:"#94A3B8", marginTop:4 }}>
                {msg.autor} · {(msg.ts||"").slice(0,10)}
                {msg.expira && ` · Expira: ${msg.expira}`}
              </div>
            </div>
            {esAdmin && (
              <button onClick={()=>setMensajes(prev=>prev.filter(m=>m.id!==msg.id))}
                style={{ background:"none", border:"none", fontSize:14, cursor:"pointer", color:"#CBD5E1", flexShrink:0, marginLeft:8, padding:"2px 6px" }}>✕</button>
            )}
          </div>
        </div>
      ))}

      {visibles.length === 0 && esAdmin && (
        <div style={{ textAlign:"center", padding:"12px 0", fontFamily:"Nunito", fontSize:11, color:"#94A3B8" }}>
          Sin mensajes activos. Usa "Nuevo mensaje" para comunicarte con las tiendas.
        </div>
      )}
    </div>
  );
}

  lanzamiento:  { icon: "🚀", label: "Lanzamiento",      color: "#8B5CF6" },
  contrato:     { icon: "📄", label: "Vto. Contrato",    color: "#EF4444" },
  operacional:  { icon: "⚙️", label: "Operacional",      color: "#F59E0B" },
  capacitacion: { icon: "🎓", label: "Capacitación",     color: "#3B82F6" },
  precio:       { icon: "💲", label: "Cambio de precios",color: "#10B981" },
  proveedor:    { icon: "🚚", label: "Proveedor",        color: "#F97316" },
  rrhh:         { icon: "👥", label: "RRHH",             color: "#EC4899" },
  legal:        { icon: "⚖️", label: "Legal/Normativa",  color: "#64748B" },
  otro:         { icon: "📌", label: "Otro",             color: "#6C63FF" },
};

const ALERTA_PRIORIDAD = {
  critica:  { label: "🔴 Crítica",   color: "#EF4444", bg: "#FEF2F2" },
  alta:     { label: "🟠 Alta",      color: "#F97316", bg: "#FFF7ED" },
  media:    { label: "🟡 Media",     color: "#F59E0B", bg: "#FFFBEB" },
  baja:     { label: "🟢 Informativa", color: "#22C55E", bg: "#F0FDF4" },
};

function CentroAlertas({ session, marca }) {
  const esAdmin = session?.rol === "admin" || session?.rol === "gerente";
  const m = MARCAS[marca] || MARCAS[Object.keys(MARCAS)[0]] || { color:"#6C63FF", nombre:"—" };

  const EMPTY = {
    titulo:"", tipo:"operacional", prioridad:"media", cuerpo:"", link:"",
    destino:"todas", fechaVto:"", tags:"", archivada:false,
  };

  const [alertas, setAlertas] = useSupabase("horreo_alertas", []);
  const [tab, setTab] = useState("feed");
  const [form, setForm] = useState(EMPTY);
  const [editId, setEditId] = useState(null);
  const [saved, setSaved] = useState(false);
  const [filtroTipo, setFiltroTipo] = useState("todos");
  const [filtroMostrarArch, setFiltroMostrarArch] = useState(false);
  const [expandedId, setExpandedId] = useState(null);
  const [confirmDel, setConfirmDel] = useState(null);
  const [busqueda, setBusqueda] = useState("");

  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  const handleGuardar = () => {
    if (!form.titulo.trim()) return;
    if (editId) {
      setAlertas(prev => prev.map(a => a.id === editId
        ? { ...a, ...form, tsEdit: new Date().toISOString(), editadoPor: session?.nombre||"Admin" }
        : a));
    } else {
      const nueva = {
        id: uid(), ...form,
        ts: new Date().toISOString(),
        autor: session?.nombre || "Admin",
        vistas: [],
      };
      setAlertas(prev => [nueva, ...prev]);
    }
    setSaved(true);
    setForm(EMPTY);
    setEditId(null);
    setTimeout(()=>setSaved(false), 2000);
    setTab("feed");
  };

  const handleArchivar = (id) => setAlertas(prev => prev.map(a => a.id===id ? {...a, archivada:!a.archivada} : a));

  const marcarVista = (id) => {
    const uid2 = session?.user||"anon";
    setAlertas(prev => prev.map(a => {
      if (a.id !== id) return a;
      const vistas = Array.isArray(a.vistas) ? a.vistas : [];
      if (vistas.includes(uid2)) return a;
      return { ...a, vistas: [...vistas, uid2] };
    }));
  };

  const hoy = today();

  // Filtrar alertas visibles para la marca actual
  const alertasFiltradas = useMemo(() => {
    let list = alertas.filter(a => {
      if (!filtroMostrarArch && a.archivada) return false;
      if (a.destino !== "todas" && a.destino !== marca) return false;
      if (filtroTipo !== "todos" && a.tipo !== filtroTipo) return false;
      if (busqueda.trim()) {
        const q = busqueda.toLowerCase();
        return (a.titulo||"").toLowerCase().includes(q) ||
               (a.cuerpo||"").toLowerCase().includes(q) ||
               (a.tags||"").toLowerCase().includes(q);
      }
      return true;
    });
    // Ordenar: críticas primero, luego por fecha desc
    const priOrd = { critica:0, alta:1, media:2, baja:3 };
    list.sort((a,b) => {
      const pd = (priOrd[a.prioridad]||2) - (priOrd[b.prioridad]||2);
      if (pd !== 0) return pd;
      return b.ts > a.ts ? 1 : -1;
    });
    return list;
  }, [alertas, marca, filtroTipo, filtroMostrarArch, busqueda]);

  const noLeidas = useMemo(() => {
    const uid2 = session?.user||"anon";
    return alertas.filter(a =>
      !a.archivada &&
      (a.destino === "todas" || a.destino === marca) &&
      !(Array.isArray(a.vistas) && a.vistas.includes(uid2))
    ).length;
  }, [alertas, marca, session]);

  // Vencimientos próximos (próximos 30 días)
  const proxVtos = useMemo(() => alertas.filter(a => {
    if (!a.fechaVto || a.archivada) return false;
    const dias = Math.ceil((new Date(a.fechaVto) - new Date(hoy)) / 86400000);
    return dias >= 0 && dias <= 30;
  }).sort((a,b)=>a.fechaVto>b.fechaVto?1:-1), [alertas, hoy]);

  const diasParaVto = (fechaVto) => {
    const d = Math.ceil((new Date(fechaVto) - new Date(hoy)) / 86400000);
    if (d < 0) return { label:"Vencido", color:"#EF4444" };
    if (d === 0) return { label:"Hoy!", color:"#EF4444" };
    if (d <= 7)  return { label:`${d}d`, color:"#F97316" };
    if (d <= 30) return { label:`${d}d`, color:"#F59E0B" };
    return { label:`${d}d`, color:"#22C55E" };
  };

  const tarjetaAlerta = (a) => {
    const tipo = ALERTA_TIPOS[a.tipo] || ALERTA_TIPOS.otro;
    const prio = ALERTA_PRIORIDAD[a.prioridad] || ALERTA_PRIORIDAD.media;
    const exp  = expandedId === a.id;
    const uid2 = session?.user||"anon";
    const leida = Array.isArray(a.vistas) && a.vistas.includes(uid2);
    const vto   = a.fechaVto ? diasParaVto(a.fechaVto) : null;

    return (
      <div key={a.id} style={{
        background: a.archivada ? "#F8FAFC" : prio.bg,
        border:`1.5px solid ${a.archivada ? "#E2E8F0" : prio.color}33`,
        borderLeft:`4px solid ${a.archivada ? "#CBD5E1" : prio.color}`,
        borderRadius:12, marginBottom:10, overflow:"hidden",
        opacity: a.archivada ? 0.65 : 1,
      }}>
        {/* Header card */}
        <div onClick={()=>{ setExpandedId(exp?null:a.id); if(!leida) marcarVista(a.id); }}
          style={{ padding:"12px 14px", cursor:"pointer", display:"flex", gap:10, alignItems:"flex-start" }}>
          {/* Icono tipo */}
          <div style={{ width:36, height:36, borderRadius:10, background:`${tipo.color}20`, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, fontSize:18 }}>
            {tipo.icon}
          </div>
          <div style={{ flex:1, minWidth:0 }}>
            <div style={{ display:"flex", alignItems:"center", gap:6, flexWrap:"wrap", marginBottom:2 }}>
              {!leida && !a.archivada && (
                <span style={{ width:8, height:8, borderRadius:"50%", background:"#EF4444", flexShrink:0, display:"inline-block" }}/>
              )}
              <span style={{ fontFamily:"Nunito", fontWeight:900, fontSize:13, color:"#1A1D2E", lineHeight:1.2 }}>{a.titulo}</span>
            </div>
            <div style={{ display:"flex", gap:6, flexWrap:"wrap", alignItems:"center" }}>
              <span style={{ fontFamily:"Nunito", fontSize:9, fontWeight:800, color:tipo.color, background:`${tipo.color}15`, borderRadius:5, padding:"1px 6px" }}>
                {tipo.icon} {tipo.label}
              </span>
              <span style={{ fontFamily:"Nunito", fontSize:9, fontWeight:800, color:prio.color }}>
                {prio.label}
              </span>
              {vto && (
                <span style={{ fontFamily:"Nunito", fontSize:9, fontWeight:800, color:vto.color, background:`${vto.color}15`, borderRadius:5, padding:"1px 6px" }}>
                  ⏰ Vence: {vto.label}
                </span>
              )}
              {a.archivada && (
                <span style={{ fontFamily:"Nunito", fontSize:9, color:"#94A3B8", fontWeight:700 }}>📦 Archivada</span>
              )}
            </div>
            <div style={{ fontFamily:"Nunito", fontSize:10, color:"#94A3B8", marginTop:3 }}>
              {a.autor} · {(a.ts||"").slice(0,10)}
              {a.destino !== "todas" && MARCAS[a.destino] && ` · ${MARCAS[a.destino].emoji} ${MARCAS[a.destino].nombre}`}
              {Array.isArray(a.vistas) && a.vistas.length > 0 && ` · 👁 ${a.vistas.length}`}
            </div>
          </div>
          <span style={{ color:"#CBD5E1", fontSize:11, flexShrink:0 }}>{exp?"▲":"▼"}</span>
        </div>

        {/* Expandido */}
        {exp && (
          <div style={{ borderTop:"1px solid #F1F5F9", padding:"12px 14px", background:"rgba(255,255,255,0.6)" }}>
            {a.cuerpo && (
              <div style={{ fontFamily:"Nunito", fontSize:12, color:"#334155", lineHeight:1.7, marginBottom:10, whiteSpace:"pre-wrap" }}>
                {a.cuerpo}
              </div>
            )}
            {a.tags && (
              <div style={{ display:"flex", flexWrap:"wrap", gap:4, marginBottom:10 }}>
                {a.tags.split(",").map(t=>t.trim()).filter(Boolean).map(t=>(
                  <span key={t} style={{ fontFamily:"Nunito", fontSize:9, color:"#6C63FF", background:"#EDE9FE", borderRadius:5, padding:"2px 8px", fontWeight:700 }}>#{t}</span>
                ))}
              </div>
            )}
            {a.link && (
              <a href={a.link} target="_blank" rel="noreferrer"
                style={{ display:"inline-flex", alignItems:"center", gap:5, fontFamily:"Nunito", fontSize:11, color:"#3B82F6", fontWeight:700, marginBottom:10, textDecoration:"none" }}>
                🔗 Ver documento / enlace externo
              </a>
            )}
            {a.fechaVto && (
              <div style={{ fontFamily:"Nunito", fontSize:11, color:diasParaVto(a.fechaVto).color, fontWeight:700, marginBottom:10 }}>
                ⏰ Fecha de vencimiento: {a.fechaVto} ({diasParaVto(a.fechaVto).label})
              </div>
            )}
            {a.tsEdit && (
              <div style={{ fontFamily:"Nunito", fontSize:9, color:"#94A3B8", marginBottom:10 }}>
                Editado el {a.tsEdit.slice(0,10)} por {a.editadoPor}
              </div>
            )}
            {esAdmin && (
              <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                <button onClick={()=>{ setForm({titulo:a.titulo,tipo:a.tipo,prioridad:a.prioridad,cuerpo:a.cuerpo||"",link:a.link||"",destino:a.destino,fechaVto:a.fechaVto||"",tags:a.tags||"",archivada:a.archivada}); setEditId(a.id); setTab("nueva"); }}
                  style={{ background:"#6C63FF", color:"#fff", border:"none", borderRadius:8, padding:"7px 12px", fontFamily:"Nunito", fontWeight:800, fontSize:11, cursor:"pointer" }}>
                  ✏️ Editar
                </button>
                <button onClick={()=>handleArchivar(a.id)}
                  style={{ background:"#F1F5F9", color:"#64748B", border:"none", borderRadius:8, padding:"7px 12px", fontFamily:"Nunito", fontWeight:800, fontSize:11, cursor:"pointer" }}>
                  {a.archivada ? "📬 Desarchivar" : "📦 Archivar"}
                </button>
                <button onClick={()=>showMailModal(`[El Hórreo] ${a.titulo}`, `${a.titulo}\n\n${a.cuerpo||""}${a.link?"\n\nEnlace: "+a.link:""}${a.fechaVto?"\nVencimiento: "+a.fechaVto:""}`)}
                  style={{ background:"#EFF6FF", color:"#3B82F6", border:"none", borderRadius:8, padding:"7px 12px", fontFamily:"Nunito", fontWeight:800, fontSize:11, cursor:"pointer" }}>
                  📤 Compartir
                </button>
                <button onClick={()=>setConfirmDel(a)}
                  style={{ background:"#FEF2F2", color:"#EF4444", border:"none", borderRadius:8, padding:"7px 12px", fontFamily:"Nunito", fontWeight:800, fontSize:11, cursor:"pointer" }}>
                  🗑
                </button>
              </div>
            )}
            {!esAdmin && (
              <button onClick={()=>showMailModal(`[El Hórreo] ${a.titulo}`, `${a.titulo}\n\n${a.cuerpo||""}${a.link?"\n\nEnlace: "+a.link:""}`)}
                style={{ background:"#EFF6FF", color:"#3B82F6", border:"none", borderRadius:8, padding:"7px 12px", fontFamily:"Nunito", fontWeight:800, fontSize:11, cursor:"pointer" }}>
                📤 Compartir
              </button>
            )}
          </div>
        )}
      </div>
    );
  };

  return (
    <div className="fade" style={{ paddingBottom:90 }}>
      <LogoHeader marca={marca} />
      <SectionTitle color={m.color}>🔔 Centro de Alertas</SectionTitle>

      {confirmDel && (
        <ConfirmModal
          msg={`¿Eliminar alerta "${confirmDel.titulo}"?`}
          detalle="Esta acción no se puede deshacer."
          onConfirm={()=>{ setAlertas(prev=>prev.filter(a=>a.id!==confirmDel.id)); setConfirmDel(null); }}
          onCancel={()=>setConfirmDel(null)}
        />
      )}

      {/* ── KPIs ── */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:8, marginBottom:14 }}>
        {[
          ["Sin leer", noLeidas, "#EF4444"],
          ["Activas", alertas.filter(a=>!a.archivada&&(a.destino==="todas"||a.destino===marca)).length, m.color],
          ["Vto. próximos", proxVtos.length, "#F59E0B"],
        ].map(([l,v,c])=>(
          <Card key={l} style={{ textAlign:"center", padding:"10px 6px" }}>
            <div style={{ fontFamily:"Nunito", fontWeight:900, fontSize:22, color:c }}>{v}</div>
            <div style={{ fontFamily:"Nunito", fontSize:9, color:"#94A3B8", textTransform:"uppercase", fontWeight:700 }}>{l}</div>
          </Card>
        ))}
      </div>

      {/* ── Vencimientos próximos banner ── */}
      {proxVtos.length > 0 && (
        <div style={{ background:"#FFF7ED", border:"1.5px solid #FED7AA", borderRadius:12, padding:"10px 14px", marginBottom:14 }}>
          <div style={{ fontFamily:"Nunito", fontWeight:900, fontSize:12, color:"#C2410C", marginBottom:6 }}>
            ⏰ Vencimientos próximos (30 días)
          </div>
          {proxVtos.map(a => {
            const vto = diasParaVto(a.fechaVto);
            return (
              <div key={a.id} onClick={()=>{ setExpandedId(a.id); setTab("feed"); }}
                style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"5px 0", borderBottom:"1px solid #FED7AA", cursor:"pointer" }}>
                <div style={{ fontFamily:"Nunito", fontSize:11, fontWeight:700, color:"#1A1D2E", flex:1 }}>{a.titulo}</div>
                <div style={{ fontFamily:"Nunito", fontSize:11, fontWeight:800, color:vto.color, flexShrink:0, marginLeft:8 }}>
                  {a.fechaVto} · {vto.label}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* ── Tabs ── */}
      <div style={{ display:"flex", gap:6, marginBottom:14 }}>
        {[["feed","📋 Feed"],["nueva", esAdmin ? (editId?"✏️ Editando":"➕ Nueva") : ""]].filter(([,l])=>l).map(([k,l])=>(
          <button key={k} onClick={()=>{ setTab(k); if(k==="feed") setEditId(null); }}
            style={{ flex:1, background:tab===k?m.color:"#F1F5F9", color:tab===k?"#fff":"#64748B",
              border:"none", borderRadius:10, padding:"10px 0", fontFamily:"Nunito", fontWeight:800, fontSize:12, cursor:"pointer" }}>
            {l}
            {k==="feed" && noLeidas>0 && tab!=="feed" && (
              <span style={{ marginLeft:5, background:"#EF4444", color:"#fff", borderRadius:10, padding:"1px 6px", fontSize:9, fontWeight:800 }}>{noLeidas}</span>
            )}
          </button>
        ))}
      </div>

      {/* ── TAB FEED ── */}
      {tab === "feed" && (
        <div>
          {/* Barra de búsqueda y filtros */}
          <div style={{ display:"flex", gap:6, marginBottom:10 }}>
            <input placeholder="🔍 Buscar..." value={busqueda} onChange={e=>setBusqueda(e.target.value)}
              style={{ flex:1, border:"1.5px solid #E2E8F0", borderRadius:10, padding:"8px 12px", fontFamily:"Nunito", fontSize:12 }}/>
          </div>
          <div style={{ display:"flex", gap:6, overflowX:"auto", paddingBottom:6, marginBottom:12 }}>
            {[["todos","Todos"], ...Object.entries(ALERTA_TIPOS).map(([k,v])=>[k, v.icon+" "+v.label])].map(([k,l])=>(
              <button key={k} onClick={()=>setFiltroTipo(k)}
                style={{ flexShrink:0, background:filtroTipo===k?"#1A1D2E":"#F1F5F9", color:filtroTipo===k?"#fff":"#64748B",
                  border:"none", borderRadius:8, padding:"6px 12px", fontFamily:"Nunito", fontWeight:700, fontSize:10, cursor:"pointer", whiteSpace:"nowrap" }}>
                {l}
              </button>
            ))}
          </div>
          {esAdmin && (
            <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:12 }}>
              <input type="checkbox" id="chk-arch" checked={filtroMostrarArch} onChange={e=>setFiltroMostrarArch(e.target.checked)}/>
              <label htmlFor="chk-arch" style={{ fontFamily:"Nunito", fontSize:11, color:"#64748B", cursor:"pointer" }}>Mostrar archivadas</label>
            </div>
          )}

          {alertasFiltradas.length === 0
            ? <Card><div style={{ textAlign:"center", padding:28, color:"#94A3B8", fontFamily:"Nunito" }}>
                {busqueda ? `Sin resultados para "${busqueda}"` : "Sin alertas activas"}
              </div></Card>
            : alertasFiltradas.map(a => tarjetaAlerta(a))
          }
        </div>
      )}

      {/* ── TAB NUEVA / EDITAR ── */}
      {tab === "nueva" && esAdmin && (
        <Card>
          <div style={{ fontFamily:"Nunito", fontWeight:900, fontSize:14, color:m.color, marginBottom:14 }}>
            {editId ? "✏️ Editar alerta" : "➕ Nueva alerta"}
          </div>

          <Field label="Título *">
            <input placeholder="ej: Nuevo lanzamiento McDonalds — Cuarto de Libra Doble" value={form.titulo} onChange={e=>set("titulo",e.target.value)}/>
          </Field>

          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
            <Field label="Tipo">
              <select value={form.tipo} onChange={e=>set("tipo",e.target.value)}>
                {Object.entries(ALERTA_TIPOS).map(([k,v])=>
                  <option key={k} value={k}>{v.icon} {v.label}</option>
                )}
              </select>
            </Field>
            <Field label="Prioridad">
              <select value={form.prioridad} onChange={e=>set("prioridad",e.target.value)}>
                {Object.entries(ALERTA_PRIORIDAD).map(([k,v])=>
                  <option key={k} value={k}>{v.label}</option>
                )}
              </select>
            </Field>
          </div>

          <Field label="Detalle / Descripción">
            <textarea placeholder="Descripción completa, instrucciones, contexto..." value={form.cuerpo}
              onChange={e=>set("cuerpo",e.target.value)}
              style={{ width:"100%", minHeight:100, border:"1.5px solid #E2E8F0", borderRadius:10, padding:"8px 10px",
                fontFamily:"Nunito", fontSize:12, resize:"vertical", boxSizing:"border-box", lineHeight:1.6 }}/>
          </Field>

          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
            <Field label="Dirigida a">
              <select value={form.destino} onChange={e=>set("destino",e.target.value)}>
                <option value="todas">Todas las marcas</option>
                {Object.entries(MARCAS).map(([k,v])=>
                  <option key={k} value={k}>{v.emoji} {v.nombre}</option>
                )}
              </select>
            </Field>
            <Field label="Fecha de vencimiento">
              <input type="date" value={form.fechaVto} onChange={e=>set("fechaVto",e.target.value)}/>
            </Field>
          </div>

          <Field label="Link / Documento (opcional)">
            <input placeholder="https://..." value={form.link} onChange={e=>set("link",e.target.value)}/>
          </Field>

          <Field label="Etiquetas (separadas por coma)">
            <input placeholder="ej: doggis, proveedores, urgente" value={form.tags} onChange={e=>set("tags",e.target.value)}/>
          </Field>

          {/* Preview visual */}
          {form.titulo && (
            <div style={{
              background: (ALERTA_PRIORIDAD[form.prioridad]||ALERTA_PRIORIDAD.media).bg,
              borderLeft:`4px solid ${(ALERTA_PRIORIDAD[form.prioridad]||ALERTA_PRIORIDAD.media).color}`,
              borderRadius:10, padding:"10px 14px", marginBottom:14
            }}>
              <div style={{ fontFamily:"Nunito", fontSize:10, color:"#64748B", marginBottom:3 }}>Vista previa</div>
              <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                <span style={{ fontSize:16 }}>{(ALERTA_TIPOS[form.tipo]||ALERTA_TIPOS.otro).icon}</span>
                <span style={{ fontFamily:"Nunito", fontWeight:900, fontSize:13, color:"#1A1D2E" }}>{form.titulo}</span>
              </div>
              {form.cuerpo && <div style={{ fontFamily:"Nunito", fontSize:11, color:"#475569", marginTop:5, lineHeight:1.5 }}>{form.cuerpo.slice(0,120)}{form.cuerpo.length>120?"…":""}</div>}
            </div>
          )}

          <div style={{ display:"flex", gap:8 }}>
            <Btn color={saved?"#22C55E":m.color} full onClick={handleGuardar} disabled={!form.titulo.trim()}>
              {saved ? "✅ Guardado" : editId ? "💾 Guardar cambios" : "📣 Publicar alerta"}
            </Btn>
            {editId && (
              <Btn color="#94A3B8" outline small onClick={()=>{ setForm(EMPTY); setEditId(null); setTab("feed"); }}>
                Cancelar
              </Btn>
            )}
          </div>
        </Card>
      )}
    </div>
  );
}
