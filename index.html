function aplicarInventarioInicial() {
  const KEY_APPLIED = "horreo_inv_inicial_aplicado_v1";
  if (localStorage.getItem(KEY_APPLIED)) return; // ya aplicado
  try {
    const { locales } = INVENTARIO_INICIAL;
    const fecha = INVENTARIO_INICIAL.fecha; // "2026-06-08"
    // Agrupar por marca
    const marcaStock = {};
    const marcaFecha = {};
    const marcaHist  = {};
    Object.entries(locales).forEach(([local, d]) => {
      const marca = d.marca;
      if (!marcaStock[marca]) { marcaStock[marca] = {}; marcaFecha[marca] = {}; marcaHist[marca] = []; }
      // Solo cargar si no hay conteo previo para este local
      const existingKey = "horreo_conteo_" + marca;
      const existing = JSON.parse(localStorage.getItem(existingKey) || "{}");
      let nuevos = 0;
      Object.entries(d.items).forEach(([nombre, cant]) => {
        const key = local + "||" + nombre;
        if (!(key in existing)) {
          existing[key] = cant;
          nuevos++;
        }
      });
      if (nuevos > 0) {
        localStorage.setItem(existingKey, JSON.stringify(existing));
      }
      // Fecha del conteo
      const fechaKey = "horreo_conteo_fecha_" + marca;
      const fechas = JSON.parse(localStorage.getItem(fechaKey) || "{}");
      if (!fechas[local]) {
        fechas[local] = fecha;
        localStorage.setItem(fechaKey, JSON.stringify(fechas));
      }
      // Historial
      const histKey = "horreo_inv_hist_" + marca;
      const hist = JSON.parse(localStorage.getItem(histKey) || "[]");
      const yaExiste = hist.some(h => h.local === local && h.fecha === fecha);
      if (!yaExiste) {
        hist.unshift({ fecha, local, archivo: "Inventario_ERP_08-06-2026.xlsx",
          items: Object.values(d.items).filter(v=>v>0).length, tipo: "completado" });
        localStorage.setItem(histKey, JSON.stringify(hist.slice(0,20)));
      }
    });
    localStorage.setItem(KEY_APPLIED, "1");
    console.log("[El Hórreo] Inventario inicial 08-06-2026 aplicado correctamente.");
  } catch(e) { console.warn("[El Hórreo] Error aplicando inventario inicial:", e.message); }
}

// Ejecutar inmediatamente (antes que React monte)
aplicarInventarioInicial();

function getErpLocal(localNombre) {
  // Primero busca en CATALOGO_INVENTARIO (datos completos de inventario ERP real)
  if (CATALOGO_INVENTARIO[localNombre]) return CATALOGO_INVENTARIO[localNombre].map(it => {
    // Support both {n,u,p,id} and [name, um] array formats
    const nm = Array.isArray(it) ? it[0] : it.n;
    const um = Array.isArray(it) ? it[1] : it.u;
    return {
    m: nm, u: um, um_basica: um, pres: Array.isArray(it) ? "" : (it.p||""), erp_id: Array.isArray(it) ? null : it.id,
    // pd (consumo diario) se calcula desde ERP_HISTORICO si existe
    pd: (() => {
      const erp = ERP_HISTORICO[localNombre] || ERP_HISTORICO[Object.keys(ERP_HISTORICO).find(k => localNombre && (k === localNombre || localNombre.includes(k.split(" - ")[0]) || k.includes(localNombre.split(" - ").slice(-1)[0])))||""] || [];
      const match = erp.find(e => e.m.toUpperCase() === it.n);
      return match ? match.pd : 0;
    })(),
    q: 0, c: 0, p: []
  };});
  // Fallback a ERP_HISTORICO
  if (ERP_HISTORICO[localNombre]) return ERP_HISTORICO[localNombre];
  const key = Object.keys(ERP_HISTORICO).find(k => localNombre && localNombre.includes(k.split(" - ")[0]));
  return key ? ERP_HISTORICO[key] : [];
}

// Lookup UM básica de un producto por nombre (desde CATALOGO_INVENTARIO)
function getUmBasica(nombreMat) {
  const n = (nombreMat||"").toUpperCase().trim();
  for (const items of Object.values(CATALOGO_INVENTARIO)) {
    const found = items.find(it => Array.isArray(it) ? it[0]===n : (it.n===n||it.n.startsWith(n.slice(0,10))));
    if (found) return Array.isArray(found) ? found[1] : (found.u||"UNI");
  }
  return "UNI";
}
function getPresentacion(nombreMat) {
  const n = (nombreMat||"").toUpperCase().trim();
  for (const items of Object.values(CATALOGO_INVENTARIO)) {
    const found = items.find(it => !Array.isArray(it) && (it.n===n || it.n.startsWith(n.slice(0,10))));
    if (found && found.p) return found.p;
  }
  return "";
}

// ── Par de Producción ─────────────────────────────────────────────────────────
// Soporta: datos ERP (inventario importado) + ingreso manual de stock
function ParProduccion({ marca, ventas }) {
  const m = MARCAS[marca] || MARCAS[Object.keys(MARCAS)[0]] || { color:"#6C63FF", bg:"#F0EEFF", emoji:"🌭", textColor:"#fff", nombre:"—" };
  const localesMarca = LOCALES_POR_MARCA[marca] || LOCALES;
  const [local, setLocal]         = useState(localesMarca[0] || "");
  const [diasCoverage, setDias]   = useState(1);
  const [filtro, setFiltro]       = useState("");
  const [stockMap, setStockMap]   = useStorage("horreo_stock_manual_" + marca, {});
  const [editStock, setEditStock] = useState(null);
  const [erpInv, setErpInv]       = useStorage("horreo_erp_inv_" + marca, null);
  const [loadingERP, setLoadingERP] = useState(false);
  const [erpError, setErpError]   = useState("");
  const [modoStock, setModoStock] = useState("erp");
  const [costoTeoDetalle, setCostoTeoDetalle] = useStorage("horreo_ct_detalle_" + marca, null);
  const [loadingCT, setLoadingCT] = useState(false);
  const [ctError, setCtError] = useState("");

  // ── Motor de consumo dinámico con jerarquía de fuentes ────────────────────
  // Devuelve { pd, fuente } para cada item del catálogo
  const consumoDinamico = useMemo(() => {
    const hoy   = new Date();
    const hace7  = new Date(hoy); hace7.setDate(hoy.getDate() - 7);
    const hace28 = new Date(hoy); hace28.setDate(hoy.getDate() - 28);

    // Ventas del local en la app (últimas 4 semanas)
    const ventasLocal28 = (ventas||[]).filter(v =>
      v.local === local && v.marca === marca &&
      v.fecha >= hace28.toISOString().slice(0,10)
    );
    const ventasLocal7 = ventasLocal28.filter(v =>
      v.fecha >= hace7.toISOString().slice(0,10)
    );

    // Calcular ventas promedio diario (últimas 4 semanas para tendencia)
    const diasConVentas28 = new Set(ventasLocal28.map(v=>v.fecha)).size;
    const diasConVentas7  = new Set(ventasLocal7.map(v=>v.fecha)).size;
    const totalVenta28 = ventasLocal28.reduce((s,v)=>s+(parseFloat(v.venta_bruta)||0),0);
    const totalVenta7  = ventasLocal7.reduce((s,v)=>s+(parseFloat(v.venta_bruta)||0),0);
    const vd28 = diasConVentas28 > 0 ? totalVenta28/diasConVentas28 : 0;
    const vd7  = diasConVentas7  > 0 ? totalVenta7/diasConVentas7   : 0;
    // Mezcla: 60% semana anterior + 40% tendencia 4 semanas
    const ventaDiaMix = vd7 > 0 && vd28 > 0 ? (vd7*0.6 + vd28*0.4)
                      : vd7 > 0 ? vd7
                      : vd28 > 0 ? vd28 : 0;

    // ERP histórico del local como fallback
    const erpItems = getErpLocal(local);
    const erpMap = {};
    erpItems.forEach(it => { erpMap[it.m.toUpperCase()] = it.pd || 0; });

    // Para cada item del catálogo, calcular pd y fuente
    const result = {};
    erpItems.forEach(it => {
      const nombre = it.m.toUpperCase();
      const pdERP  = it.pd || 0;

      // Fuente 1: ajuste por venta real si tenemos ratio venta/consumo del ERP
      if (ventaDiaMix > 0 && pdERP > 0) {
        // Necesitamos venta de referencia del ERP para calcular ratio consumo/venta
        // Obtenemos del ERP_HISTORICO el promedio de venta_bruta si existe
        const erpH = Object.values(ERP_HISTORICO).flat();
        const erpRef = erpH.find(e => e.m.toUpperCase() === nombre);
        // Si el ERP tiene consumo diario y podemos estimar consumo por peso de venta
        // Ratio = pd_ERP / venta_dia_ERP (cuánto se consume por peso de venta)
        // Estimamos venta diaria del ERP como promedio de locales similares
        const ventaDiaERP = erpRef ? (erpRef.c * erpRef.pd) / Math.max(1, erpRef.q) : 0;
        if (ventaDiaERP > 0 && ventaDiaMix > 0) {
          const ratioAjuste = ventaDiaMix / ventaDiaERP;
          // Ajuste suavizado: no más de 2x ni menos de 0.5x del histórico
          const factorSuave = Math.min(2, Math.max(0.5, ratioAjuste));
          result[nombre] = {
            pd:     Math.round(pdERP * factorSuave * 100) / 100,
            fuente: diasConVentas7 >= 3 ? "ventas_semana" : "ventas_tendencia",
            pdBase: pdERP,
            factor: Math.round(factorSuave*100)/100,
          };
          return;
        }
      }
      // Fuente 2: ERP histórico directo
      if (pdERP > 0) {
        result[nombre] = { pd: pdERP, fuente: "erp_historico", pdBase: pdERP, factor: 1 };
        return;
      }
      // Fuente 3: no hay datos
      result[nombre] = { pd: 0, fuente: "sin_datos", pdBase: 0, factor: 1 };
    });

    return {
      map: result,
      ventaDiaMix: Math.round(ventaDiaMix),
      diasConVentas7,
      diasConVentas28,
      fuente: diasConVentas7 >= 3 ? "ventas_semana" :
              diasConVentas28 >= 5 ? "ventas_tendencia" : "erp_historico",
    };
  }, [local, marca, ventas]);

  // Enriquecer items con consumo dinámico
  const items = useMemo(() => {
    const base = getErpLocal(local);
    return base.map(it => {
      const din = consumoDinamico.map[it.m.toUpperCase()];
      return { ...it, pd: din ? din.pd : (it.pd || 0), _fuente: din?.fuente || "erp_historico", _factor: din?.factor || 1 };
    });
  }, [local, consumoDinamico]);
  const diasStr = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
  const hoy = new Date();
  const diasSem = Array.from({length:7},(_,i)=>{ const d=new Date(hoy); d.setDate(hoy.getDate()+i); return d; });

  const filtered = useMemo(() => {
    if (!filtro) return items;
    return items.filter(it => it.m.toLowerCase().includes(filtro.toLowerCase()));
  }, [items, filtro]);

  // Consumo teórico del local activo (de informe ERP cargado)
  const consumoTeoLocal = useMemo(() => {
    if (!costoTeoDetalle || !costoTeoDetalle.data) return {};
    // Buscar coincidencia de local en el detalle
    const keys = Object.keys(costoTeoDetalle.data);
    const matchKey = keys.find(k => k === local) || keys.find(k => local.includes(k.split(" - ")[0]) || k.includes(local.split(" - ")[0]));
    return matchKey ? costoTeoDetalle.data[matchKey] : {};
  }, [costoTeoDetalle, local]);

  const norm = s => String(s||"").trim().toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");

  // Stock ajustado = ERP - consumo teórico del período
  const calcStock = (mat, unidad) => {
    let stockBase = 0;
    if (modoStock === "erp" && erpInv && erpInv.items) {
      const found = erpInv.items.find(i =>
        i.nombre.toLowerCase() === mat.toLowerCase() ||
        i.nombre.toLowerCase().includes(mat.toLowerCase().slice(0, 12))
      );
      if (found) stockBase = found.cantidad;
    } else {
      stockBase = parseFloat(stockMap[local + "||" + mat] || 0);
    }
    // Descontar consumo teórico si está disponible
    if (Object.keys(consumoTeoLocal).length > 0) {
      const matNorm = norm(mat);
      const ctMatch = consumoTeoLocal[matNorm] || Object.entries(consumoTeoLocal).find(([k]) => k.includes(matNorm.slice(0,8)) || matNorm.includes(k.slice(0,8)))?.[1];
      if (ctMatch && ctMatch.cantidad > 0) {
        stockBase = Math.max(0, stockBase - ctMatch.cantidad);
      }
    }
    return stockBase;
  };

  // Importar informe costo teórico para descuento de inventario
  const handleCTFile = async e => {
    const file = e.target.files[0]; if (!file) return;
    setLoadingCT(true); setCtError("");
    try {
      const XLSX2 = await loadXLSX();
      const wb = XLSX2.read(await file.arrayBuffer(), { type:"array" });
      const data = parseCostoTeoricoDetalle(wb);
      const localesCount = Object.keys(data).length;
      const itemsCount   = Object.values(data).reduce((s, v) => s + Object.keys(v).length, 0);
      setCostoTeoDetalle({ fecha: today(), archivo: file.name, data, localesCount, itemsCount });
    } catch(err) { setCtError("Error al leer: " + err.message); }
    finally { setLoadingCT(false); e.target.value = ""; }
  };

  const calcNeeded  = (it) => Math.ceil(it.pd * diasCoverage * 10) / 10;
  const calcFaltante = (it) => Math.max(0, calcNeeded(it) - calcStock(it.m, it.u));

  const saveStock = () => {
    if (!editStock) return;
    setStockMap(prev => ({ ...prev, [local + "||" + editStock.material]: parseFloat(editStock.value) || 0 }));
    setEditStock(null);
  };

  const urgencia = (it) => {
    const stock = calcStock(it.m, it.u); const needed = calcNeeded(it);
    if (stock === 0) return "critico";
    if (stock < needed * 0.3) return "bajo";
    if (stock < needed) return "ok";
    return "suficiente";
  };
  const urg_color = { critico:"#EF4444", bajo:"#F97316", ok:"#EAB308", suficiente:"#22C55E" };
  const urg_label = { critico:"🔴 Sin stock", bajo:"🟠 Stock bajo", ok:"🟡 Stock parcial", suficiente:"🟢 OK" };

  const resumen = useMemo(() => ({
    criticos: filtered.filter(it=>urgencia(it)==="critico").length,
    bajos:    filtered.filter(it=>urgencia(it)==="bajo").length,
  }), [filtered, stockMap, erpInv, diasCoverage, local, modoStock]);

  // Importar inventario ERP
  const handleErpFile = async e => {
    const file = e.target.files[0]; if (!file) return;
    setLoadingERP(true); setErpError("");
    try {
      const XLSX = await loadXLSX();
      const wb = XLSX.read(await file.arrayBuffer(), { type:"array" });
      const parsed = parseInventarioERP(wb);
      setErpInv({ local, fecha: today(), items: parsed, archivo: file.name });
    } catch(err) { setErpError("Error al leer archivo: " + err.message); }
    finally { setLoadingERP(false); e.target.value = ""; }
  };

  // Colores y labels por fuente
  const fuenteInfo = {
    ventas_semana:    { label:"📱 Semana anterior (app)", color:"#22C55E", bg:"#F0FDF4", border:"#86EFAC", desc:`Calculado desde ${consumoDinamico.diasConVentas7} días de ventas registradas en los últimos 7 días` },
    ventas_tendencia: { label:"📈 Tendencia 4 semanas (app)", color:"#6C63FF", bg:"#EFF6FF", border:"#BFDBFE", desc:`Promedio de ${consumoDinamico.diasConVentas28} días registrados en 4 semanas` },
    erp_historico:    { label:"📂 Histórico ERP", color:"#F59E0B", bg:"#FFFBEB", border:"#FDE68A", desc:"No hay suficientes ventas en la app · Usando datos del Back Office importado" },
    sin_datos:        { label:"⚠️ Sin datos", color:"#EF4444", bg:"#FEF2F2", border:"#FECACA", desc:"Sin ventas ni historial ERP para este local" },
  };
  const fi = fuenteInfo[consumoDinamico.fuente] || fuenteInfo.erp_historico;

  return (
    <div style={{paddingBottom:80}}>

      {/* Banner de fuente de consumo */}
      <div style={{ background:fi.bg, border:`1.5px solid ${fi.border}`, borderRadius:12, padding:"10px 14px", marginBottom:12 }}>
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          <div style={{ flex:1 }}>
            <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:12, color:fi.color }}>
              Fuente de consumo: {fi.label}
            </div>
            <div style={{ fontFamily:"Nunito", fontSize:10, color:"#64748B", marginTop:2 }}>{fi.desc}</div>
            {consumoDinamico.ventaDiaMix > 0 && (
              <div style={{ fontFamily:"Nunito", fontSize:10, color:fi.color, fontWeight:700, marginTop:2 }}>
                Venta/día de referencia: ${consumoDinamico.ventaDiaMix.toLocaleString("es-CL")}
              </div>
            )}
          </div>
          {consumoDinamico.fuente === "erp_historico" && (
            <div style={{ fontSize:10, color:"#94A3B8", fontFamily:"Nunito", textAlign:"right", flexShrink:0 }}>
              Registra ventas<br/>para mejorar
            </div>
          )}
          {consumoDinamico.fuente !== "erp_historico" && consumoDinamico.fuente !== "sin_datos" && (
            <div style={{ textAlign:"right", flexShrink:0 }}>
              <div style={{ fontFamily:"Nunito", fontSize:18, fontWeight:900, color:fi.color }}>
                {consumoDinamico.diasConVentas7}d
              </div>
              <div style={{ fontFamily:"Nunito", fontSize:8, color:"#94A3B8" }}>sem.</div>
            </div>
          )}
        </div>
      </div>

      <Card style={{marginBottom:12}}>
        <div style={{fontFamily:"Nunito",fontWeight:900,fontSize:15,color:m.color,marginBottom:12}}>🍳 Par de Producción</div>

        {/* Local y cobertura */}
        <Field label="Local">
          <select value={local} onChange={e=>setLocal(e.target.value)}>
            {localesMarca.map(l=><option key={l} value={l}>{nombreCortoLocal(l)}</option>)}
          </select>
        </Field>
        <Field label="Cobertura (días)">
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:4}}>
            {[1,2,3,5,7].map(d=>(
              <button key={d} onClick={()=>setDias(d)}
                style={{background:diasCoverage===d?m.color:"#F1F5F9",color:diasCoverage===d?"#fff":"#475569",border:"none",borderRadius:8,padding:"6px 14px",fontFamily:"Nunito",fontWeight:800,fontSize:12,cursor:"pointer"}}>
                {d}d
              </button>
            ))}
          </div>
        </Field>

        {/* Toggle fuente de stock */}
        <Field label="Fuente de stock">
          <div style={{display:"flex",gap:6,marginTop:4}}>
            <button onClick={()=>setModoStock("erp")}
              style={{background:modoStock==="erp"?m.color:"#F1F5F9",color:modoStock==="erp"?"#fff":"#475569",border:"none",borderRadius:8,padding:"6px 14px",fontFamily:"Nunito",fontWeight:800,fontSize:12,cursor:"pointer"}}>
              📤 Inventario ERP
            </button>
            <button onClick={()=>setModoStock("manual")}
              style={{background:modoStock==="manual"?m.color:"#F1F5F9",color:modoStock==="manual"?"#fff":"#475569",border:"none",borderRadius:8,padding:"6px 14px",fontFamily:"Nunito",fontWeight:800,fontSize:12,cursor:"pointer"}}>
              ✏️ Manual
            </button>
          </div>
        </Field>

        {/* Importar ERP */}
        {modoStock === "erp" && (
          <div style={{marginTop:10,background:"#F8FAFC",borderRadius:10,padding:12}}>
            {erpInv ? (
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{fontSize:11,fontWeight:800,color:m.color,fontFamily:"Nunito"}}>✅ Inventario ERP cargado</div>
                  <div style={{fontSize:10,color:"#64748B"}}>{erpInv.archivo} · {erpInv.fecha} · {erpInv.items?.length} ítems</div>
                </div>
                <label style={{background:m.color+"20",color:m.color,borderRadius:8,padding:"5px 10px",fontSize:11,fontWeight:800,fontFamily:"Nunito",cursor:"pointer"}}>
                  🔄 Actualizar
                  <input type="file" accept=".xlsx,.xls" style={{display:"none"}} onChange={handleErpFile}/>
                </label>
              </div>
            ) : (
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:12,color:"#64748B",marginBottom:8,fontFamily:"Nunito"}}>
                  Importa el <b>Inventario General</b> del ERP para usar stock real
                </div>
                {loadingERP ? <div style={{color:m.color,fontSize:12,fontFamily:"Nunito"}}>⏳ Procesando...</div> : (
                  <label style={{display:"inline-block",background:m.color,color:"#fff",borderRadius:10,padding:"8px 18px",fontFamily:"Nunito",fontWeight:800,fontSize:12,cursor:"pointer"}}>
                    📤 Importar Inventario ERP
                    <input type="file" accept=".xlsx,.xls" style={{display:"none"}} onChange={handleErpFile}/>
                  </label>
                )}
                {erpError && <div style={{color:"#EF4444",fontSize:11,marginTop:8}}>{erpError}</div>}
              </div>
            )}
          </div>
        )}

        {/* Costo Teórico para descuento de inventario */}
        <div style={{marginTop:10,background:"#F0FDF4",borderRadius:10,padding:10,border:"1px solid #86EFAC"}}>
          <div style={{fontSize:11,fontWeight:800,color:"#15803D",fontFamily:"Nunito",marginBottom:4}}>📊 Informe Costo Teórico → Descuento Inventario</div>
          {costoTeoDetalle ? (
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontSize:10,color:"#16A34A",fontWeight:700,fontFamily:"Nunito"}}>✅ {costoTeoDetalle.archivo}</div>
                <div style={{fontSize:10,color:"#64748B"}}>{costoTeoDetalle.fecha} · {costoTeoDetalle.localesCount} locales · {costoTeoDetalle.itemsCount} ítems</div>
                <div style={{fontSize:10,color:"#15803D",marginTop:2}}>⚡ Stock mostrado = ERP − consumo teórico del período</div>
              </div>
              <div style={{display:"flex",gap:4,flexDirection:"column",alignItems:"flex-end"}}>
                <label style={{background:"#15803D",color:"#fff",borderRadius:8,padding:"4px 10px",fontSize:11,fontWeight:800,fontFamily:"Nunito",cursor:"pointer"}}>
                  🔄<input type="file" accept=".xlsx,.xls" style={{display:"none"}} onChange={handleCTFile}/>
                </label>
                <button onClick={()=>setCostoTeoDetalle(null)} style={{background:"#FEE2E2",color:"#DC2626",border:"none",borderRadius:6,padding:"3px 8px",fontSize:10,cursor:"pointer",fontFamily:"Nunito",fontWeight:700}}>✕ Quitar</button>
              </div>
            </div>
          ) : (
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:11,color:"#64748B",marginBottom:6,fontFamily:"Nunito"}}>
                Importa el <b>Informe Costo Teórico con Detalle</b> para descontar el consumo del período del inventario ERP
              </div>
              {loadingCT ? <div style={{color:"#16A34A",fontSize:12,fontFamily:"Nunito"}}>⏳ Procesando...</div> : (
                <label style={{display:"inline-block",background:"#16A34A",color:"#fff",borderRadius:10,padding:"7px 16px",fontFamily:"Nunito",fontWeight:800,fontSize:12,cursor:"pointer"}}>
                  📊 Importar Costo Teórico
                  <input type="file" accept=".xlsx,.xls" style={{display:"none"}} onChange={handleCTFile}/>
                </label>
              )}
              {ctError && <div style={{color:"#EF4444",fontSize:11,marginTop:6}}>{ctError}</div>}
            </div>
          )}
        </div>

        {/* Resumen */}
        <div style={{display:"flex",gap:8,marginTop:10}}>
          <div style={{flex:1,background:resumen.criticos>0?"#FEF2F2":"#F0FDF4",borderRadius:10,padding:"8px 12px",textAlign:"center"}}>
            <div style={{fontSize:20,fontWeight:900,fontFamily:"Nunito",color:resumen.criticos>0?"#EF4444":"#22C55E"}}>{resumen.criticos}</div>
            <div style={{fontSize:10,color:"#64748B"}}>Sin stock</div>
          </div>
          <div style={{flex:1,background:resumen.bajos>0?"#FFF7ED":"#F0FDF4",borderRadius:10,padding:"8px 12px",textAlign:"center"}}>
            <div style={{fontSize:20,fontWeight:900,fontFamily:"Nunito",color:resumen.bajos>0?"#F97316":"#22C55E"}}>{resumen.bajos}</div>
            <div style={{fontSize:10,color:"#64748B"}}>Stock bajo</div>
          </div>
          <div style={{flex:2,background:"#F8FAFC",borderRadius:10,padding:"8px 12px",textAlign:"center"}}>
            <div style={{fontSize:11,fontWeight:700,color:"#64748B",fontFamily:"Nunito"}}>Período</div>
            <div style={{fontSize:11,color:m.color,fontWeight:800,fontFamily:"Nunito"}}>
              {diasSem[0].toLocaleDateString("es-CL",{day:"numeric",month:"short"})} →{" "}
              {diasSem[Math.min(diasCoverage,6)].toLocaleDateString("es-CL",{day:"numeric",month:"short"})}
            </div>
          </div>
        </div>
      </Card>

      {/* Buscador */}
      <div style={{background:"#F1F5F9",borderRadius:12,padding:"8px 12px",marginBottom:10,display:"flex",alignItems:"center",gap:8}}>
        <span style={{color:"#94A3B8"}}>🔍</span>
        <input value={filtro} onChange={e=>setFiltro(e.target.value)} placeholder="Buscar insumo..."
          style={{border:"none",background:"transparent",fontFamily:"Nunito",fontSize:13,flex:1,outline:"none",color:"#334155"}}/>
        {filtro && <span style={{cursor:"pointer",color:"#94A3B8"}} onClick={()=>setFiltro("")}>✕</span>}
      </div>

      {/* Modal stock manual */}
      {editStock && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{background:"#fff",borderRadius:16,padding:24,width:"100%",maxWidth:340}}>
            <div style={{fontFamily:"Nunito",fontWeight:900,fontSize:14,marginBottom:8,color:"#1E293B"}}>📦 Ingresar Stock Manual</div>
            <div style={{fontSize:12,color:"#64748B",marginBottom:12}}>{editStock.material}</div>
            <input type="number" min="0" step="0.1" value={editStock.value}
              onChange={e=>setEditStock(s=>({...s,value:e.target.value}))}
              style={{width:"100%",border:"2px solid "+m.color,borderRadius:10,padding:"10px 14px",fontFamily:"Nunito",fontSize:16,fontWeight:700,color:"#1E293B",outline:"none",marginBottom:14}}
              autoFocus onKeyDown={e=>e.key==="Enter"&&saveStock()}/>
            <div style={{display:"flex",gap:8}}>
              <Btn full color={m.color} onClick={saveStock}>✅ Guardar</Btn>
              <Btn full outline color={m.color} onClick={()=>setEditStock(null)}>Cancelar</Btn>
            </div>
          </div>
        </div>
      )}

      {/* Lista de insumos */}
      {items.length === 0 ? (
        <Card><div style={{textAlign:"center",color:"#94A3B8",padding:20,fontFamily:"Nunito"}}>Sin datos ERP para este local</div></Card>
      ) : (
        filtered.map(it => {
          const needed = calcNeeded(it);
          const stock  = calcStock(it.m, it.u);
          const urg    = urgencia(it);
          const falta  = calcFaltante(it);
          const pct    = needed > 0 ? Math.min(1, stock / needed) : 1;
          const erpMatch = modoStock==="erp" && erpInv?.items?.find(i =>
            i.nombre.toLowerCase().includes(it.m.toLowerCase().slice(0,12))
          );
          // Stock ERP bruto (sin descuento teórico)
          const stockERPBruto = erpMatch ? erpMatch.cantidad : null;
          const matNormIT = norm(it.m);
          const ctDescontado = Object.keys(consumoTeoLocal).length > 0 && (consumoTeoLocal[matNormIT] || Object.entries(consumoTeoLocal).find(([k]) => k.includes(matNormIT.slice(0,8)) || matNormIT.includes(k.slice(0,8)))?.[1]);
          // UM básica desde catálogo (KGS, LTS, UNI)
          const umBasica    = it.um_basica || it.u || "UNI";
          const presentacion = it.pres || "";
          const erpId       = it.erp_id ? `#${it.erp_id}` : "";
          const fuenteItem  = it._fuente || "erp_historico";
          const factorItem  = it._factor || 1;
          const fuenteBadge = {
            ventas_semana:    { icon:"📱", color:"#22C55E" },
            ventas_tendencia: { icon:"📈", color:"#6C63FF" },
            erp_historico:    { icon:"📂", color:"#F59E0B" },
            sin_datos:        { icon:"⚠️", color:"#EF4444" },
          }[fuenteItem] || { icon:"📂", color:"#F59E0B" };

          return (
            <Card key={it.m} style={{marginBottom:8,borderLeft:`3px solid ${urg_color[urg]}`,padding:"10px 12px"}}>
              {/* Header: nombre + badge estado */}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:5}}>
                <div style={{flex:1,paddingRight:8}}>
                  <div style={{fontFamily:"Nunito",fontWeight:900,fontSize:13,color:"#1E293B",lineHeight:1.2}}>{it.m}</div>
                  {(presentacion || erpId) && (
                    <div style={{fontFamily:"Nunito",fontSize:9,color:"#94A3B8",marginTop:2}}>
                      {erpId && <span style={{background:"#F1F5F9",borderRadius:4,padding:"1px 5px",marginRight:5,fontWeight:700}}>{erpId}</span>}
                      {presentacion && <span>{presentacion}</span>}
                    </div>
                  )}
                </div>
                <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:3,flexShrink:0}}>
                  <span style={{fontSize:10,color:urg_color[urg],fontWeight:800,whiteSpace:"nowrap"}}>{urg_label[urg]}</span>
                  <div style={{display:"flex",gap:3}}>
                    <span style={{background:`${fuenteBadge.color}18`,color:fuenteBadge.color,borderRadius:5,padding:"1px 5px",fontSize:9,fontWeight:700}}
                      title={fuenteItem}>
                      {fuenteBadge.icon}{factorItem !== 1 ? ` ×${factorItem}` : ""}
                    </span>
                    <span style={{background:`${urg_color[urg]}18`,color:urg_color[urg],borderRadius:5,padding:"1px 7px",fontSize:9,fontWeight:800}}>
                      {umBasica}
                    </span>
                  </div>
                </div>
              </div>

              {/* Chips de métricas */}
              <div style={{display:"flex",gap:5,marginBottom:7,flexWrap:"wrap"}}>
                {it.pd > 0 && (
                  <span style={{background:"#F1F5F9",borderRadius:6,padding:"2px 8px",fontSize:10,color:"#64748B",fontFamily:"Nunito"}}>
                    📊 <b>{it.pd.toFixed(2)} {umBasica}/día</b>
                  </span>
                )}
                <span style={{background:"#EFF6FF",borderRadius:6,padding:"2px 8px",fontSize:10,color:"#3B82F6",fontFamily:"Nunito"}}>
                  🎯 <b>{needed} {umBasica}</b> necesario
                </span>
                {erpMatch && <span style={{background:"#F0FDF4",borderRadius:6,padding:"2px 8px",fontSize:10,color:"#16A34A",fontFamily:"Nunito",fontWeight:700}}>📤 ERP</span>}
                {ctDescontado && ctDescontado.cantidad > 0 && (
                  <span style={{background:"#FEF9C3",borderRadius:6,padding:"2px 8px",fontSize:10,color:"#92400E",fontFamily:"Nunito"}}>
                    −{ctDescontado.cantidad.toFixed(2)} {umBasica} CT
                  </span>
                )}
              </div>

              {/* Barra de cobertura */}
              <div style={{background:"#F1F5F9",borderRadius:6,height:7,marginBottom:7,overflow:"hidden"}}>
                <div style={{width:(pct*100)+"%",height:"100%",background:urg_color[urg],borderRadius:6,transition:"width .3s"}}/>
              </div>

              {/* Stock + Faltante + botón */}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{fontSize:11,color:"#64748B",fontFamily:"Nunito"}}>
                  {ctDescontado && stockERPBruto !== null ? (
                    <>Stock ajustado: <b style={{color:urg_color[urg]}}>{stock.toFixed(2)} {umBasica}</b>
                    <span style={{color:"#94A3B8",marginLeft:4}}>({stockERPBruto.toFixed(2)} ERP)</span></>
                  ) : (
                    <>Stock: <b style={{color:urg_color[urg]}}>{stock} {umBasica}</b></>
                  )}
                  {falta > 0 && <span style={{color:"#EF4444",marginLeft:8,fontWeight:700}}>· Faltan: <b>{falta.toFixed(2)} {umBasica}</b></span>}
                </div>
                {modoStock === "manual" && (
                  <button onClick={()=>setEditStock({material:it.m,value:stock||""})}
                    style={{background:m.color+"20",color:m.color,border:"none",borderRadius:8,padding:"4px 10px",fontFamily:"Nunito",fontWeight:800,fontSize:11,cursor:"pointer"}}>
                    ✏️ Stock
                  </button>
                )}
              </div>
            </Card>
          );
        })
      )}
    </div>
  );
}

// ── Sugerencia de Pedidos a Proveedores ───────────────────────────────────────
// Usa: inventario ERP + historial de compras ERP (Back Office) + promedio diario
function SugerenciaPedidos({ marca, ventas }) {
  const m = MARCAS[marca] || MARCAS[Object.keys(MARCAS)[0]] || { color:"#6C63FF", bg:"#F0EEFF", emoji:"🌭", textColor:"#fff", nombre:"—" };
  const localesMarca = LOCALES_POR_MARCA[marca] || LOCALES;

  // ── Estado principal ────────────────────────────────────────────────────────
  const [local, setLocal]           = useState(localesMarca[0] || "");
  const [diasRuta, setDiasRuta]     = useState(3);
  const [diasBuffer, setBuffer]     = useState(1);
  const [paso, setPaso]             = useState("conteo"); // "conteo" | "pedido"
  const [filtro, setFiltro]         = useState("");
  const [stockConteo, setStockConteo] = useStorage("horreo_conteo_" + marca, {}); // {local||mat: cantidad}
  const [conteoFecha, setConteoFecha] = useStorage("horreo_conteo_fecha_" + marca, {});
  const [provExpanded, setProvExpanded] = useState({});
  const [comprasERP]                = useStorage("horreo_compras_erp_" + marca, null);
  const [costoTeoDetalle]           = useStorage("horreo_ct_detalle_" + marca, null);
  const [editingStock, setEditingStock] = useState(null); // nombre del mat editando

  // ── Motor consumo dinámico ─────────────────────────────────────────────────
  const consumoDin = useMemo(() => {
    const hoy = new Date();
    const hace7  = new Date(hoy); hace7.setDate(hoy.getDate()-7);
    const hace28 = new Date(hoy); hace28.setDate(hoy.getDate()-28);
    const v28 = (ventas||[]).filter(v=>v.local===local&&v.marca===marca&&v.fecha>=hace28.toISOString().slice(0,10));
    const v7  = v28.filter(v=>v.fecha>=hace7.toISOString().slice(0,10));
    const d7  = new Set(v7.map(v=>v.fecha)).size;
    const d28 = new Set(v28.map(v=>v.fecha)).size;
    const vd7  = d7>0  ? v7.reduce((s,v)=>s+(parseFloat(v.venta_bruta)||0),0)/d7   : 0;
    const vd28 = d28>0 ? v28.reduce((s,v)=>s+(parseFloat(v.venta_bruta)||0),0)/d28 : 0;
    const vdMix = vd7>0&&vd28>0 ? vd7*0.6+vd28*0.4 : vd7>0?vd7:vd28>0?vd28:0;
    const base = getErpLocal(local);
    const map = {};
    base.forEach(it => {
      const pdERP = it.pd||0;
      if (vdMix>0 && pdERP>0) {
        const erpH = Object.values(ERP_HISTORICO).flat();
        const ref  = erpH.find(e=>e.m.toUpperCase()===it.m.toUpperCase());
        const vdERP = ref ? (ref.c*ref.pd)/Math.max(1,ref.q) : 0;
        if (vdERP>0) {
          const f = Math.min(2, Math.max(0.5, vdMix/vdERP));
          map[it.m.toUpperCase()] = { pd: Math.round(pdERP*f*100)/100, fuente: d7>=3?"📱 Sem.ant.":"📈 4 sem.", factor: f };
          return;
        }
      }
      map[it.m.toUpperCase()] = { pd: pdERP, fuente: "📂 ERP", factor: 1 };
    });
    return { map, d7, fuente: d7>=3?"📱 Sem.ant.":d28>=5?"📈 4 sem.":"📂 ERP hist." };
  }, [local, marca, ventas]);

  // ── Items del local con consumo dinámico ───────────────────────────────────
  const items = useMemo(() => {
    return getErpLocal(local).map(it => {
      const din = consumoDin.map[it.m.toUpperCase()];
      return { ...it, pd: din?din.pd:(it.pd||0), _fuente: din?.fuente||"📂 ERP", _factor: din?.factor||1 };
    });
  }, [local, consumoDin]);

  // ── Stock: conteo manual del día (persiste por local+material) ─────────────
  const getStock = (mat) => parseFloat(stockConteo[local+"||"+mat] ?? -1); // -1 = no contado aún
  const setStock = (mat, val) => {
    const v = parseFloat(val);
    setStockConteo(prev => ({ ...prev, [local+"||"+mat]: isNaN(v) ? 0 : v }));
    setConteoFecha(prev => ({ ...prev, [local]: today() }));
  };

  // ── Historial compras por material ─────────────────────────────────────────
  const histMap = useMemo(() => {
    if (!comprasERP?.items) return {};
    const map = {};
    comprasERP.items.filter(c => c.local?.includes(local.split(" - ")[0])).forEach(c => {
      if (!map[c.material]) map[c.material] = { ultimo:"", precio:0, total:0 };
      map[c.material].total += c.cantRecep||0;
      if (c.fecha > map[c.material].ultimo) { map[c.material].ultimo = c.fecha; map[c.material].precio = c.precioFacturado||c.precioPactado||0; }
    });
    return map;
  }, [comprasERP, local]);

  const diasTotal  = diasRuta + diasBuffer;
  const fechaConteo = conteoFecha[local] || null;
  const itemsContados = items.filter(it => getStock(it.m) >= 0).length;

  // ── Calcular sugerencias (solo items con stock conocido O todos) ───────────
  const sugerencias = useMemo(() => {
    return items.map(it => {
      const stock  = Math.max(0, getStock(it.m)); // -1 → 0 (sin contar = asumir 0)
      const needed = Math.round(it.pd * diasTotal * 100) / 100;
      const pedir  = Math.max(0, Math.round((needed - stock) * 100) / 100);
      const umB    = it.um_basica || it.u || "UNI";
      const pres   = it.pres || "";
      const erpId  = it.erp_id;
      const prov   = it.p && it.p.length > 0 ? it.p[0] : { n:"Sin proveedor asignado", r:"" };
      const hist   = histMap[it.m] || null;
      const noContado = getStock(it.m) < 0;
      return { ...it, stock, needed, pedir, umB, pres, erpId, prov, hist, noContado };
    }).filter(it => {
      if (!filtro) return it.pedir > 0 || it.noContado;
      return it.m.toLowerCase().includes(filtro.toLowerCase());
    });
  }, [items, stockConteo, diasTotal, local, filtroMat]);

  // Filtro final para vista pedidos: solo los que hay que pedir
  const aPedir = sugerencias.filter(it => it.pedir > 0);

  // Agrupa por proveedor
  const porProveedor = useMemo(() => {
    const map = {};
    aPedir.forEach(s => {
      const key = s.prov.n;
      if (!map[key]) map[key] = { nombre:s.prov.n, rut:s.prov.r, items:[] };
      map[key].items.push(s);
    });
    return Object.values(map).sort((a,b) => b.items.length - a.items.length);
  }, [aPedir]);

  // ── WhatsApp por proveedor ─────────────────────────────────────────────────
  const enviarWA = (pv) => {
    const lineas = pv.items.map(s =>
      `• ${s.m}: *${s.pedir} ${s.umB}*${s.pres ? " ("+s.pres+")" : ""}${s.hist?.precio ? " — últ. precio $"+Math.round(s.hist.precio).toLocaleString("es-CL") : ""}`
    ).join("
");
    const txt = `📦 PEDIDO ${MARCAS[marca]?.nombre?.toUpperCase()||marca} — ${nombreCortoLocal(local)}
Fecha: ${today()}

${lineas}

_El Hórreo · Adm. Franquicias_`;
    const waPhone = getWhatsAppPhone();
    const url = waPhone
      ? `https://wa.me/${waPhone}?text=${encodeURIComponent(txt)}`
      : `https://wa.me/?text=${encodeURIComponent(txt)}`;
    window.open(url, "_blank");
  };

  // ── Enviar pedido completo por WhatsApp ────────────────────────────────────
  const enviarTodoWA = () => {
    const provs = porProveedor.map(pv => {
      const lineas = pv.items.map(s => `  • ${s.m}: ${s.pedir} ${s.umB}`).join("
");
      return `*${pv.nombre}*
${lineas}`;
    }).join("

");
    const txt = `📦 PEDIDO COMPLETO — ${MARCAS[marca]?.nombre||marca} · ${nombreCortoLocal(local)}
Fecha: ${today()} · ${diasTotal}d cobertura

${provs}

_El Hórreo · Adm. Franquicias_`;
    showMailModal(`[El Hórreo] Pedido ${MARCAS[marca]?.nombre||marca} — ${today()}`, txt);
  };

  // ── Limpiar conteo ─────────────────────────────────────────────────────────
  const limpiarConteo = () => {
    setStockConteo(prev => {
      const next = {...prev};
      items.forEach(it => delete next[local+"||"+it.m]);
      return next;
    });
    setConteoFecha(prev => ({ ...prev, [local]: null }));
  };

  const itemsFiltrados = paso === "conteo"
    ? items.filter(it => !filtro || it.m.toLowerCase().includes(filtro.toLowerCase()))
    : [];

  // Colores fuente
  const fuenteColor = (f) => f?.includes("Sem")?"#22C55E":f?.includes("4 sem")?"#6C63FF":"#F59E0B";

  return (
    <div style={{paddingBottom:80}}>

      {/* ── HEADER: Local + Cobertura + Fuente ──────────────────────────────── */}
      <Card style={{marginBottom:10}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div style={{fontFamily:"Nunito",fontWeight:900,fontSize:15,color:m.color}}>🚚 Pedidos</div>
          <span style={{background:fuenteColor(consumoDin.fuente)+"18",color:fuenteColor(consumoDin.fuente),
            borderRadius:8,padding:"3px 9px",fontFamily:"Nunito",fontWeight:800,fontSize:10}}>
            {consumoDin.fuente}
          </span>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr auto",gap:8,alignItems:"end"}}>
          <Field label="Local">
            <select value={local} onChange={e=>{ setLocal(e.target.value); setFiltro(""); }}>
              {localesMarca.map(l=><option key={l} value={l}>{nombreCortoLocal(l)}</option>)}
            </select>
          </Field>
          <div style={{paddingBottom:2}}>
            <div style={{fontFamily:"Nunito",fontSize:9,color:"#94A3B8",fontWeight:700,marginBottom:3}}>COBERTURA</div>
            <div style={{display:"flex",gap:4}}>
              {[1,2,3,5,7].map(d=>(
                <button key={d} onClick={()=>setDiasRuta(d)}
                  style={{background:diasRuta===d?m.color:"#F1F5F9",color:diasRuta===d?"#fff":"#64748B",
                    border:"none",borderRadius:7,padding:"5px 8px",fontFamily:"Nunito",fontWeight:800,fontSize:11,cursor:"pointer"}}>
                  {d}d
                </button>
              ))}
            </div>
          </div>
        </div>

        {/* KPIs rápidos */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6,marginTop:8}}>
          {[
            ["Días cobertura", diasTotal+"d", m.color],
            ["Contados hoy", `${itemsContados}/${items.length}`, itemsContados===items.length?"#22C55E":"#F59E0B"],
            ["A pedir", aPedir.length+" ítems", aPedir.length>0?"#EF4444":"#22C55E"],
          ].map(([l,v,c])=>(
            <div key={l} style={{textAlign:"center",background:"#F8FAFC",borderRadius:8,padding:"6px 4px"}}>
              <div style={{fontFamily:"Nunito",fontWeight:900,fontSize:14,color:c}}>{v}</div>
              <div style={{fontFamily:"Nunito",fontSize:8,color:"#94A3B8",textTransform:"uppercase",fontWeight:700}}>{l}</div>
            </div>
          ))}
        </div>
      </Card>

      {/* ── TABS: CONTEO / PEDIDO ───────────────────────────────────────────── */}
      <div style={{display:"flex",gap:6,marginBottom:12}}>
        {[["conteo","📋 Conteo",itemsContados<items.length?items.length-itemsContados:null],
          ["pedido","🚚 Pedido",aPedir.length||null]].map(([id,label,badge])=>(
          <button key={id} onClick={()=>setPaso(id)}
            style={{flex:1,background:paso===id?m.color:"#F1F5F9",color:paso===id?"#fff":"#64748B",
              border:"none",borderRadius:12,padding:"11px 0",fontFamily:"Nunito",fontWeight:800,fontSize:13,
              cursor:"pointer",position:"relative"}}>
            {label}
            {badge && badge > 0 && (
              <span style={{position:"absolute",top:-6,right:-6,background:paso===id?"#fff":"#EF4444",
                color:paso===id?m.color:"#fff",borderRadius:10,padding:"1px 6px",fontSize:10,fontWeight:800,
                border:`1.5px solid ${paso===id?m.color:"#EF4444"}`}}>
                {badge}
              </span>
            )}
          </button>
        ))}
      </div>

      {/* ── TAB CONTEO ──────────────────────────────────────────────────────── */}
      {paso === "conteo" && (
        <div>
          {/* Buscador + info conteo */}
          <div style={{display:"flex",gap:8,marginBottom:10,alignItems:"center"}}>
            <div style={{flex:1,background:"#F1F5F9",borderRadius:10,padding:"8px 12px",display:"flex",gap:6,alignItems:"center"}}>
              <span style={{color:"#94A3B8"}}>🔍</span>
              <input value={filtro} onChange={e=>setFiltro(e.target.value)} placeholder="Buscar producto..."
                style={{border:"none",background:"transparent",fontFamily:"Nunito",fontSize:12,flex:1,outline:"none"}}/>
            </div>
            {itemsContados > 0 && (
              <button onClick={limpiarConteo}
                style={{background:"#FEF2F2",color:"#EF4444",border:"none",borderRadius:10,padding:"8px 12px",fontFamily:"Nunito",fontWeight:800,fontSize:11,cursor:"pointer",flexShrink:0}}>
                🗑 Reset
              </button>
            )}
          </div>

          {fechaConteo && (
            <div style={{background:"#F0FDF4",border:"1px solid #86EFAC",borderRadius:10,padding:"7px 12px",marginBottom:10,fontFamily:"Nunito",fontSize:11,color:"#166534"}}>
              ✅ Último conteo guardado: <b>{fechaConteo}</b> · {itemsContados} productos
            </div>
          )}

          {/* Lista de productos para contar */}
          {itemsFiltrados.map(it => {
            const stock     = getStock(it.m);
            const contado   = stock >= 0;
            const umB       = it.um_basica || it.u || "UNI";
            const needed    = Math.round(it.pd * diasTotal * 100)/100;
            const pedir     = Math.max(0, Math.round((needed - Math.max(0,stock))*100)/100);
            const editando  = editingStock === it.m;
            const [inputVal, setInputVal] = React.useState(contado ? String(stock) : "");

            return (
              <div key={it.m} style={{
                background: editando?"#F5F3FF": contado?(pedir>0?"#FFF8F0":"#F0FDF4"):"#fff",
                border:`1.5px solid ${editando?"#C4B5FD":contado?(pedir>0?"#FED7AA":"#86EFAC"):"#E2E8F0"}`,
                borderRadius:12, padding:"10px 14px", marginBottom:8,
                display:"flex", alignItems:"center", gap:10
              }} onClick={()=>{ if(!editando){ setEditingStock(it.m); setInputVal(contado?String(stock):""); } }}>

                {/* Status dot */}
                <div style={{width:10,height:10,borderRadius:"50%",flexShrink:0,
                  background:editando?"#6C63FF":contado?(pedir>0?"#F59E0B":"#22C55E"):"#E2E8F0"}}/>

                {/* Info producto */}
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontFamily:"Nunito",fontWeight:800,fontSize:12,color:"#1E293B",
                    overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{it.m}</div>
                  <div style={{fontFamily:"Nunito",fontSize:9,color:"#94A3B8"}}>
                    {it.pres||umB}
                    {it.pd>0 && <span style={{marginLeft:6,color:fuenteColor(it._fuente)}}>
                      {it._fuente} · {it.pd.toFixed(2)}/día
                    </span>}
                  </div>
                </div>

                {/* Input de stock O valor actual */}
                {editando ? (
                  <div style={{display:"flex",gap:5,alignItems:"center",flexShrink:0}}>
                    <input autoFocus type="number" min="0" step="0.1"
                      value={inputVal}
                      onChange={e=>setInputVal(e.target.value)}
                      onKeyDown={e=>{ if(e.key==="Enter"||e.key==="Tab"){ setStock(it.m,inputVal); setEditingStock(null); }}}
                      style={{width:72,border:"2px solid #6C63FF",borderRadius:8,padding:"6px 8px",
                        fontFamily:"Nunito",fontWeight:800,fontSize:14,textAlign:"center",outline:"none",color:"#6C63FF"}}/>
                    <button onClick={e=>{ e.stopPropagation(); setStock(it.m,inputVal); setEditingStock(null); }}
                      style={{background:"#6C63FF",color:"#fff",border:"none",borderRadius:8,
                        padding:"6px 10px",fontFamily:"Nunito",fontWeight:800,fontSize:12,cursor:"pointer"}}>
                      ✓
                    </button>
                  </div>
                ) : (
                  <div style={{textAlign:"right",flexShrink:0}}>
                    {contado ? (
                      <>
                        <div style={{fontFamily:"Nunito",fontWeight:900,fontSize:14,
                          color:pedir>0?"#F59E0B":"#22C55E"}}>{stock} {umB}</div>
                        {pedir > 0 && <div style={{fontFamily:"Nunito",fontSize:9,color:"#EF4444",fontWeight:700}}>
                          pedir {pedir} {umB}
                        </div>}
                      </>
                    ) : (
                      <div style={{fontFamily:"Nunito",fontSize:11,color:"#94A3B8",fontWeight:700}}>
                        Toca para<br/>ingresar
                      </div>
                    )}
                  </div>
                )}
              </div>
            );
          })}

          {itemsContados > 0 && (
            <div style={{padding:"14px 0",textAlign:"center"}}>
              <button onClick={()=>setPaso("pedido")}
                style={{background:m.color,color:"#fff",border:"none",borderRadius:14,
                  padding:"14px 32px",fontFamily:"Nunito",fontWeight:900,fontSize:15,cursor:"pointer",
                  boxShadow:`0 4px 20px ${m.color}44`}}>
                Ver pedido → {aPedir.length} ítems a pedir
              </button>
            </div>
          )}
        </div>
      )}

      {/* ── TAB PEDIDO ──────────────────────────────────────────────────────── */}
      {paso === "pedido" && (
        <div>
          {aPedir.length === 0 ? (
            <Card>
              <div style={{textAlign:"center",padding:24,fontFamily:"Nunito"}}>
                <div style={{fontSize:32,marginBottom:8}}>✅</div>
                <div style={{fontWeight:800,color:"#22C55E",fontSize:15}}>Stock suficiente para {diasTotal} días</div>
                <div style={{fontSize:12,color:"#94A3B8",marginTop:4}}>
                  {itemsContados < items.length
                    ? `Solo se contaron ${itemsContados}/${items.length} productos — ve a Conteo para completar`
                    : "Todos los productos tienen cobertura suficiente"}
                </div>
              </div>
            </Card>
          ) : (
            <>
              {/* Botón enviar todo */}
              <button onClick={enviarTodoWA}
                style={{width:"100%",background:"#25D366",color:"#fff",border:"none",borderRadius:14,
                  padding:"14px 0",fontFamily:"Nunito",fontWeight:900,fontSize:14,cursor:"pointer",
                  marginBottom:12,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                💬 Enviar pedido completo por WhatsApp / Mail
              </button>

              {!fechaConteo && (
                <div style={{background:"#FFF8E7",border:"1px solid #FDE68A",borderRadius:10,padding:"8px 12px",
                  marginBottom:12,fontFamily:"Nunito",fontSize:11,color:"#92400E"}}>
                  ⚠️ No hay conteo del día — los stocks aparecen como 0. Ve a <b>Conteo</b> primero para mayor precisión.
                </div>
              )}

              {/* Por proveedor */}
              {porProveedor.map(pv => {
                const exp = provExpanded[pv.nombre] !== false;
                const totalItems = pv.items.length;
                return (
                  <Card key={pv.nombre} style={{marginBottom:10}}>
                    <div onClick={()=>setProvExpanded(p=>({...p,[pv.nombre]:!exp}))}
                      style={{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer",marginBottom:exp?10:0}}>
                      <div style={{flex:1}}>
                        <div style={{fontFamily:"Nunito",fontWeight:900,fontSize:13,color:"#1E293B"}}>{pv.nombre}</div>
                        {pv.rut && <div style={{fontSize:9,color:"#94A3B8"}}>RUT {pv.rut}</div>}
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <button onClick={e=>{e.stopPropagation();enviarWA(pv);}}
                          style={{background:"#25D366",color:"#fff",border:"none",borderRadius:8,
                            padding:"6px 12px",fontFamily:"Nunito",fontWeight:800,fontSize:11,cursor:"pointer"}}>
                          💬 WA
                        </button>
                        <span style={{background:m.color+"20",color:m.color,borderRadius:20,
                          padding:"3px 10px",fontSize:11,fontWeight:800,fontFamily:"Nunito"}}>
                          {totalItems} ítem{totalItems!==1?"s":""}
                        </span>
                        <span style={{color:"#94A3B8",fontSize:12}}>{exp?"▲":"▼"}</span>
                      </div>
                    </div>

                    {exp && pv.items.map(s => (
                      <div key={s.m} style={{borderTop:"1px solid #F1F5F9",paddingTop:8,paddingBottom:4}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                          <div style={{flex:1}}>
                            <div style={{fontFamily:"Nunito",fontWeight:800,fontSize:12,color:"#1E293B"}}>{s.m}</div>
                            {(s.pres||s.erpId) && (
                              <div style={{fontFamily:"Nunito",fontSize:9,color:"#94A3B8"}}>
                                {s.erpId?`#${s.erpId} · `:""}{s.pres}
                              </div>
                            )}
                          </div>
                          <div style={{textAlign:"right",flexShrink:0,marginLeft:8}}>
                            <div style={{fontFamily:"Nunito",fontWeight:900,fontSize:14,color:m.color}}>
                              {s.pedir} {s.umB}
                            </div>
                            {s.noContado && (
                              <div style={{fontFamily:"Nunito",fontSize:9,color:"#F59E0B",fontWeight:700}}>sin contar</div>
                            )}
                          </div>
                        </div>
                        <div style={{display:"flex",gap:5,marginTop:4,flexWrap:"wrap"}}>
                          <span style={{background:"#F1F5F9",borderRadius:5,padding:"1px 7px",fontSize:10,color:"#64748B"}}>
                            Stock: <b>{s.noContado?"—":s.stock+" "+s.umB}</b>
                          </span>
                          <span style={{background:"#EFF6FF",borderRadius:5,padding:"1px 7px",fontSize:10,color:"#3B82F6"}}>
                            Necesita: <b>{s.needed} {s.umB}</b>
                          </span>
                          {s.hist?.ultimo && (
                            <span style={{background:"#F0FDF4",borderRadius:5,padding:"1px 7px",fontSize:10,color:"#16A34A"}}>
                              🗓 {s.hist.ultimo}
                              {s.hist.precio>0 && ` · $${Math.round(s.hist.precio).toLocaleString("es-CL")}`}
                            </span>
                          )}
                          <span style={{background:fuenteColor(s._fuente)+"18",color:fuenteColor(s._fuente),
                            borderRadius:5,padding:"1px 7px",fontSize:10,fontWeight:700}}>
                            {s._fuente}
                          </span>
                        </div>
                      </div>
                    ))}
                  </Card>
                );
              })}
            </>
          )}
        </div>
      )}
    </div>
  );
}
