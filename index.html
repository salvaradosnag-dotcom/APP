  <!-- Service Worker para cache offline -->
  <script>
    if ('serviceWorker' in navigator) {
      const swCode = `
        const CACHE = 'horreo-v3';
        const SHELL = [self.location.href];

        self.addEventListener('install', e => {
          e.waitUntil(
            caches.open(CACHE).then(c => c.addAll(SHELL)).then(() => self.skipWaiting())
          );
        });

        self.addEventListener('activate', e => {
          e.waitUntil(
            caches.keys().then(keys =>
              Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
            ).then(() => self.clients.claim())
          );
        });

        self.addEventListener('fetch', e => {
          // Solo cachear GET del mismo origen
          if (e.request.method !== 'GET') return;
          const url = new URL(e.request.url);
          // Nunca cachear Supabase, Google Fonts ni APIs externas
          if (url.hostname.includes('supabase') || url.hostname.includes('googleapis') ||
              url.hostname.includes('gstatic') || url.hostname.includes('unpkg')) return;

          e.respondWith(
            caches.match(e.request).then(cached => {
              const network = fetch(e.request).then(res => {
                if (res.ok && url.origin === self.location.origin) {
                  const clone = res.clone();
                  caches.open(CACHE).then(c => c.put(e.request, clone));
                }
                return res;
              }).catch(() => cached);
              return cached || network;
            })
          );
        });
      `;
      const swBlob = new Blob([swCode], {type:'text/javascript'});
      const swUrl  = URL.createObjectURL(swBlob);
      navigator.serviceWorker.register(swUrl, {scope: './'})
        .then(reg => {
          console.log('[SW] Registrado:', reg.scope);
          // Notificar si hay actualización disponible
          reg.addEventListener('updatefound', () => {
            const nw = reg.installing;
            nw.addEventListener('statechange', () => {
              if (nw.state === 'installed' && navigator.serviceWorker.controller) {
                window._swUpdateReady = true;
                window.dispatchEvent(new Event('sw-update-ready'));
              }
            });
          });
        })
        .catch(err => console.warn('[SW] Error:', err));
    }

    // Capturar evento beforeinstallprompt para el banner personalizado
    window._installPrompt = null;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      window._installPrompt = e;
      window.dispatchEvent(new Event('pwa-installable'));
    });
    window.addEventListener('appinstalled', () => {
      window._installPrompt = null;
      window.dispatchEvent(new Event('pwa-installed'));
    });
  </script>

// ── XLSX — carga única, sin race condition ────────────────────────────────────
let _XLSX = null;
let _xlsxLoading = false;
let _xlsxCallbacks = [];

async function loadXLSX() {
  if (_XLSX) return _XLSX;
  if (window.XLSX) { _XLSX = window.XLSX; return _XLSX; }
  if (_xlsxLoading) return new Promise((res, rej) => _xlsxCallbacks.push({ res, rej }));
  _xlsxLoading = true;
  return new Promise((res, rej) => {
    _xlsxCallbacks.push({ res, rej });
    const s = document.createElement("script");
    s.src = "https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
    s.onload = () => {
      _XLSX = window.XLSX; _xlsxLoading = false;
      _xlsxCallbacks.forEach(cb => cb.res(_XLSX)); _xlsxCallbacks = [];
    };
    s.onerror = e => {
      _xlsxLoading = false;
      _xlsxCallbacks.forEach(cb => cb.rej(e)); _xlsxCallbacks = [];
    };
    document.head.appendChild(s);
  });
}

// ── useStorage — sin stale closure, persiste en setData ──────────────────────
function useStorage(key, init) {
  const [data, setData] = useState(() => {
    try { const r = localStorage.getItem(key); return r ? JSON.parse(r) : init; }
    catch { return init; }
  });
  const save = useCallback(val => {
    setData(prev => {
      const next = typeof val === "function" ? val(prev) : val;
      try { localStorage.setItem(key, JSON.stringify(next)); }
      catch (e) { console.warn(`localStorage lleno (${key}):`, e.message); }
      return next;
    });
  }, [key]);
  return [data, save];
}

let _sbCfgKey = "";

function getSB() {
  try {
    const cfg = JSON.parse(localStorage.getItem("horreo_config") || "{}");
    const sbUrl = cfg.supabaseUrl || SUPABASE_URL_DEFAULT;
    const sbKey = cfg.supabaseKey || SUPABASE_KEY_DEFAULT;
    if (!sbUrl || !sbKey) return null;
    const cfgKey = sbUrl + sbKey;
    if (_sb && _sbCfgKey === cfgKey) return _sb;
    const lib = window.supabase;
    if (!lib) return null;
    const factory = typeof lib.createClient === "function" ? lib.createClient
                  : typeof lib === "function" ? lib : null;
    if (!factory) return null;
    _sb = factory(sbUrl, sbKey, {
      realtime: { params: { eventsPerSecond: 10 } }
    });
    _sbCfgKey = cfgKey;
    console.log("SB client OK:", sbUrl);
  } catch (e) { console.warn("getSB:", e.message); }
  return _sb;
}
function resetSB() { _sb = null; _sbCfgKey = ""; }

const SB_STATUS = { connected: false, listeners: new Set() };
function setSBConnected(v) {
  if (SB_STATUS.connected === v) return;
  SB_STATUS.connected = v;
  SB_STATUS.listeners.forEach(fn => fn(v));
}
function useSBStatus() {
  const [connected, setConnected] = useState(() => SB_STATUS.connected);
  useEffect(() => {
    setConnected(SB_STATUS.connected);
    SB_STATUS.listeners.add(setConnected);
    return () => SB_STATUS.listeners.delete(setConnected);
  }, []);
  return connected;
}

const SB_TABLE_MAP = {
  "horreo_v2_ventas":         "ventas",
  "horreo_v2_kpi":            "kpis",
  "horreo_v2_metas":          "metas",
  "horreo_v2_metasd":         "metas_diarias",
  "horreo_desviaciones":      "desviaciones",
  "horreo_planillas_costos":  "planillas_costos",
  "horreo_he_solicitudes":    "he_solicitudes",
  "horreo_labor_semanas":     "labor_semanas",
};

function sbNormRow(r) {
  if (!r) return r;
  const row = { ...r };
  if (row.empleados && typeof row.empleados === "string") {
    try { row.empleados = JSON.parse(row.empleados); } catch {}
  }
  return row;
}

function sbPrepRow(r) {
  const row = { ...r };
  if (row.empleados && typeof row.empleados !== "string") row.empleados = JSON.stringify(row.empleados);
  for (const [k, v] of Object.entries(row)) { if (v === "" || v === undefined) row[k] = null; }
  return row;
}

function useSupabase(key, init) {
  const tabla = SB_TABLE_MAP[key];
  const [data, _setData] = useState(() => {
    try { const r = localStorage.getItem(key); return r ? JSON.parse(r) : init; } catch { return init; }
  });
  const dataRef = useRef(data);

  const applyData = (parsed) => {
    dataRef.current = parsed;
    _setData(parsed);
    try { localStorage.setItem(key, JSON.stringify(parsed)); } catch {}
  };

  useEffect(() => {
    if (!tabla) return;
    let cancelled = false;
    let channel = null;

    const run = async () => {
      // esperar a que getSB() funcione (max 8 segundos)
      let sb = null;
      for (let i = 0; i < 16; i++) {
        sb = getSB();
        if (sb) break;
        await new Promise(res => setTimeout(res, 500));
      }
      if (!sb || cancelled) { console.warn("SB no disponible para", tabla); return; }

      // carga inicial
      try {
        const { data: rows, error } = await sb.from(tabla).select("*");
        if (cancelled) return;
        if (error) { console.warn("SB load", tabla, error.message); }
        else {
          applyData(rows.map(sbNormRow));
          setSBConnected(true);
          console.log("SB loaded", tabla, rows.length, "rows");
        }
      } catch(e) { console.warn("SB load exception", tabla, e.message); }

      // realtime
      if (cancelled) return;
      try {
        channel = sb.channel("horreo_" + tabla)
          .on("postgres_changes", { event: "INSERT", schema: "public", table: tabla }, ({ new: row }) => {
            if (cancelled) return;
            const norm = sbNormRow(row);
            _setData(prev => {
              if (prev.find(r => r.id === norm.id)) return prev;
              const next = [...prev, norm];
              dataRef.current = next;
              try { localStorage.setItem(key, JSON.stringify(next)); } catch {}
              return next;
            });
          })
          .on("postgres_changes", { event: "UPDATE", schema: "public", table: tabla }, ({ new: row }) => {
            if (cancelled) return;
            const norm = sbNormRow(row);
            _setData(prev => {
              const next = prev.map(r => r.id === norm.id ? norm : r);
              dataRef.current = next;
              try { localStorage.setItem(key, JSON.stringify(next)); } catch {}
              return next;
            });
          })
          .on("postgres_changes", { event: "DELETE", schema: "public", table: tabla }, ({ old: row }) => {
            if (cancelled) return;
            _setData(prev => {
              const next = prev.filter(r => r.id !== row.id);
              dataRef.current = next;
              try { localStorage.setItem(key, JSON.stringify(next)); } catch {}
              return next;
            });
          })
          .subscribe(status => {
            console.log("SB channel", tabla, status);
            if (status === "SUBSCRIBED") setSBConnected(true);
            if (status === "CHANNEL_ERROR" || status === "TIMED_OUT") setSBConnected(false);
          });
      } catch(e) { console.warn("SB realtime", tabla, e.message); }
    };

    run();
    return () => {
      cancelled = true;
      try { if (channel) getSB()?.removeChannel(channel); } catch {}
    };
  }, [key, tabla]);

  const save = useCallback((val) => {
    _setData(prev => {
      const next = typeof val === "function" ? val(prev) : val;
      dataRef.current = next;
      try { localStorage.setItem(key, JSON.stringify(next)); } catch {}
      if (tabla && Array.isArray(next)) {
        const sb = getSB();
        if (sb) {
          const prevMap = Object.fromEntries((Array.isArray(prev) ? prev : []).map(r => [r.id, JSON.stringify(sbPrepRow(r))]));
          const dirty = next.filter(r => !prevMap[r.id] || prevMap[r.id] !== JSON.stringify(sbPrepRow(r)));
          if (dirty.length > 0) {
            sb.from(tabla).upsert(dirty.map(sbPrepRow), { onConflict: "id" })
              .then(({ error }) => {
                if (error) console.warn("SB upsert", tabla, error.message);
                else console.log("SB upsert OK", tabla, dirty.length, "rows");
              });
          }
        }
      }
      return next;
    });
  }, [key, tabla]);

  return [data, save];
}


// Hard-delete en Supabase — elimina por id de la tabla correspondiente
async function sbDelete(tabla, id) {
  try {
    const sb = getSB();
    if (!sb) return;
    const { error } = await sb.from(tabla).delete().eq("id", id);
    if (error) console.warn("SB delete", tabla, error.message);
    else console.log("SB delete OK", tabla, id);
  } catch(e) { console.warn("SB delete exception", e.message); }
}

// Eliminar múltiples por condición (ej: todos los de un local+fecha)
async function sbDeleteWhere(tabla, filters) {
  try {
    const sb = getSB();
    if (!sb) return;
    let q = sb.from(tabla).delete();
    for (const [col, val] of Object.entries(filters)) q = q.eq(col, val);
    const { error } = await q;
    if (error) console.warn("SB deleteWhere", tabla, error.message);
  } catch(e) { console.warn("SB deleteWhere exception", e.message); }
}

async function syncDesdeSupabase(setters) {
  const sb = getSB();
  if (!sb) return { ok: false, msg: "Sin conexión Supabase. Verifica credenciales en ⚙️ Config." };
  const resultados = [];
  for (const [key, setter] of Object.entries(setters)) {
    const tabla = SB_TABLE_MAP[key];
    if (!tabla) continue;
    try {
      const { data: rows, error } = await sb.from(tabla).select("*");
      if (error) { resultados.push({ tabla, ok: false, msg: error.message }); continue; }
      const parsed = (rows || []).map(sbNormRow);
      setter(parsed);
      try { localStorage.setItem(key, JSON.stringify(parsed)); } catch {}
      resultados.push({ tabla, ok: true, n: parsed.length });
    } catch (e) {
      resultados.push({ tabla, ok: false, msg: e.message });
    }
  }
  return { ok: true, resultados };
}



async function syncToSheets(tabla, rows, url) {
  if (!url || url === APPS_SCRIPT_URL_DEFAULT) return { ok: false, msg: "URL no configurada" };
  try {
    const res = await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ tabla, rows }) });
    const data = await res.json();
    return { ok: true, msg: data.message || "Sincronizado" };
  } catch (e) { return { ok: false, msg: e.message }; }
}

// PWA INSTALL BANNER
// ══════════════════════════════════════════════════════════════════════════════
function InstallBanner() {
  const [state, setState] = useState("hidden"); // hidden | installable | ios | update
  const [dismissed, setDismissed] = useStorage("horreo_pwa_dismissed", false);

  useEffect(() => {
    if (dismissed) return;
    // Ya instalada como app standalone
    if (window.matchMedia("(display-mode: standalone)").matches ||
        window.navigator.standalone === true) return;

    // Android/Chrome — evento beforeinstallprompt ya capturado
    if (window._installPrompt) { setState("installable"); return; }
    window.addEventListener("pwa-installable", () => setState("installable"), { once: true });

    // iOS — no tiene beforeinstallprompt, detectar Safari
    const isIos = /iphone|ipad|ipod/i.test(navigator.userAgent);
    const isSafari = /safari/i.test(navigator.userAgent) && !/chrome/i.test(navigator.userAgent);
    if (isIos && isSafari) { setState("ios"); return; }

    // Actualización disponible
    window.addEventListener("sw-update-ready", () => setState("update"), { once: true });
    if (window._swUpdateReady) setState("update");
  }, [dismissed]);

  const handleInstall = async () => {
    if (!window._installPrompt) return;
    window._installPrompt.prompt();
    const { outcome } = await window._installPrompt.userChoice;
    if (outcome === "accepted") { setState("hidden"); window._installPrompt = null; }
  };

  const handleUpdate = () => {
    navigator.serviceWorker.getRegistration().then(reg => reg?.waiting?.postMessage({ type:"SKIP_WAITING" }));
    window.location.reload();
  };

  const dismiss = () => { setDismissed(true); setState("hidden"); };

  if (state === "hidden" || dismissed) return null;

  const configs = {
    installable: {
      icon: "📲", color: "#6C63FF",
      title: "Instalar El Hórreo",
      desc: "Acceso directo desde tu pantalla de inicio, funciona sin internet.",
      btn: "Instalar app", action: handleInstall,
    },
    ios: {
      icon: "📲", color: "#6C63FF",
      title: "Agregar a inicio",
      desc: `Toca ${String.fromCodePoint(0x1F4E4)} Compartir → "Agregar a pantalla de inicio" para instalar la app.`,
      btn: null, action: null,
    },
    update: {
      icon: "🔄", color: "#10B981",
      title: "Actualización disponible",
      desc: "Hay una nueva versión de El Hórreo lista para instalar.",
      btn: "Actualizar ahora", action: handleUpdate,
    },
  };

  const c = configs[state];
  if (!c) return null;

  return (
    <div style={{
      position: "fixed", bottom: "calc(62px + env(safe-area-inset-bottom, 0px))",
      left: 0, right: 0, zIndex: 200,
      display: "flex", justifyContent: "center", padding: "0 12px",
      animation: "fadeIn .3s ease",
    }}>
      <div style={{
        width: "100%", maxWidth: 520,
        background: "var(--bg-card)", border: `1.5px solid ${c.color}44`,
        borderRadius: 16, padding: "12px 14px",
        boxShadow: `0 8px 32px rgba(0,0,0,0.18), 0 0 0 1px ${c.color}22`,
        display: "flex", alignItems: "center", gap: 10,
      }}>
        <span style={{ fontSize: 26, flexShrink: 0 }}>{c.icon}</span>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontFamily: "Nunito", fontWeight: 800, fontSize: 13, color: "var(--text-1)" }}>{c.title}</div>
          <div style={{ fontFamily: "Nunito", fontSize: 11, color: "var(--text-3)", marginTop: 2, lineHeight: 1.4 }}>{c.desc}</div>
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 5, flexShrink: 0 }}>
          {c.btn && (
            <button onClick={c.action}
              style={{ background: c.color, color: "#fff", border: "none", borderRadius: 9, padding: "7px 12px", fontFamily: "Nunito", fontWeight: 800, fontSize: 11, cursor: "pointer", whiteSpace: "nowrap" }}>
              {c.btn}
            </button>
          )}
          <button onClick={dismiss}
            style={{ background: "var(--divider)", color: "var(--text-3)", border: "none", borderRadius: 9, padding: "5px 10px", fontFamily: "Nunito", fontWeight: 700, fontSize: 10, cursor: "pointer" }}>
            {state === "ios" ? "Entendido" : "Ahora no"}
          </button>
        </div>
      </div>
    </div>
  );
}

function exportExcel(sheets) {
  // sheets = [{ name, headers, rows }]
  // Uses SheetJS if available, falls back to CSV modal
  if (window.XLSX) {
    const wb = window.XLSX.utils.book_new();
    sheets.forEach(sh => {
      const ws = window.XLSX.utils.aoa_to_sheet([sh.headers, ...sh.rows]);
      // Style header row width
      ws["!cols"] = sh.headers.map(h => ({ wch: Math.max(12, String(h).length + 4) }));
      window.XLSX.utils.book_append_sheet(wb, ws, sh.name.slice(0,31));
    });
    window.XLSX.writeFile(wb, sheets[0].name.replace(/[^\w]/g,"_") + ".xlsx");
  } else {
    // Fallback: CSV via modal
    const csv = sheets.map(sh =>
      "=== " + sh.name + " ===\n" +
      [sh.headers, ...sh.rows].map(r => r.join(",")).join("\n")
    ).join("\n\n");
    showCSVModal(sheets[0].name + ".csv", csv);
  }
}

// ── Helper global: obtener lista de empleados desde horarios cargados ─────────
function getEmpleadosDeMarca(marca) {
  try {
    const semanas = JSON.parse(localStorage.getItem("horreo_labor_semanas") || "[]");
    const personal = JSON.parse(localStorage.getItem("horreo_personal_adicional") || "[]");
    const empFromSemanas = semanas
      .filter(s => s.marca === marca)
      .flatMap(s => s.empleados.map(e => ({ nombre: e.nombre, cargo: e.cargo, rut: e.rut })));
    const empFromPersonal = personal
      .filter(p => p.marca === marca)
      .map(p => ({ nombre: p.nombre, cargo: p.cargo, rut: p.id }));
    // Deduplicate by nombre
    const all = [...empFromSemanas, ...empFromPersonal];
    const seen = new Set();
    return all.filter(e => { if (seen.has(e.nombre)) return false; seen.add(e.nombre); return true; })
              .sort((a,b) => a.nombre.localeCompare(b.nombre));
  } catch { return []; }
}

// Reusable employee selector component

// Semáforo de cumplimiento configurable
// verde ≥ verde_min%, amarillo ≥ amarillo_min%, rojo < amarillo_min%
function getSemaforo(valor, meta, config = {}) {
  if (!meta || meta === 0) return { color: "#94A3B8", icono: "⚪", label: "Sin meta" };
  const pct = (valor / meta) * 100;
  const verde    = config.verde    ?? 100;
  const amarillo = config.amarillo ?? 90;
  if (pct >= verde)    return { color: "#22C55E", icono: "🟢", label: `${pct.toFixed(1)}%`, pct };
  if (pct >= amarillo) return { color: "#F59E0B", icono: "🟡", label: `${pct.toFixed(1)}%`, pct };
  return                        { color: "#EF4444", icono: "🔴", label: `${pct.toFixed(1)}%`, pct };
}

// Para métricas inversas (menor es mejor: merma, KDS, labor)
function getSemaforoInverso(valor, meta, config = {}) {
  if (!meta || meta === 0) return { color: "#94A3B8", icono: "⚪", label: "Sin meta" };
  const pct = (valor / meta) * 100;
  const verde    = config.verde    ?? 100;
  const amarillo = config.amarillo ?? 110;
  if (pct <= verde)    return { color: "#22C55E", icono: "🟢", label: `${pct.toFixed(1)}%`, pct };
  if (pct <= amarillo) return { color: "#F59E0B", icono: "🟡", label: `${pct.toFixed(1)}%`, pct };
  return                        { color: "#EF4444", icono: "🔴", label: `${pct.toFixed(1)}%`, pct };
}

// Generar alertas automáticas basadas en KPIs del período
function generarAlertas(resumen, red, metas, metasDiarias, kpis, marca, rango) {
  const alertas = [];
  const umbralVenta = 80;   // % cumplimiento venta
  const umbralMerma = 110;  // % sobre meta
  const umbralKDS   = 110;  // % sobre meta

  resumen.forEach(r => {
    const local = nombreCortoLocal(r.local);
    // Venta bajo 80% cumplimiento
    if (r.mv > 0 && r.cumpl < umbralVenta/100) {
      alertas.push({ tipo: "venta", sev: "alta", local, msg: `Venta ${(r.cumpl*100).toFixed(0)}% de meta`, valor: r.vt, meta: r.mv });
    }
    // Merma — usa meta por local si existe, si no la del Excel, si no el default global
    const metaM = metas.find(x => x.local === r.local && x.mes === rango.ini.slice(0,7));
    const metaMermaEfectiva = metaM?.meta_mermas > 0
      ? parseFloat(metaM.meta_mermas)
      : getMetaLocal(r.local, "merma_pct", "horreo_meta_mermas_pct", 2) * r.vt / 100;
    if (metaMermaEfectiva > 0 && r.mr > metaMermaEfectiva * umbralMerma/100) {
      alertas.push({ tipo: "merma", sev: "media", local, msg: `Merma ${fmtCLP(r.mr)} supera meta ${fmtCLP(metaMermaEfectiva)}`, valor: r.mr, meta: metaMermaEfectiva });
    }
    // KDS — meta por local o del Excel
    const metaKDS = metaM?.meta_kds > 0
      ? parseFloat(metaM.meta_kds)
      : getMetaLocal(r.local, "kds_min", "horreo_meta_kds_min", 4);
    if (metaKDS > 0 && r.kp > metaKDS * umbralKDS/100) {
      alertas.push({ tipo: "kds", sev: "media", local, msg: `KDS ${r.kp.toFixed(1)} min supera meta ${metaKDS} min`, valor: r.kp, meta: metaKDS });
    }
    // Labor por local
    if (r.vt > 0 && r.lab > 0) {
      const metaLaborLocal = getMetaLocal(r.local, "labor_pct", "horreo_meta_labor_pct", 28);
      const laborPct = (r.lab / r.vt) * 100;
      if (laborPct > metaLaborLocal) {
        alertas.push({ tipo: "labor", sev: "media", local, msg: `Labor ${laborPct.toFixed(1)}% supera meta ${metaLaborLocal}% en ${local}`, valor: laborPct, meta: metaLaborLocal });
      }
    }
  });
  return alertas;
}

function AlertasBadge({ count, onClick }) {
  if (count === 0) return null;
  return (
    <button onClick={onClick} style={{
      background: "#EF4444", color: "#fff", border: "none",
      borderRadius: 20, padding: "4px 10px", fontSize: 11,
      fontWeight: 800, fontFamily: "Nunito", cursor: "pointer",
      display: "flex", alignItems: "center", gap: 4,
    }}>
      🔔 {count} alerta{count > 1 ? "s" : ""}
    </button>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// FORM VENTAS
// ══════════════════════════════════════════════════════════════════════════════
function FormVentas({ ventas, setVentas, metasDiarias, metas, syncLog, setSyncLog, marca, config }) {
  const m = MARCAS[marca] || MARCAS[Object.keys(MARCAS)[0]] || { color: "#6C63FF", bg: "#F0EEFF", emoji: "🌭", textColor: "#fff", nombre: "—" };
  const localesMarca = LOCALES_POR_MARCA[marca] || LOCALES;
  const [form, setForm] = useState({ fecha: today(), local: localesMarca[0], turno: TURNOS[0], usuario: "", venta_bruta: "", boletas: "", merma: "", colaciones: "", obs: "" });
  const [saved, setSaved] = useState(false);
  const [syncing, setSyncing] = useState(false);
  const [syncErr, setSyncErr] = useState(false);
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  // Resetear local al cambiar de marca
  useEffect(() => {
    const locales = LOCALES_POR_MARCA[marca] || LOCALES;
    setForm(f => ({ ...f, local: locales[0] }));
  }, [marca]);

  const metaDia = useMemo(() => (metasDiarias || []).find(x => x.local === form.local && x.fecha === form.fecha), [metasDiarias, form.local, form.fecha]);
  const metaMes = useMemo(() => (metas || []).find(x => x.local === form.local && x.mes === form.fecha.slice(0, 7)), [metas, form.local, form.fecha]);

  const metaV    = parseFloat(metaDia?.meta_venta_bruta || 0);
  const metaB    = parseFloat(metaDia?.meta_boletas || 0);
  const aaVenta  = parseFloat(metaMes?.aa_venta_bruta || 0);
  const ticket   = form.venta_bruta && form.boletas ? Math.round(parseFloat(form.venta_bruta) / parseFloat(form.boletas)) : 0;
  const cumplV   = metaV ? parseFloat(form.venta_bruta || 0) / metaV : 0;
  const cumplB   = metaB ? parseFloat(form.boletas || 0) / metaB : 0;
  const difPPTO  = parseFloat(form.venta_bruta || 0) - metaV;
  const difAA    = parseFloat(form.venta_bruta || 0) - aaVenta;
  const crecAA   = aaVenta ? difAA / aaVenta : 0;
  const mermaPct = form.venta_bruta ? parseFloat(form.merma || 0) / parseFloat(form.venta_bruta) : 0;
  const mes      = form.fecha.slice(0, 7);

  const acumLocal = useMemo(() =>
    ventas.filter(v => v.local === form.local && v.fecha.slice(0, 7) === mes && v.marca === marca)
          .reduce((s, v) => s + parseFloat(v.venta_bruta || 0), 0) + parseFloat(form.venta_bruta || 0),
    [ventas, form.local, mes, marca, form.venta_bruta]);

  // Días hasta hoy con meta cargada
  const diasConMeta = useMemo(() =>
    (metasDiarias || []).filter(x => x.local === form.local && x.fecha.slice(0, 7) === mes && x.fecha <= form.fecha),
    [metasDiarias, form.local, mes, form.fecha]);

  const metaAcum = diasConMeta.reduce((s, x) => s + parseFloat(x.meta_venta_bruta || 0), 0);

  // AA acumulado: prorrateado por días transcurridos respecto a días en el mes
  const diasEnMes = useMemo(() => {
    const [y, mo] = mes.split("-").map(Number);
    return new Date(y, mo, 0).getDate();
  }, [mes]);
  const aaAcum   = diasEnMes > 0 ? (aaVenta / diasEnMes) * diasConMeta.length : 0;
  const cumplAcum  = metaAcum ? acumLocal / metaAcum : 0;
  const crecAcumAA = aaAcum   ? (acumLocal - aaAcum) / aaAcum : 0;

  // ── Lógica corte 16h ────────────────────────────────────────────────────────
  // Si turno = "Cierre" y existe un "Corte 16:00" del mismo día/local,
  // el usuario ingresa la venta TOTAL del día y guardamos solo el delta.
  const registroCorte16 = useMemo(() =>
    form.turno === "Cierre"
      ? ventas.find(v => v.local === form.local && v.fecha === form.fecha && v.turno === "Corte 16:00" && v.marca === marca)
      : null,
  [ventas, form.local, form.fecha, form.turno, marca]);

  const ventaIngresada = parseFloat(form.venta_bruta || 0);
  const ventaCorte16   = parseFloat(registroCorte16?.venta_bruta || 0);
  // Si hay corte previo, la venta real a guardar es el delta
  const ventaAGuardar  = registroCorte16 ? Math.max(0, ventaIngresada - ventaCorte16) : ventaIngresada;
  const boletasIngresadas = parseFloat(form.boletas || 0);
  const boletasCorte16    = parseFloat(registroCorte16?.boletas || 0);
  const boletasAGuardar   = registroCorte16 ? Math.max(0, boletasIngresadas - boletasCorte16) : boletasIngresadas;

  const existeDuplicado = useMemo(() =>
    ventas.some(v => v.local === form.local && v.fecha === form.fecha && v.turno === form.turno && v.marca === marca),
    [ventas, form.local, form.fecha, form.turno, marca]
  );

  const handleSave = async () => {
    const reg = {
      id: uid(), marca, ...form,
      venta_bruta: ventaAGuardar,
      boletas: boletasAGuardar,
      ...(registroCorte16 ? { venta_total_dia: ventaIngresada, corte_16_ref: registroCorte16.id } : {}),
      ticket: boletasAGuardar > 0 ? Math.round(ventaAGuardar / boletasAGuardar) : ticket,
      meta_dia: metaV, meta_boletas_dia: metaB,
      cumpl_venta: metaV ? ventaAGuardar / metaV : cumplV,
      cumpl_boletas: metaB ? boletasAGuardar / metaB : cumplB,
      dif_ppto: ventaAGuardar - metaV, dif_aa: difAA, crec_aa: crecAA,
      merma_pct: mermaPct, acum_local: acumLocal, meta_acum: metaAcum,
      cumpl_acum: cumplAcum, aa_acum: aaAcum,
      ts: new Date().toISOString()
    };
    setVentas(v => [...v, reg]);
    setSaved(true);
    mailVenta(reg, m.nombre);
    if (config?.appsScriptUrl && config.appsScriptUrl !== APPS_SCRIPT_URL_DEFAULT) {
      setSyncing(true);
      const res = await syncToSheets("Form_Ventas", [reg], config.appsScriptUrl);
      setSyncing(false);
      if (res.ok) { const ts = new Date().toLocaleTimeString("es-CL", { hour: "2-digit", minute: "2-digit" }); setSyncLog(l => [...l, { tabla: "Form_Ventas", ts, ok: true }]); }
      else setSyncErr(true);
    }
    setTimeout(() => { setSaved(false); setSyncErr(false); }, 3000);
    setForm(f => ({ ...f, venta_bruta: "", boletas: "", merma: "", colaciones: "", obs: "" }));
  };

  const g2 = { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 };
  const hasData = parseFloat(form.venta_bruta) > 0;

  return (
    <div className="fade" style={{ paddingBottom: 90 }}>
      <LogoHeader marca={marca} />
      <SectionTitle color={m.color}>🛒 Registro de Ventas</SectionTitle>
      {(hasData || metaV > 0) && (
        <Card style={{ marginBottom: 14, border: `2px solid ${m.color}33`, background: m.bg }}>
          <div style={{ fontSize: 11, color: "#64748B", marginBottom: 10, fontWeight: 700, letterSpacing: .5, textTransform: "uppercase" }}>📊 Real vs PPTO vs AA</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 6, marginBottom: 12 }}>
            {[["REAL", fmtCLP(form.venta_bruta || 0), m.color, `${form.boletas || 0} bol.`, null],
              ["PPTO", fmtCLP(metaV), "#6C63FF", `${difPPTO >= 0 ? "+" : ""}${fmtCLP(difPPTO)}`, difPPTO >= 0 ? "#22C55E" : "#EF4444"],
              ["AA", fmtCLP(aaVenta), "#64748B", `${crecAA >= 0 ? "+" : ""}${((crecAA || 0) * 100).toFixed(1)}%`, crecAA >= 0 ? "#22C55E" : "#EF4444"],
            ].map(([lbl, val, c, sub, sc]) => (
              <div key={lbl} style={{ background: "#fff", borderRadius: 10, padding: "10px 8px", textAlign: "center" }}>
                <div style={{ fontSize: 9, color: "#94A3B8", fontWeight: 700, marginBottom: 4 }}>{lbl}</div>
                <div style={{ fontSize: 17, fontFamily: "Nunito", fontWeight: 900, color: c }}>{val}</div>
                <div style={{ fontSize: 10, color: sc || "#94A3B8", fontWeight: sc ? 700 : 400 }}>{sub}</div>
              </div>
            ))}
          </div>
          {metaV > 0 && (
            <div style={{ marginBottom: 8 }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
                <span style={{ fontSize: 11, color: "#64748B", fontWeight: 600 }}>Real vs PPTO día</span>
                <span style={{ fontSize: 12, fontWeight: 800, fontFamily: "Nunito", color: cumplV >= 1 ? "#22C55E" : cumplV >= 0.8 ? "#F59E0B" : "#EF4444" }}>{((cumplV || 0) * 100).toFixed(1)}%</span>
              </div>
              <div style={{ height: 8, background: "#E2E8F0", borderRadius: 8 }}>
                <div style={{ height: "100%", width: `${Math.min(100, (cumplV || 0) * 100)}%`, background: cumplV >= 1 ? "#22C55E" : cumplV >= 0.8 ? "#F59E0B" : "#EF4444", borderRadius: 8, transition: "width .5s" }} />
              </div>
            </div>
          )}
          {metaAcum > 0 && (
            <div>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
                <span style={{ fontSize: 11, color: "#64748B", fontWeight: 600 }}>Acum. mes vs PPTO</span>
                <span style={{ fontSize: 12, fontWeight: 800, fontFamily: "Nunito", color: cumplAcum >= 1 ? "#22C55E" : cumplAcum >= 0.8 ? "#F59E0B" : "#EF4444" }}>{((cumplAcum || 0) * 100).toFixed(1)}%</span>
              </div>
              <div style={{ height: 8, background: "#E2E8F0", borderRadius: 8 }}>
                <div style={{ height: "100%", width: `${Math.min(100, (cumplAcum || 0) * 100)}%`, background: cumplAcum >= 1 ? "#22C55E" : cumplAcum >= 0.8 ? "#F59E0B" : "#EF4444", borderRadius: 8, transition: "width .5s" }} />
              </div>
              <div style={{ fontSize: 10, color: "#94A3B8", marginTop: 4 }}>
                {fmtCLP(acumLocal)} acum. / {fmtCLP(metaAcum)} ppto
                {aaAcum > 0 && <span style={{ marginLeft: 8, color: crecAcumAA >= 0 ? "#22C55E" : "#EF4444" }}>AA: {crecAcumAA >= 0 ? "+" : ""}{((crecAcumAA || 0) * 100).toFixed(1)}%</span>}
              </div>
            </div>
          )}
          {ticket > 0 && (
            <div style={{ marginTop: 10, display: "flex", gap: 16 }}>
              <div><span style={{ fontSize: 10, color: "#94A3B8" }}>Ticket prom. </span><span style={{ fontSize: 13, fontWeight: 800, fontFamily: "Nunito", color: m.color }}>{fmtCLP(ticket)}</span></div>
              {metaB > 0 && <div><span style={{ fontSize: 10, color: "#94A3B8" }}>Boletas: </span><span style={{ fontSize: 13, fontWeight: 800, fontFamily: "Nunito", color: cumplB >= 1 ? "#22C55E" : "#F59E0B" }}>{((cumplB || 0) * 100).toFixed(0)}%</span></div>}
            </div>
          )}
        </Card>
      )}
      <Card>
        <div style={{ ...g2, marginBottom: 12 }}>
          <Field label="Fecha"><input type="date" value={form.fecha} onChange={e => set("fecha", e.target.value)} /></Field>
          <Field label="Local"><select value={form.local} onChange={e => set("local", e.target.value)}>{localesMarca.map(l => <option key={l}>{l}</option>)}</select></Field>
          <Field label="Turno"><select value={form.turno} onChange={e => set("turno", e.target.value)}>{TURNOS.map(t => <option key={t}>{t}</option>)}</select></Field>
          <Field label="Usuario"><input placeholder="Nombre" value={form.usuario} onChange={e => set("usuario", e.target.value)} /></Field>
        </div>
        <Divider label="💰 Ventas" color={m.color} />

        {/* Banner corte 16h — solo aparece cuando turno=Cierre y hay corte previo */}
        {registroCorte16 && (
          <div style={{ marginBottom:10, background:"#EFF6FF", border:"1.5px solid #BFDBFE", borderRadius:10, padding:"10px 12px" }}>
            <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:12, color:"#1D4ED8", marginBottom:4 }}>
              🕓 Corte 16:00 registrado — ingresa la venta total del día
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8 }}>
              <div>
                <div style={{ fontSize:9, color:"#64748B", fontWeight:700 }}>CORTE 16:00</div>
                <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:13, color:"#1D4ED8" }}>{fmtCLP(ventaCorte16)}</div>
                <div style={{ fontSize:9, color:"#94A3B8" }}>{registroCorte16.boletas} bol.</div>
              </div>
              <div>
                <div style={{ fontSize:9, color:"#64748B", fontWeight:700 }}>VENTA TOTAL DÍA</div>
                <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:13, color:ventaIngresada > ventaCorte16 ? m.color : "#94A3B8" }}>
                  {ventaIngresada > 0 ? fmtCLP(ventaIngresada) : "ingresa abajo"}
                </div>
              </div>
              <div>
                <div style={{ fontSize:9, color:"#64748B", fontWeight:700 }}>SE GUARDARÁ (delta)</div>
                <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:13, color: ventaAGuardar > 0 ? "#22C55E" : "#94A3B8" }}>
                  {ventaAGuardar > 0 ? fmtCLP(ventaAGuardar) : "—"}
                </div>
                <div style={{ fontSize:9, color:"#94A3B8" }}>{boletasAGuardar > 0 ? boletasAGuardar + " bol." : ""}</div>
              </div>
            </div>
          </div>
        )}

        <div style={{ ...g2, marginBottom: 12 }}>
          <Field label={registroCorte16 ? "Venta Total del Día $" : "Venta Bruta $"}>
            <input type="number" placeholder="0" value={form.venta_bruta} onChange={e => set("venta_bruta", e.target.value)} />
          </Field>
          <Field label={registroCorte16 ? "Boletas Total del Día" : "N° Boletas"}>
            <input type="number" placeholder="0" value={form.boletas} onChange={e => set("boletas", e.target.value)} />
          </Field>
        </div>
        <Divider label="🗑️ Mermas & Colaciones" color="#EF4444" />
        <div style={{ ...g2, marginBottom: 12 }}>
          <Field label="Merma $"><input type="number" placeholder="0" value={form.merma} onChange={e => set("merma", e.target.value)} /></Field>
          <Field label="Colaciones $"><input type="number" placeholder="0" value={form.colaciones} onChange={e => set("colaciones", e.target.value)} /></Field>
        </div>
        <Field label="Observaciones"><textarea rows={2} placeholder="Notas del turno..." value={form.obs} onChange={e => set("obs", e.target.value)} style={{ resize: "none" }} /></Field>
        {existeDuplicado && (
          <div style={{ marginTop:10, background:"#FFFBEB", border:"1.5px solid #FDE68A", borderRadius:10, padding:"10px 12px", display:"flex", gap:8, alignItems:"flex-start" }}>
            <span style={{ fontSize:16 }}>⚠️</span>
            <div style={{ fontSize:12, color:"#92400E", fontFamily:"Nunito", fontWeight:700, lineHeight:1.5 }}>
              Ya existe un registro para <strong>{nombreCortoLocal(form.local)}</strong> — <strong>{form.fecha}</strong> — <strong>{form.turno}</strong>.<br/>
              <span style={{ fontWeight:400 }}>Puedes guardarlo igual (quedará como registro adicional) o revisar en Historial.</span>
            </div>
          </div>
        )}
        <div style={{ marginTop: 16, display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
          <Btn onClick={handleSave} color={saved ? "#22C55E" : m.color} disabled={!form.venta_bruta}>{saved ? "✅ Guardado" : "💾 Guardar Registro"}</Btn>
          <SyncBadge syncing={syncing} error={syncErr} lastSync={syncLog.filter(s => s.tabla === "Form_Ventas" && s.ok).slice(-1)[0]?.ts} />
        </div>
      </Card>
    </div>
  );
}

// FORM KPI
// ══════════════════════════════════════════════════════════════════════════════
function FormKPI({ kpis, setKpis, syncLog, setSyncLog, marca, config }) {
  const m = MARCAS[marca] || MARCAS[Object.keys(MARCAS)[0]] || { color: "#6C63FF", bg: "#F0EEFF", emoji: "🌭", textColor: "#fff", nombre: "—" };
  const localesMarca = LOCALES_POR_MARCA[marca] || LOCALES;
  const [form, setForm] = useState({ fecha: today(), local: localesMarca[0], usuario: "", kds_desayuno: "", kds_almuerzo: "", kds_tarde: "", kds_noche: "", nota_uber: "", nota_pya: "", pedidos_uber: "", pedidos_pya: "", nps_promotores: "", nps_pasivos: "", nps_detractores: "", obs: "" });
  const [saved, setSaved] = useState(false);
  const [syncing, setSyncing] = useState(false);
  const [syncErr, setSyncErr] = useState(false);
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  useEffect(() => { setForm(f => ({ ...f, local: (LOCALES_POR_MARCA[marca] || LOCALES)[0] })); }, [marca]);

  const kdsVals  = [form.kds_desayuno, form.kds_almuerzo, form.kds_tarde, form.kds_noche].map(Number).filter(n => n > 0);
  const kdsProm  = kdsVals.length ? (kdsVals.reduce((a, b) => a + b, 0) / kdsVals.length).toFixed(1) : 0;
  const totalPed = (parseFloat(form.pedidos_uber) || 0) + (parseFloat(form.pedidos_pya) || 0);
  const totalNPS = (parseFloat(form.nps_promotores) || 0) + (parseFloat(form.nps_pasivos) || 0) + (parseFloat(form.nps_detractores) || 0);
  const npsScore = totalNPS ? (((parseFloat(form.nps_promotores) || 0) - (parseFloat(form.nps_detractores) || 0)) / totalNPS * 100).toFixed(0) : 0;

  // Detectar duplicado: mismo local+fecha ya con KPI
  const existeDuplicadoKPI = useMemo(() =>
    kpis.some(k => k.local === form.local && k.fecha === form.fecha && k.marca === marca),
    [kpis, form.local, form.fecha, marca]
  );

  const handleSave = async () => {
    const reg = { id: uid(), marca, ...form, kds_prom: kdsProm, total_pedidos: totalPed, nps_score: npsScore, ts: new Date().toISOString() };
    setKpis(k => [...k, reg]); setSaved(true);
    mailKPI(reg, m.nombre);
    if (config?.appsScriptUrl && config.appsScriptUrl !== APPS_SCRIPT_URL_DEFAULT) {
      setSyncing(true);
      const res = await syncToSheets("Form_KPI", [reg], config.appsScriptUrl);
      setSyncing(false);
      if (res.ok) { const ts = new Date().toLocaleTimeString("es-CL", { hour: "2-digit", minute: "2-digit" }); setSyncLog(l => [...l, { tabla: "Form_KPI", ts, ok: true }]); }
      else setSyncErr(true);
    }
    setTimeout(() => { setSaved(false); setSyncErr(false); }, 3000);
    setForm(f => ({ ...f, kds_desayuno: "", kds_almuerzo: "", kds_tarde: "", kds_noche: "", nota_uber: "", nota_pya: "", pedidos_uber: "", pedidos_pya: "", nps_promotores: "", nps_pasivos: "", nps_detractores: "", obs: "" }));
  };

  const g2 = { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 };
  return (
    <div className="fade" style={{ paddingBottom: 90 }}>
      <LogoHeader marca={marca} />
      <SectionTitle color={m.color}>⚡ KPIs Operacionales</SectionTitle>
      {kdsProm > 0 && (
        <Card style={{ marginBottom: 14, border: `2px solid ${m.color}22`, background: m.bg }}>
          <div style={{ display: "flex", gap: 24, flexWrap: "wrap" }}>
            <div><div style={{ fontSize: 10, color: "#94A3B8" }}>KDS Promedio</div><div style={{ fontSize: 22, fontFamily: "Nunito", fontWeight: 900, color: "#06B6D4" }}>{kdsProm} min</div></div>
            {totalPed > 0 && <div><div style={{ fontSize: 10, color: "#94A3B8" }}>Total Pedidos</div><div style={{ fontSize: 22, fontFamily: "Nunito", fontWeight: 900, color: "#6C63FF" }}>{totalPed}</div></div>}
            {totalNPS > 0 && <div><div style={{ fontSize: 10, color: "#94A3B8" }}>NPS Score</div><div style={{ fontSize: 22, fontFamily: "Nunito", fontWeight: 900, color: npsScore >= 50 ? "#22C55E" : "#F59E0B" }}>{npsScore}</div></div>}
          </div>
        </Card>
      )}
      <Card>
        <div style={{ ...g2, marginBottom: 12 }}>
          <Field label="Fecha"><input type="date" value={form.fecha} onChange={e => set("fecha", e.target.value)} /></Field>
          <Field label="Local"><select value={form.local} onChange={e => set("local", e.target.value)}>{localesMarca.map(l => <option key={l}>{l}</option>)}</select></Field>
          <Field label="Usuario" col={2}><input placeholder="Nombre" value={form.usuario} onChange={e => set("usuario", e.target.value)} /></Field>
        </div>
        <Divider label="⏱️ KDS — Tiempos (min)" color="#06B6D4" />
        <div style={{ ...g2, marginBottom: 12 }}>
          <Field label="Desayuno"><input type="number" placeholder="0" value={form.kds_desayuno} onChange={e => set("kds_desayuno", e.target.value)} /></Field>
          <Field label="Almuerzo"><input type="number" placeholder="0" value={form.kds_almuerzo} onChange={e => set("kds_almuerzo", e.target.value)} /></Field>
          <Field label="Tarde"><input type="number" placeholder="0" value={form.kds_tarde} onChange={e => set("kds_tarde", e.target.value)} /></Field>
          <Field label="Noche"><input type="number" placeholder="0" value={form.kds_noche} onChange={e => set("kds_noche", e.target.value)} /></Field>
        </div>
        <Divider label="🚀 Delivery" color="#6C63FF" />
        <div style={{ ...g2, marginBottom: 12 }}>
          <Field label="Nota Uber (/5)"><input type="number" step=".1" min="1" max="5" placeholder="5.0" value={form.nota_uber} onChange={e => set("nota_uber", e.target.value)} /></Field>
          <Field label="Nota PedidosYa (/5)"><input type="number" step=".1" min="1" max="5" placeholder="5.0" value={form.nota_pya} onChange={e => set("nota_pya", e.target.value)} /></Field>
          <Field label="Pedidos Uber"><input type="number" placeholder="0" value={form.pedidos_uber} onChange={e => set("pedidos_uber", e.target.value)} /></Field>
          <Field label="Pedidos PYA"><input type="number" placeholder="0" value={form.pedidos_pya} onChange={e => set("pedidos_pya", e.target.value)} /></Field>
        </div>
        <Divider label="⭐ NPS" color="#22C55E" />
        <div style={{ ...g2, marginBottom: 12 }}>
          <Field label="Promotores"><input type="number" placeholder="0" value={form.nps_promotores} onChange={e => set("nps_promotores", e.target.value)} /></Field>
          <Field label="Pasivos"><input type="number" placeholder="0" value={form.nps_pasivos} onChange={e => set("nps_pasivos", e.target.value)} /></Field>
          <Field label="Detractores" col={2}><input type="number" placeholder="0" value={form.nps_detractores} onChange={e => set("nps_detractores", e.target.value)} /></Field>
        </div>
        <Field label="Observaciones"><textarea rows={2} placeholder="Notas KPI..." value={form.obs} onChange={e => set("obs", e.target.value)} style={{ resize: "none" }} /></Field>
        {existeDuplicadoKPI && (
          <div style={{ marginTop:10, background:"#FFFBEB", border:"1.5px solid #FDE68A", borderRadius:10, padding:"10px 12px", display:"flex", gap:8, alignItems:"flex-start" }}>
            <span style={{ fontSize:16 }}>⚠️</span>
            <div style={{ fontSize:12, color:"#92400E", fontFamily:"Nunito", fontWeight:700, lineHeight:1.5 }}>
              Ya hay KPI registrado para <strong>{nombreCortoLocal(form.local)}</strong> — <strong>{form.fecha}</strong>.<br/>
              <span style={{ fontWeight:400 }}>Puedes guardar igual (quedará como adicional) o revisar en Historial.</span>
            </div>
          </div>
        )}
        <div style={{ marginTop: 16, display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
          <Btn onClick={handleSave} color={saved ? "#22C55E" : m.color}>{saved ? "✅ Guardado" : "💾 Guardar KPI"}</Btn>
          <SyncBadge syncing={syncing} error={syncErr} lastSync={syncLog.filter(s => s.tabla === "Form_KPI" && s.ok).slice(-1)[0]?.ts} />
        </div>
      </Card>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// METAS
// ══════════════════════════════════════════════════════════════════════════════
// ══════════════════════════════════════════════════════════════════════════════
// DASHBOARD — filtros por período, comparaciones, exportar
// ══════════════════════════════════════════════════════════════════════════════
function Dashboard({ ventas, kpis, inventarios, metas, metasDiarias, marca, planillas, semanas }) {
  const m = MARCAS[marca] || MARCAS[Object.keys(MARCAS)[0]] || { color: "#6C63FF", bg: "#F0EEFF", emoji: "🌭", textColor: "#fff", nombre: "—" };
  const localesMarca = LOCALES_POR_MARCA[marca] || LOCALES;

  // Helper: calcular costo labor desde semanas del módulo Labor
  const getLaborPlanilla = useCallback((local, ini, fin) => {
    try {
      const mes = ini.slice(0, 7);
      const semanasData = (semanas && semanas.length > 0)
        ? semanas
        : JSON.parse(localStorage.getItem("horreo_labor_semanas") || "[]");
      const valoresCargo = JSON.parse(localStorage.getItem("horreo_labor_valores") || "{}");
      const semsDelMes = semanasData.filter(s =>
        s.marca === marca &&
        s.uploadLocal === local &&
        (s.inicio?.slice(0,7) === mes || s.fin?.slice(0,7) === mes)
      );
      if (!semsDelMes.length) return 0;
      let totalCosto = 0;
      semsDelMes.forEach(sem => {
        (sem.empleados || []).forEach(emp => {
          const vc = valoresCargo[emp.cargo] || { hora: 0, mes: 0, bono: 0 };
          const diasTrabajados = (emp.dias || []).filter(d => d.estado === "trabajo");
          if (vc.hora > 0) {
            diasTrabajados.forEach(d => { totalCosto += (d.horas || 0) * vc.hora; });
          } else if (vc.mes > 0) {
            const diasHabiles = (sem.empleados[0]?.dias || []).filter(d => d.estado !== "libre").length || 20;
            totalCosto += (vc.mes / diasHabiles) * diasTrabajados.length;
          }
          if (vc.bono > 0) {
            const diasHabiles = (sem.empleados[0]?.dias || []).filter(d => d.estado !== "libre").length || 20;
            totalCosto += diasHabiles > 0 ? (vc.bono / diasHabiles) * diasTrabajados.length : 0;
          }
        });
      });
      return totalCosto;
    } catch { return 0; }
  }, [marca, semanas]);

  // ── Filtros ─────────────────────────────────────────────────────────────────
  const [localFilter, setLocalFilter] = useState("Todos");
  const [periodo, setPeriodo]         = useState("mes");   // mes | semana | dia | rango
  const [mesFilter, setMesFilter]     = useState(today().slice(0,7));
  const [semFilter, setSemFilter]     = useState(today()); // any date in the week
  const [diaFilter, setDiaFilter]     = useState(today());
  const [rangoIni, setRangoIni]       = useState(today().slice(0,7) + "-01");
  const [rangoFin, setRangoFin]       = useState(today());
  const [comparar, setComparar]       = useState("none"); // none | mes_anterior | semana_anterior | aa
  const [verTab, setVerTab]           = useState("kpis"); // kpis | ranking | tendencia

  // Calcular rango de fechas según período seleccionado
  const rango = useMemo(() => {
    if (periodo === "mes") {
      const [y,mo] = mesFilter.split("-").map(Number);
      const dias = new Date(y,mo,0).getDate();
      return { ini: mesFilter+"-01", fin: mesFilter+"-"+String(dias).padStart(2,"0"), label: mesFilter };
    }
    if (periodo === "semana") {
      const d = new Date(semFilter+"T12:00:00");
      const dow = d.getDay(); // 0=dom
      const lunes = new Date(d); lunes.setDate(d.getDate() - (dow === 0 ? 6 : dow-1));
      const dom   = new Date(lunes); dom.setDate(lunes.getDate()+6);
      const fmt = dt => dt.toISOString().split("T")[0];
      return { ini: fmt(lunes), fin: fmt(dom), label: "Sem " + fmt(lunes) };
    }
    if (periodo === "dia") {
      return { ini: diaFilter, fin: diaFilter, label: diaFilter };
    }
    return { ini: rangoIni, fin: rangoFin, label: rangoIni + " → " + rangoFin };
  }, [periodo, mesFilter, semFilter, diaFilter, rangoIni, rangoFin]);

  // Rango de comparación (período anterior o AA)
  const rangoComp = useMemo(() => {
    if (comparar === "none") return null;
    if (comparar === "aa") {
      const offset = d => { const dt=new Date(d+"T12:00:00"); dt.setFullYear(dt.getFullYear()-1); return dt.toISOString().split("T")[0]; };
      return { ini: offset(rango.ini), fin: offset(rango.fin), label: "AA " + rango.label };
    }
    if (comparar === "mes_anterior") {
      const [y,mo] = rango.ini.slice(0,7).split("-").map(Number);
      const prev = mo === 1 ? `${y-1}-12` : `${y}-${String(mo-1).padStart(2,"0")}`;
      const dias = new Date(parseInt(prev.split("-")[0]), parseInt(prev.split("-")[1]), 0).getDate();
      return { ini: prev+"-01", fin: prev+"-"+String(dias).padStart(2,"0"), label: "Mes anterior" };
    }
    if (comparar === "semana_anterior") {
      const prevIni = new Date(rango.ini+"T12:00:00"); prevIni.setDate(prevIni.getDate()-7);
      const prevFin = new Date(rango.fin+"T12:00:00"); prevFin.setDate(prevFin.getDate()-7);
      const fmt = dt => dt.toISOString().split("T")[0];
      return { ini: fmt(prevIni), fin: fmt(prevFin), label: "Sem anterior" };
    }
    return null;
  }, [comparar, rango]);

  // Función genérica para calcular métricas de un rango
  const calcMetricas = useCallback((rangoR) => {
    if (!rangoR) return null;
    return localesMarca.map(local => {
      const vR  = ventas.filter(v => v.local===local && v.marca===marca && v.fecha>=rangoR.ini && v.fecha<=rangoR.fin);
      const kR  = kpis.filter(k => k.local===local && k.marca===marca && k.fecha>=rangoR.ini && k.fecha<=rangoR.fin);
      const metaM = metas.find(x => x.local===local && x.mes===rangoR.ini.slice(0,7));
      const vt  = vR.reduce((s,v)=>s+parseFloat(v.venta_bruta||0),0);
      const vn  = vt / 1.19; // Venta Neta (sin IVA 19%)
      const bt  = vR.reduce((s,v)=>s+parseFloat(v.boletas||0),0);
      const mr  = vR.reduce((s,v)=>s+parseFloat(v.merma||0),0);
      const col = vR.reduce((s,v)=>s+parseFloat(v.colaciones||0),0);
      const labVentas = vR.reduce((s,v)=>s+parseFloat(v.labor_real||0),0);
      const lab = labVentas > 0 ? labVentas : getLaborPlanilla(local, rangoR.ini, rangoR.fin);
      const mv  = parseFloat(metaM?.meta_venta_bruta||0);
      const mvn = mv / 1.19; // Meta Venta Neta
      const aaV = parseFloat(metaM?.aa_venta_bruta||0);
      const kp  = kR.length ? kR.reduce((s,k)=>s+parseFloat(k.kds_prom||0),0)/kR.length : 0;
      const np  = kR.length ? kR.reduce((s,k)=>s+parseFloat(k.nps_score||0),0)/kR.length : 0;
      return { local, vt, vn, bt, mr, col, lab, labVentas, mv, mvn, aaV, kp, np, cumpl: mv?vt/mv:0 };
    });
  }, [ventas, kpis, metas, marca, localesMarca, getLaborPlanilla]);

  const resumen  = useMemo(()=>calcMetricas(rango),  [calcMetricas, rango]);
  const resComp  = useMemo(()=>calcMetricas(rangoComp), [calcMetricas, rangoComp]);

  const red = useMemo(()=>({
    vt:  resumen.reduce((s,r)=>s+r.vt, 0),
    vn:  resumen.reduce((s,r)=>s+r.vn, 0),
    mv:  resumen.reduce((s,r)=>s+r.mv, 0),
    mvn: resumen.reduce((s,r)=>s+r.mvn, 0),
    mr:  resumen.reduce((s,r)=>s+r.mr, 0),
    col: resumen.reduce((s,r)=>s+r.col, 0),
    lab: resumen.reduce((s,r)=>s+r.lab, 0),
    kp:  resumen.filter(r=>r.kp>0).length ? resumen.reduce((s,r)=>s+r.kp,0)/resumen.filter(r=>r.kp>0).length : 0,
    vtComp: resComp ? resComp.reduce((s,r)=>s+r.vt,0) : 0,
  }), [resumen, resComp]);

  const redCumpl    = red.mv ? red.vt/red.mv : 0;
  const varComp     = resComp && red.vtComp > 0 ? (red.vt - red.vtComp) / red.vtComp : null;

  // Tendencia diaria para el período seleccionado
  const tendencia = useMemo(() => {
    const ventasFiltradas = ventas.filter(v =>
      v.marca===marca && v.fecha>=rango.ini && v.fecha<=rango.fin &&
      (localFilter==="Todos" || v.local===localFilter)
    );
    const byFecha = {};
    ventasFiltradas.forEach(v => {
      if (!byFecha[v.fecha]) byFecha[v.fecha] = { fecha:v.fecha, vt:0, bt:0 };
      byFecha[v.fecha].vt += parseFloat(v.venta_bruta||0);
      byFecha[v.fecha].bt += parseFloat(v.boletas||0);
    });
    return Object.values(byFecha).sort((a,b)=>a.fecha>b.fecha?1:-1);
  }, [ventas, marca, rango, localFilter]);

  // Comparación mes a mes (últimos 6 meses)
  const mesesRecientes = useMemo(() => {
    const meses = [];
    const base = new Date(today()+"T12:00:00");
    for (let i=5; i>=0; i--) {
      const d = new Date(base); d.setMonth(d.getMonth()-i);
      const mes = d.toISOString().slice(0,7);
      const vt = ventas.filter(v=>v.marca===marca && v.fecha.slice(0,7)===mes && (localFilter==="Todos"||v.local===localFilter))
                       .reduce((s,v)=>s+parseFloat(v.venta_bruta||0),0);
      const metaM = metas.find(x=>x.local===localesMarca[0] && x.mes===mes);
      const mv = localesMarca.reduce((s,l)=>{ const mm=metas.find(x=>x.local===l&&x.mes===mes); return s+parseFloat(mm?.meta_venta_bruta||0); },0);
      meses.push({ mes, vt, mv, label: mes.slice(5) });
    }
    return meses;
  }, [ventas, metas, marca, localFilter, localesMarca]);

  const mes = rango.ini.slice(0,7); // for compatibility
  const ranking    = useMemo(()=>[...resumen].sort((a,b)=>b.vt-a.vt), [resumen]);
  const maxVt      = Math.max(...resumen.map(r=>r.vt), 1);
  const medals     = ["🥇","🥈","🥉","4️⃣","5️⃣","6️⃣"];
  const medalColors= ["#F5C800","#C0C0C0","#CD7F32","#94A3B8","#94A3B8","#94A3B8"];
  const ventaHoy   = useMemo(()=>ventas.filter(v=>v.fecha===today()&&v.marca===marca).reduce((s,v)=>s+parseFloat(v.venta_bruta||0),0),[ventas,marca]);

  // ── Exportar a Excel ────────────────────────────────────────────────────────
  const handleExport = () => {
    loadXLSX().then(() => {
      const ventasRows = ventas
        .filter(v => v.marca===marca && v.fecha>=rango.ini && v.fecha<=rango.fin && (localFilter==="Todos"||v.local===localFilter))
        .sort((a,b)=>a.fecha>b.fecha?1:-1)
        .map(v=>[v.fecha,v.local,v.turno||"",parseFloat(v.venta_bruta||0),parseFloat(v.boletas||0),parseFloat(v.merma||0),parseFloat(v.colaciones||0),(parseFloat(v.cumpl_venta||0)*100).toFixed(1)+"%",v.obs||""]);
      const tendRows = tendencia.map(t=>[t.fecha,Math.round(t.vt),t.bt]);
      const resRows  = resumen.map(r=>[r.local,Math.round(r.vt),r.bt,Math.round(r.mv),(r.cumpl*100).toFixed(1)+"%",Math.round(r.mr),r.kp.toFixed(1),r.np.toFixed(0)]);
      const mesRows  = mesesRecientes.map(m=>[m.mes,Math.round(m.vt),Math.round(m.mv),(m.mv>0?((m.vt/m.mv)*100).toFixed(1):"—")+"%"]);
      exportExcel([
        { name:"Ventas "+rango.label, headers:["Fecha","Local","Turno","Venta Bruta","Boletas","Merma","Colaciones","Cumpl%","Obs"], rows:ventasRows },
        { name:"Tendencia", headers:["Fecha","Venta","Boletas"], rows:tendRows },
        { name:"Por Local", headers:["Local","Venta","Boletas","Meta","Cumpl%","Merma","KDS","NPS"], rows:resRows },
        { name:"Mes a Mes", headers:["Mes","Venta","Meta","Cumpl%"], rows:mesRows },
      ]);
    });
  };

  // ── Compartir resumen ────────────────────────────────────────────────────────
  const handleShare = () => {
    const lineas = ranking.map((r,i)=>
      medals[i]+" "+nombreCortoLocal(r.local)+": "+fmtCLP(r.vt)+" ("+(r.cumpl*100).toFixed(0)+"%)"
    ).join("\n");
    const varStr = varComp !== null
      ? "\nvs "+(rangoComp?.label)+": "+(varComp>=0?"+":"")+(varComp*100).toFixed(1)+"% ("+(varComp>=0?"+":"")+fmtCLP(red.vt-red.vtComp)+")"
      : "";
    const texto = [
      "📊 *Dashboard "+m.nombre+"*",
      "Período: "+rango.label,
      "",
      "💰 Venta Red: "+fmtCLP(red.vt),
      "🎯 Cumpl. Meta: "+(redCumpl*100).toFixed(1)+"%"+varStr,
      "",
      "*Ranking:*",
      lineas,
      "",
      "🗑️ Mermas: "+fmtCLP(red.mr),
      "⏱️ KDS prom: "+red.kp.toFixed(1)+" min",
      "",
      "_El Hórreo · Adm. Franquicias_",
    ].join("\n");
    showShareModal("Resumen "+rango.label, texto);
  };

  return (
    <div className="fade" style={{ paddingBottom: 90 }}>
      <LogoHeader marca={marca} />

      {/* ── PANEL LICENCIAS Y AUSENTISMOS ────────────────────────────────────── */}
      {(() => {
        const hoy = today();
        const proxFin = new Date(hoy+"T12:00:00"); proxFin.setDate(proxFin.getDate()+5);
        const proxFinStr = proxFin.toISOString().split("T")[0];
        try {
          const todasLic = JSON.parse(localStorage.getItem("horreo_licencias") || "[]");
          // Filtrar por marca (si el local pertenece a esta marca)
          const localesMarcaSet = new Set(localesMarca);
          const licMarca = todasLic.filter(l => !l.marca || l.marca === marca || localesMarcaSet.has(l.local));
          if (!licMarca.length) return null;
          // Activas hoy
          const activas = licMarca.filter(l => l.fechaIni <= hoy && (!l.fechaFin || l.fechaFin >= hoy));
          // Próximas a vencer (en 5 días)
          const proxVencer = activas.filter(l => l.fechaFin && l.fechaFin >= hoy && l.fechaFin <= proxFinStr);
          // Próximas a iniciar
          const proxIniciar = licMarca.filter(l => l.fechaIni > hoy && l.fechaIni <= proxFinStr);
          if (!activas.length && !proxVencer.length && !proxIniciar.length) return null;
          return (
            <div style={{ marginBottom:14 }}>
              {/* Activas hoy */}
              {activas.length > 0 && (
                <div style={{ background:"#FEF2F2", border:"1.5px solid #FECACA", borderRadius:12, padding:"10px 14px", marginBottom:8 }}>
                  <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:13, color:"#EF4444", marginBottom:8, display:"flex", alignItems:"center", gap:6 }}>
                    🏥 {activas.length} ausentismo{activas.length>1?"s":""} activo{activas.length>1?"s":""} hoy
                  </div>
                  {activas.map((l,i) => {
                    const diasRestantes = l.fechaFin ? Math.round((new Date(l.fechaFin+"T12:00:00") - new Date(hoy+"T12:00:00")) / 86400000) : null;
                    const venceHoy = diasRestantes === 0;
                    return (
                      <div key={i} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"5px 0", borderBottom: i<activas.length-1?"1px solid #FEE2E2":"none" }}>
                        <div style={{ flex:1, minWidth:0 }}>
                          <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:12, color:"#1A1D2E", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                            {l.nombre}
                          </div>
                          <div style={{ display:"flex", gap:5, marginTop:2, flexWrap:"wrap" }}>
                            <span style={{ background:"#FEE2E2", color:"#EF4444", borderRadius:5, padding:"1px 7px", fontSize:9, fontWeight:800, fontFamily:"Nunito" }}>{l.tipo}</span>
                            {l.cargo && <span style={{ fontSize:9, color:"#94A3B8", fontFamily:"Nunito" }}>{l.cargo}</span>}
                            {l.local && <span style={{ fontSize:9, color:"#94A3B8", fontFamily:"Nunito" }}>· {l.local.split(" - ").pop()}</span>}
                          </div>
                        </div>
                        <div style={{ textAlign:"right", flexShrink:0, marginLeft:8 }}>
                          {venceHoy
                            ? <span style={{ fontFamily:"Nunito", fontWeight:900, fontSize:12, color:"#EF4444" }}>Vence hoy ⚠️</span>
                            : diasRestantes !== null
                              ? <span style={{ fontFamily:"Nunito", fontWeight:700, fontSize:11, color:"#94A3B8" }}>{l.fechaIni}{l.fechaFin&&l.fechaFin!==l.fechaIni?" → "+l.fechaFin:""}</span>
                              : <span style={{ fontFamily:"Nunito", fontSize:11, color:"#94A3B8" }}>{l.fechaIni}</span>
                          }
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
              {/* Próximas a vencer o iniciar */}
              {(proxVencer.filter(l=>!activas.find(a=>a.nombre===l.nombre&&a.tipo===l.tipo)).length > 0 || proxIniciar.length > 0) && (
                <div style={{ background:"#FFFBEB", border:"1.5px solid #FDE68A", borderRadius:12, padding:"10px 14px" }}>
                  <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:12, color:"#D97706", marginBottom:8 }}>
                    🔔 Próximas (5 días)
                  </div>
                  {proxIniciar.map((l,i) => {
                    const diasParaIni = Math.round((new Date(l.fechaIni+"T12:00:00") - new Date(hoy+"T12:00:00")) / 86400000);
                    return (
                      <div key={"ini"+i} style={{ display:"flex", justifyContent:"space-between", fontSize:11, padding:"4px 0", borderBottom:"1px solid #FEF3C7" }}>
                        <div>
                          <span style={{ fontWeight:700, fontFamily:"Nunito" }}>{l.nombre}</span>
                          <span style={{ background:"#EDE9FE", color:"#7C3AED", borderRadius:4, padding:"1px 5px", fontSize:9, fontWeight:700, marginLeft:5 }}>Inicia pronto</span>
                          <div style={{ color:"#94A3B8", fontSize:10 }}>{l.tipo}</div>
                        </div>
                        <span style={{ color:"#7C3AED", fontWeight:800, fontFamily:"Nunito", fontSize:12 }}>en {diasParaIni}d</span>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          );
        } catch { return null; }
      })()}

      {/* ── Alertas automáticas de ventas/KPIs ──────────────────────────────── */}
      {(() => {
        if (!resumen || resumen.length === 0) return null;
        const redMock = { vt: resumen.reduce((s,r)=>s+r.vt,0), mv: resumen.reduce((s,r)=>s+r.mv,0), heV: 0 };
        const alertas = generarAlertas(resumen, redMock, metas, metasDiarias, kpis, marca, rango);
        if (alertas.length === 0) return null;
        return (
          <div style={{ marginBottom:14 }}>
            <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:12, color:"#EF4444", marginBottom:6 }}>
              🔔 {alertas.length} alerta{alertas.length>1?"s":" activa"}
            </div>
            {alertas.map((a,i)=>(
              <div key={i} style={{ background: a.sev==="alta"?"#FEF2F2":"#FFFBEB", border:`1px solid ${a.sev==="alta"?"#FECACA":"#FDE68A"}`, borderRadius:10, padding:"6px 10px", marginBottom:5, display:"flex", gap:8, alignItems:"center" }}>
                <span style={{ fontSize:14 }}>{a.tipo==="venta"?"💰":a.tipo==="merma"?"🗑️":a.tipo==="kds"?"⏱️":"👷"}</span>
                <div style={{ flex:1 }}>
                  <span style={{ fontSize:10, fontWeight:700, color:"#94A3B8" }}>{a.local} · </span>
                  <span style={{ fontSize:11, color:"#1A1D2E" }}>{a.msg}</span>
                </div>
              </div>
            ))}
          </div>
        );
      })()}

      {/* ── FILTROS ─────────────────────────────────────────────────────────── */}
      <Card style={{ marginBottom: 14, padding: 12 }}>
        {/* Período */}
        <div style={{ display: "flex", gap: 5, marginBottom: 10, overflowX: "auto" }}>
          {[["mes","📅 Mes"],["semana","📆 Semana"],["dia","📆 Día"],["rango","📊 Rango"]].map(([k,l])=>(
            <button key={k} onClick={()=>setPeriodo(k)} style={{ flexShrink:0, background:periodo===k?m.color:"#F8FAFC", border:`1.5px solid ${periodo===k?m.color:"#E2E8F0"}`, borderRadius:8, padding:"5px 12px", fontSize:11, fontWeight:700, fontFamily:"Nunito", color:periodo===k?"#fff":"#64748B", cursor:"pointer" }}>{l}</button>
          ))}
        </div>
        {/* Date pickers */}
        <div style={{ display: "grid", gridTemplateColumns: periodo==="rango"?"1fr 1fr":"1fr 1fr", gap: 8, marginBottom: 10 }}>
