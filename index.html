const FormKPI = React.memo(function FormKPI({ kpis, setKpis, syncLog, setSyncLog, marca, config }) {
  const m = MARCAS[marca] || MARCAS[Object.keys(MARCAS)[0]] || { color: "#6C63FF", bg: "#F0EEFF", emoji: "🌭", textColor: "#fff", nombre: "—" };
  const localesMarca = LOCALES_POR_MARCA[marca] || LOCALES;
  const [form, setForm] = useState({ fecha: today(), local: localesMarca[0], usuario: "", kds_desayuno: "", kds_almuerzo: "", kds_tarde: "", kds_noche: "", kds_general: "", kds_fritos: "", kds_salsera: "", nota_uber: "", nota_pya: "", pedidos_uber: "", pedidos_pya: "", nps_promotores: "", nps_pasivos: "", nps_detractores: "", obs: "" });
  const [saved, setSaved] = useState(false);
  const [syncing, setSyncing] = useState(false);
  const [syncErr, setSyncErr] = useState(false);
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  useEffect(() => { setForm(f => ({ ...f, local: (LOCALES_POR_MARCA[marca] || LOCALES)[0] })); }, [marca]);

  const kdsMode = ["doggis","juanmaestro"].includes(marca) ? "estacion" : "daypart";

  const kdsVals  = kdsMode === "estacion"
    ? [form.kds_general, form.kds_fritos, form.kds_salsera].map(Number).filter(n => n > 0)
    : [form.kds_desayuno, form.kds_almuerzo, form.kds_tarde, form.kds_noche].map(Number).filter(n => n > 0);
  const kdsProm  = kdsVals.length ? (kdsVals.reduce((a, b) => a + b, 0) / kdsVals.length).toFixed(1) : 0;
  const totalPed = (parseFloat(form.pedidos_uber) || 0) + (parseFloat(form.pedidos_pya) || 0);
  const totalNPS = (parseFloat(form.nps_promotores) || 0) + (parseFloat(form.nps_pasivos) || 0) + (parseFloat(form.nps_detractores) || 0);
  const npsScore = totalNPS ? (((parseFloat(form.nps_promotores) || 0) - (parseFloat(form.nps_detractores) || 0)) / totalNPS * 100).toFixed(0) : 0;

  // NPS acumulado del mes para el local seleccionado
  const npsAcumMes = useMemo(() => {
    const mes = form.fecha.slice(0, 7);
    const registrosMes = kpis.filter(k => k.local === form.local && k.marca === marca && k.fecha.slice(0, 7) === mes && (parseFloat(k.nps_promotores)||0) + (parseFloat(k.nps_pasivos)||0) + (parseFloat(k.nps_detractores)||0) > 0);
    if (!registrosMes.length) return null;
    const totP = registrosMes.reduce((s, k) => s + (parseFloat(k.nps_promotores)||0), 0);
    const totN = registrosMes.reduce((s, k) => s + (parseFloat(k.nps_detractores)||0), 0);
    const totT = registrosMes.reduce((s, k) => s + (parseFloat(k.nps_promotores)||0) + (parseFloat(k.nps_pasivos)||0) + (parseFloat(k.nps_detractores)||0), 0);
    return { score: Math.round((totP - totN) / totT * 100), dias: registrosMes.length };
  }, [kpis, form.local, form.fecha, marca]);

  // Detectar duplicado: mismo local+fecha ya con KPI
  const existeDuplicadoKPI = useMemo(() =>
    kpis.some(k => k.local === form.local && k.fecha === form.fecha && k.marca === marca),
    [kpis, form.local, form.fecha, marca]
  );

  const handleSave = async () => {
    const reg = { id: uid(), marca, ...form, kds_prom: kdsProm, total_pedidos: totalPed, nps_score: npsScore, ts: new Date().toISOString() };
    setKpis(k => [...k, reg]); setSaved(true);
    mailKPI(reg, m.nombre);
    if (config?.appsScriptUrl && config.appsScriptUrl !== APPS_SCRIPT_URL_DEFAULT) {
      setSyncing(true);
      const res = await syncToSheets("Form_KPI", [reg], config.appsScriptUrl);
      setSyncing(false);
      if (res.ok) { const ts = new Date().toLocaleTimeString("es-CL", { hour: "2-digit", minute: "2-digit" }); setSyncLog(l => [...l, { tabla: "Form_KPI", ts, ok: true }]); }
      else setSyncErr(true);
    }
    setTimeout(() => { setSaved(false); setSyncErr(false); }, 3000);
    setForm(f => ({ ...f, kds_desayuno: "", kds_almuerzo: "", kds_tarde: "", kds_noche: "", kds_general: "", kds_fritos: "", kds_salsera: "", nota_uber: "", nota_pya: "", pedidos_uber: "", pedidos_pya: "", nps_promotores: "", nps_pasivos: "", nps_detractores: "", obs: "" }));
  };

  const g2 = { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 };
  return (
    <div className="fade" style={{ paddingBottom: 90 }}>
      <LogoHeader marca={marca} />
      <SectionTitle color={m.color}>⚡ KPIs Operacionales</SectionTitle>
      {(kdsProm > 0 || npsAcumMes) && (
        <Card style={{ marginBottom: 14, border: `2px solid ${m.color}22`, background: m.bg }}>
          <div style={{ display: "flex", gap: 24, flexWrap: "wrap" }}>
            {kdsProm > 0 && <div><div style={{ fontSize: 10, color: "#94A3B8" }}>KDS Promedio</div><div style={{ fontSize: 22, fontFamily: "Nunito", fontWeight: 900, color: "#06B6D4" }}>{kdsProm} min</div></div>}
            {kdsMode === "estacion" && form.kds_general > 0 && <div><div style={{ fontSize: 10, color: "#94A3B8" }}>General</div><div style={{ fontSize: 18, fontFamily: "Nunito", fontWeight: 900, color: "#06B6D4" }}>{form.kds_general}m</div></div>}
            {kdsMode === "estacion" && form.kds_fritos > 0 && <div><div style={{ fontSize: 10, color: "#94A3B8" }}>Fritos</div><div style={{ fontSize: 18, fontFamily: "Nunito", fontWeight: 900, color: "#F59E0B" }}>{form.kds_fritos}m</div></div>}
            {kdsMode === "estacion" && form.kds_salsera > 0 && <div><div style={{ fontSize: 10, color: "#94A3B8" }}>Salsera</div><div style={{ fontSize: 18, fontFamily: "Nunito", fontWeight: 900, color: "#22C55E" }}>{form.kds_salsera}m</div></div>}
            {totalPed > 0 && <div><div style={{ fontSize: 10, color: "#94A3B8" }}>Total Pedidos</div><div style={{ fontSize: 22, fontFamily: "Nunito", fontWeight: 900, color: "#6C63FF" }}>{totalPed}</div></div>}
            {totalNPS > 0 && <div><div style={{ fontSize: 10, color: "#94A3B8" }}>NPS Score hoy</div><div style={{ fontSize: 22, fontFamily: "Nunito", fontWeight: 900, color: npsScore >= 50 ? "#22C55E" : "#F59E0B" }}>{npsScore}</div></div>}
            {npsAcumMes && <div style={{ borderLeft: "1.5px solid #E2E8F0", paddingLeft: 20 }}>
              <div style={{ fontSize: 10, color: "#94A3B8" }}>NPS Acum. mes ({npsAcumMes.dias}d)</div>
              <div style={{ fontSize: 22, fontFamily: "Nunito", fontWeight: 900, color: npsAcumMes.score >= 50 ? "#22C55E" : npsAcumMes.score >= 0 ? "#F59E0B" : "#EF4444" }}>{npsAcumMes.score}</div>
            </div>}
          </div>
        </Card>
      )}
      <Card>
        <div style={{ ...g2, marginBottom: 12 }}>
          <Field label="Fecha"><input type="date" value={form.fecha} onChange={e => set("fecha", e.target.value)} /></Field>
          <Field label="Local"><select value={form.local} onChange={e => set("local", e.target.value)}>{localesMarca.map(l => <option key={l}>{l}</option>)}</select></Field>
          <Field label="Usuario" col={2}><input placeholder="Nombre" value={form.usuario} onChange={e => set("usuario", e.target.value)} /></Field>
        </div>
        <Divider label="⏱️ KDS — Tiempos (min)" color="#06B6D4" />
        {kdsMode === "estacion" ? (
          <div style={{ ...g2, marginBottom: 12 }}>
            <Field label="🍳 KDS General"><input type="number" placeholder="0" value={form.kds_general} onChange={e => set("kds_general", e.target.value)} /></Field>
            <Field label="🍟 KDS Fritos"><input type="number" placeholder="0" value={form.kds_fritos} onChange={e => set("kds_fritos", e.target.value)} /></Field>
            <Field label="🥫 KDS Salsera" col={2}><input type="number" placeholder="0" value={form.kds_salsera} onChange={e => set("kds_salsera", e.target.value)} /></Field>
          </div>
        ) : (
          <div style={{ ...g2, marginBottom: 12 }}>
            <Field label="Desayuno"><input type="number" placeholder="0" value={form.kds_desayuno} onChange={e => set("kds_desayuno", e.target.value)} /></Field>
            <Field label="Almuerzo"><input type="number" placeholder="0" value={form.kds_almuerzo} onChange={e => set("kds_almuerzo", e.target.value)} /></Field>
            <Field label="Tarde"><input type="number" placeholder="0" value={form.kds_tarde} onChange={e => set("kds_tarde", e.target.value)} /></Field>
            <Field label="Noche"><input type="number" placeholder="0" value={form.kds_noche} onChange={e => set("kds_noche", e.target.value)} /></Field>
          </div>
        )}
        <Divider label="🚀 Delivery" color="#6C63FF" />
        <div style={{ ...g2, marginBottom: 12 }}>
          <Field label="Nota Uber (/5)"><input type="number" step=".1" min="1" max="5" placeholder="5.0" value={form.nota_uber} onChange={e => set("nota_uber", e.target.value)} /></Field>
          <Field label="Nota PedidosYa (/5)"><input type="number" step=".1" min="1" max="5" placeholder="5.0" value={form.nota_pya} onChange={e => set("nota_pya", e.target.value)} /></Field>
          <Field label="Pedidos Uber"><input type="number" placeholder="0" value={form.pedidos_uber} onChange={e => set("pedidos_uber", e.target.value)} /></Field>
          <Field label="Pedidos PYA"><input type="number" placeholder="0" value={form.pedidos_pya} onChange={e => set("pedidos_pya", e.target.value)} /></Field>
        </div>
        <Divider label="⭐ NPS" color="#22C55E" />
        <div style={{ ...g2, marginBottom: 12 }}>
          <Field label="Promotores"><input type="number" placeholder="0" value={form.nps_promotores} onChange={e => set("nps_promotores", e.target.value)} /></Field>
          <Field label="Pasivos"><input type="number" placeholder="0" value={form.nps_pasivos} onChange={e => set("nps_pasivos", e.target.value)} /></Field>
          <Field label="Detractores" col={2}><input type="number" placeholder="0" value={form.nps_detractores} onChange={e => set("nps_detractores", e.target.value)} /></Field>
        </div>
        <Field label="Observaciones"><textarea rows={2} placeholder="Notas KPI..." value={form.obs} onChange={e => set("obs", e.target.value)} style={{ resize: "none" }} /></Field>
        {existeDuplicadoKPI && (
          <div style={{ marginTop:10, background:"#FFFBEB", border:"1.5px solid #FDE68A", borderRadius:10, padding:"10px 12px", display:"flex", gap:8, alignItems:"flex-start" }}>
            <span style={{ fontSize:16 }}>⚠️</span>
            <div style={{ fontSize:12, color:"#92400E", fontFamily:"Nunito", fontWeight:700, lineHeight:1.5 }}>
              Ya hay KPI registrado para <strong>{nombreCortoLocal(form.local)}</strong> — <strong>{form.fecha}</strong>.<br/>
              <span style={{ fontWeight:400 }}>Puedes guardar igual (quedará como adicional) o revisar en Historial.</span>
            </div>
          </div>
        )}
        <div style={{ marginTop: 16, display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
          <Btn onClick={handleSave} color={saved ? "#22C55E" : m.color}>{saved ? "✅ Guardado" : "💾 Guardar KPI"}</Btn>
          <SyncBadge syncing={syncing} error={syncErr} lastSync={syncLog.filter(s => s.tabla === "Form_KPI" && s.ok).slice(-1)[0]?.ts} />
        </div>
      </Card>
    </div>
  );
}); // end React.memo

// ══════════════════════════════════════════════════════════════════════════════
// METAS
// ══════════════════════════════════════════════════════════════════════════════
// ══════════════════════════════════════════════════════════════════════════════
// DASHBOARD — filtros por período, comparaciones, exportar
// ══════════════════════════════════════════════════════════════════════════════
const Dashboard = React.memo(function Dashboard({ ventas, kpis, inventarios, metas, metasDiarias, marca, planillas, semanas, costoTeorico, config, session }) {
  const m = MARCAS[marca] || MARCAS[Object.keys(MARCAS)[0]] || { color: "#6C63FF", bg: "#F0EEFF", emoji: "🌭", textColor: "#fff", nombre: "—" };
  const localesMarca = LOCALES_POR_MARCA[marca] || LOCALES;

  // Usar hook centralizado — elimina duplicación con ControlLabor
  const getLaborPlanilla = useLaborCosto(semanas, marca);

  // ── Alertas automáticas vía Telegram — se disparan cuando hay alertas críticas ──
  const lastAlertKey = useRef("");
  useEffect(() => {
    if (!config?.tgAlertBot || !config?.tgAlertChat) return;
    // Solo disparar una vez por marca+mes para no saturar
    const mesActual = today().slice(0, 7);
    const alertKey = marca + "_" + mesActual;
    if (lastAlertKey.current === alertKey) return;
    // Esperar 3s para que los datos estén cargados antes de evaluar
    const timer = setTimeout(async () => {
      try {
        const redMock = { vt: 0, mv: 0, heV: 0 };
        const alertas = generarAlertas([], redMock, metas, metasDiarias, kpis, marca, { ini: mesActual + "-01", fin: today() });
        const criticas = alertas.filter(a => a.sev === "alta");
        if (criticas.length > 0) {
          lastAlertKey.current = alertKey;
          const texto = `🔔 <b>El Hórreo — ${MARCAS[marca]?.nombre || marca}</b>\n${criticas.length} alerta${criticas.length > 1 ? "s" : ""} crítica${criticas.length > 1 ? "s" : ""}:\n` +
            criticas.map(a => `• ${a.local}: ${a.msg}`).join("\n");
          await sendTelegram(config.tgAlertBot, config.tgAlertChat, texto);
        }
      } catch(e) { console.warn("[Alertas Telegram]", e.message); }
    }, 3000);
    return () => clearTimeout(timer);
  }, [marca, metas, metasDiarias, kpis, config]);

  // ── Filtros ─────────────────────────────────────────────────────────────────
  const [localFilter, setLocalFilter] = useState("Todos");
  const [periodo, setPeriodo]         = useState("mes");   // mes | semana | dia | rango
  const [mesFilter, setMesFilter]     = useState(today().slice(0,7));
  const [semFilter, setSemFilter]     = useState(today()); // any date in the week
  const [diaFilter, setDiaFilter]     = useState(today());
  const [rangoIni, setRangoIni]       = useState(today().slice(0,7) + "-01");
  const [rangoFin, setRangoFin]       = useState(today());
  const [comparar, setComparar]       = useState("none"); // none | mes_anterior | semana_anterior | aa
  const [verTab, setVerTab]           = useState("kpis"); // kpis | ranking | tendencia
  const [vistaGrupo, setVistaGrupo]   = useState(false); // vista comparativa entre marcas/grupos

  // Calcular rango de fechas según período seleccionado
  const rango = useMemo(() => {
    if (periodo === "mes") {
      const [y,mo] = mesFilter.split("-").map(Number);
      const dias = new Date(y,mo,0).getDate();
      return { ini: mesFilter+"-01", fin: mesFilter+"-"+String(dias).padStart(2,"0"), label: mesFilter };
    }
    if (periodo === "semana") {
      const d = new Date(semFilter+"T12:00:00");
      const dow = d.getDay(); // 0=dom
      const lunes = new Date(d); lunes.setDate(d.getDate() - (dow === 0 ? 6 : dow-1));
      const dom   = new Date(lunes); dom.setDate(lunes.getDate()+6);
      const fmt = dt => dt.toISOString().split("T")[0];
      return { ini: fmt(lunes), fin: fmt(dom), label: "Sem " + fmt(lunes) };
    }
    if (periodo === "dia") {
      return { ini: diaFilter, fin: diaFilter, label: diaFilter };
    }
    return { ini: rangoIni, fin: rangoFin, label: rangoIni + " → " + rangoFin };
  }, [periodo, mesFilter, semFilter, diaFilter, rangoIni, rangoFin]);

  // Rango de comparación (período anterior o AA)
  const rangoComp = useMemo(() => {
    if (comparar === "none") return null;
    if (comparar === "aa") {
      const offset = d => { const dt=new Date(d+"T12:00:00"); dt.setFullYear(dt.getFullYear()-1); return dt.toISOString().split("T")[0]; };
      return { ini: offset(rango.ini), fin: offset(rango.fin), label: "AA " + rango.label };
    }
    if (comparar === "mes_anterior") {
      const [y,mo] = rango.ini.slice(0,7).split("-").map(Number);
      const prev = mo === 1 ? `${y-1}-12` : `${y}-${String(mo-1).padStart(2,"0")}`;
      const dias = new Date(parseInt(prev.split("-")[0]), parseInt(prev.split("-")[1]), 0).getDate();
      return { ini: prev+"-01", fin: prev+"-"+String(dias).padStart(2,"0"), label: "Mes anterior" };
    }
    if (comparar === "semana_anterior") {
      const prevIni = new Date(rango.ini+"T12:00:00"); prevIni.setDate(prevIni.getDate()-7);
      const prevFin = new Date(rango.fin+"T12:00:00"); prevFin.setDate(prevFin.getDate()-7);
      const fmt = dt => dt.toISOString().split("T")[0];
      return { ini: fmt(prevIni), fin: fmt(prevFin), label: "Sem anterior" };
    }
    return null;
  }, [comparar, rango]);

  // Función genérica para calcular métricas de un rango
  const calcMetricas = useCallback((rangoR) => {
    if (!rangoR) return null;
    return localesMarca.map(local => {
      const vR  = ventas.filter(v => v.local===local && v.marca===marca && v.fecha>=rangoR.ini && v.fecha<=rangoR.fin);
      const kR  = kpis.filter(k => k.local===local && k.marca===marca && k.fecha>=rangoR.ini && k.fecha<=rangoR.fin);
      const metaM = metas.find(x => x.local===local && x.mes===rangoR.ini.slice(0,7));
      const vt  = vR.reduce((s,v)=>s+parseFloat(v.venta_bruta||0),0);
      const vn  = vt / 1.19; // Venta Neta (sin IVA 19%)
      const bt  = vR.reduce((s,v)=>s+parseFloat(v.boletas||0),0);
      const mr  = vR.reduce((s,v)=>s+parseFloat(v.merma||0),0);
      const col = vR.reduce((s,v)=>s+parseFloat(v.colaciones||0),0);
      const labVentas = vR.reduce((s,v)=>s+parseFloat(v.labor_real||0),0);
      const lab = labVentas > 0 ? labVentas : getLaborPlanilla(local, rangoR.ini, rangoR.fin);
      const mv  = parseFloat(metaM?.meta_venta_bruta||0);
      const mvn = mv / 1.19; // Meta Venta Neta
      const aaV = parseFloat(metaM?.aa_venta_bruta||0);
      const kp  = kR.length ? kR.reduce((s,k)=>s+parseFloat(k.kds_prom||0),0)/kR.length : 0;
      const np  = kR.length ? kR.reduce((s,k)=>s+parseFloat(k.nps_score||0),0)/kR.length : 0;
      return { local, vt, vn, bt, mr, col, lab, labVentas, mv, mvn, aaV, kp, np, cumpl: mv?vt/mv:0 };
    });
  }, [ventas, kpis, metas, marca, localesMarca, getLaborPlanilla]);

  const resumen  = useMemo(()=>calcMetricas(rango),  [calcMetricas, rango]);
  const resComp  = useMemo(()=>calcMetricas(rangoComp), [calcMetricas, rangoComp]);

  const red = useMemo(()=>({
    vt:  resumen.reduce((s,r)=>s+r.vt, 0),
    vn:  resumen.reduce((s,r)=>s+r.vn, 0),
    mv:  resumen.reduce((s,r)=>s+r.mv, 0),
    mvn: resumen.reduce((s,r)=>s+r.mvn, 0),
    mr:  resumen.reduce((s,r)=>s+r.mr, 0),
    col: resumen.reduce((s,r)=>s+r.col, 0),
    lab: resumen.reduce((s,r)=>s+r.lab, 0),
    kp:  resumen.filter(r=>r.kp>0).length ? resumen.reduce((s,r)=>s+r.kp,0)/resumen.filter(r=>r.kp>0).length : 0,
    vtComp: resComp ? resComp.reduce((s,r)=>s+r.vt,0) : 0,
  }), [resumen, resComp]);

  // Si las ventas no tienen mermas/colaciones registradas, usar datos del costoTeorico (ERP)
  // filtrando por el mes del período activo
  const redConFoodCost = useMemo(() => {
    const mrVentas  = red.mr;
    const colVentas = red.col;
    // Solo intentar fallback cuando no hay datos en ventas y hay costoTeorico disponible
    if ((mrVentas > 0 && colVentas > 0) || !costoTeorico || !costoTeorico.length) {
      return { mr: mrVentas, col: colVentas, mrFuente: null, colFuente: null };
    }
    const localesMarcaSet = new Set(localesMarca);
    const mesPeriodo = rango.ini.slice(0, 7);
    const ctDelMes = costoTeorico.filter(r =>
      localesMarcaSet.has(r.local) && (r.periodo || "").slice(0, 7) === mesPeriodo
    );
    const mrCT  = ctDelMes.reduce((s, r) => s + (r.mermas    || 0), 0);
    const colCT = ctDelMes.reduce((s, r) => s + (r.colaciones || 0), 0);
    return {
      mr:       mrVentas  > 0 ? mrVentas  : mrCT,
      col:      colVentas > 0 ? colVentas : colCT,
      mrFuente: mrVentas  === 0 && mrCT  > 0 ? "ERP" : null,
      colFuente:colVentas === 0 && colCT > 0 ? "ERP" : null,
    };
  }, [red, costoTeorico, localesMarca, rango]);

  const redCumpl    = red.mv ? red.vt/red.mv : 0;
  const varComp     = resComp && red.vtComp > 0 ? (red.vt - red.vtComp) / red.vtComp : null;

  // Mapa de mermas y colaciones por local desde costoTeorico (fallback para KPIs por local)
  const ctPorLocal = useMemo(() => {
    if (!costoTeorico || !costoTeorico.length) return {};
    const mesPeriodo = rango.ini.slice(0, 7);
    const map = {};
    costoTeorico
      .filter(r => (r.periodo || "").slice(0, 7) === mesPeriodo)
      .forEach(r => {
        if (!map[r.local]) map[r.local] = { mr: 0, col: 0 };
        map[r.local].mr  += (r.mermas     || 0);
        map[r.local].col += (r.colaciones || 0);
      });
    return map;
  }, [costoTeorico, rango]);

  // Helper: obtiene mr/col de un local con fallback a costoTeorico
  const getMrCol = useCallback((r) => {
    const mrV  = r.mr;
    const colV = r.col;
    const ct   = ctPorLocal[r.local] || {};
    return {
      mr:       mrV  > 0 ? mrV  : (ct.mr  || 0),
      col:      colV > 0 ? colV : (ct.col || 0),
      mrERP:    mrV  === 0 && (ct.mr  || 0) > 0,
      colERP:   colV === 0 && (ct.col || 0) > 0,
    };
  }, [ctPorLocal]);
  const tendencia = useMemo(() => {
    const ventasFiltradas = ventas.filter(v =>
      v.marca===marca && v.fecha>=rango.ini && v.fecha<=rango.fin &&
      (localFilter==="Todos" || v.local===localFilter)
    );
    const byFecha = {};
    ventasFiltradas.forEach(v => {
      if (!byFecha[v.fecha]) byFecha[v.fecha] = { fecha:v.fecha, vt:0, bt:0 };
      byFecha[v.fecha].vt += parseFloat(v.venta_bruta||0);
      byFecha[v.fecha].bt += parseFloat(v.boletas||0);
    });
    return Object.values(byFecha).sort((a,b)=>a.fecha>b.fecha?1:-1);
  }, [ventas, marca, rango, localFilter]);

  // Comparación mes a mes (últimos 6 meses)
  const mesesRecientes = useMemo(() => {
    const meses = [];
    const base = new Date(today()+"T12:00:00");
    for (let i=5; i>=0; i--) {
      const d = new Date(base); d.setMonth(d.getMonth()-i);
      const mes = d.toISOString().slice(0,7);
      const vt = ventas.filter(v=>v.marca===marca && v.fecha.slice(0,7)===mes && (localFilter==="Todos"||v.local===localFilter))
                       .reduce((s,v)=>s+parseFloat(v.venta_bruta||0),0);
      const metaM = metas.find(x=>x.local===localesMarca[0] && x.mes===mes);
      const mv = localesMarca.reduce((s,l)=>{ const mm=metas.find(x=>x.local===l&&x.mes===mes); return s+parseFloat(mm?.meta_venta_bruta||0); },0);
      meses.push({ mes, vt, mv, label: mes.slice(5) });
    }
    return meses;
  }, [ventas, metas, marca, localFilter, localesMarca]);

  const mes = rango.ini.slice(0,7); // for compatibility
  const ranking    = useMemo(()=>[...resumen].sort((a,b)=>b.vt-a.vt), [resumen]);
  const maxVt      = Math.max(...resumen.map(r=>r.vt), 1);
  const medals     = ["🥇","🥈","🥉","4️⃣","5️⃣","6️⃣"];
  const medalColors= ["#F5C800","#C0C0C0","#CD7F32","#94A3B8","#94A3B8","#94A3B8"];
  const ventaHoy   = useMemo(()=>ventas.filter(v=>v.fecha===today()&&v.marca===marca).reduce((s,v)=>s+parseFloat(v.venta_bruta||0),0),[ventas,marca]);

  // ── Exportar a Excel ────────────────────────────────────────────────────────
  const handleExport = () => {
    loadXLSX().then(() => {
      const ventasRows = ventas
        .filter(v => v.marca===marca && v.fecha>=rango.ini && v.fecha<=rango.fin && (localFilter==="Todos"||v.local===localFilter))
        .sort((a,b)=>a.fecha>b.fecha?1:-1)
        .map(v=>[v.fecha,v.local,v.turno||"",parseFloat(v.venta_bruta||0),parseFloat(v.boletas||0),parseFloat(v.merma||0),parseFloat(v.colaciones||0),(parseFloat(v.cumpl_venta||0)*100).toFixed(1)+"%",v.obs||""]);
      const tendRows = tendencia.map(t=>[t.fecha,Math.round(t.vt),t.bt]);
      const resRows  = resumen.map(r=>[r.local,Math.round(r.vt),r.bt,Math.round(r.mv),(r.cumpl*100).toFixed(1)+"%",Math.round(r.mr),r.kp.toFixed(1),r.np.toFixed(0)]);
      const mesRows  = mesesRecientes.map(m=>[m.mes,Math.round(m.vt),Math.round(m.mv),(m.mv>0?((m.vt/m.mv)*100).toFixed(1):"—")+"%"]);
      exportExcel([
        { name:"Ventas "+rango.label, headers:["Fecha","Local","Turno","Venta Bruta","Boletas","Merma","Colaciones","Cumpl%","Obs"], rows:ventasRows },
        { name:"Tendencia", headers:["Fecha","Venta","Boletas"], rows:tendRows },
        { name:"Por Local", headers:["Local","Venta","Boletas","Meta","Cumpl%","Merma","KDS","NPS"], rows:resRows },
        { name:"Mes a Mes", headers:["Mes","Venta","Meta","Cumpl%"], rows:mesRows },
      ]);
    });
  };

  // ── Compartir resumen ────────────────────────────────────────────────────────
  const handleShare = () => {
    const lineas = ranking.map((r,i)=>
      medals[i]+" "+nombreCortoLocal(r.local)+": "+fmtCLP(r.vt)+" ("+(r.cumpl*100).toFixed(0)+"%)"
    ).join("\n");
    const varStr = varComp !== null
      ? "\nvs "+(rangoComp?.label)+": "+(varComp>=0?"+":"")+(varComp*100).toFixed(1)+"% ("+(varComp>=0?"+":"")+fmtCLP(red.vt-red.vtComp)+")"
      : "";
    const texto = [
      "📊 *Dashboard "+m.nombre+"*",
      "Período: "+rango.label,
      "",
      "💰 Venta Red: "+fmtCLP(red.vt),
      "🎯 Cumpl. Meta: "+(redCumpl*100).toFixed(1)+"%"+varStr,
      "",
      "*Ranking:*",
      lineas,
      "",
      "🗑️ Mermas: "+fmtCLP(redConFoodCost.mr),
      "⏱️ KDS prom: "+red.kp.toFixed(1)+" min",
      "",
      "_El Hórreo · Adm. Franquicias_",
    ].join("\n");
    showShareModal("Resumen "+rango.label, texto);
  };

  return (
    <div className="fade" style={{ paddingBottom: 90 }}>
      <LogoHeader marca={marca} />

      {/* ── MENSAJES IMPORTANTES ─────────────────────────────────────────────── */}
      {session && <MensajesImportantesPanel session={session} marca={marca} />}

      {/* ── VISTA COMPARATIVA POR MARCA/GRUPO ─────────────────────────────────── */}
      <div style={{ display:"flex", gap:6, marginBottom:10, flexWrap:"wrap" }}>
        <button onClick={()=>setVistaGrupo(false)}
          style={{ flex:"0 0 auto", background: !vistaGrupo ? m.color : "#F1F5F9", color: !vistaGrupo ? "#fff" : "#64748B", border:"none", borderRadius:10, padding:"7px 12px", fontFamily:"Nunito", fontWeight:800, fontSize:11, cursor:"pointer" }}>
          {m.emoji} {m.nombre}
        </button>
        <button onClick={()=>setVistaGrupo(true)}
          style={{ flex:"0 0 auto", background: vistaGrupo ? "#6C63FF" : "#F1F5F9", color: vistaGrupo ? "#fff" : "#64748B", border:"none", borderRadius:10, padding:"7px 12px", fontFamily:"Nunito", fontWeight:800, fontSize:11, cursor:"pointer" }}>
          🏢 Por Marca
        </button>
      </div>

      {/* Comparativo entre marcas */}
      {vistaGrupo && (() => {
        // Calcular resumen por marca para el período seleccionado
        const marcasClaves = Object.keys(MARCAS);
        const resPorMarca = marcasClaves.map(mk => {
          const localesMk = LOCALES_POR_MARCA[mk] || [];
          const ventasMk = ventas.filter(v => v.marca===mk && v.fecha>=rango.ini && v.fecha<=rango.fin);
          const vt = ventasMk.reduce((s,v)=>s+parseFloat(v.venta_bruta||0),0);
          const vn = vt / 1.19;
          const bt = ventasMk.reduce((s,v)=>s+parseFloat(v.boletas||0),0);
          const mr = ventasMk.reduce((s,v)=>s+parseFloat(v.merma||0),0);
          const nDias = ventasMk.length > 0 ? new Set(ventasMk.map(v=>v.fecha)).size : 0;
          const tkProm = bt > 0 ? vt / bt : 0;
          const metasMk = metas.filter(x => localesMk.includes(x.local) && x.mes === rango.ini.slice(0,7));
          const mv = metasMk.reduce((s,x)=>s+parseFloat(x.meta_venta_bruta||0),0);
          return { mk, m: MARCAS[mk], vt, vn, bt, mr, nDias, tkProm, mv, cumpl: mv>0?vt/mv:null, tieneVentas: vt > 0 };
        }).filter(r => r.tieneVentas);

        const totalVt = resPorMarca.reduce((s,r)=>s+r.vt, 0);

        return (
          <div style={{ marginBottom:14 }}>
            <Card style={{ marginBottom:10 }}>
              <div style={{ fontFamily:"Nunito", fontWeight:900, fontSize:14, color:"#1A1D2E", marginBottom:10 }}>
                🏢 Resumen por Marca — {rango.label}
              </div>

              {/* Período selector compacto */}
              <div style={{ display:"flex", gap:6, marginBottom:12, flexWrap:"wrap" }}>
                {[["mes","Mes"],["semana","Semana"],["dia","Día"]].map(([k,l]) => (

                    style={{ background:periodo===k?"#6C63FF":"#F1F5F9", color:periodo===k?"#fff":"#475569", border:"none", borderRadius:8, padding:"5px 10px", fontFamily:"Nunito", fontWeight:700, fontSize:11, cursor:"pointer" }}>

              </div>

              {resPorMarca.map(r => {
                const pctDelTotal = totalVt > 0 ? r.vt / totalVt : 0;
                const fcPct = (() => {
                  try {
                    const planillasMk = (planillas||[]).filter(p=>p.marca===r.mk && !p.es_acumulado);
                    const mesActual = rango.ini.slice(0,7);
                    const semsDelMes = planillasMk.filter(p=>(p.fecha_carga||"").slice(0,7)===mesActual);
                    if (!semsDelMes.length) return null;
                    const vn = semsDelMes.reduce((s,p)=>s+p.venta_neta,0);
                    const cr = semsDelMes.reduce((s,p)=>s+p.costo_real,0);
                    return vn > 0 ? (cr/vn)*100 : null;
                  } catch { return null; }
                })();
                const metaFC = readMetaLS("horreo_meta_foodcost_pct", 40);
                const fcColor = fcPct === null ? "#94A3B8" : fcPct <= metaFC ? "#22C55E" : fcPct <= metaFC*1.05 ? "#F59E0B" : "#EF4444";

                return (
                  <div key={r.mk} style={{ marginBottom:10, padding:"10px 12px", background:r.m.bg, borderRadius:12, border:`1.5px solid ${r.m.color}33` }}>

                      <div style={{ display:"flex", alignItems:"center", gap:6 }}>

                      </div>
                      {r.cumpl !== null && (

                    </div>
                    <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:6, marginBottom:6 }}>
                      <div>
                        <div style={{ fontSize:9, color:"#94A3B8", fontFamily:"Nunito", fontWeight:700 }}>VENTA BRUTA</div>
                        <div style={{ fontSize:14, fontFamily:"Nunito", fontWeight:900, color:r.m.color }}>{fmtCLP(r.vt)}</div>
                        <div style={{ fontSize:9, color:"#94A3B8" }}>{(pctDelTotal*100).toFixed(0)}% red</div>
                      </div>
                      <div>
                        <div style={{ fontSize:9, color:"#94A3B8", fontFamily:"Nunito", fontWeight:700 }}>TICKET PROM</div>
                        <div style={{ fontSize:14, fontFamily:"Nunito", fontWeight:900, color:"#1A1D2E" }}>{r.tkProm>0?fmtCLP(r.tkProm):"—"}</div>
                        <div style={{ fontSize:9, color:"#94A3B8" }}>{r.bt} boletas</div>
                      </div>
                      <div>
                        <div style={{ fontSize:9, color:"#94A3B8", fontFamily:"Nunito", fontWeight:700 }}>FOOD COST</div>
                        <div style={{ fontSize:14, fontFamily:"Nunito", fontWeight:900, color:fcColor }}>{fcPct!==null?fcPct.toFixed(1)+"%":"—"}</div>
                        {r.mr > 0 && <div style={{ fontSize:9, color:"#EF4444" }}>Merma: {fmtCLP(r.mr)}</div>}
                      </div>
                    </div>
                    {/* Barra participación */}
                    <div style={{ height:5, background:"#E2E8F0", borderRadius:3 }}>
                      <div style={{ height:"100%", width:`${pctDelTotal*100}%`, background:r.m.color, borderRadius:3 }} />
                    </div>
                  </div>
                );
              })}

              {/* Totales */}
              {resPorMarca.length > 0 && (
                <div style={{ background:"#F8FAFF", borderRadius:10, padding:"10px 12px", marginTop:8, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                  <span style={{ fontFamily:"Nunito", fontWeight:800, fontSize:12, color:"#6C63FF" }}>🌐 Total red</span>
                  <span style={{ fontFamily:"Nunito", fontWeight:900, fontSize:15, color:"#1A1D2E" }}>{fmtCLP(totalVt)}</span>
                </div>
              )}
            </Card>
          </div>
        );
      })()}


      {(() => {
        const hoy = today();
        const proxFin = new Date(hoy+"T12:00:00"); proxFin.setDate(proxFin.getDate()+5);
        const proxFinStr = proxFin.toISOString().split("T")[0];
        try {
          const todasLic = JSON.parse(localStorage.getItem("horreo_licencias") || "[]");
          // Filtrar por marca (si el local pertenece a esta marca)
          const localesMarcaSet = new Set(localesMarca);
          const licMarca = todasLic.filter(l => !l.marca || l.marca === marca || localesMarcaSet.has(l.local));
          if (!licMarca.length) return null;
          // Activas hoy
          const activas = licMarca.filter(l => l.fechaIni <= hoy && (!l.fechaFin || l.fechaFin >= hoy));
          // Próximas a vencer (en 5 días)
          const proxVencer = activas.filter(l => l.fechaFin && l.fechaFin >= hoy && l.fechaFin <= proxFinStr);
          // Próximas a iniciar
          const proxIniciar = licMarca.filter(l => l.fechaIni > hoy && l.fechaIni <= proxFinStr);
          if (!activas.length && !proxVencer.length && !proxIniciar.length) return null;
          return (
            <div style={{ marginBottom:14 }}>
              {/* Activas hoy */}
              {activas.length > 0 && (
                <div style={{ background:"#FEF2F2", border:"1.5px solid #FECACA", borderRadius:12, padding:"10px 14px", marginBottom:8 }}>
                  <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:13, color:"#EF4444", marginBottom:8, display:"flex", alignItems:"center", gap:6 }}>
                    🏥 {activas.length} ausentismo{activas.length>1?"s":""} activo{activas.length>1?"s":""} hoy
                  </div>
                  {activas.map((l,i) => {
                    const diasRestantes = l.fechaFin ? Math.round((new Date(l.fechaFin+"T12:00:00") - new Date(hoy+"T12:00:00")) / 86400000) : null;
                    const venceHoy = diasRestantes === 0;
                    return (
                      <div key={i} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"5px 0", borderBottom: i<activas.length-1?"1px solid #FEE2E2":"none" }}>
                        <div style={{ flex:1, minWidth:0 }}>
                          <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:12, color:"#1A1D2E", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                            {l.nombre}
                          </div>
                          <div style={{ display:"flex", gap:5, marginTop:2, flexWrap:"wrap" }}>
                            <span style={{ background:"#FEE2E2", color:"#EF4444", borderRadius:5, padding:"1px 7px", fontSize:9, fontWeight:800, fontFamily:"Nunito" }}>{l.tipo}</span>
                            {l.cargo && <span style={{ fontSize:9, color:"#94A3B8", fontFamily:"Nunito" }}>{l.cargo}</span>}
                            {l.local && <span style={{ fontSize:9, color:"#94A3B8", fontFamily:"Nunito" }}>· {l.local.split(" - ").pop()}</span>}
                          </div>
                        </div>
                        <div style={{ textAlign:"right", flexShrink:0, marginLeft:8 }}>
                          {venceHoy
                            ? <span style={{ fontFamily:"Nunito", fontWeight:900, fontSize:12, color:"#EF4444" }}>Vence hoy ⚠️</span>
                            : diasRestantes !== null
                              ? <span style={{ fontFamily:"Nunito", fontWeight:700, fontSize:11, color:"#94A3B8" }}>{l.fechaIni}{l.fechaFin&&l.fechaFin!==l.fechaIni?" → "+l.fechaFin:""}</span>

                          }
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
              {/* Próximas a vencer o iniciar */}
              {(proxVencer.filter(l=>!activas.find(a=>a.nombre===l.nombre&&a.tipo===l.tipo)).length > 0 || proxIniciar.length > 0) && (
                <div style={{ background:"#FFFBEB", border:"1.5px solid #FDE68A", borderRadius:12, padding:"10px 14px" }}>
                  <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:12, color:"#D97706", marginBottom:8 }}>
                    🔔 Próximas (5 días)
                  </div>
                  {proxIniciar.map((l,i) => {

                        <span style={{ color:"#7C3AED", fontWeight:800, fontFamily:"Nunito", fontSize:12 }}>en {diasParaIni}d</span>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          );
        } catch { return null; }
      })()}

      {/* ── Alertas automáticas de ventas/KPIs ──────────────────────────────── */}
      {(() => {
        if (!resumen || resumen.length === 0) return null;
        const redMock = { vt: resumen.reduce((s,r)=>s+r.vt,0), mv: resumen.reduce((s,r)=>s+r.mv,0), heV: 0 };
        const alertas = generarAlertas(resumen, redMock, metas, metasDiarias, kpis, marca, rango);
        if (alertas.length === 0) return null;
        return (
          <div style={{ marginBottom:14 }}>
            <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:12, color:"#EF4444", marginBottom:6 }}>
              🔔 {alertas.length} alerta{alertas.length>1?"s":" activa"}
            </div>
            {alertas.map((a,i)=>(
              <div key={i} style={{ background: a.sev==="alta"?"#FEF2F2":"#FFFBEB", border:`1px solid ${a.sev==="alta"?"#FECACA":"#FDE68A"}`, borderRadius:10, padding:"6px 10px", marginBottom:5, display:"flex", gap:8, alignItems:"center" }}>
                <span style={{ fontSize:14 }}>{a.tipo==="venta"?"💰":a.tipo==="merma"?"🗑️":a.tipo==="kds"?"⏱️":"👷"}</span>
                <div style={{ flex:1 }}>
                  <span style={{ fontSize:10, fontWeight:700, color:"#94A3B8" }}>{a.local} · </span>
                  <span style={{ fontSize:11, color:"#1A1D2E" }}>{a.msg}</span>
                </div>
              </div>
            ))}
          </div>
        );
      })()}

      {/* ── FILTROS ─────────────────────────────────────────────────────────── */}
      <Card style={{ marginBottom: 14, padding: 12 }}>
        {/* Período */}
        <div style={{ display: "flex", gap: 5, marginBottom: 10, overflowX: "auto" }}>
          {[["mes","📅 Mes"],["semana","📆 Semana"],["dia","📆 Día"],["rango","📊 Rango"]].map(([k,l])=>(
            <button key={k} onClick={()=>setPeriodo(k)} style={{ flexShrink:0, background:periodo===k?m.color:"#F8FAFC", border:`1.5px solid ${periodo===k?m.color:"#E2E8F0"}`, borderRadius:8, padding:"5px 12px", fontSize:11, fontWeight:700, fontFamily:"Nunito", color:periodo===k?"#fff":"#64748B", cursor:"pointer" }}>{l}</button>

          {periodo === "semana" && <Field label="Semana (cualquier día)"><input type="date" value={semFilter} onChange={e=>setSemFilter(e.target.value)} style={{ fontSize:12 }}/></Field>}
          {periodo === "dia"    && <Field label="Día"><input type="date" value={diaFilter} onChange={e=>setDiaFilter(e.target.value)} style={{ fontSize:12 }}/></Field>}
          {periodo === "rango"  && <>

          </>}
          <Field label="Local">
            <select value={localFilter} onChange={e=>setLocalFilter(e.target.value)} style={{ fontSize:12 }}>
              <option>Todos</option>{localesMarca.map(l=><option key={l}>{l}</option>)}
            </select>
          </Field>
        </div>
        {/* Comparar con */}
        <div style={{ marginBottom: 6 }}>
          <Label>Comparar con</Label>
          <div style={{ display: "flex", gap: 5, flexWrap: "wrap" }}>

              <button key={k} onClick={()=>setComparar(k)} style={{ flexShrink:0, background:comparar===k?"#1A1D2E":"#F8FAFC", border:`1.5px solid ${comparar===k?"#1A1D2E":"#E2E8F0"}`, borderRadius:8, padding:"4px 10px", fontSize:10, fontWeight:700, fontFamily:"Nunito", color:comparar===k?"#fff":"#64748B", cursor:"pointer" }}>{l}</button>
            ))}
          </div>
        </div>
        {/* Acciones */}
        <div style={{ display: "flex", gap: 8, marginTop: 8 }}>

          <button onClick={handleShare}  style={{ flex:1, background:"#6C63FF", border:"none", borderRadius:10, padding:"8px 0", fontFamily:"Nunito", fontWeight:700, fontSize:12, color:"#fff", cursor:"pointer" }}>📤 Compartir</button>
        </div>
      </Card>

      {/* ── KPIs PRINCIPALES ────────────────────────────────────────────────── */}
      {/* Indicador de período activo */}
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:8 }}>
        <div style={{ display:"flex", alignItems:"center", gap:6 }}>
          <div style={{ background:m.color+"22", borderRadius:8, padding:"4px 10px", fontFamily:"Nunito", fontWeight:800, fontSize:12, color:m.color }}>

            </div>
          )}
        </div>
        <div style={{ fontSize:10, color:"var(--text-4)", fontFamily:"Nunito" }}>
          {periodo === "mes" ? "Mes completo" : periodo === "semana" ? "Semana" : periodo === "dia" ? "Día" : "Rango"}
        </div>
      </div>

      {/* Bloque principal: Venta Bruta + Neta + Cumpl */}
      <Card style={{ marginBottom:10, padding:"14px 16px" }}>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:10 }}>
          <div>
            <div style={{ fontSize:9, color:"#94A3B8", fontWeight:700, textTransform:"uppercase", letterSpacing:.8 }}>💰 Venta Bruta Red</div>
            <div style={{ fontFamily:"Nunito", fontWeight:900, fontSize:24, color:m.color, lineHeight:1.1 }}>{fmtCLP(red.vt)}</div>
            {red.mv > 0 && <div style={{ fontSize:11, color:"#94A3B8" }}>Meta: {fmtCLP(red.mv)}</div>}
          </div>
          <div>
            <div style={{ fontSize:9, color:"#94A3B8", fontWeight:700, textTransform:"uppercase", letterSpacing:.8 }}>💵 Venta Neta Red</div>
            <div style={{ fontFamily:"Nunito", fontWeight:900, fontSize:20, color:"#6C63FF", lineHeight:1.1 }}>{fmtCLP(red.vn)}</div>
            {red.mvn > 0 && <div style={{ fontSize:11, color:"#94A3B8" }}>Meta: {fmtCLP(red.mvn)}</div>}
          </div>
        </div>
        {/* Barra cumplimiento */}
        {red.mv > 0 && (
          <div>
            <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4 }}>
              <span style={{ fontSize:11, color:"#64748B", fontWeight:700 }}>🎯 Cumplimiento meta red</span>
              <span style={{ fontFamily:"Nunito", fontWeight:900, fontSize:13, color:redCumpl>=1?"#22C55E":redCumpl>=0.8?"#F59E0B":"#EF4444" }}>
                {(redCumpl*100).toFixed(1)}%
              </span>
            </div>
            <div style={{ height:8, background:"#E2E8F0", borderRadius:8 }}>
              <div style={{ height:"100%", width:`${Math.min(100,redCumpl*100)}%`, background:redCumpl>=1?"#22C55E":redCumpl>=0.8?"#F59E0B":"#EF4444", borderRadius:8, transition:"width .6s" }}/>
            </div>
            <div style={{ display:"flex", justifyContent:"space-between", marginTop:3 }}>
              <span style={{ fontSize:9, color:"#94A3B8" }}>{fmtCLP(red.vt)} real</span>
              {varComp !== null && (
                <span style={{ fontSize:9, fontWeight:700, color:varComp>=0?"#22C55E":"#EF4444" }}>
                  {varComp>=0?"+":""}{(varComp*100).toFixed(1)}% vs {rangoComp?.label}
                </span>
              )}
              <span style={{ fontSize:9, color:"#94A3B8" }}>{fmtCLP(red.mv)} meta</span>
            </div>
          </div>
        )}
      </Card>

      {/* Fila: Boletas + Ticket + Venta Hoy */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8, marginBottom:10 }}>
        {(() => {
          const totalBoletas = resumen.reduce((s,r)=>s+r.bt, 0);
          const ticketProm   = totalBoletas > 0 ? red.vt / totalBoletas : 0;
          return [
            { icon:"🧾", label:"Boletas", value: totalBoletas > 0 ? totalBoletas.toLocaleString("es-CL") : "—", color:"#1A1D2E" },
            { icon:"🎫", label:"Ticket prom.", value: ticketProm > 0 ? fmtCLP(ticketProm) : "—", color:"#6C63FF" },
            { icon:"🛒", label:"Venta hoy",  value: ventaHoy > 0 ? fmtCLP(ventaHoy) : "—", color:"#94A3B8" },
          ].map(k => (
            <Card key={k.label} style={{ padding:"10px 10px", position:"relative", overflow:"hidden" }}>
              <div style={{ position:"absolute", top:0, left:0, right:0, height:3, background:k.color }}/>
              <div style={{ fontSize:14, marginBottom:2 }}>{k.icon}</div>
              <div style={{ fontSize:9, color:"#94A3B8", fontWeight:700, textTransform:"uppercase", letterSpacing:.5 }}>{k.label}</div>
              <div style={{ fontFamily:"Nunito", fontWeight:900, fontSize:14, color:k.color, lineHeight:1.2 }}>{k.value}</div>
            </Card>
          ));
        })()}
      </div>

      {/* Venta promedio diaria necesaria para llegar a la meta */}
      {(() => {
        if (periodo !== "mes" || red.mv <= 0) return null;
        // Días totales del mes
        const [y, mo] = mesFilter.split("-").map(Number);
        const diasDelMes = new Date(y, mo, 0).getDate();
        const hoy = today();
        const mesActual = hoy.slice(0, 7) === mesFilter;

        // Días con ventas registradas en el período
        const fechasConVentas = new Set(
          ventas.filter(v => v.marca === marca && v.fecha >= rango.ini && v.fecha <= rango.fin).map(v => v.fecha)
        );
        const diasConDatos = fechasConVentas.size;

        // Días faltantes: días del mes sin datos (excluye días futuros si es mes actual)
        let diasFaltantes;
        if (mesActual) {
          const diaHoy = parseInt(hoy.slice(8, 10));
          // Días transcurridos hasta hoy sin datos
          const diasPasadosSinDatos = Array.from({ length: diaHoy }, (_, i) => {
            const d = String(i + 1).padStart(2, "0");
            return mesFilter + "-" + d;
          }).filter(f => !fechasConVentas.has(f)).length;
          // Días futuros restantes
          const diasFuturos = diasDelMes - diaHoy;
          diasFaltantes = diasPasadosSinDatos + diasFuturos;
        } else {
          diasFaltantes = diasDelMes - diasConDatos;
        }

        if (diasFaltantes <= 0) return null;

        const faltanPesos = Math.max(0, red.mv - red.vt);
        if (faltanPesos <= 0) return null;

        const promNecesario = faltanPesos / diasFaltantes;
        const promActual = diasConDatos > 0 ? red.vt / diasConDatos : 0;
        const ratio = promActual > 0 ? promNecesario / promActual : null;
        const alcanzable = ratio !== null && ratio <= 2.5;
        const colorCard = ratio === null ? "#6C63FF" : alcanzable ? "#F59E0B" : "#EF4444";

        return (
          <div style={{ marginBottom: 10 }}>
            <div style={{
              background: "var(--bg-card)",
              borderRadius: 14,
              border: `2px solid ${colorCard}22`,
              padding: "12px 14px",
              position: "relative",
              overflow: "hidden"
            }}>
              <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 3, background: colorCard }} />
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                <div>
                  <div style={{ fontSize: 9, color: "#94A3B8", fontWeight: 700, textTransform: "uppercase", letterSpacing: .6, marginBottom: 2 }}>
                    📈 Venta prom. necesaria / día
                  </div>
                  <div style={{ fontFamily: "Nunito", fontWeight: 900, fontSize: 22, color: colorCard, lineHeight: 1.1 }}>
                    {fmtCLP(promNecesario)}
                  </div>
                  <div style={{ fontSize: 10, color: "#64748B", marginTop: 2 }}>
                    Para cubrir {fmtCLP(faltanPesos)} en <strong>{diasFaltantes}</strong> día{diasFaltantes !== 1 ? "s" : ""} sin datos
                  </div>
                </div>
                <div style={{ textAlign: "right" }}>
                  {promActual > 0 && (
                    <>
                      <div style={{ fontSize: 9, color: "#94A3B8", fontWeight: 700, textTransform: "uppercase", letterSpacing: .4 }}>Prom. actual</div>
                      <div style={{ fontFamily: "Nunito", fontWeight: 800, fontSize: 13, color: "#64748B" }}>{fmtCLP(promActual)}</div>
                      {ratio !== null && (
                        <div style={{ fontSize: 10, fontWeight: 700, color: colorCard, marginTop: 2 }}>
                          {ratio >= 1 ? `×${ratio.toFixed(1)} vs actual` : `✓ bajo actual`}
                        </div>
                      )}
                    </>
                  )}
                </div>
              </div>
              {/* Mini barra: cuánto del promedio necesario cubre el actual */}
              {promActual > 0 && (
                <div style={{ marginTop: 8 }}>
                  <div style={{ height: 5, background: "#E2E8F0", borderRadius: 4 }}>
                    <div style={{
                      height: "100%",
                      width: `${Math.min(100, (promActual / promNecesario) * 100)}%`,
                      background: colorCard,
                      borderRadius: 4,
                      transition: "width .5s"
                    }} />
                  </div>
                  <div style={{ display: "flex", justifyContent: "space-between", marginTop: 2 }}>
                    <span style={{ fontSize: 8, color: "#94A3B8" }}>Prom. actual: {fmtCLP(promActual)}</span>
                    <span style={{ fontSize: 8, color: "#94A3B8" }}>Necesario: {fmtCLP(promNecesario)}</span>
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      })()}

      {/* Ratios sobre Venta Neta */}
      {red.vn > 0 && (
        <div style={{ marginBottom:10 }}>
          <div style={{ fontSize:10, color:"#94A3B8", fontWeight:700, textTransform:"uppercase", letterSpacing:.6, marginBottom:6 }}>Ratios sobre Venta Neta</div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8, marginBottom:4 }}>
            {[
              { label:"Labor", value: red.lab, pct: red.lab/red.vn, icon:"👷", warn:0.30,
                fuente: red.lab > 0 ? (resumen.some(r=>r.labVentas>0) ? "desde ventas" : "desde horarios") : null },
              { label:"Mermas",    value: redConFoodCost.mr,  pct: redConFoodCost.mr/red.vn,  icon:"🗑️", warn:0.05, fuente: redConFoodCost.mrFuente },
              { label:"Colaciones",value: redConFoodCost.col, pct: redConFoodCost.col/red.vn, icon:"🍽️", warn:0.04, fuente: redConFoodCost.colFuente },
            ].map(k=>{
              const over = k.pct > k.warn;
              const c = over ? "#EF4444" : k.value > 0 ? "#22C55E" : "#94A3B8";
              return (
                <Card key={k.label} style={{ position:"relative", overflow:"hidden", padding:"10px 10px" }}>
                  <div style={{ position:"absolute", top:0, left:0, right:0, height:3, background:c, borderRadius:"16px 16px 0 0" }}/>
                  <div style={{ fontSize:16, marginBottom:2 }}>{k.icon}</div>
                  <div style={{ fontSize:9, color:"#94A3B8", textTransform:"uppercase", letterSpacing:.5, marginBottom:2, fontWeight:700, lineHeight:1.2 }}>{k.label}</div>
                  <div style={{ fontSize:18, fontFamily:"Nunito", fontWeight:900, color:c, lineHeight:1 }}>
                    {k.value > 0 ? (k.pct*100).toFixed(1)+"%" : "—"}
                  </div>
                  <div style={{ fontSize:9, color:"#94A3B8", marginTop:2 }}>{k.value > 0 ? fmtCLP(k.value) : "Sin datos"}</div>
                  {k.fuente && (
                    <div style={{ fontSize:8, color:"#6C63FF", fontWeight:700, marginTop:1, background:"#EDE9FE", borderRadius:4, padding:"1px 4px", display:"inline-block" }}>
                      📋 {k.fuente}
                    </div>
                  )}
                  {/* Meta indicator */}
                  {k.value > 0 && (
                    <div style={{ fontSize:8, color: over?"#EF4444":"#22C55E", fontWeight:700, marginTop:1 }}>
                      {over ? `▲ sobre meta ${(k.warn*100).toFixed(0)}%` : `✓ bajo meta ${(k.warn*100).toFixed(0)}%`}
                    </div>
                  )}
                </Card>
              );
            })}
          </div>
          <div style={{ fontSize:9, color:"var(--text-5)", textAlign:"right", fontFamily:"Nunito" }}>
            Período: {rango.ini} → {rango.fin}
          </div>
        </div>
      )}

      {/* Comparación con período anterior */}
      {varComp !== null && (
        <Card style={{ marginBottom:14, border:`2px solid ${varComp>=0?"#86EFAC":"#FCA5A5"}`, background:varComp>=0?"#F0FDF4":"#FEF2F2" }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <div>
              <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:13 }}>vs {rangoComp?.label}</div>
              <div style={{ fontSize:11, color:"#64748B" }}>{fmtCLP(red.vtComp)} período anterior</div>
            </div>
            <div style={{ textAlign:"right" }}>
              <div style={{ fontSize:26, fontFamily:"Nunito", fontWeight:900, color:varComp>=0?"#22C55E":"#EF4444" }}>{varComp>=0?"+":""}{(varComp*100).toFixed(1)}%</div>
              <div style={{ fontSize:11, fontWeight:700, color:varComp>=0?"#22C55E":"#EF4444" }}>{varComp>=0?"+":""}{fmtCLP(red.vt-red.vtComp)}</div>
            </div>
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:6, marginTop:10 }}>
            {[["Período actual",red.vt,m.color],["Período comp.",red.vtComp,"#94A3B8"]].map(([l,v,c])=>(
              <div key={l}>
                <div style={{ fontSize:10, color:"#64748B", marginBottom:3 }}>{l}</div>
                <div style={{ height:6, background:"#E2E8F0", borderRadius:4 }}>
                  <div style={{ height:"100%", width:`${(v/Math.max(red.vt,red.vtComp,1))*100}%`, background:c, borderRadius:4, transition:"width .5s" }}/>
                </div>
                <div style={{ fontSize:10, fontWeight:700, color:c, fontFamily:"Nunito", marginTop:2 }}>{fmtCLP(v)}</div>
              </div>
            ))}
          </div>
        </Card>
      )}

      {/* ── TABS: KPIs / Ranking / Tendencia / Mes a Mes ─────────────────────── */}
      <div style={{ display:"flex", gap:5, marginBottom:12, overflowX:"auto" }}>
        {[["kpis","📊 KPIs"],["ranking","🏆 Ranking"],["tendencia","📈 Tendencia"],["meses","📅 Mes a Mes"]].map(([k,l])=>(
          <button key={k} onClick={()=>setVerTab(k)} style={{ flexShrink:0, background:verTab===k?m.color:"#F8FAFC", border:`1.5px solid ${verTab===k?m.color:"#E2E8F0"}`, borderRadius:8, padding:"6px 12px", fontSize:11, fontWeight:700, fontFamily:"Nunito", color:verTab===k?"#fff":"#64748B", cursor:"pointer" }}>{l}</button>
        ))}
      </div>

      {/* KPIs por local */}
      {verTab === "kpis" && resumen.filter(r=>localFilter==="Todos"||r.local===localFilter).map(r=>{
        const ri = ranking.findIndex(x=>x.local===r.local);
        const rComp = resComp?.find(x=>x.local===r.local);
        const varL = rComp && rComp.vt>0 ? (r.vt-rComp.vt)/rComp.vt : null;
        const laborPct  = r.vn > 0 ? r.lab / r.vn : 0;
        const { mr, col, mrERP, colERP } = getMrCol(r);
        const mermasPct = r.vn > 0 ? mr / r.vn : 0;
        const colPct    = r.vn > 0 ? col / r.vn : 0;
        return (
          <Card key={r.local} style={{ marginBottom:12, borderTop:`3px solid ${m.color}` }}>
            {/* Header local */}
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:10 }}>
              <div>
                <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:13, lineHeight:1.2 }}>{r.local}</div>
                <Badge text={`#${ri+1}`} color={medalColors[ri]} small />
              </div>
              <div style={{ textAlign:"right" }}>
                {varL!==null && <div style={{ fontSize:10, fontWeight:700, color:varL>=0?"#22C55E":"#EF4444", marginBottom:2 }}>{varL>=0?"+":""}{(varL*100).toFixed(1)}% vs {rangoComp?.label}</div>}
              </div>
            </div>

            {/* Ventas bruta / neta */}
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:10, background:"#F8FAFC", borderRadius:10, padding:"8px 10px" }}>
              <div>
                <div style={{ fontSize:9, color:"#94A3B8", fontWeight:700, textTransform:"uppercase", letterSpacing:.5 }}>Venta Bruta</div>
                <div style={{ fontSize:18, fontFamily:"Nunito", fontWeight:900, color:m.color, lineHeight:1.1 }}>{fmtCLP(r.vt)}</div>
                {r.mv > 0 && <div style={{ fontSize:10, color:"#94A3B8" }}>Meta: {fmtCLP(r.mv)}</div>}
              </div>
              <div>
                <div style={{ fontSize:9, color:"#94A3B8", fontWeight:700, textTransform:"uppercase", letterSpacing:.5 }}>Venta Neta</div>
                <div style={{ fontSize:18, fontFamily:"Nunito", fontWeight:900, color:"#6C63FF", lineHeight:1.1 }}>{fmtCLP(r.vn)}</div>
                {r.mvn > 0 && <div style={{ fontSize:10, color:"#94A3B8" }}>Meta: {fmtCLP(r.mvn)}</div>}
              </div>
            </div>

            {/* Cumplimiento */}
            {r.mv > 0 && (
              <div style={{ marginBottom:10 }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:4 }}>
                  <span style={{ fontSize:10, color:"#64748B", fontWeight:700 }}>Cumplimiento meta</span>
                  <SemaforoChip small {...getSemaforo(r.vt, r.mv, { verde:100, amarillo:90 })} />
                </div>
                <PctBar value={r.cumpl} />
              </div>
            )}

            {/* Ratios sobre venta neta */}
            {r.vn > 0 && (
              <>
                <div style={{ fontSize:9, color:"#94A3B8", fontWeight:700, textTransform:"uppercase", letterSpacing:.5, marginBottom:6 }}>Ratios sobre Venta Neta</div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:6, marginBottom:10 }}>
                  {[
                    { label:"Labor",      value:r.lab, pct:laborPct,  icon:"👷",  warn:0.30, erp:false },
                    { label:"Mermas",     value:mr,    pct:mermasPct, icon:"🗑️", warn:0.05, erp:mrERP },
                    { label:"Colaciones", value:col,   pct:colPct,    icon:"🍽️", warn:0.04, erp:colERP },
                  ].map(k=>{
                    const over = k.pct > k.warn;
                    const c = over ? "#EF4444" : (k.pct > 0 ? "#F59E0B" : "#94A3B8");
                    return (
                      <div key={k.label} style={{ background: over?"#FEF2F2":"#F8FAFC", borderRadius:8, padding:"6px 8px", border:`1px solid ${over?"#FECACA":"#F0F4F8"}` }}>
                        <div style={{ fontSize:12 }}>{k.icon}</div>
                        <div style={{ fontSize:9, color:"#94A3B8", fontWeight:600 }}>{k.label}</div>
                        <div style={{ fontSize:13, fontFamily:"Nunito", fontWeight:900, color:c }}>{k.pct>0?(k.pct*100).toFixed(1)+"%":"—"}</div>
                        <div style={{ fontSize:9, color:"#94A3B8" }}>{fmtCLP(k.value)}</div>
                        {k.erp && <div style={{ fontSize:8, color:"#6C63FF", fontWeight:700, background:"#EDE9FE", borderRadius:4, padding:"1px 4px", marginTop:2, display:"inline-block" }}>📋 ERP</div>}
                      </div>
                    );
                  })}
                </div>
              </>
            )}

            {/* KPIs operacionales */}
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr 1fr", gap:6 }}>
              {[["Boletas",r.bt,"#1A1D2E"],["KDS",r.kp>0?r.kp.toFixed(1)+" m":"—","#06B6D4"],["NPS",r.np>0?r.np.toFixed(0):"—","#22C55E"]].map(([l,v,c])=>(
                <div key={l} style={{ background:"#F8FAFC", borderRadius:8, padding:"5px 8px" }}>
                  <div style={{ fontSize:9, color:"#94A3B8" }}>{l}</div>
                  <div style={{ fontSize:12, fontWeight:800, fontFamily:"Nunito", color:c }}>{v}</div>
                </div>
              ))}
            </div>
          </Card>
        );
      })}

      {/* Ranking */}
      {verTab === "ranking" && (
        <Card>
          <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:14, marginBottom:14 }}>🏆 Ranking — {rango.label}</div>
          {ranking.map((r,i)=>(
            <div key={r.local} style={{ marginBottom:12 }}>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4, alignItems:"center" }}>
                <div style={{ display:"flex", alignItems:"center", gap:8 }}><span style={{ fontSize:18 }}>{medals[i]}</span><span style={{ fontSize:13, fontWeight:700, fontFamily:"Nunito" }}>{r.local}</span></div>
                <div style={{ textAlign:"right" }}><div style={{ fontSize:14, fontWeight:800, fontFamily:"Nunito", color:medalColors[i] }}>{fmtCLP(r.vt)}</div><div style={{ fontSize:10, color:"#94A3B8" }}>{r.mv>0?fmtPct(r.cumpl)+" meta":""}</div></div>
              </div>
              <div style={{ height:6, background:"#F0F4F8", borderRadius:4 }}><div style={{ height:"100%", width:`${(r.vt/maxVt)*100}%`, background:medalColors[i], borderRadius:4, transition:"width .6s" }}/></div>
            </div>
          ))}
        </Card>
      )}

      {/* Tendencia diaria */}
      {verTab === "tendencia" && (
        <Card>
          <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:14, marginBottom:12 }}>📈 Tendencia diaria — {rango.label}</div>
          {tendencia.length === 0 && <div style={{ color:"#94A3B8", textAlign:"center", padding:20 }}>Sin datos en este período</div>}
          {tendencia.map((t,i)=>{
            const maxTv = Math.max(...tendencia.map(x=>x.vt),1);
            return (
              <div key={t.fecha} style={{ display:"flex", alignItems:"center", gap:8, marginBottom:6 }}>
                <div style={{ fontSize:10, color:"#64748B", width:60, flexShrink:0 }}>{t.fecha.slice(5)}</div>
                <div style={{ flex:1, height:20, background:"#F8FAFC", borderRadius:4, position:"relative", overflow:"hidden" }}>
                  <div style={{ height:"100%", width:`${(t.vt/maxTv)*100}%`, background:m.color+"88", borderRadius:4, transition:"width .4s" }}/>
                  <div style={{ position:"absolute", top:0, left:6, right:0, height:"100%", display:"flex", alignItems:"center" }}>
                    <span style={{ fontSize:9, fontWeight:700, fontFamily:"Nunito", color:"#1A1D2E" }}>{fmtCLP(t.vt)}</span>
                  </div>
                </div>
                <div style={{ fontSize:10, color:"#94A3B8", width:28, textAlign:"right", flexShrink:0 }}>{t.bt}</div>
              </div>
            );
          })}
          {tendencia.length > 0 && (
            <div style={{ marginTop:10, paddingTop:8, borderTop:"1px solid #F0F4F8", display:"flex", justifyContent:"space-between" }}>
              <span style={{ fontSize:11, fontWeight:700, color:"#64748B" }}>Total período</span>
              <span style={{ fontSize:13, fontWeight:900, fontFamily:"Nunito", color:m.color }}>{fmtCLP(tendencia.reduce((s,t)=>s+t.vt,0))}</span>
            </div>
          )}
        </Card>
      )}

      {/* Mes a mes */}
      {verTab === "meses" && (
        <Card>
          <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:14, marginBottom:14 }}>📅 Últimos 6 meses</div>
          {mesesRecientes.map((mes,i)=>{
            const maxM = Math.max(...mesesRecientes.map(x=>x.vt),1);
            const prev = i > 0 ? mesesRecientes[i-1] : null;
            const varM = prev && prev.vt > 0 ? (mes.vt-prev.vt)/prev.vt : null;
            return (
              <div key={mes.mes} style={{ marginBottom:14 }}>
                <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4 }}>
                  <span style={{ fontFamily:"Nunito", fontWeight:800, fontSize:13 }}>{mes.mes}</span>
                  <div style={{ textAlign:"right" }}>
                    <span style={{ fontFamily:"Nunito", fontWeight:800, fontSize:14, color:m.color }}>{fmtCLP(mes.vt)}</span>
                    {varM!==null && <span style={{ fontSize:10, marginLeft:6, fontWeight:700, color:varM>=0?"#22C55E":"#EF4444" }}>{varM>=0?"+":""}{(varM*100).toFixed(1)}%</span>}
                  </div>
                </div>
                <div style={{ height:8, background:"#F0F4F8", borderRadius:4 }}>
                  <div style={{ height:"100%", width:`${(mes.vt/maxM)*100}%`, background:m.color, borderRadius:4, transition:"width .6s" }}/>
                </div>
                {mes.mv > 0 && <div style={{ fontSize:9, color:"#94A3B8", marginTop:2 }}>Meta: {fmtCLP(mes.mv)} · Cumpl: {((mes.vt/mes.mv)*100).toFixed(0)}%</div>}
              </div>
            );
          })}
        </Card>
      )}
    </div>
  );
}); // end React.memo(Dashboard)

// CONFIG — con indicador de uso localStorage
// ══════════════════════════════════════════════════════════════════════════════
// ── MigracionSB — migrar datos de localStorage a Supabase ────────────────────
function MigracionSB() {
  const [estado, setEstado] = useState(null);
  const [detalle, setDetalle] = useState([]);
  const [showSQL, setShowSQL] = useState(false);

  const SQL_NUEVAS_TABLAS = `-- Ejecutar en Supabase SQL Editor (una sola vez)
-- ⚠️ IMPORTANTE: si ya tienes alguna tabla, usa las columnas ADD COLUMN al final

-- Tabla he_solicitudes (horas extra) — RECREAR si falta la columna "fecha"
CREATE TABLE IF NOT EXISTS he_solicitudes (
  id TEXT PRIMARY KEY,
  marca TEXT, local TEXT, fecha TEXT, turno TEXT,
  usuario TEXT, horas NUMERIC, motivo TEXT,
  costo_estimado NUMERIC, estado TEXT DEFAULT 'pendiente', ts TEXT
);
ALTER TABLE he_solicitudes ENABLE ROW LEVEL SECURITY;
CREATE POLICY "allow_all" ON he_solicitudes FOR ALL USING (true) WITH CHECK (true);
-- Si la tabla ya existe pero le falta la columna fecha, ejecuta:
-- ALTER TABLE he_solicitudes ADD COLUMN IF NOT EXISTS fecha TEXT;
-- ALTER TABLE he_solicitudes ADD COLUMN IF NOT EXISTS turno TEXT;
-- ALTER TABLE he_solicitudes ADD COLUMN IF NOT EXISTS usuario TEXT;
-- ALTER TABLE he_solicitudes ADD COLUMN IF NOT EXISTS costo_estimado NUMERIC;

CREATE TABLE IF NOT EXISTS contactos (
  id TEXT PRIMARY KEY,
  nombre TEXT, email TEXT, telefono TEXT
);
CREATE TABLE IF NOT EXISTS licencias (
  id TEXT PRIMARY KEY,
  nombre TEXT, cargo TEXT, local TEXT, marca TEXT,
  tipo TEXT, "fechaIni" TEXT, "fechaFin" TEXT, "diasEstimados" TEXT, obs TEXT
);
CREATE TABLE IF NOT EXISTS personal_adicional (
  id TEXT PRIMARY KEY,
  nombre TEXT, cargo TEXT, local TEXT, marca TEXT,
  "fechaIni" TEXT, "fechaFin" TEXT, horas_dia NUMERIC
);
CREATE TABLE IF NOT EXISTS boletas_honorarios (
  id TEXT PRIMARY KEY,
  marca TEXT, nombre TEXT, rut TEXT, banco TEXT,
  "tipoCuenta" TEXT, "numeroCuenta" TEXT, direccion TEXT,
  local TEXT, fecha TEXT, "horasNormal" NUMERIC, "valorHora" NUMERIC,
  descripcion TEXT, obs TEXT,
  "totalBruto" NUMERIC, retencion NUMERIC, "totalNeto" NUMERIC,
  estado TEXT DEFAULT 'pendiente', autor TEXT, ts TEXT
);
CREATE TABLE IF NOT EXISTS alertas (
  id TEXT PRIMARY KEY,
  titulo TEXT, tipo TEXT, prioridad TEXT,
  cuerpo TEXT, link TEXT, destino TEXT,
  "fechaVto" TEXT, tags TEXT, archivada BOOLEAN DEFAULT false,
  autor TEXT, ts TEXT, "tsEdit" TEXT, "editadoPor" TEXT,
  vistas JSONB DEFAULT '[]'
);
ALTER TABLE alertas ENABLE ROW LEVEL SECURITY;
CREATE POLICY "allow_all" ON alertas FOR ALL USING (true) WITH CHECK (true);
CREATE TABLE IF NOT EXISTS app_settings (
  id TEXT PRIMARY KEY, value JSONB
);
-- RLS
ALTER TABLE contactos ENABLE ROW LEVEL SECURITY;
ALTER TABLE licencias ENABLE ROW LEVEL SECURITY;
ALTER TABLE personal_adicional ENABLE ROW LEVEL SECURITY;
ALTER TABLE boletas_honorarios ENABLE ROW LEVEL SECURITY;
ALTER TABLE app_settings ENABLE ROW LEVEL SECURITY;
CREATE POLICY "allow_all" ON contactos FOR ALL USING (true) WITH CHECK (true);
CREATE POLICY "allow_all" ON licencias FOR ALL USING (true) WITH CHECK (true);
CREATE POLICY "allow_all" ON personal_adicional FOR ALL USING (true) WITH CHECK (true);
CREATE POLICY "allow_all" ON boletas_honorarios FOR ALL USING (true) WITH CHECK (true);
CREATE POLICY "allow_all" ON app_settings FOR ALL USING (true) WITH CHECK (true);`;

  const migrar = async () => {
    const sb = getSB();
    if (!sb) { setEstado("error"); setDetalle(["No hay conexión Supabase configurada."]); return; }
    setEstado("running"); setDetalle([]);

    const tablas = [
      { key: "horreo_v2_ventas",          tabla: "ventas" },
      { key: "horreo_v2_kpi",             tabla: "kpis" },
      { key: "horreo_v2_metas",           tabla: "metas" },
      { key: "horreo_v2_metasd",          tabla: "metas_diarias" },
      { key: "horreo_desviaciones",       tabla: "desviaciones" },
      { key: "horreo_planillas_costos",   tabla: "planillas_costos" },
      { key: "horreo_he_solicitudes",     tabla: "he_solicitudes" },
      { key: "horreo_labor_semanas",      tabla: "labor_semanas" },
      { key: "horreo_licencias",          tabla: "licencias" },
      { key: "horreo_personal_adicional", tabla: "personal_adicional" },
      { key: "horreo_contactos",          tabla: "contactos" },
      { key: "horreo_boletas_honorarios", tabla: "boletas_honorarios" },
      { key: "horreo_alertas",          tabla: "alertas" },
    ];
    const settingKeys = [
      "horreo_config", "horreo_labor_valores", "horreo_labor_recargos",
      "horreo_labor_diashabiles", "horreo_meta_labor_pct", "horreo_metas_kpi_local", "horreo_grupos",
    ];

    const log = [];
    for (const { key, tabla } of tablas) {
      try {
        const raw = localStorage.getItem(key);
        if (!raw) { log.push(`⏭ ${tabla}: sin datos locales`); continue; }
        const rows = JSON.parse(raw);
        if (!Array.isArray(rows) || rows.length === 0) { log.push(`⏭ ${tabla}: vacío`); continue; }
        const prepared = rows
          .filter(r => r.id != null && r.id !== "")   // descartar filas sin id válido
          .map(r => sbPrepRow(r));
        const skipped = rows.length - prepared.length;
        const { error } = await sb.from(tabla).upsert(prepared, { onConflict: "id" });
        if (error) { log.push(`❌ ${tabla}: ${error.message}`); }
        else { log.push(`✅ ${tabla}: ${prepared.length} registros${skipped > 0 ? ` (${skipped} sin id ignorados)` : ""}`); }
      } catch (e) { log.push(`❌ ${tabla}: ${e.message}`); }
      setDetalle([...log]);
    }
    for (const key of settingKeys) {
      try {
        const raw = localStorage.getItem(key);
        if (!raw) { log.push(`⏭ settings[${key.replace("horreo_","")}]: sin datos`); continue; }
        const value = JSON.parse(raw);
        const { error } = await sb.from("app_settings").upsert({ id: key, value }, { onConflict: "id" });
        if (error) { log.push(`❌ settings[${key.replace("horreo_","")}]: ${error.message}`); }
        else { log.push(`✅ settings[${key.replace("horreo_","")}]: guardado`); }
      } catch (e) { log.push(`❌ settings[${key.replace("horreo_","")}]: ${e.message}`); }
      setDetalle([...log]);
    }
    setEstado("done");
  };

  if (!getSB() && estado === null) return (
    <div style={{ marginTop:10, fontSize:11, color:"#94A3B8", fontFamily:"Nunito" }}>
      Guarda la URL y clave de Supabase para habilitar la migración.
    </div>
  );

  return (
    <div style={{ marginTop:12, borderTop:"1px solid #E2E8F0", paddingTop:12 }}>
      <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:12, color:"#1A1D2E", marginBottom:8 }}>
        📦 Migrar datos locales a Supabase
      </div>
      <div style={{ fontSize:11, color:"#64748B", marginBottom:8, fontFamily:"Nunito" }}>
        Sube todos los datos almacenados en este dispositivo a la nube. Solo necesitas hacerlo una vez.
      </div>
      <div style={{ background:"#FEF2F2", border:"1px solid #FECACA", borderRadius:8, padding:"8px 12px", marginBottom:10, fontSize:11, color:"#991B1B", fontFamily:"Nunito", lineHeight:1.6 }}>
        ⚠️ <strong>Antes de migrar:</strong> ejecuta el SQL de abajo en el editor de Supabase para crear las tablas faltantes (especialmente <code>he_solicitudes</code> y <code>boletas_honorarios</code>). Si ya tienes la tabla pero le falta la columna <code>fecha</code>, ejecuta los ALTER TABLE comentados dentro del SQL.
      </div>
      <button onClick={() => setShowSQL(s => !s)}
        style={{ background:"#FFF8E7", border:"1px solid #FDE68A", borderRadius:8, padding:"6px 12px", fontFamily:"Nunito", fontWeight:800, fontSize:11, color:"#92400E", cursor:"pointer", marginBottom:8, width:"100%" }}>
        {showSQL ? "▲ Ocultar SQL" : "📋 Ver SQL tablas y columnas faltantes (ejecutar en Supabase)"}
      </button>
      {showSQL && (
        <textarea readOnly value={SQL_NUEVAS_TABLAS}
          style={{ width:"100%", minHeight:280, fontFamily:"monospace", fontSize:10, padding:10, border:"1.5px solid #E2E8F0", borderRadius:10, resize:"vertical", color:"#1A1D2E", background:"#F8FAFC", lineHeight:1.6, boxSizing:"border-box", marginBottom:8 }} />
      )}
      <Btn onClick={migrar} color="#10B981" full disabled={estado==="running"}>
        {estado === "running" ? "⏳ Migrando..." : estado === "done" ? "🔄 Migrar de nuevo" : "🚀 Iniciar migración"}
      </Btn>
      {detalle.length > 0 && (
        <div style={{ marginTop:10, background:"#1A1D2E", borderRadius:10, padding:"10px 12px", fontFamily:"monospace", fontSize:11, color:"#E2E8F0", lineHeight:1.9 }}>
          {detalle.map((l,i) => <div key={i}>{l}</div>)}
          {estado === "done" && <div style={{ marginTop:6, color:"#22C55E", fontWeight:700 }}>✅ Migración completada</div>}
        </div>
      )}
    </div>
  );
}
