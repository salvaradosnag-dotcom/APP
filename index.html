  // Recargos
  const [recargos, setRecargos] = useCloudSetting("horreo_labor_recargos", {
    domingo:    { pct: 30,  activo: true },
    feriado:    { pct: 50,  activo: true },
    sabado:     { pct: 0,   activo: false },
    horasextra: { pct: 50,  activo: true },
  });
  const [feriados, setFeriados] = useCloudSetting("horreo_feriados", []);
  // Meta % labor/venta configurable
  const [metaLaborPct, setMetaLaborPct] = useCloudSetting("horreo_meta_labor_pct", 28);
  // Personal adicional (no en horario): [{ id, nombre, cargo, local, marca, fechaIni, fechaFin, horas_dia }]
  const [personalAdicional, setPersonalAdicional] = useSupabase("horreo_personal_adicional", []);
  // Licencias/permisos: [{ id, nombre, cargo, local, marca, tipo, fechaIni, fechaFin, obs }]
  const [licencias, setLicencias] = useSupabase("horreo_licencias", []);
  // Vista mes (para tab "por mes")
  const [mesSel, setMesSel] = useState(today().slice(0,7));
  const [periodoVista, setPeriodoVista] = useState("semana"); // semana | mes

  // Local selector for upload — fallback cuando el ERP no indica sucursal
  const [uploadLocal, setUploadLocal] = useState((LOCALES_POR_MARCA[marca]||LOCALES)[0]);
  // Sincronizar uploadLocal si cambia la marca
  useEffect(() => { setUploadLocal((LOCALES_POR_MARCA[marca]||LOCALES)[0]); }, [marca]);

  // Only show semanas for current marca
  const semanasMarcaTodas = useMemo(() => semanas.filter(s => s.marca === marca), [semanas, marca]);

  // Local actualmente visible (puede ser uno sin archivo propio, ej. Heladería)
  const localesConSemanas = useMemo(() =>
    [...new Set(semanasMarcaTodas.map(s => s.uploadLocal).filter(Boolean))],
  [semanasMarcaTodas]);

  const [vistaLocal, setVistaLocal] = useStorage("horreo_labor_vista_local_"+marca, "");
  // Si vistaLocal no está seteado o ya no existe, defaultear al primer local con semanas
  const vistaLocalEfectiva = (vistaLocal && (LOCALES_POR_MARCA[marca]||LOCALES).includes(vistaLocal))
    ? vistaLocal
    : (localesConSemanas[0] || (LOCALES_POR_MARCA[marca]||LOCALES)[0] || "");

  // Semanas solo del local visible
  const semanasMarca = useMemo(() =>
    semanasMarcaTodas.filter(s => s.uploadLocal === vistaLocalEfectiva),
  [semanasMarcaTodas, vistaLocalEfectiva]);

  const semana = semanasMarca[Math.min(semSel, semanasMarca.length - 1)] || null;

  // ── Parsear archivo ─────────────────────────────────────────────────────────
  const handleFile = async e => {
    const file = e.target.files[0]; if (!file) return;
    setLoading(true); setError("");
    try {
      const XLSX = await loadXLSX();
      const wb   = XLSX.read(await file.arrayBuffer(), { type:"array", cellText:true, raw:false });
      const parsed = parseHorarioXLSX(XLSX, wb);
      if (!parsed.length) throw new Error("No se encontraron semanas en el archivo");

      // ── Split por sucursal de empleado ────────────────────────────────────
      // Doggis puede tener empleados asignados a "Heladería" en el mismo archivo.
      // Para cada semana parseada, creamos una entrada separada por cada sucursal
      // distinta que aparezca en los empleados. El uploadLocal es el fallback
      // para empleados sin sucursal explícita.
      const taggedParsed = [];
      // Construir mapa de aliases ERP → { local, marca } — incluye TODOS los locales del sistema,
      // no solo los de la marca activa, porque un archivo puede contener empleados de otra marca
      // (ej: Doggis y Heladería comparten planilla en el ERP).
      const norm2 = s => s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\s+/g," ").trim();
      // Dos mapas: uno solo con la marca activa (prioridad), otro con todas
      const aliasMapMarca = {};   // solo marca activa
      const aliasMapGlobal = {};  // todas las marcas
      for (const [mk, locales] of Object.entries(LOCALES_POR_MARCA)) {
        for (const l of locales) {
          const tokens = [
            norm2(l),
            norm2(nombreCortoLocal(l)),
            ...l.toLowerCase().split(/[\s\-]+/).filter(p => p.length > 3),
          ];
          for (const t of tokens) {
            aliasMapGlobal[t] = aliasMapGlobal[t] || { local: l, marca: mk };
            if (mk === marca) aliasMapMarca[t] = { local: l, marca: mk };
          }
        }
      }
      // Matching: busca primero en marca activa, luego en global
      const matchLocalMarca = (sucErp) => {
        if (!sucErp) return { local: uploadLocal, marca };
        const sn = norm2(sucErp);
        // 1. Exact match en marca activa
        if (aliasMapMarca[sn]) return aliasMapMarca[sn];
        // 2. Exact match global
        if (aliasMapGlobal[sn]) return aliasMapGlobal[sn];
        // 3. Includes bidireccional en marca activa primero
        for (const [alias, lm] of Object.entries(aliasMapMarca)) {
          if (sn.includes(alias) || alias.includes(sn)) return lm;
        }
        // 4. Includes bidireccional global
        for (const [alias, lm] of Object.entries(aliasMapGlobal)) {
          if (sn.includes(alias) || alias.includes(sn)) return lm;
        }
        // 5. Token overlap en marca activa
        const tokens = sn.split(/\s+/).filter(t => t.length > 3);
        for (const t of tokens) {
          for (const [alias, lm] of Object.entries(aliasMapMarca)) {
            if (alias.includes(t)) return lm;
          }
        }
        // 6. Token overlap global
        for (const t of tokens) {
          for (const [alias, lm] of Object.entries(aliasMapGlobal)) {
            if (alias.includes(t)) return lm;
          }
        }
        return { local: uploadLocal, marca }; // fallback
      };

      for (const s of parsed) {
        // Agrupar empleados por su sucursal individual → { "local__marca": [emps] }
        const porLocalMarca = {};
        for (const emp of s.empleados) {
          const sucEmp = emp.sucursal && emp.sucursal.trim() ? emp.sucursal.trim() : "";
          const { local: localMatch, marca: marcaMatch } = sucEmp ? matchLocalMarca(sucEmp) : { local: uploadLocal, marca };
          const key = localMatch + "__" + marcaMatch;
          if (!porLocalMarca[key]) porLocalMarca[key] = { local: localMatch, marca: marcaMatch, emps: [] };
          porLocalMarca[key].emps.push(emp);
        }
        // Crear una entrada de semana por local+marca
        for (const { local: localKey, marca: marcaKey, emps } of Object.values(porLocalMarca)) {
          taggedParsed.push({
            ...s,
            id: uid(),
            ts: new Date().toISOString(),
            marca: marcaKey,
            sucursal: localKey,
            uploadLocal: localKey,
            empleados: emps,
          });
        }
      }

      setSemanas(prev => {
        // Merge: reemplazar exactamente las combinaciones marca+local+semana que vienen en el archivo.
        // Conservar todo lo demás (otras marcas, otros locales, otras semanas).
        const semanasNuevas = new Set(taggedParsed.map(s => s.marca + "__" + s.semana + "__" + s.uploadLocal));
        const marcasLocalesNuevos = new Set(taggedParsed.map(s => s.marca + "__" + s.uploadLocal));
        // Eliminar de Supabase las semanas viejas que se van a reemplazar (pueden no tener id válido)
        const aEliminar = prev.filter(s =>
          marcasLocalesNuevos.has(s.marca + "__" + s.uploadLocal) &&
          semanasNuevas.has(s.marca + "__" + s.semana + "__" + s.uploadLocal)
        );
        aEliminar.forEach(s => { if (s.id) sbDelete("labor_semanas", s.id); });
        const conservar = prev.filter(s =>
          !marcasLocalesNuevos.has(s.marca + "__" + s.uploadLocal) ||
          !semanasNuevas.has(s.marca + "__" + s.semana + "__" + s.uploadLocal)
        );
        return [...conservar, ...taggedParsed];
      });

      // Seleccionar la primera semana del local actualmente seleccionado
      const idxNuevo = taggedParsed.findIndex(s => s.uploadLocal === uploadLocal);
      setSemSel(idxNuevo >= 0 ? idxNuevo : 0);
      // Forzar vista al local que se acaba de subir
      setVistaLocal(uploadLocal);
      setTab("resumen");

      // Info de lo que se cargó
      const resumen = Object.entries(
        taggedParsed.reduce((acc, s) => {
          acc[s.uploadLocal] = (acc[s.uploadLocal]||0) + 1;
          return acc;
        }, {})
      ).map(([l, n]) => `${nombreCortoLocal(l)}: ${n} sem.`).join(" | ");

      // Debug: mostrar valores únicos de sucursal que vinieron del ERP
      const sucursalesERP = [...new Set(
        parsed.flatMap(s => s.empleados.map(e => e.sucursal || "(vacío)"))
      )].join(", ");
      setError("✅ " + resumen + (sucursalesERP ? `  ·  ERP sucursal: ${sucursalesERP}` : ""));
    } catch(err) { setError("Error: " + err.message); }
    setLoading(false);
  };

  // ── Helpers recargos ───────────────────────────────────────────────────────
  const esDomingo  = fecha => new Date(fecha + "T12:00:00").getDay() === 0;
  const esSabado   = fecha => new Date(fecha + "T12:00:00").getDay() === 6;
  const esFeriado  = fecha => feriados.includes(fecha);

  // Factor de recargo para un día (1.0 = sin recargo)
  const factorDia = fecha => {
    let factor = 1.0;
    if (esFeriado(fecha)  && recargos.feriado?.activo) factor = Math.max(factor, 1 + recargos.feriado.pct / 100);
    else if (esDomingo(fecha) && recargos.domingo?.activo) factor = Math.max(factor, 1 + recargos.domingo.pct / 100);
    else if (esSabado(fecha)  && recargos.sabado?.activo)  factor = Math.max(factor, 1 + recargos.sabado.pct  / 100);
    return factor;
  };

  // ── Calcular costo por empleado (con recargos por día) ──────────────────────
  const calcCosto = (emp) => {
    const vc = valoresCargo[emp.cargo] || { hora: 0, mes: 0, bono: 0 };
    const diasTrabajados = emp.dias.filter(d => d.estado === "trabajo").length;
    // Bono prorrateable: (bono_mensual / días_hábiles) × días_trabajados
    const bonoProrrateo = diasHabiles > 0 && vc.bono > 0 ? (vc.bono / diasHabiles) * diasTrabajados : 0;
    let costoBase = 0;
    if (vc.hora > 0) {
      costoBase = emp.dias.reduce((s, d) => {
        if (d.estado !== "trabajo") return s;
        return s + d.horas * vc.hora * factorDia(d.fecha);
      }, 0);
    } else if (vc.mes > 0 && diasHabiles > 0) {
      const valorDia = vc.mes / diasHabiles;
      costoBase = emp.dias.reduce((s, d) => {
        if (d.estado !== "trabajo") return s;
        return s + valorDia * factorDia(d.fecha);
      }, 0);
    }
    return costoBase + bonoProrrateo;
  };

  // Costo detallado por día (para empleado individual)
  const calcCostoDia = (emp, fecha) => {
    const vc = valoresCargo[emp.cargo] || { hora: 0, mes: 0, bono: 0 };
    const dia = emp.dias.find(d => d.fecha === fecha);
    if (!dia || dia.estado !== "trabajo") return { base: 0, recargo: 0, bono: 0, total: 0, factor: 1 };
    const factor = factorDia(fecha);
    const bonoDia = diasHabiles > 0 && vc.bono > 0 ? vc.bono / diasHabiles : 0;
    let base = 0;
    if (vc.hora > 0) base = dia.horas * vc.hora;
    else if (vc.mes > 0 && diasHabiles > 0) base = vc.mes / diasHabiles;
    return { base, recargo: base * (factor - 1), bono: bonoDia, total: base * factor + bonoDia, factor };
  };

  // ── Resumen de la semana ─────────────────────────────────────────────────────
  // ── Empleados trasladados HACIA esta semana desde otros locales ──────────────
  // Recorre todas las demás semanas de la marca buscando traslados que apunten
  // a este local (semana.uploadLocal) en fechas que caen dentro de esta semana.
  const empsTrasladadosAqui = useMemo(() => {
    if (!semana) return [];
    const result = [];
    semanas.forEach(otraSem => {
      if (otraSem.marca !== marca) return;
      if (otraSem.uploadLocal === semana.uploadLocal &&
          otraSem.inicio === semana.inicio) return; // misma semana
      const trasladosHacia = (otraSem.traslados || []).filter(t =>
        t.localDestino === semana.uploadLocal &&
        semana.fechasDias.includes(t.fecha)
      );
      if (!trasladosHacia.length) return;
      // Para cada empleado de esa otra semana que tiene traslado hacia aquí
      const fechasSet = new Set(trasladosHacia.map(t => t.fecha));
      otraSem.empleados.forEach(emp => {
        const diasAqui = emp.dias.filter(d =>
          d.estado === "trabajo" && fechasSet.has(d.fecha) &&
          trasladosHacia.some(t => t.rut === emp.rut && t.fecha === d.fecha)
        );
        if (!diasAqui.length) return;
        result.push({ emp, diasAqui, origenLocal: otraSem.uploadLocal });
      });
    });
    return result;
  }, [semana, semanas, marca]);

  const resumen = useMemo(() => {
    if (!semana) return null;
    const traslados = semana.traslados || [];
    const byCargo = {};
    let totalHoras = 0, totalCosto = 0, totalRecargo = 0;

    // ── Empleados propios (excluyendo días trasladados fuera) ─────────────────
    semana.empleados.forEach(emp => {
      const diasActivos = emp.dias.filter(d => {
        if (d.estado !== "trabajo") return false;
        const tr = traslados.find(t => t.rut === emp.rut && t.fecha === d.fecha);
        return !tr || tr.localDestino === semana.uploadLocal;
      });
      const horasActivas = diasActivos.reduce((s, d) => s + d.horas, 0);
      const vc = valoresCargo[emp.cargo] || { hora: 0, mes: 0, bono: 0 };
      const diasTrabActivos = diasActivos.length;
      const bonoProrrateo = diasHabiles > 0 && vc.bono > 0 ? (vc.bono / diasHabiles) * diasTrabActivos : 0;
      let costoBase = 0, costoSinRec = 0;
      diasActivos.forEach(d => {
        const factor = factorDia(d.fecha);
        if (vc.hora > 0) { costoBase += d.horas * vc.hora * factor; costoSinRec += d.horas * vc.hora; }
        else if (vc.mes > 0 && diasHabiles > 0) { const vd = vc.mes / diasHabiles; costoBase += vd * factor; costoSinRec += vd; }
      });
      const costo = costoBase + bonoProrrateo;
      totalHoras += horasActivas;
      totalCosto += costo;
      totalRecargo += (costo - costoSinRec);
      if (!byCargo[emp.cargo]) byCargo[emp.cargo] = { cargo:emp.cargo, empleados:0, horas:0, costo:0, recargo:0 };
      byCargo[emp.cargo].empleados++;
      byCargo[emp.cargo].horas += horasActivas;
      byCargo[emp.cargo].costo += costo;
      byCargo[emp.cargo].recargo += (costo - costoSinRec);
    });

    // ── Empleados trasladados HACIA aquí desde otros locales ──────────────────
    empsTrasladadosAqui.forEach(({ emp, diasAqui }) => {
      const horasAqui = diasAqui.reduce((s, d) => s + d.horas, 0);
      const vc = valoresCargo[emp.cargo] || { hora: 0, mes: 0, bono: 0 };
      const bonoProrrateo = diasHabiles > 0 && vc.bono > 0 ? (vc.bono / diasHabiles) * diasAqui.length : 0;
      let costoBase = 0, costoSinRec = 0;
      diasAqui.forEach(d => {
        const factor = factorDia(d.fecha);
        if (vc.hora > 0) { costoBase += d.horas * vc.hora * factor; costoSinRec += d.horas * vc.hora; }
        else if (vc.mes > 0 && diasHabiles > 0) { const vd = vc.mes / diasHabiles; costoBase += vd * factor; costoSinRec += vd; }
      });
      const costo = costoBase + bonoProrrateo;
      totalHoras += horasAqui;
      totalCosto += costo;
      totalRecargo += (costo - costoSinRec);
      if (!byCargo[emp.cargo]) byCargo[emp.cargo] = { cargo:emp.cargo, empleados:0, horas:0, costo:0, recargo:0 };
      byCargo[emp.cargo].empleados++;
      byCargo[emp.cargo].horas += horasAqui;
      byCargo[emp.cargo].costo += costo;
      byCargo[emp.cargo].recargo += (costo - costoSinRec);
    });

    // ── Horas Extra solicitudes ───────────────────────────────────────────────
    const heDelPeriodo = solicitudes.filter(sol =>
      sol.marca === marca &&
      semana.fechasDias.includes(sol.fecha) &&
      sol.estado !== "rechazada"
    );
    const costoHESolicitudes = heDelPeriodo.reduce((s, sol) => s + parseFloat(sol.costo_estimado || 0), 0);
    const horasHESolicitudes = heDelPeriodo.reduce((s, sol) => s + parseFloat(sol.horas || 0), 0);

    return {
      byCargo: Object.values(byCargo),
      totalHoras: totalHoras + horasHESolicitudes,
      totalCosto: totalCosto + costoHESolicitudes,
      totalRecargo,
      costoHESolicitudes,
      horasHESolicitudes,
      heDelPeriodo,
      empsTrasladados: empsTrasladadosAqui.length,
    };
  }, [semana, semanas, marca, valoresCargo, diasHabiles, recargos, feriados, solicitudes, empsTrasladadosAqui]);

  // ── Labor por día con recargos + cruce con ventas ───────────────────────────
  const porDia = useMemo(() => {
    if (!semana) return [];
    const traslados = semana.traslados || [];
    const map = {};
    semana.fechasDias.forEach(f => {
      const esDom = esDomingo(f), esSab = esSabado(f), esFer = esFeriado(f);
      const tipo = esFer ? "feriado" : esDom ? "domingo" : esSab ? "sabado" : "normal";
      const factor = factorDia(f);
      map[f] = { fecha:f, horas:0, costoBase:0, costoTotal:0, recargo:0, empleados:0, trabajando:[], tipo, factor };
    });

    // Empleados propios (excluyendo días trasladados fuera)
    semana.empleados.forEach(emp => {
      emp.dias.forEach(d => {
        if (!map[d.fecha] || d.estado !== "trabajo") return;
        const tr = traslados.find(t => t.rut === emp.rut && t.fecha === d.fecha);
        if (tr && tr.localDestino !== semana.uploadLocal) return;
        const det = calcCostoDia(emp, d.fecha);
        map[d.fecha].horas      += d.horas;
        map[d.fecha].costoBase  += det.base;
        map[d.fecha].costoTotal += det.total;
        map[d.fecha].recargo    += det.recargo;
        map[d.fecha].empleados++;
        map[d.fecha].trabajando.push({
          nombre: emp.nombre, cargo: emp.cargo, turno: d.turno, horas: d.horas,
          costoBase: det.base, recargo: det.recargo, total: det.total, factor: det.factor,
          trasladado: false,
        });
      });
    });

    // Empleados trasladados HACIA aquí
    empsTrasladadosAqui.forEach(({ emp, diasAqui, origenLocal }) => {
      diasAqui.forEach(d => {
        if (!map[d.fecha]) return;
        const det = calcCostoDia(emp, d.fecha);
        map[d.fecha].horas      += d.horas;
        map[d.fecha].costoBase  += det.base;
        map[d.fecha].costoTotal += det.total;
        map[d.fecha].recargo    += det.recargo;
        map[d.fecha].empleados++;
        map[d.fecha].trabajando.push({
          nombre: emp.nombre, cargo: emp.cargo, turno: d.turno, horas: d.horas,
          costoBase: det.base, recargo: det.recargo, total: det.total, factor: det.factor,
          trasladado: true, origenLocal,
        });
      });
    });

    // HE solicitudes
    solicitudes.filter(sol =>
      sol.marca === marca &&
      semana.fechasDias.includes(sol.fecha) &&
      sol.estado !== "rechazada"
    ).forEach(sol => {
      if (map[sol.fecha]) {
        map[sol.fecha].costoTotal += parseFloat(sol.costo_estimado || 0);
        map[sol.fecha].horasHE = (map[sol.fecha].horasHE || 0) + parseFloat(sol.horas || 0);
        map[sol.fecha].costoHE = (map[sol.fecha].costoHE || 0) + parseFloat(sol.costo_estimado || 0);
      }
    });
    return Object.values(map).sort((a,b) => a.fecha > b.fecha ? 1 : -1);
  }, [semana, semanas, marca, valoresCargo, diasHabiles, recargos, feriados, solicitudes, empsTrasladadosAqui]);

  const DIAS_ES = ["Lun","Mar","Mié","Jue","Vie","Sáb","Dom"];

  // ── RENDER ──────────────────────────────────────────────────────────────────
  if (!semanasMarca.length) {
    // ── Dashboard sintético para locales sin archivo propio (ej. Heladería) ──
    const localViendo = vistaLocalEfectiva;
    const localesM = LOCALES_POR_MARCA[marca] || LOCALES;

    // Reunir todas las semanas de la marca (de OTROS locales) que tienen traslados hacia localViendo
    const semanasConTraslados = semanas.filter(s =>
      s.marca === marca &&
      (s.traslados || []).some(t => t.localDestino === localViendo)
    );

    // Calcular factor recargo (necesita las helpers que ya existen más abajo, replicamos inline)
    const esDom  = f => new Date(f+"T12:00:00").getDay() === 0;
    const esSab  = f => new Date(f+"T12:00:00").getDay() === 6;
    const esFer  = f => feriados.includes(f);
    const factor = f => {
      if (esFer(f)  && recargos.feriado?.activo)  return 1 + recargos.feriado.pct / 100;
      if (esDom(f)  && recargos.domingo?.activo)  return 1 + recargos.domingo.pct / 100;
      if (esSab(f)  && recargos.sabado?.activo)   return 1 + recargos.sabado.pct  / 100;
      return 1;
    };
    const costoDia = (emp, dia) => {
      const vc = valoresCargo[emp.cargo] || { hora:0, mes:0, bono:0 };
      const f  = factor(dia.fecha);
      if (vc.hora > 0) return dia.horas * vc.hora * f;
      if (vc.mes > 0 && diasHabiles > 0) return (vc.mes / diasHabiles) * f;
      return 0;
    };

    // Agrupar por semana → días → empleados
    const porSemana = semanasConTraslados.map(s => {
      const trasAqui = (s.traslados || []).filter(t => t.localDestino === localViendo);
      const fechasSet = new Set(trasAqui.map(t => t.fecha));
      const DIAS_ES = ["Lun","Mar","Mié","Jue","Vie","Sáb","Dom"];

      const emps = [];
      s.empleados.forEach(emp => {
        const diasAqui = emp.dias.filter(d =>
          d.estado === "trabajo" && fechasSet.has(d.fecha) &&
          trasAqui.some(t => t.rut === emp.rut && t.fecha === d.fecha)
        );
        if (!diasAqui.length) return;
        const horas = diasAqui.reduce((a,d)=>a+d.horas,0);
        const costo = diasAqui.reduce((a,d)=>a+costoDia(emp,d),0);
        const bono  = diasHabiles > 0 && (valoresCargo[emp.cargo]?.bono||0) > 0
          ? (valoresCargo[emp.cargo].bono / diasHabiles) * diasAqui.length : 0;
        emps.push({ emp, diasAqui, horas, costo: costo + bono });
      });

      const totalH = emps.reduce((a,e)=>a+e.horas,0);
      const totalC = emps.reduce((a,e)=>a+e.costo,0);

      // porDia map para el detalle
      const diaMap = {};
      s.fechasDias.filter(f=>fechasSet.has(f)).forEach(f => {
        diaMap[f] = { fecha:f, horas:0, costo:0, empleados:[], tipo: esFer(f)?"feriado":esDom(f)?"domingo":esSab(f)?"sabado":"normal" };
      });
      emps.forEach(({emp,diasAqui,costo}) => {
        diasAqui.forEach(d => {
          if (!diaMap[d.fecha]) return;
          diaMap[d.fecha].horas += d.horas;
          diaMap[d.fecha].costo += costoDia(emp, d);
          diaMap[d.fecha].empleados.push({ nombre: emp.nombre, cargo: emp.cargo, horas: d.horas, turno: d.turno });
        });
      });

      return {
        semana: s.semana, inicio: s.inicio, fin: s.fin,
        origenLocal: s.uploadLocal,
        emps, totalH, totalC,
        dias: Object.values(diaMap).sort((a,b)=>a.fecha>b.fecha?1:-1),
      };
    }).filter(s => s.emps.length > 0)
      .sort((a,b) => b.inicio > a.inicio ? 1 : -1);

    const DIAS_ES = ["Lun","Mar","Mié","Jue","Vie","Sáb","Dom"];
    const totalHAll = porSemana.reduce((a,s)=>a+s.totalH,0);
    const totalCAll = porSemana.reduce((a,s)=>a+s.totalC,0);

    return (
      <div className="fade" style={{ paddingBottom:90 }}>
        <LogoHeader marca={marca} />
        <SectionTitle color={m.color}>🏭 Control de Labor</SectionTitle>

        {/* Selector de local + botón subir */}
        <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:6, background:"#F8FAFC", borderRadius:10, padding:"8px 12px" }}>
          <span style={{ fontSize:11, color:"#64748B", flexShrink:0 }}>Ver tienda:</span>
          <select value={vistaLocalEfectiva} onChange={e=>{ setVistaLocal(e.target.value); setUploadLocal(e.target.value); setSemSel(0); }}
            style={{ flex:1, fontSize:12, padding:"6px 8px", fontFamily:"Nunito", fontWeight:700,
              border:"1.5px solid #E2E8F0", borderRadius:9 }}>
            {localesM.map(l=><option key={l} value={l}>{nombreCortoLocal(l)||l}</option>)}
          </select>
          <div style={{ position:"relative", flexShrink:0 }}>
            <input type="file" accept=".xlsx,.xls" onChange={handleFile}
              style={{ position:"absolute", inset:0, opacity:0, cursor:"pointer", width:"100%", height:"100%" }} />
            <button style={{ background:m.color, border:"none", borderRadius:10, padding:"7px 11px",
              color:"#fff", fontFamily:"Nunito", fontWeight:700, fontSize:11, cursor:"pointer" }}>
              {loading?"⏳":"📂 Subir"}
            </button>
          </div>
        </div>
        {/* Indicador de local que recibirá el archivo */}
        <div style={{ marginBottom:10, fontSize:10, color:"#94A3B8", paddingLeft:4 }}>
          📂 Al subir, el archivo se asignará a <strong style={{ color:"#475569" }}>{nombreCortoLocal(uploadLocal)}</strong> como fallback (si el ERP no indica sucursal)
        </div>

        {error && <div style={{ marginBottom:10, padding:"8px 12px", borderRadius:9,
          background:error.startsWith("✅")?"#F0FDF4":"#FEF2F2",
          color:error.startsWith("✅")?"#166534":"#991B1B",
          fontFamily:"Nunito", fontSize:12, fontWeight:700 }}>{error}</div>}

        {porSemana.length === 0 ? (
          <Card style={{ textAlign:"center", padding:32 }}>
            <div style={{ fontSize:32, marginBottom:12 }}>🔀</div>
            <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:14, color:"#475569", marginBottom:6 }}>
              Sin traslados hacia {nombreCortoLocal(localViendo)}
            </div>
            <div style={{ fontFamily:"Nunito", fontSize:12, color:"#94A3B8", lineHeight:1.6 }}>
              Esta tienda no tiene archivo de horario propio.<br/>
              Para ver personal aquí, configura traslados desde otra tienda<br/>
              en <strong>Labor → 👥 Empleados</strong>.
            </div>
          </Card>
        ) : (
          <>
            {/* KPIs globales */}
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:12 }}>
              <Card style={{ position:"relative", overflow:"hidden" }}>
                <div style={{ position:"absolute", top:0, left:0, right:0, height:3, background:m.color }} />
                <div style={{ fontSize:9, color:"#94A3B8", fontWeight:700, textTransform:"uppercase" }}>Total horas</div>
                <div style={{ fontSize:26, fontFamily:"Nunito", fontWeight:900, color:m.color }}>{fmtH(totalHAll)}</div>
                <div style={{ fontSize:11, color:"#94A3B8" }}>{porSemana.length} sem. con traslados</div>
              </Card>
              <Card style={{ position:"relative", overflow:"hidden" }}>
                <div style={{ position:"absolute", top:0, left:0, right:0, height:3, background:"#EF4444" }} />
                <div style={{ fontSize:9, color:"#94A3B8", fontWeight:700, textTransform:"uppercase" }}>Costo total</div>
                <div style={{ fontSize:22, fontFamily:"Nunito", fontWeight:900, color:totalCAll>0?"#EF4444":"#94A3B8" }}>
                  {totalCAll > 0 ? fmtCLP(totalCAll) : "—"}
                </div>
                {totalCAll === 0 && <div style={{ fontSize:10, color:"#94A3B8" }}>Configura valores en ⚙️</div>}
              </Card>
            </div>

            {/* Detalle por semana */}
            {porSemana.map((s, si) => (
              <Card key={si} style={{ marginBottom:12 }}>
                {/* Header semana */}
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
                  <div>
                    <div style={{ fontFamily:"Nunito", fontWeight:900, fontSize:13, color:"#1A1D2E" }}>
                      Sem {s.semana}: {s.inicio.slice(5)} → {s.fin.slice(5)}
                    </div>
                    <div style={{ fontFamily:"Nunito", fontSize:10, color:"#94A3B8" }}>
                      Trasladados desde {nombreCortoLocal(s.origenLocal)}
                    </div>
                  </div>
                  <div style={{ textAlign:"right" }}>
                    <div style={{ fontFamily:"Nunito", fontWeight:900, fontSize:15, color:m.color }}>{fmtH(s.totalH)}</div>
                    {s.totalC > 0 && <div style={{ fontFamily:"Nunito", fontSize:12, fontWeight:700, color:"#EF4444" }}>{fmtCLP(s.totalC)}</div>}
                  </div>
                </div>

                {/* Empleados trasladados */}
                <div style={{ marginBottom:10 }}>
                  {s.emps.map(({emp, diasAqui, horas, costo}, ei) => {
                    const cc = cargoColor(emp.cargo);
                    return (
                      <div key={ei} style={{ display:"flex", justifyContent:"space-between", alignItems:"center",
                        padding:"6px 8px", background: cc.bg, borderRadius:8, marginBottom:4 }}>
                        <div>
                          <span style={{ fontFamily:"Nunito", fontWeight:800, fontSize:12 }}>
                            {emp.nombre.split(" ").slice(0,3).join(" ")}
                          </span>
                          <span style={{ background:cc.color+"22", color:cc.color, borderRadius:4, padding:"1px 6px",
                            fontSize:9, fontWeight:700, marginLeft:6 }}>{emp.cargo}</span>
                          <div style={{ fontFamily:"Nunito", fontSize:10, color:"#94A3B8", marginTop:1 }}>
                            {diasAqui.map(d => {
                              const idx = ["2026-06-08","2026-06-09","2026-06-10","2026-06-11","2026-06-12","2026-06-13","2026-06-14"].indexOf(d.fecha);
                              const dow = new Date(d.fecha+"T12:00:00").getDay();
                              const dNames = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
                              return `${dNames[dow]} ${d.fecha.slice(5)}`;
                            }).join(" · ")}
                          </div>
                        </div>
                        <div style={{ textAlign:"right" }}>
                          <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:12, color:m.color }}>{fmtH(horas)}</div>
                          {costo > 0 && <div style={{ fontFamily:"Nunito", fontSize:10, fontWeight:700, color:"#EF4444" }}>{fmtCLP(costo)}</div>}
                        </div>
                      </div>
                    );
                  })}
                </div>

                {/* Detalle por día */}
                <div style={{ borderTop:"1.5px solid #F1F5F9", paddingTop:8 }}>
                  <div style={{ fontFamily:"Nunito", fontSize:10, color:"#94A3B8", fontWeight:700, marginBottom:6, textTransform:"uppercase" }}>
                    Por día
                  </div>
                  <div style={{ display:"grid", gridTemplateColumns:"repeat(7,minmax(0,1fr))", gap:3 }}>
                    {s.dias.map((dia, di) => {
                      const dow = new Date(dia.fecha+"T12:00:00").getDay();
                      const dNames = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
                      const bgColor = dia.tipo==="feriado"?"#FEE2E2":dia.tipo==="domingo"?"#FEF3C7":dia.tipo==="sabado"?"#F5F3FF":"#F8FAFC";
                      return (
                        <div key={dia.fecha} style={{ background:bgColor, borderRadius:7, padding:"5px 3px", textAlign:"center",
                          border:`1px solid ${dia.tipo!=="normal"?"#FDE68A":"#E2E8F0"}` }}>
                          <div style={{ fontSize:8, fontWeight:800, color:"#64748B" }}>{dNames[dow]}</div>
                          <div style={{ fontSize:7, color:"#94A3B8" }}>{dia.fecha.slice(5)}</div>
                          {dia.horas > 0 ? (
                            <>
                              <div style={{ fontSize:10, fontWeight:900, color:m.color, fontFamily:"Nunito" }}>{fmtH(dia.horas)}</div>
                              <div style={{ fontSize:8, color:"#94A3B8" }}>{dia.empleados.length}p</div>
                              {dia.costo > 0 && <div style={{ fontSize:7, fontWeight:700, color:"#EF4444" }}>{fmtCLP(dia.costo).replace("$","")}</div>}
                            </>
                          ) : (
                            <div style={{ fontSize:8, color:"#CBD5E1", marginTop:4 }}>—</div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>
              </Card>
            ))}
          </>
        )}
      </div>
    );
  }

  return (
    <div className="fade" style={{ paddingBottom:90 }}>
      <LogoHeader marca={marca} />
      <SectionTitle color={m.color}>🏭 Control de Labor</SectionTitle>

      {/* Selector de tienda — muestra todos los locales de la marca */}
      {(LOCALES_POR_MARCA[marca]||LOCALES).length > 1 && (
        <div style={{ display:"flex", gap:5, marginBottom:12, overflowX:"auto", paddingBottom:2 }}>
          {(LOCALES_POR_MARCA[marca]||LOCALES).map(l => {
            const tieneArchivo = semanasMarcaTodas.some(s => s.uploadLocal === l);
            const esSel = l === vistaLocalEfectiva;
            return (
              <button key={l} onClick={() => { setVistaLocal(l); setSemSel(0); }}
                style={{
                  flexShrink:0, background: esSel ? m.color : "#fff",
                  color: esSel ? "#fff" : tieneArchivo ? "#1A1D2E" : "#94A3B8",
                  border: `1.5px solid ${esSel ? m.color : tieneArchivo ? "#E2E8F0" : "#F1F5F9"}`,
                  borderRadius:10, padding:"7px 12px", fontFamily:"Nunito", fontWeight:800,
                  fontSize:11, cursor:"pointer", whiteSpace:"nowrap",
                  display:"flex", alignItems:"center", gap:4,
                }}>
                {nombreCortoLocal(l)}
                {tieneArchivo
                  ? <span style={{ background: esSel?"rgba(255,255,255,0.3)":m.color+"22", color: esSel?"#fff":m.color, borderRadius:6, padding:"1px 5px", fontSize:9, fontWeight:700 }}>
                      {semanasMarcaTodas.filter(s=>s.uploadLocal===l).length}
                    </span>
                  : <span style={{ fontSize:9, color: esSel?"rgba(255,255,255,0.7)":"#94A3B8" }}>🔀</span>
                }
              </button>
            );
          })}
        </div>
      )}

      {/* Selector de semana + subir nuevo */}
      <div style={{ display:"flex", gap:8, marginBottom:8, alignItems:"center" }}>
        <select value={semSel} onChange={e => setSemSel(parseInt(e.target.value))}
          style={{ flex:1, fontWeight:700, fontSize:12 }}>
          {semanasMarca.map((s,i) => {
            const localLabel = nombreCortoLocal(s.uploadLocal||s.sucursal||"") || "?";
            return (
              <option key={i} value={i}>
                Sem {s.semana}: {s.inicio.slice(5)} → {s.fin.slice(5)} · {localLabel} ({s.empleados?.length||0} emp.)
              </option>
            );
          })}
        </select>
        <div style={{ position:"relative", flexShrink:0 }}>
          <input type="file" accept=".xlsx,.xls" onChange={handleFile}
            style={{ position:"absolute", inset:0, opacity:0, cursor:"pointer", width:"100%", height:"100%" }} />
          <button style={{ background:m.color, border:"none", borderRadius:10, padding:"8px 12px", color:"#fff", fontFamily:"Nunito", fontWeight:700, fontSize:12, cursor:"pointer" }}>
            {loading ? "⏳" : "📂 Subir"}
          </button>
        </div>
      </div>

      {/* Feedback del último upload */}
      {error && (
        <div style={{ marginBottom:8, padding:"8px 12px", borderRadius:9,
          background: error.startsWith("✅") ? "#F0FDF4" : "#FEF2F2",
          border: `1px solid ${error.startsWith("✅") ? "#86EFAC" : "#FECACA"}`,
          color: error.startsWith("✅") ? "#166534" : "#991B1B",
          fontFamily:"Nunito", fontSize:12, fontWeight:700 }}>
          {error}
        </div>
      )}

      {/* Tabs */}
      <div style={{ display:"flex", gap:6, marginBottom:14, overflowX:"auto", paddingBottom:2 }}>
        {[["resumen","📊 Resumen"],["calendario","📆 Calendario"],["vslabor","💹 Labor/Venta"],["empleados","👥 Empleados"],["personal","➕ Personal"],["licencias","🏥 Licencias"]].map(([k,l]) => (
          <Btn key={k} onClick={() => setTab(k)} color={m.color} outline={tab!==k} small>{l}</Btn>
        ))}
      </div>

      {/* ─── RESUMEN ─── */}
      {tab === "resumen" && resumen && (
        <>
          {/* Semana actual */}
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:10 }}>
            <Card style={{ position:"relative", overflow:"hidden" }}>
              <div style={{ position:"absolute", top:0, left:0, right:0, height:3, background:m.color }} />
              <div style={{ fontSize:9, color:"#94A3B8", fontWeight:700, textTransform:"uppercase", letterSpacing:.8 }}>Horas semana</div>
              <div style={{ fontSize:26, fontFamily:"Nunito", fontWeight:900, color:m.color }}>{fmtH(resumen.totalHoras)}</div>
              <div style={{ fontSize:11, color:"#94A3B8" }}>
                {semana.empleados.length} propios
                {resumen.empsTrasladados > 0 && (
                  <span style={{ marginLeft:5, color:"#16A34A", fontWeight:700 }}>
                    +{resumen.empsTrasladados} 🔀
                  </span>
                )}
              </div>
            </Card>
            <Card style={{ position:"relative", overflow:"hidden" }}>
              <div style={{ position:"absolute", top:0, left:0, right:0, height:3, background:"#EF4444" }} />
              <div style={{ fontSize:9, color:"#94A3B8", fontWeight:700, textTransform:"uppercase", letterSpacing:.8 }}>Costo semana</div>
              <div style={{ fontSize:22, fontFamily:"Nunito", fontWeight:900, color:"#EF4444" }}>
                {resumen.totalCosto > 0 ? fmtCLP(resumen.totalCosto) : "—"}
              </div>
              {resumen.totalRecargo > 0 && <div style={{ fontSize:10, color:"#F59E0B", fontWeight:700 }}>+{fmtCLP(resumen.totalRecargo)} rec.</div>}
              {resumen.costoHESolicitudes > 0 && <div style={{ fontSize:10, color:"#6C63FF", fontWeight:700 }}>+{fmtCLP(resumen.costoHESolicitudes)} HE</div>}
              {resumen.totalCosto === 0 && <div style={{ fontSize:10, color:"#94A3B8" }}>Configura valores en ⚙️</div>}
            </Card>
          </div>
          {/* Banner de traslados recibidos */}
          {resumen.empsTrasladados > 0 && (
            <div style={{ background:"#F0FDF4", border:"1.5px solid #86EFAC", borderRadius:10, padding:"8px 12px", marginBottom:10, display:"flex", alignItems:"center", gap:8 }}>
              <span style={{ fontSize:16 }}>🔀</span>
              <div style={{ fontFamily:"Nunito", fontSize:12 }}>
                <span style={{ fontWeight:800, color:"#15803D" }}>{resumen.empsTrasladados} empleado{resumen.empsTrasladados > 1 ? "s" : ""} trasladado{resumen.empsTrasladados > 1 ? "s" : ""} hacia esta tienda</span>
                <div style={{ fontSize:10, color:"#86EFAC99" }}>
                  {empsTrasladadosAqui.map(({emp, origenLocal}) =>
                    `${emp.nombre.split(" ").slice(0,2).join(" ")} (${nombreCortoLocal(origenLocal)})`
                  ).join(" · ")}
                </div>
              </div>
            </div>
          )}
          {/* Acumulado mes en curso */}
          {(() => {
            const mesActual = semana.inicio ? semana.inicio.slice(0,7) : today().slice(0,7);
            const semsDelMes = semanasMarca.filter(s => s.inicio?.slice(0,7) === mesActual || s.fin?.slice(0,7) === mesActual);
            let horasMes = 0, costoMes = 0, recargoMes = 0;
            semsDelMes.forEach(sem => {
              sem.empleados.forEach(emp => {
                horasMes += emp.horas_calc;
                const c = calcCosto(emp);
                costoMes += c;
                const sinRec = emp.dias.reduce((s, d) => {
                  if (d.estado !== "trabajo") return s;
                  const vc = valoresCargo[emp.cargo] || { hora:0, mes:0 };
                  if (vc.hora > 0) return s + d.horas * vc.hora;
                  if (vc.mes > 0 && diasHabiles > 0) return s + vc.mes / diasHabiles;
                  return s;
                }, 0);
                recargoMes += (c - sinRec);
              });
            });
            if (semsDelMes.length <= 1) return null;
            const ventaMesBruta = ventas.filter(v => v.marca === marca && v.fecha.slice(0,7) === mesActual)
                                   .reduce((s,v) => s + parseFloat(v.venta_bruta||0), 0);
            const ventaMes = ventaMesBruta / 1.19;
            const ratioMes = ventaMes > 0 ? (costoMes / ventaMes) * 100 : 0;
            const META = (() => { try { return parseFloat(localStorage.getItem("horreo_meta_labor_pct")) || 28; } catch { return 28; } })();
            const rc = ratioMes === 0 ? "#94A3B8" : ratioMes <= META ? "#22C55E" : "#EF4444";
            return (
              <Card style={{ marginBottom:10, border:`1.5px solid ${m.color}33`, background:m.color+"08" }}>
                <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:12, color:m.color, marginBottom:8 }}>
                  📅 Acumulado {mesActual} — {semsDelMes.length} semanas
                </div>
                <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:"clamp(4px,1.2vw,8px)" }}>
                  <div>
                    <div style={{ fontSize:9, color:"#94A3B8", fontWeight:700 }}>HORAS MES</div>
                    <div style={{ fontSize:16, fontFamily:"Nunito", fontWeight:900, color:m.color }}>{fmtH(horasMes)}</div>
                  </div>
                  <div>
                    <div style={{ fontSize:9, color:"#94A3B8", fontWeight:700 }}>COSTO MES</div>
                    <div style={{ fontSize:14, fontFamily:"Nunito", fontWeight:900, color:"#EF4444" }}>{costoMes > 0 ? fmtCLP(costoMes) : "—"}</div>
                    {recargoMes > 0 && <div style={{ fontSize:9, color:"#F59E0B" }}>+{fmtCLP(recargoMes)} rec.</div>}
                  </div>
                  <div>
                    <div style={{ fontSize:9, color:"#94A3B8", fontWeight:700 }}>% LABOR</div>
                    <div style={{ fontSize:16, fontFamily:"Nunito", fontWeight:900, color:rc }}>{ratioMes > 0 ? ratioMes.toFixed(1)+"%" : "—"}</div>
                    {ventaMes > 0 && <div style={{ fontSize:9, color:"#94A3B8" }}>{fmtCLP(ventaMes)} neta</div>}
                  </div>
                </div>
              </Card>
            );
          })()}


          {/* Por cargo */}
          <Card style={{ marginBottom:14 }}>
            <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:14, marginBottom:12 }}>Desglose por cargo</div>
            {resumen.byCargo.map(bc => {
              const cc = cargoColor(bc.cargo);
              return (
                <div key={bc.cargo} style={{ background:cc.bg, border:`1.5px solid ${cc.color}33`, borderRadius:10, padding:"10px 12px", marginBottom:8 }}>
                  <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}>
                    <div>
                      <span style={{ fontFamily:"Nunito", fontWeight:800, fontSize:13, color:cc.color }}>{bc.cargo}</span>
                      <span style={{ fontSize:10, color:"#94A3B8", marginLeft:8 }}>{bc.empleados} persona{bc.empleados>1?"s":""}</span>
                    </div>
                    <div style={{ textAlign:"right" }}>
                      <div style={{ fontSize:14, fontWeight:800, fontFamily:"Nunito", color:cc.color }}>{fmtH(bc.horas)}</div>
                      {bc.costo > 0 && (
                    <div style={{ fontSize:11, fontWeight:700 }}>
                      <span style={{ color:"#EF4444" }}>{fmtCLP(bc.costo)}</span>
                      {bc.recargo > 0 && <span style={{ color:"#F59E0B", marginLeft:5, fontSize:10 }}>+{fmtCLP(bc.recargo)}</span>}
                    </div>
                  )}
                    </div>
                  </div>
                  <div style={{ height:6, background:"#E2E8F0", borderRadius:6 }}>
                    <div style={{ height:"100%", width:`${Math.min(100,(bc.horas/resumen.totalHoras)*100)}%`, background:cc.color, borderRadius:6 }} />
                  </div>
                </div>
              );
            })}
          </Card>

          {/* Ausencias de la semana */}
          {(() => {
            const ausentes = semana.empleados.filter(emp => emp.dias.some(d => d.estado !== "libre" && d.estado !== "trabajo"));
            if (!ausentes.length) return null;
            return (
              <Card style={{ border:"1.5px solid #FECACA", background:"#FEF2F2" }}>
                <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:13, color:"#EF4444", marginBottom:8 }}>⚠️ Ausencias / Incidencias</div>
                {ausentes.map(emp => {
                  const dias = emp.dias.filter(d => d.estado !== "libre" && d.estado !== "trabajo");
                  return (
                    <div key={emp.rut} style={{ fontSize:11, padding:"4px 0", borderBottom:"1px solid #FEE2E2" }}>
                      <span style={{ fontWeight:700 }}>{emp.nombre.split(" ").slice(0,2).join(" ")}</span>
                      <span style={{ color:"#94A3B8", marginLeft:6 }}>{dias.length}d ausente —</span>

      {/* ─── CALENDARIO SEMANAL ─── */}
      {tab === "calendario" && (

                    <div style={{ fontSize:8, color:"#94A3B8" }}>{dia.empleados>0?dia.empleados+"p":""}</div>
                    {dia.tipo==="domingo"&&<div style={{ fontSize:7, color:"#D97706", fontWeight:700 }}>DOM</div>}
                    {dia.tipo==="feriado"&&<div style={{ fontSize:7, color:"#EF4444", fontWeight:700 }}>FER</div>}
                  </div>

            </div>
            <div style={{ display:"flex", gap:10, marginTop:8, flexWrap:"wrap" }}>
              <div style={{ fontSize:9, color:"#64748B" }}>🟢 ≤{metaLaborPct||28}% &nbsp; 🟡 ≤{Math.round((metaLaborPct||28)*1.15)}% &nbsp; 🔴 >{Math.round((metaLaborPct||28)*1.15)}%</div>
            </div>
          </Card>

          {/* Acumulado de horas por cargo */}
          {resumen && resumen.byCargo && resumen.byCargo.length > 0 && (
            <Card style={{ marginBottom:14 }}>
              <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:13, marginBottom:12 }}>
                👷 Acumulado semanal por cargo
              </div>
              {/* Total semana */}
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8, marginBottom:12 }}>
                <div style={{ background:"#F8FAFC", borderRadius:10, padding:"8px 10px", textAlign:"center" }}>
                  <div style={{ fontSize:9, color:"#94A3B8", fontWeight:700, textTransform:"uppercase" }}>Total horas</div>
                  <div style={{ fontFamily:"Nunito", fontWeight:900, fontSize:18, color:m.color }}>{fmtH(resumen.totalHoras)}</div>
                </div>
                <div style={{ background:"#FEF2F2", borderRadius:10, padding:"8px 10px", textAlign:"center" }}>
                  <div style={{ fontSize:9, color:"#94A3B8", fontWeight:700, textTransform:"uppercase" }}>Costo labor</div>
                  <div style={{ fontFamily:"Nunito", fontWeight:900, fontSize:16, color:"#EF4444" }}>
                    {resumen.totalCosto > 0 ? fmtCLP(resumen.totalCosto) : "—"}
                  </div>
                  {resumen.totalRecargo > 0 && <div style={{ fontSize:9, color:"#F59E0B" }}>+{fmtCLP(resumen.totalRecargo)} rec.</div>}
                </div>
                <div style={{ background:"#F8FAFC", borderRadius:10, padding:"8px 10px", textAlign:"center" }}>
                  <div style={{ fontSize:9, color:"#94A3B8", fontWeight:700, textTransform:"uppercase" }}>Personas</div>
                  <div style={{ fontFamily:"Nunito", fontWeight:900, fontSize:18, color:"#6C63FF" }}>{semana?.empleados?.length || 0}</div>

              </div>
              {/* Por cargo */}
              {resumen.byCargo.map(bc => {

                  <div style={{ display:"flex", alignItems:"center", gap:5 }}>

                    {dia.tipo === "sabado" && recargos.sabado?.activo && <span style={{ background:"#EDE9FE", color:"#7C3AED", borderRadius:4, padding:"1px 5px", fontSize:9, fontWeight:700 }}>SÁB +{recargos.sabado?.pct}%</span>}
                    {dia.tipo === "feriado" && <span style={{ background:"#FEE2E2", color:"#EF4444", borderRadius:4, padding:"1px 5px", fontSize:9, fontWeight:700 }}>FERIADO +{recargos.feriado?.pct}%</span>}

                        <div>
                          <span style={{ fontWeight:600 }}>{t.nombre.split(" ").slice(0,2).join(" ")}</span>
                          <span style={{ background:cc.bg, color:cc.color, borderRadius:4, padding:"1px 5px", fontSize:9, fontWeight:700, marginLeft:5 }}>{t.cargo}</span>
                          {t.trasladado && <span style={{ background:"#DCFCE7", color:"#16A34A", borderRadius:4, padding:"1px 5px", fontSize:9, fontWeight:700, marginLeft:4 }}>

                          {t.total > 0 && <div style={{ fontSize:9, color:"#EF4444", fontWeight:700 }}>{fmtCLP(t.total)}</div>}
                        </div>
                      </div>

              )}
            </details>
          ))}
        </>
      )}

      {/* ─── LABOR vs VENTA ─── */}
      {tab === "vslabor" && (() => {
        const META_LABOR_PCT = Number(metaLaborPct) || 28;
        const localSemana = semana?.uploadLocal || "";
        // Ventas de la semana filtradas por fecha Y local de la semana actual
        const ventaSem = (semana?.fechasDias?.reduce((s, f) =>
          s + ventas.filter(v => v.fecha === f && v.marca === marca && v.local === localSemana).reduce((vs,v) => vs + parseFloat(v.venta_bruta||0),0), 0) || 0) / 1.19;
        const ratio = ventaSem > 0 ? (resumen.totalCosto / ventaSem) * 100 : 0;
        const ratioColor = ratio===0 ? "#94A3B8" : ratio<=META_LABOR_PCT ? "#22C55E" : ratio<=META_LABOR_PCT*1.15 ? "#F59E0B" : "#EF4444";

        return (
          <div>
            {/* Resumen semana */}
            {resumen.totalCosto > 0 && (
              <Card style={{ marginBottom:14 }}>
                <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:14, marginBottom:12 }}>
                  Semana {semana?.semana} — {semana?.inicio} → {semana?.fin}

                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8, marginBottom:12 }}>
                  <div><div style={{ fontSize:10, color:"#94A3B8", fontWeight:700 }}>COSTO LABOR</div><div style={{ fontSize:18, fontFamily:"Nunito", fontWeight:900, color:"#EF4444" }}>{fmtCLP(resumen.totalCosto)}</div></div>
                  <div><div style={{ fontSize:10, color:"#94A3B8", fontWeight:700 }}>VENTA NETA SEM.</div><div style={{ fontSize:18, fontFamily:"Nunito", fontWeight:900, color:m.color }}>{ventaSem>0?fmtCLP(ventaSem):"Sin datos"}</div><div style={{ fontSize:9, color:"#94A3B8" }}>Bruta: {fmtCLP(ventaSem*1.19)}</div></div>
                  <div><div style={{ fontSize:10, color:"#94A3B8", fontWeight:700 }}>% LABOR</div><div style={{ fontSize:22, fontFamily:"Nunito", fontWeight:900, color:ratioColor }}>{ratio>0?ratio.toFixed(1)+"%":"—"}</div></div>
                </div>
                {ventaSem > 0 && (
                  <div>
                    <div style={{ display:"flex", justifyContent:"space-between", marginBottom:3 }}>
                      <span style={{ fontSize:11, color:"#64748B" }}>Labor/Venta</span>
                      <span style={{ fontSize:11, fontWeight:700, color:ratioColor }}>{ratio.toFixed(1)}% — meta ≤{META_LABOR_PCT}%</span>
                    </div>
                    <div style={{ height:10, background:"#E2E8F0", borderRadius:10, position:"relative" }}>
                      <div style={{ height:"100%", width:`${Math.min(100,ratio)}%`, background:ratioColor, borderRadius:10, transition:"width .5s" }}/>
                      <div style={{ position:"absolute", top:0, bottom:0, left:`${META_LABOR_PCT}%`, width:2, background:"#1A1D2E" }}/>
                    </div>
                    <div style={{ fontSize:10, color:"#94A3B8", marginTop:3 }}>
                      {ratio<=META_LABOR_PCT ? "✅ Dentro del objetivo" : `⚠️ Sobre meta en ${(ratio-META_LABOR_PCT).toFixed(1)}pp — exceso ${fmtCLP(resumen.totalCosto - ventaSem*META_LABOR_PCT/100)}`}
                    </div>
                  </div>
                )}
                {/* HH extra y causa desvío */}
                {resumen.heDelPeriodo?.length > 0 && (
                  <div style={{ marginTop:10, paddingTop:10, borderTop:"1px solid #F0F4F8" }}>
                    <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:12, marginBottom:6 }}>⏱️ HH Extra aprobadas — causa desvío</div>
                    {resumen.heDelPeriodo.map(sol => (
                      <div key={sol.id} style={{ display:"flex", justifyContent:"space-between", fontSize:11, padding:"3px 0", borderBottom:"1px solid #F8FAFC" }}>

                          {sol.motivo && <div style={{ color:"#64748B", fontSize:10, fontStyle:"italic" }}>{sol.motivo}</div>}
                        </div>
                        <div style={{ textAlign:"right" }}>
                          <div style={{ fontWeight:800, color:"#F59E0B" }}>{sol.horas}h</div>
                          {sol.costo_estimado>0 && <div style={{ fontSize:10, color:"#EF4444" }}>{fmtCLP(sol.costo_estimado)}</div>}
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </Card>
            )}
            {/* Por día */}
            {porDia.filter(d=>d.costoTotal>0||d.horas>0).map((dia,i)=>{
              const ventaDiaBruta = ventas.filter(v=>v.fecha===dia.fecha&&v.marca===marca&&v.local===localSemana).reduce((s,v)=>s+parseFloat(v.venta_bruta||0),0);
              const ventaDia = ventaDiaBruta / 1.19;
              const ratio = ventaDia>0&&dia.costoTotal>0?(dia.costoTotal/ventaDia)*100:0;
              const ratioColor = ratio===0?"#94A3B8":ratio<=META_LABOR_PCT?"#22C55E":ratio<=META_LABOR_PCT*1.15?"#F59E0B":"#EF4444";
              const bgDia = dia.tipo==="feriado"?"#FEF2F2":dia.tipo==="domingo"?"#FFFBEB":"#F8FAFC";
              // Mini desglose por cargo del día
              const byCargoDia = {};
              dia.trabajando.forEach(t => {
                if (!byCargoDia[t.cargo]) byCargoDia[t.cargo] = { horas:0, n:0 };
                byCargoDia[t.cargo].horas += t.horas;
                byCargoDia[t.cargo].n++;
              });
              return (
                <div key={dia.fecha} style={{ background:bgDia, border:"1.5px solid #E2E8F0", borderRadius:12, padding:"10px 14px", marginBottom:8 }}>
                  {/* Header fila */}
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:8 }}>
                    <div style={{ flex:1 }}>
                      <div style={{ display:"flex", alignItems:"center", gap:5, marginBottom:2 }}>
                        <span style={{ fontFamily:"Nunito", fontWeight:800, fontSize:13 }}>{DIAS_ES[i]} {dia.fecha}</span>
                        {dia.tipo==="domingo"&&<span style={{ background:"#FEF3C7", color:"#D97706", borderRadius:4, padding:"1px 5px", fontSize:9, fontWeight:700 }}>+{recargos.domingo?.pct}%</span>}
                        {dia.tipo==="feriado"&&<span style={{ background:"#FEE2E2", color:"#EF4444", borderRadius:4, padding:"1px 5px", fontSize:9, fontWeight:700 }}>FERIADO</span>}
                      </div>
                      <div style={{ fontSize:10, color:"#94A3B8" }}>{dia.empleados} trabajando · {fmtH(dia.horas)}</div>
                    </div>
                    {/* KPIs principales del día */}
                    <div style={{ display:"flex", gap:10, alignItems:"flex-end" }}>
                      {ventaDia > 0 && (
                        <div style={{ textAlign:"right" }}>
                          <div style={{ fontSize:9, color:"#94A3B8", fontWeight:700, textTransform:"uppercase" }}>Venta Neta</div>
                          <div style={{ fontSize:13, fontWeight:800, color:m.color, fontFamily:"Nunito" }}>{fmtCLP(ventaDia)}</div>
                        </div>
                      )}
                      {dia.costoTotal > 0 && (
                        <div style={{ textAlign:"right" }}>
                          <div style={{ fontSize:9, color:"#94A3B8", fontWeight:700, textTransform:"uppercase" }}>Labor</div>
                          <div style={{ fontSize:13, fontWeight:800, color:"#EF4444", fontFamily:"Nunito" }}>{fmtCLP(dia.costoTotal)}</div>
                          {dia.recargo>0 && <div style={{ fontSize:8, color:"#F59E0B" }}>+{fmtCLP(dia.recargo)} rec.</div>}
                        </div>
                      )}
                      {ratio > 0 && (
                        <div style={{ textAlign:"right", background: ratioColor+"18", borderRadius:8, padding:"4px 8px", border:`1.5px solid ${ratioColor}44` }}>
                          <div style={{ fontFamily:"Nunito", fontWeight:900, fontSize:18, color:ratioColor, lineHeight:1 }}>{ratio.toFixed(1)}%</div>
                          <div style={{ fontSize:8, color:ratioColor, fontWeight:700 }}>L/V</div>
                        </div>
                      )}
                    </div>
                  </div>
                  {/* Barra ratio */}
                  {dia.costoTotal > 0 && (
                    <div style={{ marginBottom:8 }}>
                      <div style={{ height:7, background:"#E2E8F0", borderRadius:6, position:"relative", overflow:"hidden" }}>
                        {ratio > 0
                          ? <div style={{ height:"100%", width:`${Math.min(100,ratio)}%`, background:ratioColor, borderRadius:6 }}/>
                          : <div style={{ height:"100%", width:"100%", background:"repeating-linear-gradient(90deg,#E2E8F0 0px,#E2E8F0 8px,#F1F5F9 8px,#F1F5F9 16px)" }}/>
                        }
                        <div style={{ position:"absolute", top:0, bottom:0, left:`${META_LABOR_PCT}%`, width:2, background:"#1A1D2E", opacity:.4 }}/>
                      </div>
                      {!ventaDia && dia.costoTotal > 0 && (
                        <div style={{ fontSize:9, color:"#94A3B8", marginTop:3, fontStyle:"italic" }}>Sin venta registrada — no se puede calcular % Labor</div>
                      )}
                      {dia.costoHE > 0 && <div style={{ fontSize:9, color:"#6C63FF", marginTop:2 }}>+{fmtCLP(dia.costoHE)} HH.EE.</div>}
                    </div>
                  )}
                  {/* Mini desglose por cargo */}
                  {Object.keys(byCargoDia).length > 0 && (
                    <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                      {Object.entries(byCargoDia).map(([cargo, d]) => {
                        const cc = cargoColor(cargo);
                        return (
                          <span key={cargo} style={{ background:cc.bg, color:cc.color, borderRadius:6, padding:"2px 8px", fontSize:9, fontWeight:800, fontFamily:"Nunito" }}>
                            {cargo.split(" ")[0]} ×{d.n} · {fmtH(d.horas)}
                          </span>
                        );
                      })}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        );
      })()}

      {/* ─── FOOD COST SEMANAL ─── */}
      {tab === "foodcost" && (
        <Card><div style={{ textAlign:"center", padding:"20px 0", fontFamily:"Nunito", color:"#64748B" }}>
          🍔 El Food Cost se encuentra en la sección <strong style={{color:"#FF6B00"}}>🍔 Food Cost</strong> del menú inferior.
        </div></Card>
      )}
      {/* ─── POR MES ─── */}
      {tab === "empleados" && <GestorTraslados marca={marca} m={m} semana={semana} semanas={semanas} setSemanas={setSemanas} />}
      {tab === "personal"   && <PersonalAdicional marca={marca} m={m} valoresCargo={valoresCargo} personalAdicional={personalAdicional} setPersonalAdicional={setPersonalAdicional} />}
      {tab === "licencias"  && <GestionLicencias marca={marca} m={m} valoresCargo={valoresCargo} licencias={licencias} setLicencias={setLicencias} diasAlerta={5} />}
      {/* Config movido a ⚙️ Config → tab Labor */}
      {tab === "config" && (
        <Card>
          <div style={{ textAlign:"center", padding:"20px 0", fontFamily:"Nunito", color:"#64748B" }}>
            ⚙️ Los parámetros de Labor (valores por cargo, bonos, recargos, metas) se configuran en<br/>
            <strong style={{ color:"#6C63FF" }}>⚙️ Config → 🏭 Labor</strong>
          </div>
        </Card>
      )}
    </div>
  );
}
