// ══════════════════════════════════════════════════════════════════════════════
// INVENTARIO ERP UPLOADER — carga plantilla o inventario completado
// Los lunes y fin de mes sube el inventario ERP para precargar el conteo
// ══════════════════════════════════════════════════════════════════════════════
function InvERPUploader({ marca }) {
  const m = MARCAS[marca] || MARCAS[Object.keys(MARCAS)[0]] || { color:"#6C63FF", nombre:"—" };
  const localesMarca = LOCALES_POR_MARCA[marca] || LOCALES;

  const [loading, setLoading]   = useState(false);
  const [msg, setMsg]           = useState(null);
  const [preview, setPreview]   = useState(null); // { localNombre, formato, items, tieneCantidades }
  const [localDetectado, setLocalDetectado] = useState("");
  const [localManual, setLocalManual]       = useState(localesMarca[0] || "");
  const [stockConteo, setStockConteo]       = useStorage("horreo_conteo_" + marca, {});
  const [conteoFecha, setConteoFecha]       = useStorage("horreo_conteo_fecha_" + marca, {});
  const [histInv, setHistInv]               = useStorage("horreo_inv_hist_" + marca, []); // historial de inventarios

  const handleFile = async (e) => {
    const file = e.target.files[0]; if (!file) return;
    setLoading(true); setMsg(null); setPreview(null);
    try {
      const XLSXL = await loadXLSX();
      const buf   = await file.arrayBuffer();
      const wb    = XLSXL.read(buf, { type:"array" });
      const result = parseInventarioERP(wb);
      if (!result.items || result.items.length === 0) {
        setMsg({ ok:false, text:"❌ No se encontraron productos en el archivo." });
        setLoading(false); e.target.value=""; return;
      }
      setPreview({ ...result, archivo: file.name });
      // Detectar local automáticamente
      const localDet = result.localNombre || "";
      const localMatch = localesMarca.find(l =>
        localDet && (l.toUpperCase().includes(localDet.toUpperCase().slice(0,15)) ||
          localDet.toUpperCase().includes(l.split(" - ").pop()?.toUpperCase().slice(0,10)||""))
      ) || localesMarca[0];
      setLocalDetectado(localDet);
      setLocalManual(localMatch);
      setMsg({ ok:true, text:`✅ ${result.items.length} productos detectados · Formato: ${result.formato === "completado" ? "inventario con cantidades" : "plantilla vacía (se precargará la lista para contar)"}` });
    } catch(err) {
      setMsg({ ok:false, text:"❌ Error al leer: " + err.message });
    }
    setLoading(false); e.target.value="";
  };

  const handleCargar = () => {
    if (!preview) return;
    const local = localManual;
    const fechaHoy = today();

    if (preview.tieneCantidades) {
      // Cargar stock real desde inventario completado
      const newConteo = { ...stockConteo };
      let cargados = 0;
      preview.items.forEach(it => {
        if (it.cantFound && it.cantidad >= 0) {
          newConteo[local + "||" + it.nombre] = it.cantidad;
          cargados++;
        }
      });
      setStockConteo(newConteo);
      setConteoFecha(prev => ({ ...prev, [local]: fechaHoy }));
      // Guardar en historial
      setHistInv(prev => [
        { fecha: fechaHoy, local, archivo: preview.archivo, items: cargados, tipo: "completado" },
        ...prev.slice(0, 19)
      ]);
      setMsg({ ok:true, text:`✅ ${cargados} cantidades de stock cargadas para ${nombreCortoLocal(local)} · Fecha: ${fechaHoy}` });
    } else {
      // Plantilla vacía → precargar lista de productos (stock = -1 = "no contado")
      // Solo agrega productos al catálogo del conteo, NO borra stocks existentes
      const newConteo = { ...stockConteo };
      let precargados = 0;
      preview.items.forEach(it => {
        const key = local + "||" + it.nombre;
        if (!(key in newConteo)) {
          // No sobreescribir si ya tiene valor
          newConteo[key] = -1; // -1 = aparece en lista pero sin contar
          precargados++;
        }
      });
      setStockConteo(newConteo);
      setHistInv(prev => [
        { fecha: fechaHoy, local, archivo: preview.archivo, items: preview.items.length, tipo: "plantilla" },
        ...prev.slice(0, 19)
      ]);
      setMsg({ ok:true, text:`✅ Lista de ${preview.items.length} productos cargada para ${nombreCortoLocal(local)} · Ve a Pedidos → Conteo para ingresar las cantidades` });
    }
    setPreview(null);
  };

  return (
    <div style={{ paddingBottom:20 }}>
      {/* Instrucción principal */}
      <Card style={{ marginBottom:12, background:"linear-gradient(135deg,#1A1D2E,#2D1F3D)", border:"none" }}>
        <div style={{ fontFamily:"Nunito", fontWeight:900, fontSize:14, color:"#fff", marginBottom:8 }}>
          📦 Inventario ERP → App
        </div>
        <div style={{ fontFamily:"Nunito", fontSize:11, color:"rgba(255,255,255,0.7)", lineHeight:1.8 }}>
          Sube el <b style={{color:"#6EE7B7"}}>Inventario General</b> exportado del ERP (lunes y fin de mes).<br/>
          <b style={{color:"#FCD34D"}}>Con cantidades:</b> el stock se carga directo al módulo de Pedidos.<br/>
          <b style={{color:"#93C5FD"}}>Sin cantidades (plantilla):</b> se precarga la lista para contar desde el móvil.
        </div>
      </Card>

      {/* Upload */}
      <Card style={{ marginBottom:12 }}>
        <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:13, color:m.color, marginBottom:12 }}>
          📂 Seleccionar archivo
        </div>
        <label style={{ display:"block", background:m.color, color:"#fff", borderRadius:12, padding:"13px 0", textAlign:"center", fontFamily:"Nunito", fontWeight:800, fontSize:14, cursor:"pointer" }}>
          {loading ? "⏳ Leyendo inventario..." : "📤 Seleccionar Inventario General (.xlsx)"}
          <input type="file" accept=".xlsx,.xls" onChange={handleFile} style={{ display:"none" }} />
        </label>

        {msg && (
          <div style={{ marginTop:10, padding:"10px 12px", borderRadius:10,
            background:msg.ok?"#F0FDF4":"#FEF2F2", color:msg.ok?"#166534":"#DC2626",
            fontFamily:"Nunito", fontSize:12, fontWeight:700, lineHeight:1.5 }}>
            {msg.text}
          </div>
        )}
      </Card>

      {/* Preview y confirmación */}
      {preview && (
        <Card style={{ marginBottom:12, border:`1.5px solid ${m.color}44` }}>
          <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:13, color:m.color, marginBottom:12 }}>
            👁 Vista previa
          </div>

          {/* Info detectada */}
          <div style={{ background:"#F8FAFC", borderRadius:10, padding:"10px 12px", marginBottom:12 }}>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
              {[
                ["Local detectado", localDetectado || "No detectado"],
                ["Formato", preview.tieneCantidades ? "📊 Con cantidades" : "📋 Plantilla vacía"],
                ["Productos", preview.items.length + " ítems"],
                ["Archivo", preview.archivo?.slice(0,25)+"..."],
              ].map(([l,v]) => (
                <div key={l}>
                  <div style={{ fontFamily:"Nunito", fontSize:9, color:"#94A3B8", fontWeight:700, textTransform:"uppercase" }}>{l}</div>
                  <div style={{ fontFamily:"Nunito", fontSize:11, color:"#1A1D2E", fontWeight:800 }}>{v}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Selector de local (para confirmar o corregir) */}
          <Field label="Cargar para este local">
            <select value={localManual} onChange={e=>setLocalManual(e.target.value)}>
              {localesMarca.map(l=><option key={l} value={l}>{nombreCortoLocal(l)}</option>)}
            </select>
          </Field>

          {/* Muestra primeros 5 productos */}
          <div style={{ marginBottom:12 }}>
            <div style={{ fontFamily:"Nunito", fontSize:10, color:"#94A3B8", fontWeight:700, marginBottom:6, textTransform:"uppercase" }}>
              Primeros productos
            </div>
            {preview.items.slice(0,5).map((it,i) => (
              <div key={i} style={{ display:"flex", justifyContent:"space-between", alignItems:"center",
                padding:"5px 8px", background: i%2===0?"#F8FAFC":"#fff", borderRadius:6, marginBottom:3 }}>
                <div>
                  <span style={{ fontFamily:"Nunito", fontSize:11, fontWeight:700, color:"#1A1D2E" }}>{it.nombre}</span>
                  <span style={{ fontFamily:"Nunito", fontSize:9, color:"#94A3B8", marginLeft:6 }}>{it.pres}</span>
                </div>
                <span style={{ fontFamily:"Nunito", fontSize:11, fontWeight:800,
                  color:it.cantFound?"#22C55E":"#94A3B8" }}>
                  {it.cantFound ? it.cantidad + " " + it.um : it.um}
                </span>
              </div>
            ))}
            {preview.items.length > 5 && (
              <div style={{ fontFamily:"Nunito", fontSize:10, color:"#94A3B8", textAlign:"center", marginTop:4 }}>
                + {preview.items.length - 5} productos más
              </div>
            )}
          </div>

          <div style={{ display:"flex", gap:8 }}>
            <Btn color={m.color} full onClick={handleCargar}>
              {preview.tieneCantidades ? "💾 Cargar stock en Pedidos" : "📋 Precargar lista para contar"}
            </Btn>
            <Btn color="#94A3B8" outline small onClick={()=>setPreview(null)}>✕</Btn>
          </div>
        </Card>
      )}

      {/* Historial de inventarios cargados */}
      {histInv.length > 0 && (
        <Card>
          <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:12, color:"#1A1D2E", marginBottom:10 }}>
            📋 Historial de inventarios cargados
          </div>
          {histInv.map((h, i) => (
            <div key={i} style={{ display:"flex", justifyContent:"space-between", alignItems:"center",
              padding:"8px 0", borderBottom: i < histInv.length-1 ? "1px solid #F1F5F9" : "none" }}>
              <div>
                <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:12, color:"#1A1D2E" }}>
                  {nombreCortoLocal(h.local)}
                </div>
                <div style={{ fontFamily:"Nunito", fontSize:10, color:"#94A3B8" }}>
                  {h.archivo?.slice(0,30)} · {h.items} productos
                </div>
              </div>
              <div style={{ textAlign:"right", flexShrink:0, marginLeft:8 }}>
                <div style={{ fontFamily:"Nunito", fontSize:11, fontWeight:800, color: h.tipo==="completado"?"#22C55E":"#6C63FF" }}>
                  {h.tipo==="completado"?"📊 Stock":"📋 Lista"}
                </div>
                <div style={{ fontFamily:"Nunito", fontSize:10, color:"#94A3B8" }}>{h.fecha}</div>
              </div>
            </div>
          ))}
        </Card>
      )}

      {/* Acceso rápido al Back Office */}
      <Card style={{ marginTop:12, background:"#EFF6FF", border:"1.5px solid #BFDBFE" }}>
        <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:12, color:"#1D4ED8", marginBottom:4 }}>
          📊 Back Office ERP (compras y proveedores)
        </div>
        <div style={{ fontFamily:"Nunito", fontSize:11, color:"#64748B", lineHeight:1.6 }}>
          Se carga desde el módulo <b>Importar</b> (botón arriba en la app). Actualiza el historial de precios y proveedores en Pedidos. Súbelo una vez al mes.
        </div>
      </Card>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// CARGA CENTRALIZADA — agrupa Planilla Costos + Costo Teórico + Inventario ERP
// ══════════════════════════════════════════════════════════════════════════════
function CargaCentralizada({ marca, planillas, setPlanillas, costoTeorico, setCostoTeorico }) {
  const m = MARCAS[marca] || MARCAS[Object.keys(MARCAS)[0]] || { color:"#6C63FF", nombre:"—" };
  const [subtab, setSubtab] = useState("planilla");

  // Resumen de lo cargado
  const planillasMarca  = (planillas||[]).filter(p => p.marca === marca);
  const ctMarca         = (costoTeorico||[]).filter(r => r.marca === marca);
  const mesesPlan       = [...new Set(planillasMarca.map(p => p.fecha_carga?.slice(0,7)).filter(Boolean))].sort().reverse();
  const periodosCT      = [...new Set(ctMarca.map(r => r.periodo).filter(Boolean))].sort().reverse();

  const SubBtn = ({ id, icon, label, count }) => (
    <button onClick={()=>setSubtab(id)}
      style={{ flex:1, background: subtab===id ? m.color : "#F8FAFC",
        color: subtab===id ? "#fff" : "#475569",
        border: `1.5px solid ${subtab===id ? m.color : "#E2E8F0"}`,
        borderRadius:12, padding:"10px 6px", fontFamily:"Nunito", fontWeight:800,
        fontSize:11, cursor:"pointer", position:"relative", textAlign:"center" }}>
      <div style={{ fontSize:16 }}>{icon}</div>
      <div>{label}</div>
      {count > 0 && (
        <span style={{ position:"absolute", top:-5, right:-5, background:"#22C55E",
          color:"#fff", borderRadius:10, padding:"1px 6px", fontSize:9, fontWeight:800 }}>
          {count}
        </span>
      )}
    </button>
  );

  return (
    <div style={{ paddingBottom:20 }}>
      {/* Selector de tipo de carga */}
      <div style={{ display:"flex", gap:8, marginBottom:14 }}>
        <SubBtn id="planilla" icon="📊" label="Planilla Costos" count={mesesPlan.length} />
        <SubBtn id="teorico"  icon="📈" label="Costo Teórico"   count={periodosCT.length} />
        <SubBtn id="invERP"   icon="📦" label="Inventario ERP"  count={0} />
      </div>

      {/* Estado actual */}
      <Card style={{ marginBottom:14, background:"#F8FAFC", border:"1px solid #E2E8F0" }}>
        <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:11, color:"#475569", marginBottom:8, textTransform:"uppercase", letterSpacing:.5 }}>
          📋 Datos cargados para {m.nombre}
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8 }}>
          {[
            ["Planilla Costos", mesesPlan.length > 0 ? `${mesesPlan.length} mes${mesesPlan.length!==1?"es":""}` : "Sin datos", mesesPlan[0]||"—", "#6C63FF"],
            ["Costo Teórico",   periodosCT.length > 0 ? `${periodosCT.length} período${periodosCT.length!==1?"s":""}` : "Sin datos", periodosCT[0]||"—", "#F59E0B"],
            (() => {
            try {
              const histInvRaw = localStorage.getItem("horreo_inv_hist_" + marca);
              const histInv = histInvRaw ? JSON.parse(histInvRaw) : [];
              const ult = histInv[0];
              return ["Inventario ERP", ult ? ult.fecha : "Sin subir", ult ? nombreCortoLocal(ult.local) : "578 productos catálogo", "#22C55E"];
            } catch { return ["Inventario ERP", "Sin subir", "578 productos catálogo", "#22C55E"]; }
          })(),
          ].map(([label,val,sub,color])=>(
            <div key={label} style={{ textAlign:"center" }}>
              <div style={{ fontFamily:"Nunito", fontSize:9, color:"#94A3B8", fontWeight:700, textTransform:"uppercase" }}>{label}</div>
              <div style={{ fontFamily:"Nunito", fontWeight:900, fontSize:13, color }}>{val}</div>
              <div style={{ fontFamily:"Nunito", fontSize:9, color:"#94A3B8" }}>{sub}</div>
            </div>
          ))}
        </div>
      </Card>

      {/* Contenido según subtab */}
      {subtab === "planilla" && (
        <CargarPlanillaCostos marca={marca} planillas={planillas} setPlanillas={setPlanillas} />
      )}
      {subtab === "teorico" && (
        <CostoTeoricoUpload marca={marca} costoTeorico={costoTeorico} setCostoTeorico={setCostoTeorico} />
      )}
      {subtab === "invERP" && <InvERPUploader marca={marca} />}
    </div>
  );
}

function FoodCostSection({ marca, desviaciones, setDesviaciones, planillas, setPlanillas, ventas, costoTeorico, setCostoTeorico, config }) {
  const [tab, setTab] = useState("dashboard");
  const m = MARCAS[marca] || MARCAS[Object.keys(MARCAS)[0]] || { color: "#6C63FF", bg: "#F0EEFF", emoji: "🌭", textColor: "#fff", nombre: "—" };
  const tabs = [
    { id: "dashboard",    icon: "📊", label: "Dashboard"      },
    { id: "carga",        icon: "📥", label: "Cargar Datos"   },
    { id: "costoreal",    icon: "💰", label: "Costo Real"     },
    { id: "produccion",   icon: "🍳", label: "Producción"     },
    { id: "pedidos",      icon: "🚚", label: "Pedidos"        },
    { id: "mermas",       icon: "📉", label: "Mermas"         },
    { id: "desviaciones", icon: "📋", label: "Desviaciones"   },
    { id: "inventario",   icon: "📦", label: "Inventario IA"  },
  ];
  return (
    <div>
      <div style={{ display:"flex", gap:5, marginBottom:14, background:"#fff", borderRadius:14, padding:5, boxShadow:"0 2px 8px rgba(0,0,0,0.06)", overflowX:"auto" }}>
        {tabs.map(t => (
          <button key={t.id} onClick={()=>setTab(t.id)}
            style={{ flex:"0 0 auto", background: tab===t.id ? m.color : "transparent", color: tab===t.id ? "#fff" : "#64748B", border:"none", borderRadius:10, padding:"8px 12px", fontFamily:"Nunito", fontWeight:800, fontSize:12, cursor:"pointer", transition:"all .18s", display:"flex", alignItems:"center", gap:5, whiteSpace:"nowrap" }}>
            {t.icon} {t.label}
          </button>
        ))}
      </div>
      {tab === "dashboard"    && <DashboardFoodCost    marca={marca} planillas={planillas} costoTeorico={costoTeorico} />}
      {tab === "carga"        && <CargaCentralizada    marca={marca} planillas={planillas} setPlanillas={setPlanillas} costoTeorico={costoTeorico} setCostoTeorico={setCostoTeorico} />}
      {tab === "costoreal"    && <CostoRealModule      marca={marca} ventas={ventas} />}
      {tab === "produccion"   && <ParProduccion        marca={marca} ventas={ventas} />}
      {tab === "pedidos"      && <SugerenciaPedidos    marca={marca} ventas={ventas} />}
      {tab === "mermas"       && <MermasColaciones     marca={marca} />}
      {tab === "desviaciones" && <Desviaciones         marca={marca} desviaciones={desviaciones} setDesviaciones={setDesviaciones} />}
      {tab === "inventario"   && <InventarioIA         marca={marca} config={config} />}
    </div>
  );
}



// ══════════════════════════════════════════════════════════════════════════════
// APP ROOT
// ══════════════════════════════════════════════════════════════════════════════
function App() {
  const [page, setPage]         = useState("dashboard");
  const [marca, setMarca]       = useStorage(KEYS.marca, "doggis");
  const [dark, setDark]         = useDarkMode();
  const [ventas, setVentas]     = useSupabase(KEYS.ventas, []);
  const [kpis, setKpis]         = useSupabase(KEYS.kpi, []);
  const [invs, setInvs]         = useStorage(KEYS.inv, []);
  const [metas, setMetas]       = useSupabase(KEYS.metas, []);
  const [metasd, setMetasd]     = useSupabase(KEYS.metasd, []);
  const [desviaciones, setDesv] = useSupabase("horreo_desviaciones", []);
  const [planillas, setPlanillas] = useSupabase("horreo_planillas_costos", []);
  const [costoTeorico, setCostoTeorico] = useSupabase("horreo_costo_teorico", []);
  const [syncLog, setSyncLog]   = useStorage(KEYS.syncLog, []);
  const [config, setConfig]     = useCloudSetting("horreo_config", { appsScriptUrl: "", sheetId: "", supabaseUrl: "", supabaseKey: "" });
  const [semanas, setSemanas]   = useSupabase("horreo_labor_semanas", []);
  const [heSolicitudes, setHeSolicitudes] = useSupabase(KEYS.heSol, []);
  const [importOpen, setImportOpen] = useState(false);
  const [session, setSession]   = useState(() => getSession());
  const [syncing, setSyncing]   = useState(false);
  const sbActivo                = useSBStatus();

  // Setters para sync manual
  const syncSetters = {
    [KEYS.ventas]:                  setVentas,
    [KEYS.kpi]:                     setKpis,
    [KEYS.metas]:                   setMetas,
    [KEYS.metasd]:                  setMetasd,
    "horreo_desviaciones":          setDesv,
    "horreo_planillas_costos":      setPlanillas,
    [KEYS.heSol]:                   setHeSolicitudes,
    "horreo_labor_semanas":         setSemanas,
    "horreo_costo_teorico":         setCostoTeorico,
  };

  const handleSync = async () => {
    if (!sbActivo) return;
    setSyncing(true);
    await syncDesdeSupabase(syncSetters);
    setSyncing(false);
  };

  // Cuando se guarda config nueva con Supabase, resetear el cliente
  const handleSetConfig = useCallback(cfg => {
    setConfig(cfg);
    resetSB();
  }, []);

  // Si la marca del usuario no incluye la marca actual, cambiar a la primera permitida
  useEffect(() => {
    if (session && session.marcas && !session.marcas.includes(marca)) {
      setMarca(session.marcas[0]);
    }
  }, [session]);

  // Normalizar marca: si el valor guardado no existe en MARCAS, resetear a la primera válida
  useEffect(() => {
    if (!MARCAS[marca]) {
      const fallback = (session?.marcas || []).find(m => MARCAS[m]) || Object.keys(MARCAS)[0];
      if (fallback) setMarca(fallback);
    }
  }, [marca]);

  // Reparar marca en ventas y kpis cuyos registros tengan marca incorrecta o faltante
  // (puede ocurrir si los datos fueron importados con una versión anterior)
  useEffect(() => {
    // Construir mapa local -> marca desde LOCALES_DATA
    const localAMarca = {};
    LOCALES_DATA.forEach(l => { if (l.marca) localAMarca[l.nombre.toLowerCase()] = l.marca; });
    const reparar = (registros) => {
      let cambios = false;
      const reparados = registros.map(r => {
        const marcaCorrecta = localAMarca[r.local?.toLowerCase()];
        if (marcaCorrecta && r.marca !== marcaCorrecta) { cambios = true; return { ...r, marca: marcaCorrecta }; }
        return r;
      });
      return cambios ? reparados : null;
    };
    const ventasRep = reparar(ventas);
    if (ventasRep) { console.log("[Reparar] Corrigiendo marca en ventas"); setVentas(ventasRep); }
    const kpisRep = reparar(kpis);
    if (kpisRep) { console.log("[Reparar] Corrigiendo marca en kpis"); setKpis(kpisRep); }
  }, []); // solo al montar

  const handleLogin = (u) => { setSession(u); };
  const handleLogout = () => { clearSession(); setSession(null); setPage("dashboard"); };

  if (!session) return <Login onLogin={handleLogin} />;

  const permisos = ROL_PERMISOS[session.rol] || ROL_PERMISOS.operador;
  const navVisible = NAVITEMS.filter(n => permisos.includes(n.id));
  const pageActual = permisos.includes(page) ? page : "dashboard";

  const totalRegistros = ventas.length + kpis.length;

  const renderPage = () => {
    switch(pageActual) {
      case "honorarios":  return <BoletaHonorarios marca={marca} session={session} />;
      case "dashboard":  return <Dashboard ventas={ventas} kpis={kpis} inventarios={invs} metas={metas} metasDiarias={metasd} marca={marca} planillas={planillas} semanas={semanas} costoTeorico={costoTeorico} config={config} session={session} />;
      case "ventas":     return <FormVentas ventas={ventas} setVentas={setVentas} metasDiarias={metasd} metas={metas} syncLog={syncLog} setSyncLog={setSyncLog} marca={marca} config={config} />;
      case "he":         return <HorasExtra ventas={ventas} marca={marca} solicitudes={heSolicitudes} setSolicitudes={setHeSolicitudes} session={session} config={config} syncLog={syncLog} setSyncLog={setSyncLog} />;
      case "honorarios": return <BoletaHonorarios marca={marca} session={session} />;
      case "labor":      return <ControlLabor marca={marca} ventas={ventas} solicitudes={heSolicitudes} semanas={semanas} setSemanas={setSemanas} />;
      case "foodcost":   return <FoodCostSection marca={marca} desviaciones={desviaciones} setDesviaciones={setDesv} planillas={planillas} setPlanillas={setPlanillas} ventas={ventas} costoTeorico={costoTeorico} setCostoTeorico={setCostoTeorico} config={config} />;
      case "kpi":        return <FormKPI kpis={kpis} setKpis={setKpis} syncLog={syncLog} setSyncLog={setSyncLog} marca={marca} config={config} />;
      case "importar":   return <Importar setVentas={setVentas} setMetas={setMetas} setMetasd={setMetasd} setKpis={setKpis} marca={marca} />;
      case "historial":  return <Historial ventas={ventas} kpis={kpis} inventarios={invs} setVentas={setVentas} setKpis={setKpis} setInventarios={setInvs} marca={marca} semanas={semanas} setSemanas={setSemanas} planillas={planillas} setPlanillas={setPlanillas} session={session} costoTeorico={costoTeorico} setCostoTeorico={setCostoTeorico} />;
      case "alertas":    return <CentroAlertas session={session} marca={marca} />;
      case "config":     return <Config config={config} setConfig={handleSetConfig} />;
      default:           return <Dashboard ventas={ventas} kpis={kpis} inventarios={invs} metas={metas} metasDiarias={metasd} marca={marca} planillas={planillas} semanas={semanas} costoTeorico={costoTeorico} session={session} />;
    }
  };

  const mc = MARCAS[marca] || MARCAS[Object.keys(MARCAS)[0]] || { color: "#6C63FF", bg: "#F0EEFF", emoji: "🌭", textColor: "#fff" };

  return (
    <>
      <GS />
      <MailModal />
      <CSVModal />
      <ShareModal />

      {/* ── Modal Importar centralizado ── */}
      {importOpen && (
        <div style={{ position:"fixed", inset:0, zIndex:500, background:"rgba(0,0,0,0.5)", display:"flex", alignItems:"flex-end", justifyContent:"center" }}
          onClick={e => { if(e.target===e.currentTarget) setImportOpen(false); }}>
          <div style={{ background:"#F4F6FA", borderRadius:"20px 20px 0 0", width:"100%", maxWidth:680, maxHeight:"90vh", overflowY:"auto", padding:"16px 16px 0" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
              <div style={{ fontFamily:"Nunito", fontWeight:900, fontSize:16 }}>📥 Importar datos</div>
              <button onClick={()=>setImportOpen(false)} style={{ background:"#F1F5F9", border:"none", borderRadius:10, padding:"6px 14px", fontFamily:"Nunito", fontWeight:700, fontSize:13, color:"#64748B", cursor:"pointer" }}>✕ Cerrar</button>
            </div>
            <Importar setVentas={setVentas} setMetas={setMetas} setMetasd={setMetasd} setKpis={setKpis} marca={marca} onDone={()=>setImportOpen(false)} />
          </div>
        </div>
      )}

      <div style={{ maxWidth:680, margin:"0 auto", padding:"14px var(--pad-x,14px) 0", minHeight:"100vh", background:"var(--bg)", transition:"background .25s" }} className="content-safe content-wrap">
        {/* Header con usuario y logout */}
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
          <MarcaSelector marca={marca} setMarca={m => { if(session.marcas.includes(m)) setMarca(m); }} session={session} />
          <div style={{ display:"flex", alignItems:"center", gap:6, flexShrink:0 }}>
            {/* Dark mode toggle */}
            <button onClick={() => setDark(d => !d)} title={dark?"Modo claro":"Modo oscuro"}
              style={{ background:"var(--bg-card)", border:"1.5px solid var(--border)", borderRadius:8, padding:"5px 8px", fontSize:15, cursor:"pointer", lineHeight:1, minHeight:32 }}>
              {dark ? "☀️" : "🌙"}
            </button>
            <div style={{ fontFamily:"Nunito", fontWeight:700, fontSize:10, color:"var(--text-3)", textAlign:"right", lineHeight:1.3 }}>
              <div style={{ color:mc.color }}>{session.nombre}</div>
              <div style={{ textTransform:"uppercase", fontSize:9, letterSpacing:.5 }}>{session.rol}</div>
            </div>
            <button onClick={handleLogout} title="Cerrar sesión"
              style={{ background:"var(--bg-card)", border:"1.5px solid var(--border)", borderRadius:8, padding:"5px 9px", fontFamily:"Nunito", fontWeight:700, fontSize:11, color:"var(--text-3)", cursor:"pointer" }}>
              ↩
            </button>
          </div>
        </div>

        <div style={{ display: "flex", justifyContent: "space-between", alignItems:"center", gap: 6, marginBottom: 14, marginTop: -4 }}>
          <div style={{ display:"flex", gap:6 }}>
            {permisos.includes("importar") && (
              <button onClick={()=>setImportOpen(true)} style={{ background:"#F59E0B", border:"none", borderRadius:10, padding:"6px 12px", fontFamily:"Nunito", fontWeight:800, fontSize:12, color:"#fff", cursor:"pointer", display:"flex", alignItems:"center", gap:4 }}>
                📥 Importar
              </button>
            )}
            {sbActivo && (
              <button onClick={handleSync} disabled={syncing}
                style={{ background: syncing ? "#E2E8F0" : "#10B981", border:"none", borderRadius:10, padding:"6px 12px", fontFamily:"Nunito", fontWeight:800, fontSize:12, color: syncing?"#94A3B8":"#fff", cursor: syncing?"not-allowed":"pointer", display:"flex", alignItems:"center", gap:4, transition:"all .2s" }}>
                {syncing ? "⏳" : "☁️"} {syncing ? "Sync..." : "Sync"}
              </button>
            )}
          </div>
          <div style={{ display:"flex", gap:5, alignItems:"center" }}>
            <Badge text={`${totalRegistros} reg`} color="#6C63FF" small />
            <div style={{ display:"flex", alignItems:"center", gap:4, background: sbActivo?"#F0FDF4":"#F8FAFC", borderRadius:8, padding:"3px 8px", border:`1px solid ${sbActivo?"#86EFAC":"#E2E8F0"}` }}>
              <div style={{ width:6, height:6, borderRadius:"50%", background: sbActivo?"#22C55E":"#CBD5E1", boxShadow: sbActivo?"0 0 4px #22C55E":undefined }} />
              <span style={{ fontFamily:"Nunito", fontWeight:700, fontSize:9, color: sbActivo?"#16A34A":"#94A3B8" }}>{sbActivo ? "EN LÍNEA" : "LOCAL"}</span>
            </div>
          </div>
        </div>
        {renderPage()}
      </div>
      <InstallBanner />
      <Nav active={pageActual} onChange={setPage} marca={marca} items={navVisible} />
    </>
  );
}


    // ── MOUNT ──────────────────────────────────────────────────────────────────
    class ErrorBoundary extends React.Component {
      constructor(p) { super(p); this.state = { err: null }; }
      static getDerivedStateFromError(e) { return { err: e }; }
      render() {
        if (this.state.err) return React.createElement('div', {
          style: { padding: 30, fontFamily: 'monospace', background: '#FEF2F2', color: '#DC2626', margin: 20, borderRadius: 12, fontSize: 13 }
        }, '❌ Error en la app: ' + this.state.err.message + '\n\n' + this.state.err.stack);
        return this.props.children;
      }
    }
    const container = document.getElementById("root");
    const root = ReactDOM.createRoot(container);
    root.render(React.createElement(ErrorBoundary, null, React.createElement(App)));
  </script>
</body>
