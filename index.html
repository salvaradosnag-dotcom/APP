  <!-- Service Worker para cache offline -->
  <script>
    if ('serviceWorker' in navigator) {
      const swCode = `
        const CACHE = 'horreo-v3';
        const SHELL = [self.location.href];

        self.addEventListener('install', e => {
          e.waitUntil(
            caches.open(CACHE).then(c => c.addAll(SHELL)).then(() => self.skipWaiting())
          );
        });

        self.addEventListener('activate', e => {
          e.waitUntil(
            caches.keys().then(keys =>
              Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
            ).then(() => self.clients.claim())
          );
        });

        self.addEventListener('fetch', e => {
          // Solo cachear GET del mismo origen
          if (e.request.method !== 'GET') return;
          const url = new URL(e.request.url);
          // Nunca cachear Supabase, Google Fonts ni APIs externas
          if (url.hostname.includes('supabase') || url.hostname.includes('googleapis') ||
              url.hostname.includes('gstatic') || url.hostname.includes('unpkg')) return;

          e.respondWith(
            caches.match(e.request).then(cached => {
              const network = fetch(e.request).then(res => {
                if (res.ok && url.origin === self.location.origin) {
                  const clone = res.clone();
                  caches.open(CACHE).then(c => c.put(e.request, clone));
                }
                return res;
              }).catch(() => cached);
              return cached || network;
            })
          );
        });
      `;
      const swBlob = new Blob([swCode], {type:'text/javascript'});
      const swUrl  = URL.createObjectURL(swBlob);
      navigator.serviceWorker.register(swUrl, {scope: './'})
        .then(reg => {
          console.log('[SW] Registrado:', reg.scope);
          // Notificar si hay actualización disponible
          reg.addEventListener('updatefound', () => {
            const nw = reg.installing;
            nw.addEventListener('statechange', () => {
              if (nw.state === 'installed' && navigator.serviceWorker.controller) {
                window._swUpdateReady = true;
                window.dispatchEvent(new Event('sw-update-ready'));
              }
            });
          });
        })
        .catch(err => console.warn('[SW] Error:', err));
    }

    // Capturar evento beforeinstallprompt para el banner personalizado
    window._installPrompt = null;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      window._installPrompt = e;
      window.dispatchEvent(new Event('pwa-installable'));
    });
    window.addEventListener('appinstalled', () => {
      window._installPrompt = null;
      window.dispatchEvent(new Event('pwa-installed'));
    });
  </script>

let _XLSX = null;
let _xlsxLoading = false;
let _xlsxCallbacks = [];

async function loadXLSX() {
  if (_XLSX) return _XLSX;
  if (window.XLSX) { _XLSX = window.XLSX; return _XLSX; }
  if (_xlsxLoading) return new Promise((res, rej) => _xlsxCallbacks.push({ res, rej }));
  _xlsxLoading = true;
  return new Promise((res, rej) => {
    _xlsxCallbacks.push({ res, rej });
    const s = document.createElement("script");
    s.src = "https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
    s.onload = () => {
      _XLSX = window.XLSX; _xlsxLoading = false;
      _xlsxCallbacks.forEach(cb => cb.res(_XLSX)); _xlsxCallbacks = [];
    };
    s.onerror = e => {
      _xlsxLoading = false;
      _xlsxCallbacks.forEach(cb => cb.rej(e)); _xlsxCallbacks = [];
    };
    document.head.appendChild(s);
  });
}

// ── Hash SHA-256 de contraseña (Web Crypto API nativa) ───────────────────────
async function hashPass(plain) {
  try {
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(plain));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
  } catch { return plain; } // fallback si crypto no está disponible
}

// ── Verificar contraseña: acepta tanto hash como texto plano (migración) ──────
async function verificarPass(plain, stored) {
  if (!stored) return false;
  // Si el stored tiene 64 chars hex → es hash SHA-256
  if (/^[0-9a-f]{64}$/.test(stored)) {
    const h = await hashPass(plain);
    return h === stored;
  }
  // Legado: texto plano (usuarios base sin migrar)
  return plain === stored;
}

function Login({ onLogin }) {
  const [user, setUser]   = useState("");
  const [pass, setPass]   = useState("");
  const [err, setErr]     = useState("");
  const [loading, setLoading] = useState(false);

  const handle = async () => {
    setLoading(true); setErr("");
    try {
      const extra = (() => { try { return JSON.parse(localStorage.getItem("horreo_usuarios_extra") || "[]"); } catch { return []; } })();
      const todosU = [...USUARIOS, ...extra.filter(u => !USUARIOS.find(b => b.user === u.user))];
      const userNorm = user.trim().toLowerCase();
      const candidate = todosU.find(u => u.user === userNorm);
      if (!candidate) { setErr("Usuario o contraseña incorrectos"); setLoading(false); return; }
      if (candidate.activo === false) { setErr("Usuario desactivado. Contacta al administrador."); setLoading(false); return; }
      const ok = await verificarPass(pass, candidate.passHash || candidate.pass);
      if (ok) { saveSession(candidate); onLogin(candidate); }
      else { setErr("Usuario o contraseña incorrectos"); setLoading(false); }
    } catch(e) { console.warn("[Login]", e.message); setErr("Error al verificar credenciales"); setLoading(false); }
  };

// ── useStorage — sin stale closure, persiste en setData ──────────────────────
// ── useLaborCosto — cálculo centralizado de costo de labor desde semanas ──────
// Usado por Dashboard y ControlLabor para evitar duplicación de lógica
function useLaborCosto(semanas, marca) {
  return useCallback((local, ini) => {
    try {
      const mes = ini.slice(0, 7);
      const valoresCargo = (() => { try { return JSON.parse(localStorage.getItem("horreo_labor_valores") || "{}"); } catch { return {}; } })();
      const semsDelMes = (semanas || []).filter(s =>
        s.marca === marca &&
        s.uploadLocal === local &&
        (s.inicio?.slice(0,7) === mes || s.fin?.slice(0,7) === mes)
      );
      if (!semsDelMes.length) return 0;
      let totalCosto = 0;
      semsDelMes.forEach(sem => {
        (sem.empleados || []).forEach(emp => {
          const vc = valoresCargo[emp.cargo] || { hora: 0, mes: 0, bono: 0 };
          const diasTrabajados = (emp.dias || []).filter(d => d.estado === "trabajo");
          if (vc.hora > 0) {
            diasTrabajados.forEach(d => { totalCosto += (d.horas || 0) * vc.hora; });
          } else if (vc.mes > 0) {
            const diasHabiles = (sem.empleados[0]?.dias || []).filter(d => d.estado !== "libre").length || 20;
            totalCosto += (vc.mes / diasHabiles) * diasTrabajados.length;
          }
          if (vc.bono > 0) {
            const diasHabiles = (sem.empleados[0]?.dias || []).filter(d => d.estado !== "libre").length || 20;
            totalCosto += diasHabiles > 0 ? (vc.bono / diasHabiles) * diasTrabajados.length : 0;
          }
        });
      });
      return totalCosto;
    } catch(e) { console.warn("[useLaborCosto]", e.message); return 0; }
  }, [semanas, marca]);
}

function useStorage(key, init) {
  const [data, setData] = useState(() => {
    try { const r = localStorage.getItem(key); return r ? JSON.parse(r) : init; }
    catch { return init; }
  });
  const save = useCallback(val => {
    setData(prev => {
      const next = typeof val === "function" ? val(prev) : val;
      try { localStorage.setItem(key, JSON.stringify(next)); }
      catch (e) { console.warn(`localStorage lleno (${key}):`, e.message); }
      return next;
    });
  }, [key]);
  return [data, save];
}


// ── useCloudSetting — sincroniza pares clave/valor a tabla app_settings ───────
// Supabase: CREATE TABLE app_settings (id TEXT PRIMARY KEY, value JSONB);
function useCloudSetting(settingKey, init) {
  const [data, setData] = useState(() => {
    try { const r = localStorage.getItem(settingKey); return r ? JSON.parse(r) : init; } catch { return init; }
  });
  const mountedRef = useRef(true);
  useEffect(() => { mountedRef.current = true; return () => { mountedRef.current = false; }; }, []);

  // Load from Supabase on mount
  useEffect(() => {
    const sb = getSB();
    if (!sb) return;
    sb.from("app_settings").select("value").eq("id", settingKey).maybeSingle().then(({ data: row, error }) => {
      if (error || !row) return;
      try {
        const parsed = typeof row.value === "string" ? JSON.parse(row.value) : row.value;
        if (mountedRef.current) {
          setData(parsed);
          localStorage.setItem(settingKey, JSON.stringify(parsed));
          // Sync legacy key for contacto_rapido so getWhatsAppPhone() works offline
          if (settingKey === "horreo_contacto_rapido" && parsed.telefono) {
            try { localStorage.setItem("horreo_wa_rapido", JSON.stringify(parsed)); } catch(e) { console.warn("[cloudSetting legacy sync]", e.message); }
          }
        }
      } catch(e) { console.warn("[Hórreo]", e?.message ?? e); }
    });
    // Realtime — solo si el contexto es seguro
    if (typeof window !== "undefined" && window.isSecureContext === false) {
      return; // sin cleanup necesario
    }
    let ch = null;
    try {
      ch = sb.channel("setting_" + settingKey)
        .on("postgres_changes", { event: "*", schema: "public", table: "app_settings", filter: `id=eq.${settingKey}` }, ({ new: row }) => {
          if (!row || !mountedRef.current) return;
          try { const v = typeof row.value === "string" ? JSON.parse(row.value) : row.value; setData(v); localStorage.setItem(settingKey, JSON.stringify(v)); } catch(e) { console.warn("[Hórreo]", e?.message ?? e); }
        }).subscribe();
    } catch(e) { console.log("cloudSetting realtime no disponible:", settingKey, e.message); }
    return () => { try { if (ch) sb.removeChannel(ch); } catch(e) { console.warn("[Hórreo]", e?.message ?? e); } };
  }, [settingKey]);

  const save = useCallback(val => {
    setData(prev => {
      const next = typeof val === "function" ? val(prev) : val;
      try { localStorage.setItem(settingKey, JSON.stringify(next)); } catch(e) { console.warn("[Hórreo]", e?.message ?? e); }
      // Async upsert to Supabase
      const sb = getSB();
      if (sb) sb.from("app_settings").upsert({ id: settingKey, value: next }, { onConflict: "id" }).then(({ error }) => { if (error) console.warn("cloudSetting upsert", settingKey, error.message); });
      return next;
    });
  }, [settingKey]);

  return [data, save];
}


// ── Supabase client (singleton) ───────────────────────────────────────────────
let _sb = null;
let _sbCfgKey = "";

function getSB() {
  try {
    const cfg = JSON.parse(localStorage.getItem("horreo_config") || "{}");
    const sbUrl = cfg.supabaseUrl || SUPABASE_URL_DEFAULT;
    const sbKey = cfg.supabaseKey || SUPABASE_KEY_DEFAULT;
    if (!sbUrl || !sbKey) return null;
    const cfgKey = sbUrl + sbKey;
    if (_sb && _sbCfgKey === cfgKey) return _sb;
    const lib = window.supabase;
    if (!lib) return null;
    const factory = typeof lib.createClient === "function" ? lib.createClient
                  : typeof lib === "function" ? lib : null;
    if (!factory) return null;
    _sb = factory(sbUrl, sbKey, {
      realtime: { params: { eventsPerSecond: 10 } }
    });
    _sbCfgKey = cfgKey;
    console.log("SB client OK:", sbUrl);
  } catch (e) { console.warn("getSB:", e.message); }
  return _sb;
}
function resetSB() { _sb = null; _sbCfgKey = ""; }

const SB_STATUS = { connected: false, listeners: new Set() };
function setSBConnected(v) {
  if (SB_STATUS.connected === v) return;
  SB_STATUS.connected = v;
  SB_STATUS.listeners.forEach(fn => fn(v));
  if (v) window.dispatchEvent(new Event("sb-ready"));
}
function useSBStatus() {
  const [connected, setConnected] = useState(() => SB_STATUS.connected);
  useEffect(() => {
    setConnected(SB_STATUS.connected);
    SB_STATUS.listeners.add(setConnected);
    return () => SB_STATUS.listeners.delete(setConnected);
  }, []);
  return connected;
}

const SB_TABLE_MAP = {
  "horreo_v2_ventas":              "ventas",
  "horreo_v2_kpi":                 "kpis",
  "horreo_v2_metas":               "metas",
  "horreo_v2_metasd":              "metas_diarias",
  "horreo_desviaciones":           "desviaciones",
  "horreo_planillas_costos":       "planillas_costos",
  "horreo_he_solicitudes":         "he_solicitudes",
  "horreo_labor_semanas":          "labor_semanas",
  "horreo_costo_real_periodos":    "costo_real_periodos",
  "horreo_contactos":              "contactos",
  "horreo_licencias":              "licencias",
  "horreo_personal_adicional":     "personal_adicional",
  "horreo_costo_teorico":          "costo_teorico",
  "horreo_boletas_honorarios":     "boletas_honorarios",
  "horreo_alertas":               "alertas",
};

// Rehydrata campos derivados que no se persisten (fechasDias, traslados)
function rehydrateSemana(row) {
  if (!row || !row.inicio) return row;
  if (!Array.isArray(row.fechasDias) || row.fechasDias.length === 0) {
    try {
      row.fechasDias = Array.from({length:7}, (_,k) => {
        const d = new Date(row.inicio + "T12:00:00");
        d.setDate(d.getDate() + k);
        return d.toISOString().split("T")[0];
      });
    } catch(e) { console.warn("[Hórreo]", e?.message ?? e); }
  }
  if (!Array.isArray(row.traslados)) {
    if (typeof row.traslados === "string") {
      try { row.traslados = JSON.parse(row.traslados); } catch { row.traslados = []; }
    } else {
      row.traslados = [];
    }
  }
  return row;
}

function sbNormRow(r) {
  if (!r || typeof r !== "object") { console.warn("[SB] registro inválido ignorado", r); return null; }
  const row = { ...r };
  if (row.empleados && typeof row.empleados === "string") {
    try { row.empleados = JSON.parse(row.empleados); } catch(e) { console.warn("[SB] sbNormRow empleados:", e?.message ?? e); row.empleados = []; }
  }
  if (row.traslados && typeof row.traslados === "string") {
    try { row.traslados = JSON.parse(row.traslados); } catch(e) { console.warn("[SB] sbNormRow traslados:", e?.message ?? e); row.traslados = []; }
  }
  if ("uploadLocal" in row || "inicio" in row) rehydrateSemana(row);
  return row;
}

function sbPrepRow(r) {
  const row = { ...r };
  // Campos derivados / internos — no se persisten en Supabase
  delete row.fechasDias;
  delete row._base;         // flag interno de usuarios base
  delete row.leido_por;     // campo de mensajes (no en SB)
  if (row.empleados && typeof row.empleados !== "string") row.empleados = JSON.stringify(row.empleados);
  if (row.traslados && typeof row.traslados !== "string") row.traslados = JSON.stringify(row.traslados);
  // Arrays u objetos que no tienen columna en SB → serializar o eliminar
  for (const [k, v] of Object.entries(row)) {
    if (v === "" || v === undefined) { row[k] = null; continue; }
    if (Array.isArray(v) && k !== "empleados" && k !== "traslados") { delete row[k]; continue; }
  }
  return row;
}

function useSupabase(key, init) {
  const tabla = SB_TABLE_MAP[key];
  const [data, _setData] = useState(() => {
    try {
      const r = localStorage.getItem(key);
      if (!r) return init;
      const parsed = JSON.parse(r);
      // Rehydrate derived fields for labor_semanas
      if (key === "horreo_labor_semanas" && Array.isArray(parsed)) {
        return parsed.map(s => rehydrateSemana({...s}));
      }
      return parsed;
    } catch { return init; }
  });
  const dataRef = useRef(data);

  const applyData = (rows) => {
    // Rehydrate derived fields for labor_semanas
    const parsed = (key === "horreo_labor_semanas" && Array.isArray(rows))
      ? rows.map(s => rehydrateSemana({...s}))
      : rows;
    dataRef.current = parsed;
    _setData(parsed);
    try { localStorage.setItem(key, JSON.stringify(parsed)); } catch(e) { console.warn("[Hórreo]", e?.message ?? e); }
  };

  useEffect(() => {
    if (!tabla) return;
    let cancelled = false;
    let channel = null;

    const run = async (sb) => {
      if (!sb || cancelled) { console.warn("[SB] no disponible para", tabla); return; }

      // carga inicial
      try {
        const { data: rows, error } = await sb.from(tabla).select("*");
        if (cancelled) return;
        if (error) {
          // Error de schema/columna: NO sobreescribir localStorage (mantener datos locales)
          console.warn("[SB] load error", tabla, error.message);
        } else {
          const sbRows = rows.map(sbNormRow).filter(Boolean);
          const localLen = Array.isArray(dataRef.current) ? dataRef.current.length : 0;
          if (sbRows.length > 0 || localLen === 0) {
            // Supabase tiene datos O local también vacío → aplicar resultado de SB
            applyData(sbRows);
          } else {
            // SB vacío pero local tiene datos → subir silenciosamente sin borrar local
            console.log("[SB]", tabla, "vacío en nube pero", localLen, "registros locales → subiendo...");
            const prepared = dataRef.current.map(sbPrepRow).filter(r => r && r.id);
            if (prepared.length > 0) {
              sb.from(tabla).upsert(prepared, { onConflict: "id" })
                .then(({ error: e2 }) => {
                  if (e2) console.warn("[SB] upsert local→nube", tabla, e2.message);
                  else console.log("[SB] subidos", prepared.length, "reg locales a", tabla);
                });
            }
          }
          setSBConnected(true);
          console.log("[SB] loaded", tabla, sbRows.length, "sb / local:", localLen);
        }
      } catch(e) { console.warn("[SB] load exception", tabla, e.message); }

      // realtime — solo si el contexto es seguro (https o localhost)
      if (cancelled) return;
      const canRealtime = typeof window !== "undefined" && (window.isSecureContext !== false);
      if (!canRealtime) { console.log("SB realtime desactivado (contexto inseguro):", tabla); return; }
      try {
        channel = sb.channel("horreo_" + tabla)
          .on("postgres_changes", { event: "INSERT", schema: "public", table: tabla }, ({ new: row }) => {
            if (cancelled) return;
            const norm = sbNormRow(row);
            _setData(prev => {
              if (prev.find(r => r.id === norm.id)) return prev;
              const next = [...prev, norm];
              dataRef.current = next;
              try { localStorage.setItem(key, JSON.stringify(next)); } catch(e) { console.warn("[Hórreo]", e?.message ?? e); }
              return next;
            });
          })
          .on("postgres_changes", { event: "UPDATE", schema: "public", table: tabla }, ({ new: row }) => {
            if (cancelled) return;
            const norm = sbNormRow(row);
            _setData(prev => {
              const next = prev.map(r => r.id === norm.id ? norm : r);
              dataRef.current = next;
              try { localStorage.setItem(key, JSON.stringify(next)); } catch(e) { console.warn("[Hórreo]", e?.message ?? e); }
              return next;
            });
          })
          .on("postgres_changes", { event: "DELETE", schema: "public", table: tabla }, ({ old: row }) => {
            if (cancelled) return;
            _setData(prev => {
              const next = prev.filter(r => r.id !== row.id);
              dataRef.current = next;
              try { localStorage.setItem(key, JSON.stringify(next)); } catch(e) { console.warn("[Hórreo]", e?.message ?? e); }
              return next;
            });
          })
          .subscribe(status => {
            if (status === "SUBSCRIBED") setSBConnected(true);
            if (status === "CHANNEL_ERROR" || status === "TIMED_OUT") setSBConnected(false);
          });
      } catch(e) { console.warn("SB realtime", tabla, e.message); }
    };

    // Iniciar: si SB ya está listo, correr de inmediato; si no, esperar evento sb-ready
    const initSB = () => { const sb = getSB(); if (sb && !cancelled) run(sb); };
    if (getSB()) { initSB(); }
    else { window.addEventListener("sb-ready", initSB, { once: true }); }
    return () => {
      cancelled = true;
      window.removeEventListener("sb-ready", initSB);
      try { if (channel) getSB()?.removeChannel(channel); } catch(e) { console.warn("[Hórreo]", e?.message ?? e); }
    };
  }, [key, tabla]);

  const save = useCallback((val) => {
    _setData(prev => {
      const next = typeof val === "function" ? val(prev) : val;
      dataRef.current = next;
      try { localStorage.setItem(key, JSON.stringify(next)); } catch(e) { console.warn("[Hórreo]", e?.message ?? e); }
      if (tabla && Array.isArray(next)) {
        const sb = getSB();
        if (sb) {
          const prevMap = Object.fromEntries((Array.isArray(prev) ? prev : []).map(r => [r.id, JSON.stringify(sbPrepRow(r))]));
          const dirty = next.filter(r => !prevMap[r.id] || prevMap[r.id] !== JSON.stringify(sbPrepRow(r)));
          if (dirty.length > 0) {
            sb.from(tabla).upsert(dirty.map(sbPrepRow), { onConflict: "id" })
              .then(({ error }) => {
                if (error) console.warn("SB upsert", tabla, error.message);
                else console.log("SB upsert OK", tabla, dirty.length, "rows");
              });
          }
        }
      }
      return next;
    });
  }, [key, tabla]);

  return [data, save];
}


// Hard-delete en Supabase — elimina por id de la tabla correspondiente
async function sbDelete(tabla, id) {
  try {
    const sb = getSB();
    if (!sb) return;
    const { error } = await sb.from(tabla).delete().eq("id", id);
    if (error) console.warn("SB delete", tabla, error.message);
    else console.log("SB delete OK", tabla, id);
  } catch(e) { console.warn("SB delete exception", e.message); }
}

// Eliminar múltiples por condición (ej: todos los de un local+fecha)
async function sbDeleteWhere(tabla, filters) {
  try {
    const sb = getSB();
    if (!sb) return;
    let q = sb.from(tabla).delete();
    for (const [col, val] of Object.entries(filters)) q = q.eq(col, val);
    const { error } = await q;
    if (error) console.warn("SB deleteWhere", tabla, error.message);
  } catch(e) { console.warn("SB deleteWhere exception", e.message); }
}

async function syncDesdeSupabase(setters) {
  const sb = getSB();
  if (!sb) return { ok: false, msg: "Sin conexión Supabase. Verifica credenciales en ⚙️ Config." };
  const resultados = [];
  for (const [key, setter] of Object.entries(setters)) {
    const tabla = SB_TABLE_MAP[key];
    if (!tabla) continue;
    try {
      const { data: rows, error } = await sb.from(tabla).select("*");
      if (error) { resultados.push({ tabla, ok: false, msg: error.message }); continue; }
      const parsed = (rows || []).map(sbNormRow);
      setter(parsed);
      try { localStorage.setItem(key, JSON.stringify(parsed)); } catch(e) { console.warn("[Hórreo]", e?.message ?? e); }
      resultados.push({ tabla, ok: true, n: parsed.length });
    } catch (e) {
      resultados.push({ tabla, ok: false, msg: e.message });
    }
  }
  return { ok: true, resultados };
}



async function syncToSheets(tabla, rows, url) {
  if (!url || url === APPS_SCRIPT_URL_DEFAULT) return { ok: false, msg: "URL no configurada" };
  try {
    const res = await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ tabla, rows }) });
    const data = await res.json();
    return { ok: true, msg: data.message || "Sincronizado" };
  } catch (e) { return { ok: false, msg: e.message }; }
}

    /* ══ ANIMATIONS ══════════════════════════════════════════════════════════ */

// PWA INSTALL BANNER
// ══════════════════════════════════════════════════════════════════════════════
function InstallBanner() {
  const [state, setState] = useState("hidden"); // hidden | installable | ios | update
  const [dismissed, setDismissed] = useStorage("horreo_pwa_dismissed", false);

  useEffect(() => {
    if (dismissed) return;
    // Ya instalada como app standalone
    if (window.matchMedia("(display-mode: standalone)").matches ||
        window.navigator.standalone === true) return;

    // Android/Chrome — evento beforeinstallprompt ya capturado
    if (window._installPrompt) { setState("installable"); return; }
    window.addEventListener("pwa-installable", () => setState("installable"), { once: true });

    // iOS — no tiene beforeinstallprompt, detectar Safari
    const isIos = /iphone|ipad|ipod/i.test(navigator.userAgent);
    const isSafari = /safari/i.test(navigator.userAgent) && !/chrome/i.test(navigator.userAgent);
    if (isIos && isSafari) { setState("ios"); return; }

    // Actualización disponible
    window.addEventListener("sw-update-ready", () => setState("update"), { once: true });
    if (window._swUpdateReady) setState("update");
  }, [dismissed]);

  const handleInstall = async () => {
    if (!window._installPrompt) return;
    window._installPrompt.prompt();
    const { outcome } = await window._installPrompt.userChoice;
    if (outcome === "accepted") { setState("hidden"); window._installPrompt = null; }
  };

  const handleUpdate = () => {
    navigator.serviceWorker.getRegistration().then(reg => reg?.waiting?.postMessage({ type:"SKIP_WAITING" }));
    window.location.reload();
  };

  const dismiss = () => { setDismissed(true); setState("hidden"); };

  if (state === "hidden" || dismissed) return null;

  const configs = {
    installable: {
      icon: "📲", color: "#6C63FF",
      title: "Instalar El Hórreo",
      desc: "Acceso directo desde tu pantalla de inicio, funciona sin internet.",
      btn: "Instalar app", action: handleInstall,
    },
    ios: {
      icon: "📲", color: "#6C63FF",
      title: "Agregar a inicio",
      desc: `Toca ${String.fromCodePoint(0x1F4E4)} Compartir → "Agregar a pantalla de inicio" para instalar la app.`,
      btn: null, action: null,
    },
    update: {
      icon: "🔄", color: "#10B981",
      title: "Actualización disponible",
      desc: "Hay una nueva versión de El Hórreo lista para instalar.",
      btn: "Actualizar ahora", action: handleUpdate,
    },
  };

  const c = configs[state];
  if (!c) return null;

  return (
    <div style={{
      position: "fixed", bottom: "calc(62px + env(safe-area-inset-bottom, 0px))",
      left: 0, right: 0, zIndex: 200,
      display: "flex", justifyContent: "center", padding: "0 12px",
      animation: "fadeIn .3s ease",
    }}>
      <div style={{
        width: "100%", maxWidth: 520,
        background: "var(--bg-card)", border: `1.5px solid ${c.color}44`,
        borderRadius: 16, padding: "12px 14px",
        boxShadow: `0 8px 32px rgba(0,0,0,0.18), 0 0 0 1px ${c.color}22`,
        display: "flex", alignItems: "center", gap: 10,
      }}>
        <span style={{ fontSize: 26, flexShrink: 0 }}>{c.icon}</span>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontFamily: "Nunito", fontWeight: 800, fontSize: 13, color: "var(--text-1)" }}>{c.title}</div>
          <div style={{ fontFamily: "Nunito", fontSize: 11, color: "var(--text-3)", marginTop: 2, lineHeight: 1.4 }}>{c.desc}</div>
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 5, flexShrink: 0 }}>
          {c.btn && (
            <button onClick={c.action}
              style={{ background: c.color, color: "#fff", border: "none", borderRadius: 9, padding: "7px 12px", fontFamily: "Nunito", fontWeight: 800, fontSize: 11, cursor: "pointer", whiteSpace: "nowrap" }}>
              {c.btn}
            </button>
          )}
          <button onClick={dismiss}
            style={{ background: "var(--divider)", color: "var(--text-3)", border: "none", borderRadius: 9, padding: "5px 10px", fontFamily: "Nunito", fontWeight: 700, fontSize: 10, cursor: "pointer" }}>
            {state === "ios" ? "Entendido" : "Ahora no"}
          </button>
        </div>
      </div>
    </div>
  );
}

const MAIL_OPS_DEFAULT = "saalvarado@ofd.ged.cl";
// Devuelve array de contactos [{nombre, email, telefono}]
// ── Grupos de contacto ────────────────────────────────────────────────────────
// Estructura grupo: { id, nombre, tgBotToken, tgChatId, miembros: [{nombre,email,telefono}] }
function getGrupos() {
  try {
    const raw = localStorage.getItem("horreo_grupos");
    if (raw) { const arr = JSON.parse(raw); if (Array.isArray(arr) && arr.length) return arr; }
  } catch(e) { console.warn("[Hórreo]", e?.message ?? e); }
  return [];
}
function getContactos() {
  // Mantener compatibilidad: devuelve lista plana de todos los miembros de todos los grupos
  const grupos = getGrupos();
  if (grupos.length) {
    const all = [];
    grupos.forEach(g => (g.miembros||[]).forEach(m => { if (!all.find(x=>x.email===m.email&&x.telefono===m.telefono)) all.push({...m, grupo: g.nombre}); }));
    if (all.length) return all;
  }
  try {
    const raw = localStorage.getItem("horreo_contactos");
    if (raw) { const arr = JSON.parse(raw); if (Array.isArray(arr) && arr.length) return arr; }
    const cfg = JSON.parse(localStorage.getItem("horreo_config") || "{}");
    if (cfg.emailDestino) return [{ nombre: "Operaciones", email: cfg.emailDestino, telefono: cfg.whatsappPhone || "" }];
  } catch(e) { console.warn("[Hórreo]", e?.message ?? e); }
  return [{ nombre: "Operaciones", email: MAIL_OPS_DEFAULT, telefono: "" }];
}
function getMailOps() {
  const cs = getContactos(); return cs.length ? cs[0].email : MAIL_OPS_DEFAULT;
}
function getWhatsAppPhone() {
  // 1. Contacto rápido sincronizado (clave cloud setting escrita también en localStorage)
  try {
    const rapido = JSON.parse(localStorage.getItem("horreo_contacto_rapido") || "{}");
    if (rapido.telefono) return rapido.telefono;
  } catch(e) { console.warn("[getWhatsAppPhone]", e.message); }
  // 2. Clave legacy
  try {
    const rapido2 = JSON.parse(localStorage.getItem("horreo_wa_rapido") || "{}");
    if (rapido2.telefono) return rapido2.telefono;
  } catch(e) { console.warn("[getWhatsAppPhone]", e.message); }
  // 3. Fallback: primer contacto del grupo
  const cs = getContactos(); return cs.length ? (cs[0].telefono || "") : "";
}
// Enviar mensaje Telegram a un grupo
async function sendTelegram(botToken, chatId, texto) {
  if (!botToken || !chatId) return { ok: false, error: "Sin token o chat ID" };
  try {
    const res = await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ chat_id: chatId, text: texto, parse_mode: "HTML" })
    });
    const data = await res.json();
    return data.ok ? { ok: true } : { ok: false, error: data.description };
  } catch(e) { return { ok: false, error: e.message }; }
}

  const contactosPlanos = hasGrupos ? [] : getContactos();

  const miembros = grupoSel ? (grupoSel.miembros || []) : contactosPlanos;

  const textoCorto = `*${data.asunto}*

${data.cuerpo}`;
  const textoHTML  = `<b>${data.asunto}</b>

${data.cuerpo}`;

  const handleCopy = () => {
    try { navigator.clipboard.writeText(textoCorto); } catch {
      const ta = document.getElementById("mail-preview-ta");
      if (ta) { ta.select(); ta.setSelectionRange(0,99999); document.execCommand("copy"); }
    }
    setCopied(true); setTimeout(() => setCopied(false), 2500);
  };

  const handleTelegram = async (grupo) => {
    if (!grupo.tgBotToken || !grupo.tgChatId) return;
    setTgStatus(s => ({...s, [grupo.id]: "sending"}));
    const res = await sendTelegram(grupo.tgBotToken, grupo.tgChatId, textoHTML);
    setTgStatus(s => ({...s, [grupo.id]: res.ok ? "ok" : "error:" + res.error}));
  };

  const handleWA    = (tel)   => window.open(`https://wa.me/${tel}?text=${encodeURIComponent(textoCorto)}`, "_blank");
  const handleMail  = (email) => window.open(`mailto:${email}?subject=${encodeURIComponent(data.asunto)}&body=${encodeURIComponent(data.cuerpo)}`, "_blank");

  // Guardar contacto nuevo en el grupo seleccionado (o crear grupo "Oficina" si no hay ninguno)
  const handleGuardarCtc = () => {
    if (!newCtc.nombre.trim() || (!newCtc.email.trim() && !newCtc.telefono.trim())) return;
    const miembroNuevo = {
      nombre:   newCtc.nombre.trim(),
      email:    newCtc.email.trim(),
      telefono: newCtc.telefono.replace(/\D/g,""),
    };
    try {
      const raw    = localStorage.getItem("horreo_grupos");
      let gs       = raw ? JSON.parse(raw) : [];
      if (!Array.isArray(gs)) gs = [];
      if (gs.length === 0) {
        // Crear grupo "Oficina" automáticamente
        gs = [{ id: uid(), nombre:"Oficina", miembros:[], tgBotToken:"", tgChatId:"" }];
      }
      // Agregar al grupo actualmente seleccionado (o al primero)
      const idx = grupoIdx < gs.length ? grupoIdx : 0;
      gs[idx].miembros = [...(gs[idx].miembros||[]), miembroNuevo];
      localStorage.setItem("horreo_grupos", JSON.stringify(gs));
    } catch(e) { console.warn("guardarCtc", e.message); }
    setCtcSaved(true);
    setNewCtc({ nombre:"", email:"", telefono:"" });
    setCtcVersion(v => v+1); // forzar re-render
    setTimeout(() => { setShowAddCtc(false); setCtcSaved(false); }, 1800);
  };

  // Eliminar contacto del grupo seleccionado
  const handleDelCtc = (miembroIdx) => {
    try {
      const raw = localStorage.getItem("horreo_grupos");
      let gs    = raw ? JSON.parse(raw) : [];
      const idx = grupoIdx < gs.length ? grupoIdx : 0;
      gs[idx].miembros = (gs[idx].miembros||[]).filter((_,i)=>i!==miembroIdx);
      localStorage.setItem("horreo_grupos", JSON.stringify(gs));
      setCtcVersion(v => v+1);
    } catch(e) { console.warn("delCtc", e.message); }
  };

  // Re-leer grupos tras cambios
  const gruposActuales   = ctcVersion >= 0 ? getGrupos() : grupos; // ctcVersion solo para dep
  const hasGruposActual  = gruposActuales.length > 0;
  const grupoActual      = hasGruposActual ? (gruposActuales[grupoIdx] || gruposActuales[0]) : null;
  const miembrosActuales = grupoActual ? (grupoActual.miembros||[]) : (hasGruposActual ? [] : getContactos());

  const TG_COLOR = "#229ED9";

  return (
    <div style={{ position:"fixed", inset:0, zIndex:9999, background:"rgba(0,0,0,0.55)", display:"flex", alignItems:"flex-end", justifyContent:"center" }} onClick={() => setData(null)}>
      <div onClick={e=>e.stopPropagation()} style={{ background:"#fff", borderRadius:"20px 20px 0 0", padding:20, width:"100%", maxWidth:480, maxHeight:"92vh", display:"flex", flexDirection:"column", gap:10, overflowY:"auto" }}>
        <div style={{ width:36, height:4, background:"#E2E8F0", borderRadius:2, margin:"0 auto 4px" }} />
        <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:15 }}>📤 Compartir informe</div>

        {/* Selector de grupo */}
        {hasGruposActual && (
          <div>
            <div style={{ fontSize:10, color:"#64748B", fontWeight:700, marginBottom:5, fontFamily:"Nunito" }}>GRUPO DESTINATARIO</div>
            <div style={{ display:"flex", gap:6, overflowX:"auto", paddingBottom:4 }}>
              {gruposActuales.map((g,i) => (
                <button key={g.id} onClick={() => setGrupoIdx(i)}
                  style={{ flexShrink:0, background: i===grupoIdx ? "#6C63FF":"#F1F5F9", color: i===grupoIdx?"#fff":"#1A1D2E", border:"none", borderRadius:9, padding:"7px 12px", fontFamily:"Nunito", fontWeight:800, fontSize:12, cursor:"pointer", whiteSpace:"nowrap" }}>
                  {g.nombre}
                </button>
              ))}
            </div>
          </div>
        )}

        {/* Asunto */}
        <div style={{ background:"#F8FAFC", border:"1px solid #E2E8F0", borderRadius:10, padding:"8px 12px" }}>
          <div style={{ fontSize:10, color:"#94A3B8", fontWeight:700 }}>ASUNTO</div>
          <div style={{ fontSize:12, fontWeight:700, color:"#1A1D2E" }}>{data.asunto}</div>
        </div>

        {/* Preview */}
        <textarea id="mail-preview-ta" readOnly value={`${data.asunto}

${data.cuerpo}`}
          style={{ minHeight:130, fontFamily:"monospace", fontSize:10, padding:10, border:"1.5px solid #E2E8F0", borderRadius:10, resize:"none", color:"#1A1D2E", background:"#F8FAFC", lineHeight:1.6 }} />

        {/* Telegram */}
        {grupoActual?.tgBotToken && grupoActual?.tgChatId && (
          <button onClick={() => handleTelegram(grupoActual)}
            style={{ background: tgStatus[grupoActual.id]==="ok" ? "#22C55E" : tgStatus[grupoActual.id]?.startsWith("error") ? "#EF4444" : TG_COLOR,
              border:"none", borderRadius:12, padding:"13px 0", fontFamily:"Nunito", fontWeight:800, fontSize:14, color:"#fff", cursor:"pointer" }}>
            {tgStatus[grupoActual.id]==="sending" ? "⏳ Enviando..." :
             tgStatus[grupoActual.id]==="ok"      ? "✅ Enviado a Telegram" :
             tgStatus[grupoActual.id]?.startsWith("error") ? "❌ " + tgStatus[grupoActual.id].slice(6) :
             "✈️ Enviar a Telegram"}
          </button>
        )}

        {/* Lista de contactos con envío individual + botón eliminar */}
        <div>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
            <div style={{ fontSize:10, color:"#64748B", fontWeight:700, fontFamily:"Nunito" }}>
              CONTACTOS {miembrosActuales.length > 0 ? `(${miembrosActuales.length})` : ""}
            </div>
            <button onClick={() => { setShowAddCtc(s=>!s); setCtcSaved(false); setNewCtc({nombre:"",email:"",telefono:""}); }}
              style={{ background: showAddCtc ? "#F1F5F9" : "#6C63FF", color: showAddCtc ? "#64748B" : "#fff",
                border:"none", borderRadius:8, padding:"5px 11px", fontFamily:"Nunito", fontWeight:800, fontSize:11, cursor:"pointer" }}>
              {showAddCtc ? "✕ Cancelar" : "＋ Agregar contacto"}
            </button>
          </div>

          {/* Formulario agregar contacto inline */}
          {showAddCtc && (
            <div style={{ background:"#F5F3FF", border:"1.5px solid #C4B5FD", borderRadius:12, padding:"12px 14px", marginBottom:10 }}>
              <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:12, color:"#6C63FF", marginBottom:10 }}>
                👤 Nuevo contacto
                {grupoActual && <span style={{ fontWeight:600, color:"#94A3B8" }}> → {grupoActual.nombre}</span>}
                {!hasGruposActual && <span style={{ fontWeight:600, color:"#94A3B8" }}> → se creará grupo "Oficina"</span>}
              </div>
              <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                <input placeholder="Nombre *" value={newCtc.nombre} onChange={e=>setNewCtc(p=>({...p,nombre:e.target.value}))}
                  style={{ border:"1.5px solid #DDD6FE", borderRadius:9, padding:"8px 11px", fontFamily:"Nunito", fontSize:12, outline:"none" }}/>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
                  <input placeholder="📧 Email" value={newCtc.email} onChange={e=>setNewCtc(p=>({...p,email:e.target.value}))}
                    type="email"
                    style={{ border:"1.5px solid #DDD6FE", borderRadius:9, padding:"8px 11px", fontFamily:"Nunito", fontSize:12 }}/>
                  <input placeholder="💬 WhatsApp" value={newCtc.telefono} onChange={e=>setNewCtc(p=>({...p,telefono:e.target.value.replace(/\D/g,"")}))}
                    type="tel" inputMode="numeric"
                    style={{ border:"1.5px solid #DDD6FE", borderRadius:9, padding:"8px 11px", fontFamily:"Nunito", fontSize:12 }}/>
                </div>
                <div style={{ fontSize:9, color:"#94A3B8", marginTop:-4 }}>WhatsApp: código país sin + (ej: 56912345678)</div>
                <button onClick={handleGuardarCtc}
                  disabled={!newCtc.nombre.trim() || (!newCtc.email.trim() && !newCtc.telefono.trim())}
                  style={{ background: ctcSaved ? "#22C55E" : "#6C63FF", color:"#fff", border:"none", borderRadius:10,
                    padding:"10px 0", fontFamily:"Nunito", fontWeight:800, fontSize:13, cursor:"pointer",
                    opacity: (!newCtc.nombre.trim()||(!newCtc.email.trim()&&!newCtc.telefono.trim())) ? 0.5 : 1 }}>
                  {ctcSaved ? "✅ ¡Guardado!" : "💾 Guardar contacto"}
                </button>
              </div>
            </div>
          )}

          {/* Lista de miembros */}
          {miembrosActuales.length === 0 && !showAddCtc && (
            <div style={{ textAlign:"center", padding:"12px 0", fontFamily:"Nunito", fontSize:11, color:"#94A3B8" }}>
              Sin contactos. Toca "＋ Agregar contacto" para añadir personas.
            </div>
          )}
          {miembrosActuales.map((m,i) => (
            <div key={i} style={{ display:"flex", gap:6, marginBottom:8, alignItems:"center",
              background:"#F8FAFC", borderRadius:10, padding:"8px 10px" }}>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ fontFamily:"Nunito", fontSize:12, fontWeight:800, color:"#1A1D2E",
                  overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{m.nombre || "Sin nombre"}</div>
                <div style={{ fontFamily:"Nunito", fontSize:10, color:"#94A3B8" }}>
                  {m.email && <span>📧 {m.email}  </span>}
                  {m.telefono && <span>💬 {m.telefono}</span>}
                </div>
              </div>
              {m.telefono && (
                <button onClick={() => handleWA(m.telefono)}
                  style={{ background:"#25D366", border:"none", borderRadius:9, padding:"7px 10px", fontFamily:"Nunito", fontWeight:800, fontSize:12, color:"#fff", cursor:"pointer", flexShrink:0 }}>
                  💬
                </button>
              )}
              {m.email && (
                <button onClick={() => handleMail(m.email)}
                  style={{ background:"#6C63FF", border:"none", borderRadius:9, padding:"7px 10px", fontFamily:"Nunito", fontWeight:800, fontSize:12, color:"#fff", cursor:"pointer", flexShrink:0 }}>
                  📧
                </button>
              )}
              <button onClick={() => handleDelCtc(i)}
                style={{ background:"#FEF2F2", border:"none", borderRadius:9, padding:"7px 8px", fontFamily:"Nunito", fontWeight:800, fontSize:11, color:"#EF4444", cursor:"pointer", flexShrink:0 }}>
                ✕
              </button>
            </div>
          ))}
        </div>

        {/* Copiar + cerrar */}
        <div style={{ display:"flex", gap:8 }}>
          <button onClick={handleCopy} style={{ flex:2, background:copied?"#22C55E":"#1D4ED8", border:"none", borderRadius:12, padding:"13px 0", fontFamily:"Nunito", fontWeight:800, fontSize:14, color:"#fff", cursor:"pointer" }}>
            {copied ? "✅ ¡Copiado!" : "📋 Copiar texto"}
          </button>
          <button onClick={() => setData(null)} style={{ background:"#F1F5F9", border:"none", borderRadius:12, padding:"13px 14px", fontFamily:"Nunito", fontWeight:700, fontSize:13, color:"#64748B", cursor:"pointer" }}>✕</button>
        </div>
      </div>
    </div>
  );
}

function buildMailVenta(reg, marcaNombre) {
  const cumplPct = ((reg.cumpl_venta || 0) * 100).toFixed(1);
  const cumplIcon = reg.cumpl_venta >= 1 ? "✅" : reg.cumpl_venta >= 0.8 ? "🟡" : "🔴";
  const asunto = `[El Hórreo] Venta ${marcaNombre} — ${reg.local} — ${reg.fecha} ${reg.turno || ""}`;
  // Verificar ventana horaria 15:30–16:30 (hora Chile)
  const ahora = new Date();
  const horaActual = ahora.getHours() * 60 + ahora.getMinutes(); // minutos del día
  const ventanaOK = horaActual >= 15 * 60 + 30 && horaActual <= 16 * 60 + 30;
  const horaStr = ahora.toLocaleTimeString("es-CL", { hour: "2-digit", minute: "2-digit" });
  const alertaHorario = !ventanaOK
    ? `\n⚠️  REGISTRO FUERA DE VENTANA HORARIA\n    Hora de envío: ${horaStr} (ventana esperada: 15:30–16:30)\n`
    : `\n✅  Registro dentro de ventana horaria (${horaStr})\n`;
  const cuerpo =
`REGISTRO DE VENTA
=================
Marca  : ${marcaNombre}
Local  : ${reg.local}
Fecha  : ${reg.fecha}   Turno: ${reg.turno || "-"}
Usuario: ${reg.usuario || "-"}

VENTAS
------
Venta Bruta    : $${Math.round(reg.venta_bruta || 0).toLocaleString("es-CL")}
Meta día       : $${Math.round(reg.meta_dia || 0).toLocaleString("es-CL")}
Cumplimiento   : ${cumplIcon} ${cumplPct}%
Dif. PPTO      : $${Math.round(reg.dif_ppto || 0).toLocaleString("es-CL")}
Crecimiento AA : ${((reg.crec_aa || 0) * 100).toFixed(1)}%
N° Boletas     : ${reg.boletas || 0}
Ticket prom.   : $${Math.round(reg.ticket || 0).toLocaleString("es-CL")}

OPERACIONES
-----------
Mermas         : $${Math.round(reg.merma || 0).toLocaleString("es-CL")}
Colaciones     : $${Math.round(reg.colaciones || 0).toLocaleString("es-CL")}${reg.obs ? "\nObs: " + reg.obs : ""}
${alertaHorario}
---
El Hórreo · Adm. Franquicias`;
  return { asunto, cuerpo };
}

function buildMailKPI(reg, marcaNombre) {
  const asunto = `[El Hórreo] KPI ${marcaNombre} — ${reg.local} — ${reg.fecha}`;
  const kdsEstacion = reg.kds_general || reg.kds_fritos || reg.kds_salsera;
  const cuerpo =
`REGISTRO KPI
============
Marca  : ${marcaNombre}
Local  : ${reg.local}
Fecha  : ${reg.fecha}
Usuario: ${reg.usuario || "-"}

TIEMPOS KDS
-----------
${kdsEstacion
  ? `General  : ${reg.kds_general || "-"} min   Fritos: ${reg.kds_fritos || "-"} min   Salsera: ${reg.kds_salsera || "-"} min`
  : `Desayuno : ${reg.kds_desayuno || "-"} min   Almuerzo: ${reg.kds_almuerzo || "-"} min\nTarde    : ${reg.kds_tarde || "-"} min       Noche: ${reg.kds_noche || "-"} min`}
Promedio : ${reg.kds_prom || "-"} min

DELIVERY
--------
Nota Uber: ${reg.nota_uber || "-"}/5   Nota PYA: ${reg.nota_pya || "-"}/5
Pedidos Uber: ${reg.pedidos_uber || 0}   Pedidos PYA: ${reg.pedidos_pya || 0}
Total: ${reg.total_pedidos || 0} pedidos

NPS
---
Promotores: ${reg.nps_promotores || 0}  Pasivos: ${reg.nps_pasivos || 0}  Detractores: ${reg.nps_detractores || 0}
Score NPS: ${reg.nps_score || 0}${reg.obs ? "\nObs: " + reg.obs : ""}

---
El Hórreo · Adm. Franquicias`;
  return { asunto, cuerpo };

function mailVenta(reg, marcaNombre) {
  const { asunto, cuerpo } = buildMailVenta(reg, marcaNombre);

}
function mailKPI(reg, marcaNombre) {
  const { asunto, cuerpo } = buildMailKPI(reg, marcaNombre);
  showMailModal(asunto, cuerpo);
}

function exportExcel(sheets) {
  // sheets = [{ name, headers, rows }]
  // Uses SheetJS if available, falls back to CSV modal
  if (window.XLSX) {
    const wb = window.XLSX.utils.book_new();
    sheets.forEach(sh => {
      const ws = window.XLSX.utils.aoa_to_sheet([sh.headers, ...sh.rows]);
      // Style header row width
      ws["!cols"] = sh.headers.map(h => ({ wch: Math.max(12, String(h).length + 4) }));
      window.XLSX.utils.book_append_sheet(wb, ws, sh.name.slice(0,31));
    });
    window.XLSX.writeFile(wb, sheets[0].name.replace(/[^\w]/g,"_") + ".xlsx");
  } else {
    // Fallback: CSV via modal
    const csv = sheets.map(sh =>
      "=== " + sh.name + " ===\n" +
      [sh.headers, ...sh.rows].map(r => r.join(",")).join("\n")
    ).join("\n\n");
    showCSVModal(sheets[0].name + ".csv", csv);
  }
}

// ── Helper global: obtener lista de empleados desde horarios cargados ─────────
function getEmpleadosDeMarca(marca) {
  try {
    const semanas = (JSON.parse(localStorage.getItem("horreo_labor_semanas") || "[]")).map(s => rehydrateSemana({...s}));
    const personal = JSON.parse(localStorage.getItem("horreo_personal_adicional") || "[]");
    const empFromSemanas = semanas
      .filter(s => s.marca === marca)
      .flatMap(s => s.empleados.map(e => ({ nombre: e.nombre, cargo: e.cargo, rut: e.rut })));
    const empFromPersonal = personal
      .filter(p => p.marca === marca)
      .map(p => ({ nombre: p.nombre, cargo: p.cargo, rut: p.id }));
    // Deduplicate by nombre
    const all = [...empFromSemanas, ...empFromPersonal];
    const seen = new Set();
    return all.filter(e => { if (seen.has(e.nombre)) return false; seen.add(e.nombre); return true; })
              .sort((a,b) => a.nombre.localeCompare(b.nombre));
  } catch { return []; }
}

// Reusable employee selector component
function EmpleadoSelector({ marca, value, onChange, placeholder = "Seleccionar empleado" }) {
  const empleados = getEmpleadosDeMarca(marca);
  const [modo, setModo] = useState(empleados.length > 0 ? "select" : "text");
  if (modo === "text" || empleados.length === 0) {
    return (
      <div style={{ position:"relative" }}>
        <input value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder}/>
        {empleados.length > 0 && (
          <button onClick={() => setModo("select")} style={{ position:"absolute", right:8, top:"50%", transform:"translateY(-50%)", background:"none", border:"none", fontSize:14, cursor:"pointer", color:"#6C63FF" }}>▼</button>
        )}
      </div>
    );
  }
  return (
    <div>
      <select value={value} onChange={e => {
        if (e.target.value === "__otro__") { setModo("text"); onChange(""); }
        else onChange(e.target.value);
      }}>
        <option value="">— {placeholder} —</option>
        {empleados.map(e => (
          <option key={e.rut || e.nombre} value={e.nombre}>
            {e.nombre.split(" ").slice(0,3).join(" ")} ({e.cargo})
          </option>
        ))}
        <option value="__otro__">✏️ Escribir nombre...</option>
      </select>
    </div>
  );
}

// Semáforo de cumplimiento configurable
// verde ≥ verde_min%, amarillo ≥ amarillo_min%, rojo < amarillo_min%
function getSemaforo(valor, meta, config = {}) {
  if (!meta || meta === 0) return { color: "#94A3B8", icono: "⚪", label: "Sin meta" };
  const pct = (valor / meta) * 100;
  const verde    = config.verde    ?? 100;
  const amarillo = config.amarillo ?? 90;
  if (pct >= verde)    return { color: "#22C55E", icono: "🟢", label: `${pct.toFixed(1)}%`, pct };
  if (pct >= amarillo) return { color: "#F59E0B", icono: "🟡", label: `${pct.toFixed(1)}%`, pct };
  return                        { color: "#EF4444", icono: "🔴", label: `${pct.toFixed(1)}%`, pct };
}

// Para métricas inversas (menor es mejor: merma, KDS, labor)
function getSemaforoInverso(valor, meta, config = {}) {
  if (!meta || meta === 0) return { color: "#94A3B8", icono: "⚪", label: "Sin meta" };
  const pct = (valor / meta) * 100;
  const verde    = config.verde    ?? 100;
  const amarillo = config.amarillo ?? 110;
  if (pct <= verde)    return { color: "#22C55E", icono: "🟢", label: `${pct.toFixed(1)}%`, pct };
  if (pct <= amarillo) return { color: "#F59E0B", icono: "🟡", label: `${pct.toFixed(1)}%`, pct };
  return                        { color: "#EF4444", icono: "🔴", label: `${pct.toFixed(1)}%`, pct };
}

function SemaforoChip({ color, icono, label, small = false }) {
  return (
    <span style={{
      display: "inline-flex", alignItems: "center", gap: 3,
      background: color + "20", color, border: `1px solid ${color}44`,
      borderRadius: 20, padding: small ? "2px 7px" : "3px 10px",
      fontSize: small ? 10 : 11, fontWeight: 700, fontFamily: "Nunito",
    }}>
      {icono} {label}
    </span>
  );
}

// Generar alertas automáticas basadas en KPIs del período
function generarAlertas(resumen, red, metas, metasDiarias, kpis, marca, rango) {
  const alertas = [];
  const umbralVenta = 80;   // % cumplimiento venta
  const umbralMerma = 110;  // % sobre meta
  const umbralKDS   = 110;  // % sobre meta

  resumen.forEach(r => {
    const local = nombreCortoLocal(r.local);
    // Venta bajo 80% cumplimiento
    if (r.mv > 0 && r.cumpl < umbralVenta/100) {
      alertas.push({ tipo: "venta", sev: "alta", local, msg: `Venta ${(r.cumpl*100).toFixed(0)}% de meta`, valor: r.vt, meta: r.mv });
    }
    // Merma — usa meta por local si existe, si no la del Excel, si no el default global
    const metaM = metas.find(x => x.local === r.local && x.mes === rango.ini.slice(0,7));
    const metaMermaEfectiva = metaM?.meta_mermas > 0
      ? parseFloat(metaM.meta_mermas)
      : getMetaLocal(r.local, "merma_pct", "horreo_meta_mermas_pct", 2) * r.vt / 100;
    if (metaMermaEfectiva > 0 && r.mr > metaMermaEfectiva * umbralMerma/100) {
      alertas.push({ tipo: "merma", sev: "media", local, msg: `Merma ${fmtCLP(r.mr)} supera meta ${fmtCLP(metaMermaEfectiva)}`, valor: r.mr, meta: metaMermaEfectiva });
    }
    // Colaciones — meta por local o default global
    if (r.col > 0 && r.vt > 0) {
      const metaColEfectiva = getMetaLocal(r.local, "col_pct", "horreo_meta_colaciones_pct", 3) * r.vt / 100;
      if (metaColEfectiva > 0 && r.col > metaColEfectiva * 1.2) {
        alertas.push({ tipo: "colaciones", sev: "media", local, msg: `Colaciones ${fmtCLP(r.col)} supera meta ${fmtCLP(metaColEfectiva)}`, valor: r.col, meta: metaColEfectiva });
      }
    }
    // KDS — meta por local o del Excel
    const metaKDS = metaM?.meta_kds > 0
      ? parseFloat(metaM.meta_kds)
      : getMetaLocal(r.local, "kds_min", "horreo_meta_kds_min", 4);
    if (metaKDS > 0 && r.kp > metaKDS * umbralKDS/100) {
      alertas.push({ tipo: "kds", sev: "media", local, msg: `KDS ${r.kp.toFixed(1)} min supera meta ${metaKDS} min`, valor: r.kp, meta: metaKDS });
    }
    // Labor por local
    if (r.vt > 0 && r.lab > 0) {
      const metaLaborLocal = getMetaLocal(r.local, "labor_pct", "horreo_meta_labor_pct", 28);
      const laborPct = (r.lab / r.vt) * 100;
      if (laborPct > metaLaborLocal) {
        alertas.push({ tipo: "labor", sev: "media", local, msg: `Labor ${laborPct.toFixed(1)}% supera meta ${metaLaborLocal}% en ${local}`, valor: laborPct, meta: metaLaborLocal });
      }
    }
  });
  return alertas;
}

function AlertasBadge({ count, onClick }) {
  if (count === 0) return null;
  return (
    <button onClick={onClick} style={{
      background: "#EF4444", color: "#fff", border: "none",
      borderRadius: 20, padding: "4px 10px", fontSize: 11,
      fontWeight: 800, fontFamily: "Nunito", cursor: "pointer",
      display: "flex", alignItems: "center", gap: 4,
    }}>
      🔔 {count} alerta{count > 1 ? "s" : ""}
    </button>
  );
}

// FORM VENTAS
// ══════════════════════════════════════════════════════════════════════════════
const FormVentas = React.memo(function FormVentas({ ventas, setVentas, metasDiarias, metas, syncLog, setSyncLog, marca, config }) {
  const m = MARCAS[marca] || MARCAS[Object.keys(MARCAS)[0]] || { color: "#6C63FF", bg: "#F0EEFF", emoji: "🌭", textColor: "#fff", nombre: "—" };
  const localesMarca = LOCALES_POR_MARCA[marca] || LOCALES;
  const [form, setForm] = useState({ fecha: today(), local: localesMarca[0], turno: TURNOS[0], usuario: "", venta_bruta: "", boletas: "", merma: "", colaciones: "", obs: "" });
  const [saved, setSaved] = useState(false);
  const [syncing, setSyncing] = useState(false);
  const [syncErr, setSyncErr] = useState(false);
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  // Resetear local al cambiar de marca
  useEffect(() => {
    const locales = LOCALES_POR_MARCA[marca] || LOCALES;
    setForm(f => ({ ...f, local: locales[0] }));
  }, [marca]);

  const metaDia = useMemo(() => (metasDiarias || []).find(x => x.local === form.local && x.fecha === form.fecha), [metasDiarias, form.local, form.fecha]);
  const metaMes = useMemo(() => (metas || []).find(x => x.local === form.local && x.mes === form.fecha.slice(0, 7)), [metas, form.local, form.fecha]);

  const metaV    = parseFloat(metaDia?.meta_venta_bruta || 0);
  const metaB    = parseFloat(metaDia?.meta_boletas || 0);
  const aaVenta  = parseFloat(metaMes?.aa_venta_bruta || 0);
  const ticket   = form.venta_bruta && form.boletas ? Math.round(parseFloat(form.venta_bruta) / parseFloat(form.boletas)) : 0;
  const cumplV   = metaV ? parseFloat(form.venta_bruta || 0) / metaV : 0;
  const cumplB   = metaB ? parseFloat(form.boletas || 0) / metaB : 0;
  const difPPTO  = parseFloat(form.venta_bruta || 0) - metaV;
  const difAA    = parseFloat(form.venta_bruta || 0) - aaVenta;
  const crecAA   = aaVenta ? difAA / aaVenta : 0;
  const mermaPct = form.venta_bruta ? parseFloat(form.merma || 0) / parseFloat(form.venta_bruta) : 0;
  const mes      = form.fecha.slice(0, 7);

  const acumLocal = useMemo(() =>
    ventas.filter(v => v.local === form.local && v.fecha.slice(0, 7) === mes && v.marca === marca)
          .reduce((s, v) => s + parseFloat(v.venta_bruta || 0), 0) + parseFloat(form.venta_bruta || 0),
    [ventas, form.local, mes, marca, form.venta_bruta]);

  // Días hasta hoy con meta cargada
  const diasConMeta = useMemo(() =>
    (metasDiarias || []).filter(x => x.local === form.local && x.fecha.slice(0, 7) === mes && x.fecha <= form.fecha),
    [metasDiarias, form.local, mes, form.fecha]);

  const metaAcum = diasConMeta.reduce((s, x) => s + parseFloat(x.meta_venta_bruta || 0), 0);

  // AA acumulado: prorrateado por días transcurridos respecto a días en el mes
  const diasEnMes = useMemo(() => {
    const [y, mo] = mes.split("-").map(Number);
    return new Date(y, mo, 0).getDate();
  }, [mes]);
  const aaAcum   = diasEnMes > 0 ? (aaVenta / diasEnMes) * diasConMeta.length : 0;
  const cumplAcum  = metaAcum ? acumLocal / metaAcum : 0;
  const crecAcumAA = aaAcum   ? (acumLocal - aaAcum) / aaAcum : 0;

  // ── Lógica corte 16h ────────────────────────────────────────────────────────
  // Si turno = "Cierre" y existe un "Corte 16:00" del mismo día/local,
  // el usuario ingresa la venta TOTAL del día y guardamos solo el delta.
  const registroCorte16 = useMemo(() =>
    form.turno === "Cierre"
      ? ventas.find(v => v.local === form.local && v.fecha === form.fecha && v.turno === "Corte 16:00" && v.marca === marca)
      : null,
  [ventas, form.local, form.fecha, form.turno, marca]);

  const ventaIngresada = parseFloat(form.venta_bruta || 0);
  const ventaCorte16   = parseFloat(registroCorte16?.venta_bruta || 0);
  // Si hay corte previo, la venta real a guardar es el delta
  const ventaAGuardar  = registroCorte16 ? Math.max(0, ventaIngresada - ventaCorte16) : ventaIngresada;
  const boletasIngresadas = parseFloat(form.boletas || 0);
  const boletasCorte16    = parseFloat(registroCorte16?.boletas || 0);
  const boletasAGuardar   = registroCorte16 ? Math.max(0, boletasIngresadas - boletasCorte16) : boletasIngresadas;

  const existeDuplicado = useMemo(() =>
    ventas.some(v => v.local === form.local && v.fecha === form.fecha && v.turno === form.turno && v.marca === marca),
    [ventas, form.local, form.fecha, form.turno, marca]
  );

  const handleSave = async () => {
    const reg = {
      id: uid(), marca, ...form,
      venta_bruta: ventaAGuardar,
      boletas: boletasAGuardar,
      ...(registroCorte16 ? { venta_total_dia: ventaIngresada, corte_16_ref: registroCorte16.id } : {}),
      ticket: boletasAGuardar > 0 ? Math.round(ventaAGuardar / boletasAGuardar) : ticket,
      meta_dia: metaV, meta_boletas_dia: metaB,
      cumpl_venta: metaV ? ventaAGuardar / metaV : cumplV,
      cumpl_boletas: metaB ? boletasAGuardar / metaB : cumplB,
      dif_ppto: ventaAGuardar - metaV, dif_aa: difAA, crec_aa: crecAA,
      merma_pct: mermaPct, acum_local: acumLocal, meta_acum: metaAcum,
      cumpl_acum: cumplAcum, aa_acum: aaAcum,
      ts: new Date().toISOString()
    };
    setVentas(v => [...v, reg]);
    setSaved(true);
    mailVenta(reg, m.nombre);
    if (config?.appsScriptUrl && config.appsScriptUrl !== APPS_SCRIPT_URL_DEFAULT) {
      setSyncing(true);
      const res = await syncToSheets("Form_Ventas", [reg], config.appsScriptUrl);
      setSyncing(false);
      if (res.ok) { const ts = new Date().toLocaleTimeString("es-CL", { hour: "2-digit", minute: "2-digit" }); setSyncLog(l => [...l, { tabla: "Form_Ventas", ts, ok: true }]); }
      else setSyncErr(true);
    }
    setTimeout(() => { setSaved(false); setSyncErr(false); }, 3000);
    setForm(f => ({ ...f, venta_bruta: "", boletas: "", merma: "", colaciones: "", obs: "" }));
  };

  const g2 = { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 };
  const hasData = parseFloat(form.venta_bruta) > 0;

  return (
    <div className="fade" style={{ paddingBottom: 90 }}>
      <LogoHeader marca={marca} />
      <SectionTitle color={m.color}>🛒 Registro de Ventas</SectionTitle>
      {(hasData || metaV > 0) && (
        <Card style={{ marginBottom: 14, border: `2px solid ${m.color}33`, background: m.bg }}>
          <div style={{ fontSize: 11, color: "#64748B", marginBottom: 10, fontWeight: 700, letterSpacing: .5, textTransform: "uppercase" }}>📊 Real vs PPTO vs AA</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 6, marginBottom: 12 }}>
            {[["REAL", fmtCLP(form.venta_bruta || 0), m.color, `${form.boletas || 0} bol.`, null],
              ["PPTO", fmtCLP(metaV), "#6C63FF", `${difPPTO >= 0 ? "+" : ""}${fmtCLP(difPPTO)}`, difPPTO >= 0 ? "#22C55E" : "#EF4444"],
              ["AA", fmtCLP(aaVenta), "#64748B", `${crecAA >= 0 ? "+" : ""}${((crecAA || 0) * 100).toFixed(1)}%`, crecAA >= 0 ? "#22C55E" : "#EF4444"],
            ].map(([lbl, val, c, sub, sc]) => (
              <div key={lbl} style={{ background: "#fff", borderRadius: 10, padding: "10px 8px", textAlign: "center" }}>
                <div style={{ fontSize: 9, color: "#94A3B8", fontWeight: 700, marginBottom: 4 }}>{lbl}</div>
                <div style={{ fontSize: 17, fontFamily: "Nunito", fontWeight: 900, color: c }}>{val}</div>
                <div style={{ fontSize: 10, color: sc || "#94A3B8", fontWeight: sc ? 700 : 400 }}>{sub}</div>
              </div>
            ))}
          </div>
          {metaV > 0 && (
            <div style={{ marginBottom: 8 }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
                <span style={{ fontSize: 11, color: "#64748B", fontWeight: 600 }}>Real vs PPTO día</span>
                <span style={{ fontSize: 12, fontWeight: 800, fontFamily: "Nunito", color: cumplV >= 1 ? "#22C55E" : cumplV >= 0.8 ? "#F59E0B" : "#EF4444" }}>{((cumplV || 0) * 100).toFixed(1)}%</span>
              </div>
              <div style={{ height: 8, background: "#E2E8F0", borderRadius: 8 }}>
                <div style={{ height: "100%", width: `${Math.min(100, (cumplV || 0) * 100)}%`, background: cumplV >= 1 ? "#22C55E" : cumplV >= 0.8 ? "#F59E0B" : "#EF4444", borderRadius: 8, transition: "width .5s" }} />
              </div>
            </div>
          )}
          {metaAcum > 0 && (
            <div>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
                <span style={{ fontSize: 11, color: "#64748B", fontWeight: 600 }}>Acum. mes vs PPTO</span>
                <span style={{ fontSize: 12, fontWeight: 800, fontFamily: "Nunito", color: cumplAcum >= 1 ? "#22C55E" : cumplAcum >= 0.8 ? "#F59E0B" : "#EF4444" }}>{((cumplAcum || 0) * 100).toFixed(1)}%</span>
              </div>
              <div style={{ height: 8, background: "#E2E8F0", borderRadius: 8 }}>
                <div style={{ height: "100%", width: `${Math.min(100, (cumplAcum || 0) * 100)}%`, background: cumplAcum >= 1 ? "#22C55E" : cumplAcum >= 0.8 ? "#F59E0B" : "#EF4444", borderRadius: 8, transition: "width .5s" }} />
              </div>
              <div style={{ fontSize: 10, color: "#94A3B8", marginTop: 4 }}>
                {fmtCLP(acumLocal)} acum. / {fmtCLP(metaAcum)} ppto
                {aaAcum > 0 && <span style={{ marginLeft: 8, color: crecAcumAA >= 0 ? "#22C55E" : "#EF4444" }}>AA: {crecAcumAA >= 0 ? "+" : ""}{((crecAcumAA || 0) * 100).toFixed(1)}%</span>}
              </div>
            </div>
          )}
          {ticket > 0 && (
            <div style={{ marginTop: 10, display: "flex", gap: 16 }}>
              <div><span style={{ fontSize: 10, color: "#94A3B8" }}>Ticket prom. </span><span style={{ fontSize: 13, fontWeight: 800, fontFamily: "Nunito", color: m.color }}>{fmtCLP(ticket)}</span></div>
              {metaB > 0 && <div><span style={{ fontSize: 10, color: "#94A3B8" }}>Boletas: </span><span style={{ fontSize: 13, fontWeight: 800, fontFamily: "Nunito", color: cumplB >= 1 ? "#22C55E" : "#F59E0B" }}>{((cumplB || 0) * 100).toFixed(0)}%</span></div>}
            </div>
          )}
        </Card>
      )}
      <Card>
        {metaV > 0 && !hasData && (
          <div style={{ marginBottom: 12, background: "#F0EEFF", border: "1.5px solid #C4B5FD", borderRadius: 10, padding: "10px 14px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div>
              <div style={{ fontSize: 9, color: "#7C3AED", fontWeight: 700, letterSpacing: .5, textTransform: "uppercase" }}>Meta del día</div>
              <div style={{ fontSize: 20, fontFamily: "Nunito", fontWeight: 900, color: "#6C63FF" }}>{fmtCLP(metaV)}</div>
            </div>
            {metaB > 0 && <div style={{ textAlign: "right" }}>
              <div style={{ fontSize: 9, color: "#7C3AED", fontWeight: 700, letterSpacing: .5, textTransform: "uppercase" }}>Meta boletas</div>
              <div style={{ fontSize: 20, fontFamily: "Nunito", fontWeight: 900, color: "#6C63FF" }}>{metaB}</div>
            </div>}
          </div>
        )}
        <div style={{ ...g2, marginBottom: 12 }}>
          <Field label="Fecha"><input type="date" value={form.fecha} onChange={e => set("fecha", e.target.value)} /></Field>
          <Field label="Local"><select value={form.local} onChange={e => set("local", e.target.value)}>{localesMarca.map(l => <option key={l}>{l}</option>)}</select></Field>
          <Field label="Turno"><select value={form.turno} onChange={e => set("turno", e.target.value)}>{TURNOS.map(t => <option key={t}>{t}</option>)}</select></Field>
          <Field label="Usuario"><input placeholder="Nombre" value={form.usuario} onChange={e => set("usuario", e.target.value)} /></Field>
        </div>
        <Divider label="💰 Ventas" color={m.color} />

        {/* Banner corte 16h — solo aparece cuando turno=Cierre y hay corte previo */}
        {registroCorte16 && (
          <div style={{ marginBottom:10, background:"#EFF6FF", border:"1.5px solid #BFDBFE", borderRadius:10, padding:"10px 12px" }}>
            <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:12, color:"#1D4ED8", marginBottom:4 }}>
              🕓 Corte 16:00 registrado — ingresa la venta total del día
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8 }}>
              <div>
                <div style={{ fontSize:9, color:"#64748B", fontWeight:700 }}>CORTE 16:00</div>
                <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:13, color:"#1D4ED8" }}>{fmtCLP(ventaCorte16)}</div>
                <div style={{ fontSize:9, color:"#94A3B8" }}>{registroCorte16.boletas} bol.</div>
              </div>
              <div>
                <div style={{ fontSize:9, color:"#64748B", fontWeight:700 }}>VENTA TOTAL DÍA</div>
                <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:13, color:ventaIngresada > ventaCorte16 ? m.color : "#94A3B8" }}>
                  {ventaIngresada > 0 ? fmtCLP(ventaIngresada) : "ingresa abajo"}
                </div>
              </div>
              <div>
                <div style={{ fontSize:9, color:"#64748B", fontWeight:700 }}>SE GUARDARÁ (delta)</div>
                <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:13, color: ventaAGuardar > 0 ? "#22C55E" : "#94A3B8" }}>
                  {ventaAGuardar > 0 ? fmtCLP(ventaAGuardar) : "—"}
                </div>
                <div style={{ fontSize:9, color:"#94A3B8" }}>{boletasAGuardar > 0 ? boletasAGuardar + " bol." : ""}</div>
              </div>
            </div>
          </div>
        )}

        <div style={{ ...g2, marginBottom: 12 }}>
          <Field label={registroCorte16 ? "Venta Total del Día $" : "Venta Bruta $"}>
            <input type="number" placeholder="0" value={form.venta_bruta} onChange={e => set("venta_bruta", e.target.value)} />
          </Field>
          <Field label={registroCorte16 ? "Boletas Total del Día" : "N° Boletas"}>
            <input type="number" placeholder="0" value={form.boletas} onChange={e => set("boletas", e.target.value)} />
          </Field>
        </div>
        <Field label="Observaciones"><textarea rows={2} placeholder="Notas del turno..." value={form.obs} onChange={e => set("obs", e.target.value)} style={{ resize: "none" }} /></Field>
        {existeDuplicado && (
          <div style={{ marginTop:10, background:"#FFFBEB", border:"1.5px solid #FDE68A", borderRadius:10, padding:"10px 12px", display:"flex", gap:8, alignItems:"flex-start" }}>
            <span style={{ fontSize:16 }}>⚠️</span>
            <div style={{ fontSize:12, color:"#92400E", fontFamily:"Nunito", fontWeight:700, lineHeight:1.5 }}>
              Ya existe un registro para <strong>{nombreCortoLocal(form.local)}</strong> — <strong>{form.fecha}</strong> — <strong>{form.turno}</strong>.<br/>
              <span style={{ fontWeight:400 }}>Puedes guardarlo igual (quedará como registro adicional) o revisar en Historial.</span>
            </div>
          </div>
        )}
        <div style={{ marginTop: 16, display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
          <Btn onClick={handleSave} color={saved ? "#22C55E" : m.color} disabled={!form.venta_bruta}>{saved ? "✅ Guardado" : "💾 Guardar Registro"}</Btn>
          <SyncBadge syncing={syncing} error={syncErr} lastSync={syncLog.filter(s => s.tabla === "Form_Ventas" && s.ok).slice(-1)[0]?.ts} />
        </div>
      </Card>
    </div>
  );
}); // end React.memo
