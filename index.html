// GESTIÓN USUARIOS — solo admin puede crear/editar/eliminar
// ══════════════════════════════════════════════════════════════════════════════
function GestionUsuarios({ session }) {
  const esAdmin = session?.rol === "admin";
  const [usuarios, setUsuarios] = useStorage("horreo_usuarios_extra", []);
  // Combinar base + extra:
  // Si un usuario base fue editado, existe en usuarios_extra como override (_base:false).
  // El override toma precedencia sobre el usuario base.
  const todosUsuarios = [
    // Usuarios base que NO tienen override en extra
    ...USUARIOS
      .filter(u => !usuarios.find(e => e.user === u.user))
      .map(u => ({ ...u, _base: true })),
    // Todos los usuarios extra (incluye overrides de base + nuevos)
    ...usuarios,
  ];

  const [form, setForm] = useState({ user:"", pass:"", nombre:"", rol:"operador", marcas:[], activo:true });
  const [editId, setEditId] = useState(null);
  const [msg, setMsg]       = useState(null);
  const [confirmDel, setConfirmDel] = useState(null);
  const setF = (k,v) => setForm(p => ({...p,[k]:v}));

  const rolesDisp = Object.keys(ROL_LABELS);
  const marcasDisp = Object.keys(MARCAS);

  const toggleMarca = (mk) => setF("marcas", form.marcas.includes(mk) ? form.marcas.filter(m=>m!==mk) : [...form.marcas, mk]);

  const handleGuardar = async () => {
    if (!form.user.trim() || !form.nombre.trim()) {
      setMsg({ ok:false, text:"Completa usuario y nombre." }); return;
    }
    if (!editId && !form.pass.trim()) {
      setMsg({ ok:false, text:"Ingresa una contraseña para el nuevo usuario." }); return;
    }
    if (form.marcas.length === 0) {
      setMsg({ ok:false, text:"Selecciona al menos una marca." }); return;
    }
    if (!editId && todosUsuarios.find(u => u.user === form.user.trim().toLowerCase())) {
      setMsg({ ok:false, text:"Ya existe un usuario con ese nombre." }); return;
    }

    const { pass: _p, ...formSinPass } = form;

    // Conservar hash si no se ingresó nueva contraseña
    let passHash;
    if (form.pass.trim()) {
      passHash = await hashPass(form.pass.trim());
    } else {
      const existing = todosUsuarios.find(u => u.user === editId);
      passHash = existing?.passHash || existing?.pass || "";
    }

    const nuevo = {
      ...formSinPass,
      passHash,
      user:   form.user.trim().toLowerCase(),
      _base:  false,
      activo: form.activo !== false,
      tsEdit: new Date().toISOString(),
    };

    if (editId) {
      // Verificar si ya existe en usuarios_extra o si es un usuario base (override)
      const yaEstaEnExtra = usuarios.some(u => u.user === editId);
      if (yaEstaEnExtra) {
        // Actualizar en usuarios_extra
        setUsuarios(prev => prev.map(u => u.user === editId ? nuevo : u));
      } else {
        // Es usuario base → agregar como override en usuarios_extra
        setUsuarios(prev => [...prev, nuevo]);
      }
      setMsg({ ok:true, text:`✅ Usuario "${nuevo.user}" actualizado.${!form.pass.trim() ? " (contraseña sin cambios)" : " (nueva contraseña guardada)"}` });
    } else {
      setUsuarios(prev => [...prev, nuevo]);
      setMsg({ ok:true, text:`✅ Usuario "${nuevo.user}" creado correctamente.` });
    }

    setForm({ user:"", pass:"", nombre:"", rol:"operador", marcas:[], activo:true });
    setEditId(null);
  };

  const handleEditar = (u) => {
    setForm({ user: u.user, pass: "", nombre: u.nombre, rol: u.rol, marcas: u.marcas || [], activo: u.activo !== false });
    setEditId(u.user);
    setMsg(null);
  };

  const handleEliminar = (u) => {
    setUsuarios(prev => prev.filter(x => x.user !== u.user));
    setConfirmDel(null);
  };

  if (!esAdmin) return (
    <Card>
      <div style={{ textAlign:"center", padding:"24px 0", fontFamily:"Nunito", color:"#94A3B8" }}>
        🔒 Solo el administrador puede gestionar usuarios.
      </div>
    </Card>
  );

  return (
    <div style={{ paddingBottom:10 }}>
      {confirmDel && (
        <ConfirmModal
          msg={`¿Eliminar usuario "${confirmDel.user}"?`}
          detalle="Esta acción no se puede deshacer."
          onConfirm={() => handleEliminar(confirmDel)}
          onCancel={() => setConfirmDel(null)}
        />
      )}

      {/* Lista de usuarios */}
      <Card style={{ marginBottom:14 }}>
        <div style={{ fontFamily:"Nunito", fontWeight:900, fontSize:14, color:"#6C63FF", marginBottom:12 }}>👥 Usuarios activos</div>
        {todosUsuarios.map(u => {
          const rolInfo = ROL_LABELS[u.rol] || { icon:"🏪", label: u.rol };
          const activo = u.activo !== false;
          return (
          <div key={u.user} style={{ display:"flex", alignItems:"center", gap:8, padding:"8px 0", borderBottom:"1px solid #F1F5F9", opacity: activo ? 1 : 0.5 }}>
            <div style={{ width:32, height:32, borderRadius:"50%", background: activo ? (u.rol==="admin"?"#6C63FF":u.rol==="gerente"?"#F59E0B":u.rol==="supervisor"?"#8B5CF6":"#22C55E") : "#CBD5E1", display:"flex", alignItems:"center", justifyContent:"center", color:"#fff", fontFamily:"Nunito", fontWeight:900, fontSize:14, flex:"none" }}>
              {u.nombre[0]?.toUpperCase()}
            </div>
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:12, color:"#1A1D2E", display:"flex", alignItems:"center", gap:5 }}>
                {u.nombre}
                {!activo && <span style={{ fontSize:9, background:"#FEE2E2", color:"#DC2626", borderRadius:4, padding:"1px 5px", fontWeight:800 }}>INACTIVO</span>}
              </div>
              <div style={{ fontSize:10, color:"#94A3B8" }}>
                <code style={{ background:"#F1F5F9", padding:"1px 5px", borderRadius:4 }}>{u.user}</code>
                &nbsp;· {rolInfo.icon} {rolInfo.label}
                &nbsp;· {(u.marcas||[]).map(mk => MARCAS[mk]?.emoji).join(" ")}
                {u._base && <span style={{ color:"#CBD5E1" }}> · base</span>}
              </div>
            </div>
            <div style={{ display:"flex", gap:4, flex:"none" }}>
              <button onClick={() => {
                  const yaEnExtra = usuarios.some(x => x.user === u.user);
                  if (yaEnExtra) {
                    setUsuarios(prev => prev.map(x => x.user===u.user ? {...x, activo: !activo} : x));
                  } else {
                    // usuario base → crear override solo para cambiar activo
                    const { _base, ...sinBase } = u;
                    setUsuarios(prev => [...prev, { ...sinBase, _base:false, activo: !activo }]);
                  }
                }}
                  title={activo ? "Desactivar usuario" : "Activar usuario"}
                  style={{ background: activo?"#FEF3C7":"#F0FDF4", border:"none", borderRadius:6, padding:"4px 8px", fontFamily:"Nunito", fontWeight:700, fontSize:11, color: activo?"#D97706":"#16A34A", cursor:"pointer" }}>
                  {activo ? "⏸️" : "▶️"}
                </button>
              <button onClick={() => handleEditar(u)}
                style={{ background:"#EEF2FF", border:"none", borderRadius:6, padding:"4px 8px", fontFamily:"Nunito", fontWeight:700, fontSize:11, color:"#6C63FF", cursor:"pointer" }}>
                ✏️
              </button>
              {!u._base && (
                <button onClick={() => setConfirmDel(u)}
                  style={{ background:"#FEF2F2", border:"none", borderRadius:6, padding:"4px 8px", fontFamily:"Nunito", fontWeight:700, fontSize:11, color:"#DC2626", cursor:"pointer" }}>
                  🗑️
                </button>
              )}
            </div>
          </div>
        );})}

      </Card>

      {/* Formulario crear/editar */}
      <Card>
        <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:13, color:"#6C63FF", marginBottom:12 }}>
          {editId ? `✏️ Editar usuario: ${editId}` : "➕ Nuevo usuario"}
        </div>

        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:10 }}>
          <Field label="Usuario (login)">
            <input placeholder="ej: maria" value={form.user} disabled={!!editId}
              onChange={e=>setF("user", e.target.value.replace(/\s/g,"").toLowerCase())} />
          </Field>
          <Field label={editId ? "Contraseña (vacío = sin cambios)" : "Contraseña"}>
            <input type="text" placeholder={editId ? "Dejar vacío para no cambiar" : "mínimo 6 caracteres"} value={form.pass}
              onChange={e=>setF("pass", e.target.value)} />
          </Field>
        </div>

        <Field label="Nombre completo">
          <input placeholder="Nombre que aparece en la app" value={form.nombre}
            onChange={e=>setF("nombre", e.target.value)} />
        </Field>

        <div style={{ marginTop:10 }}>
          <div style={{ fontFamily:"Nunito", fontSize:11, fontWeight:700, color:"#64748B", marginBottom:6 }}>ROL</div>
          <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
            {rolesDisp.map(r => {
              const rl = ROL_LABELS[r];
              return (
              <button key={r} onClick={()=>setF("rol",r)}
                style={{ flex:"0 0 auto", padding:"7px 10px", borderRadius:10, border:`2px solid ${form.rol===r?"#6C63FF":"#E2E8F0"}`, background:form.rol===r?"#6C63FF":"#fff", color:form.rol===r?"#fff":"#64748B", fontFamily:"Nunito", fontWeight:800, fontSize:11, cursor:"pointer" }}>
                {rl.icon} {rl.label}
              </button>
            );})}
          </div>
          <div style={{ fontSize:10, color:"#94A3B8", marginTop:4 }}>
            {ROL_LABELS[form.rol]?.desc || ""}
          </div>
        </div>

        {/* Toggle activo */}
        <div style={{ marginTop:10, display:"flex", alignItems:"center", gap:10, padding:"8px 12px", background: form.activo?"#F0FDF4":"#FEF2F2", borderRadius:10, border:`1px solid ${form.activo?"#86EFAC":"#FECACA"}` }}>
          <div style={{ flex:1 }}>
            <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:12, color: form.activo?"#166534":"#DC2626" }}>
              {form.activo ? "✅ Usuario activo" : "⏸️ Usuario inactivo"}
            </div>
            <div style={{ fontSize:10, color:"#94A3B8" }}>
              {form.activo ? "Puede ingresar a la aplicación" : "No puede iniciar sesión hasta que se reactive"}
            </div>
          </div>
          <button onClick={()=>setF("activo", !form.activo)}
            style={{ background: form.activo?"#22C55E":"#EF4444", color:"#fff", border:"none", borderRadius:8, padding:"7px 14px", fontFamily:"Nunito", fontWeight:800, fontSize:11, cursor:"pointer" }}>
            {form.activo ? "Desactivar" : "Activar"}
          </button>
        </div>

        <div style={{ marginTop:10 }}>
          <div style={{ fontFamily:"Nunito", fontSize:11, fontWeight:700, color:"#64748B", marginBottom:6 }}>MARCAS CON ACCESO</div>
          <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
            {marcasDisp.map(mk => {
              const m = MARCAS[mk];
              const sel = form.marcas.includes(mk);
              return (
                <button key={mk} onClick={()=>toggleMarca(mk)}
                  style={{ padding:"6px 12px", borderRadius:10, border:`2px solid ${sel?m.color:"#E2E8F0"}`, background:sel?m.color:"#fff", color:sel?m.textColor:"#64748B", fontFamily:"Nunito", fontWeight:700, fontSize:11, cursor:"pointer" }}>
                  {m.emoji} {m.nombre}
                </button>
              );
            })}
          </div>
        </div>

        {msg && <div style={{ marginTop:10, padding:"8px 12px", borderRadius:8, background:msg.ok?"#F0FDF4":"#FEF2F2", color:msg.ok?"#166534":"#DC2626", fontFamily:"Nunito", fontSize:12, fontWeight:700 }}>{msg.text}</div>}

        <div style={{ marginTop:12, display:"flex", gap:8 }}>
          <Btn color="#6C63FF" full onClick={handleGuardar}>
            {editId ? "💾 Guardar cambios" : "➕ Crear usuario"}
          </Btn>
          {editId && (
            <Btn color="#94A3B8" outline small onClick={() => { setEditId(null); setForm({ user:"", pass:"", nombre:"", rol:"operador", marcas:[] }); setMsg(null); }}>
              Cancelar
            </Btn>
          )}
        </div>
      </Card>
    </div>
  );
}

// GESTIÓN RED — admin agrega/elimina marcas y locales dinámicamente
// ══════════════════════════════════════════════════════════════════════════════
const EMOJIS_DISPONIBLES = ["🌭","🌮","🥪","🍿","🍔","🌯","🥗","🍕","🍜","🧆","🥙","🫔","🍱","🥡"];
const COLORES_PRESET = [
  { color:"#E8003D", bg:"#FFF0F3", textColor:"#fff",    label:"Rojo"     },
  { color:"#F5C800", bg:"#FFFBE0", textColor:"#1a1a1a", label:"Amarillo" },
  { color:"#CC0000", bg:"#FFF0F0", textColor:"#fff",    label:"Granate"  },
  { color:"#FF6B00", bg:"#FFF4ED", textColor:"#fff",    label:"Naranja"  },
  { color:"#6C63FF", bg:"#F0EEFF", textColor:"#fff",    label:"Violeta"  },
  { color:"#0891B2", bg:"#E0F7FA", textColor:"#fff",    label:"Cyan"     },
  { color:"#16A34A", bg:"#F0FDF4", textColor:"#fff",    label:"Verde"    },
  { color:"#7C3AED", bg:"#F5F3FF", textColor:"#fff",    label:"Morado"   },
];

function GestionRedAdmin({ session }) {
  const esAdmin = session?.rol === "admin";
  const [, forceUpdate] = useState(0);
  const refresh = () => forceUpdate(n => n+1);

  // Form nueva marca
  const [nuevaMarca, setNuevaMarca] = useState({ key:"", nombre:"", emoji:"🍔", color:"#E8003D", bg:"#FFF0F3", textColor:"#fff", erp:"propio" });
  const [msgMarca, setMsgMarca]     = useState(null);

  // Form nuevo local
  const [nuevoLocal, setNuevoLocal] = useState({ nombre:"", marca: Object.keys(MARCAS)[0] || "doggis" });
  const [msgLocal, setMsgLocal]     = useState(null);

  const [confirmDel, setConfirmDel] = useState(null);

  if (!esAdmin) return (
    <Card>
      <div style={{ textAlign:"center", padding:"24px 0", fontFamily:"Nunito", color:"#94A3B8" }}>
        🔒 Solo el administrador puede gestionar la red de tiendas.
      </div>
    </Card>
  );

  const handleAgregarMarca = () => {
    const key = nuevaMarca.key.trim().toLowerCase().replace(/\s+/g,"");
    if (!key || !nuevaMarca.nombre.trim()) { setMsgMarca({ ok:false, text:"Completa clave y nombre." }); return; }
    if (MARCAS[key]) { setMsgMarca({ ok:false, text:`La clave "${key}" ya existe.` }); return; }
    guardarMarcaExtra(key, { nombre: nuevaMarca.nombre.trim(), color: nuevaMarca.color, bg: nuevaMarca.bg, emoji: nuevaMarca.emoji, textColor: nuevaMarca.textColor, erp: nuevaMarca.erp });
    setMsgMarca({ ok:true, text:`✅ Marca "${nuevaMarca.nombre}" agregada. Recarga la página para verla en el selector.` });
    setNuevaMarca({ key:"", nombre:"", emoji:"🍔", color:"#E8003D", bg:"#FFF0F3", textColor:"#fff", erp:"propio" });
    refresh();
  };

  const handleAgregarLocal = () => {
    const nombre = nuevoLocal.nombre.trim();
    if (!nombre || !nuevoLocal.marca) { setMsgLocal({ ok:false, text:"Completa nombre y marca." }); return; }
    if (LOCALES_DATA.find(l => l.nombre.toLowerCase() === nombre.toLowerCase())) {
      setMsgLocal({ ok:false, text:"Ya existe un local con ese nombre." }); return;
    }
    const id = Date.now();
    guardarLocalExtra({ id, nombre, marca: nuevoLocal.marca });
    setMsgLocal({ ok:true, text:`✅ Local "${nombre}" agregado a ${MARCAS[nuevoLocal.marca]?.nombre}.` });
    setNuevoLocal(p => ({ ...p, nombre:"" }));
    refresh();
  };

  const handleEliminarLocal = (id) => {
    if (LOCALES_BASE.find(l => l.id === id)) { setConfirmDel(null); return; } // no eliminar base
    eliminarLocalExtra(id);
    setConfirmDel(null);
    refresh();
  };

  const presetColor = COLORES_PRESET.find(c => c.color === nuevaMarca.color);

  return (
    <div style={{ paddingBottom:10 }}>
      {confirmDel && (
        <ConfirmModal
          msg={`¿Eliminar "${confirmDel.nombre}"?`}
          detalle="Esta acción no elimina los datos registrados, solo quita el local del selector."
          onConfirm={() => handleEliminarLocal(confirmDel.id)}
          onCancel={() => setConfirmDel(null)}
        />
      )}

      {/* ── Marcas actuales ── */}
      <Card style={{ marginBottom:14 }}>
        <div style={{ fontFamily:"Nunito", fontWeight:900, fontSize:14, color:"#6C63FF", marginBottom:12 }}>
          🏷️ Marcas de la red
        </div>
        <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
          {Object.entries(MARCAS).map(([key, m]) => {
            const esBase = !!MARCAS_BASE[key];
            return (
              <div key={key} style={{ display:"flex", alignItems:"center", gap:10, padding:"8px 12px", background: m.bg, borderRadius:12, border:`1.5px solid ${m.color}33` }}>
                <span style={{ fontSize:20 }}>{m.emoji}</span>
                <div style={{ flex:1 }}>
                  <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:13, color:m.color }}>{m.nombre}</div>
                  <div style={{ fontSize:10, color:"#94A3B8" }}>
                    clave: <code style={{ background:"#F1F5F9", padding:"1px 5px", borderRadius:4 }}>{key}</code>
                    &nbsp;· ERP: <strong>{m.erp||"propio"}</strong>
                    &nbsp;· {(LOCALES_POR_MARCA[key]||[]).length} local(es)
                    {esBase && <span style={{ color:"#CBD5E1" }}> · predeterminada</span>}
                  </div>
                </div>
                {m.erp === "toteat" && (
                  <span style={{ background:"#FFF4ED", color:"#FF6B00", fontFamily:"Nunito", fontWeight:800, fontSize:10, padding:"3px 8px", borderRadius:6, border:"1px solid #FF6B0033" }}>Toteat</span>
                )}
              </div>
            );
          })}
        </div>
      </Card>

      {/* ── Agregar marca ── */}
      <Card style={{ marginBottom:14 }}>
        <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:13, color:"#6C63FF", marginBottom:12 }}>➕ Agregar nueva marca</div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:10 }}>
          <Field label="Clave única (sin espacios)">
            <input placeholder="ej: popcorn2" value={nuevaMarca.key}
              onChange={e=>setNuevaMarca(p=>({...p,key:e.target.value.replace(/\s/g,"").toLowerCase()}))} />
          </Field>
          <Field label="Nombre visible">
            <input placeholder="ej: Pop Corn 2" value={nuevaMarca.nombre}
              onChange={e=>setNuevaMarca(p=>({...p,nombre:e.target.value}))} />
          </Field>
        </div>

        <Field label="Emoji">
          <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginTop:4 }}>
            {EMOJIS_DISPONIBLES.map(e => (
              <button key={e} onClick={()=>setNuevaMarca(p=>({...p,emoji:e}))}
                style={{ width:36, height:36, fontSize:20, background: nuevaMarca.emoji===e?"#EEF2FF":"#F8FAFC", border:`2px solid ${nuevaMarca.emoji===e?"#6C63FF":"#E2E8F0"}`, borderRadius:8, cursor:"pointer" }}>
                {e}
              </button>
            ))}
          </div>
        </Field>

        <div style={{ marginTop:10 }}>
          <div style={{ fontFamily:"Nunito", fontSize:11, fontWeight:700, color:"#64748B", marginBottom:6 }}>COLOR</div>
          <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
            {COLORES_PRESET.map(c => (
              <button key={c.color} onClick={()=>setNuevaMarca(p=>({...p,color:c.color,bg:c.bg,textColor:c.textColor}))}
                style={{ width:28, height:28, background:c.color, border:`3px solid ${nuevaMarca.color===c.color?"#1A1D2E":"transparent"}`, borderRadius:6, cursor:"pointer", title:c.label }} />
            ))}
          </div>
        </div>

        <div style={{ marginTop:10, display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
          <Field label="Sistema ERP">
            <select value={nuevaMarca.erp} onChange={e=>setNuevaMarca(p=>({...p,erp:e.target.value}))}>
              <option value="propio">ERP Propio</option>
              <option value="toteat">Toteat</option>
            </select>
          </Field>
          <div style={{ display:"flex", alignItems:"flex-end", paddingBottom:4 }}>
            <div style={{ background:nuevaMarca.bg, borderRadius:10, padding:"6px 12px", display:"flex", alignItems:"center", gap:6, border:`1.5px solid ${nuevaMarca.color}44` }}>
              <span style={{ fontSize:18 }}>{nuevaMarca.emoji}</span>
              <span style={{ fontFamily:"Nunito", fontWeight:800, fontSize:13, color:nuevaMarca.color }}>{nuevaMarca.nombre||"Preview"}</span>
            </div>
          </div>
        </div>

        {msgMarca && <div style={{ marginTop:8, padding:"8px 12px", borderRadius:8, background:msgMarca.ok?"#F0FDF4":"#FEF2F2", color:msgMarca.ok?"#166534":"#DC2626", fontFamily:"Nunito", fontSize:12, fontWeight:700 }}>{msgMarca.text}</div>}
        <div style={{ marginTop:10 }}>
          <Btn color="#6C63FF" full onClick={handleAgregarMarca}>➕ Agregar marca</Btn>
        </div>
      </Card>

      {/* ── Locales por marca ── */}
      <Card style={{ marginBottom:14 }}>
        <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:13, color:"#6C63FF", marginBottom:12 }}>🏪 Locales por marca</div>
        {Object.entries(MARCAS).map(([key, m]) => {
          const locales = LOCALES_DATA.filter(l => l.marca === key);
          if (!locales.length) return null;
          return (
            <div key={key} style={{ marginBottom:14 }}>
              <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:6 }}>
                <span style={{ fontSize:14 }}>{m.emoji}</span>
                <span style={{ fontFamily:"Nunito", fontWeight:800, fontSize:12, color:m.color }}>{m.nombre}</span>
              </div>
              {locales.map(l => {
                const esBase = !!LOCALES_BASE.find(b => b.id === l.id);
                return (
                  <div key={l.id} style={{ display:"flex", alignItems:"center", gap:8, padding:"6px 10px", background:"#F8FAFC", borderRadius:8, marginBottom:4 }}>
                    <span style={{ flex:1, fontFamily:"Nunito", fontSize:11, color:"#1A1D2E" }}>{l.nombre}</span>
                    {esBase
                      ? <span style={{ fontSize:9, color:"#CBD5E1", fontFamily:"Nunito" }}>base</span>
                      : <button onClick={()=>setConfirmDel(l)}
                          style={{ background:"#FEF2F2", border:"none", borderRadius:6, padding:"3px 8px", fontSize:11, color:"#DC2626", cursor:"pointer", fontFamily:"Nunito", fontWeight:700 }}>✕</button>
                    }
                  </div>
                );
              })}
            </div>
          );
        })}
      </Card>

      {/* ── Agregar local ── */}
      <Card>
        <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:13, color:"#6C63FF", marginBottom:12 }}>➕ Agregar nueva tienda</div>
        <Field label="Marca">
          <select value={nuevoLocal.marca} onChange={e=>setNuevoLocal(p=>({...p,marca:e.target.value}))}>
            {Object.entries(MARCAS).map(([k,m]) => <option key={k} value={k}>{m.emoji} {m.nombre}</option>)}
          </select>
        </Field>
        <div style={{ height:8 }} />
        <Field label="Nombre del local (incluye marca + ubicación)">
          <input placeholder={`ej: ${MARCAS[nuevoLocal.marca]?.nombre} - Mall Centro`}
            value={nuevoLocal.nombre} onChange={e=>setNuevoLocal(p=>({...p,nombre:e.target.value}))} />
        </Field>
        {msgLocal && <div style={{ marginTop:8, padding:"8px 12px", borderRadius:8, background:msgLocal.ok?"#F0FDF4":"#FEF2F2", color:msgLocal.ok?"#166534":"#DC2626", fontFamily:"Nunito", fontSize:12, fontWeight:700 }}>{msgLocal.text}</div>}
        <div style={{ marginTop:10 }}>
          <Btn color="#6C63FF" full onClick={handleAgregarLocal}>➕ Agregar tienda</Btn>
        </div>
        <div style={{ marginTop:10, fontSize:10, color:"#94A3B8", fontFamily:"Nunito" }}>
          ⚠️ Los cambios se aplican inmediatamente en esta sesión. Si usas múltiples dispositivos, vuelve a cargar la página en cada uno.
        </div>
      </Card>
    </div>
  );
}

// ── MetasEditor — metas por local + defaults globales ────────────────────────
function MetasEditor({ metaLaborPct, setMetaLaborPct, metaFoodCostPct, setMetaFoodCostPct,
                       metaMermasPct, setMetaMermasPct, metaColacionesPct, setMetaColacionesPct,
                       metaKdsMin, setMetaKdsMin, metaNpsMins, setMetaNpsMins }) {

  // Metas por local — guardadas en el mismo array que usa Dashboard/Alertas
  const [metasLocal, setMetasLocal] = useStorage("horreo_metas_kpi_local", {});
  // { [local]: { labor_pct, foodcost_pct, merma_pct, kds_min, nps_min } }

  const [localSel, setLocalSel] = useState(LOCALES[0]);
  const [saved, setSaved]       = useState(false);

  const getLocal = (local) => metasLocal[local] || {};
  const setLocalField = (local, field, val) => {
    const n = parseFloat(val);
    setMetasLocal(prev => ({ ...prev, [local]: { ...prev[local], [field]: isNaN(n) ? "" : n } }));
  };

  const handleSave = () => { setSaved(true); setTimeout(() => setSaved(false), 2000); };

  const NF = (v, fallback) => (v !== undefined && v !== "" && !isNaN(v)) ? Number(v) : fallback;

  // Chip de semáforo preview
  const SemPreview = ({ val, meta, inv = false }) => {
    if (!val && val !== 0) return null;
    const ok = inv ? val >= meta : val <= meta;
    const warn = inv ? val >= meta * 0.9 : val <= meta * 1.15;
    const c = ok ? "#16A34A" : warn ? "#D97706" : "#DC2626";
    const ic = ok ? "🟢" : warn ? "🟡" : "🔴";
    return <span style={{ fontSize:10, color:c, fontWeight:700 }}>{ic} meta: {meta}</span>;
  };

  const lv = getLocal(localSel);

  return (
    <div style={{ paddingBottom: 10 }}>
      {/* Defaults globales — tarjeta compacta */}
      <Card style={{ marginBottom:14, border:"1.5px solid #E0EAFF" }}>
        <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:13, color:"#6C63FF", marginBottom:8 }}>
          🌐 Valores por defecto — red completa
        </div>
        <div style={{ fontSize:11, color:"#94A3B8", marginBottom:12 }}>
          Se aplican a locales sin configuración propia.
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8 }}>
          {[
            ["Labor/Venta %", metaLaborPct,    setMetaLaborPct,    28,  0, 100, 0.5],
            ["Food Cost %",   metaFoodCostPct,  setMetaFoodCostPct, 40,  0, 100, 0.5],
            ["Merma %",       metaMermasPct,    setMetaMermasPct,   2,   0,  20, 0.1],
            ["Colaciones %",  metaColacionesPct, setMetaColacionesPct, 3, 0,  20, 0.1],
            ["KDS máx (min)", metaKdsMin,       setMetaKdsMin,      4,   1,  60,   1],
            ["NPS mín",       metaNpsMins,      setMetaNpsMins,     80,  0, 100,   1],
          ].map(([label, val, setter, def, mn, mx, step]) => (
            <div key={label}>
              <div style={{ fontFamily:"Nunito", fontSize:9, color:"#94A3B8", fontWeight:700, marginBottom:3, textTransform:"uppercase" }}>{label}</div>
              <input type="number" value={val ?? def} min={mn} max={mx} step={step}
                onChange={e => setter(parseFloat(e.target.value))}
                style={{ width:"100%", padding:"5px 8px", fontSize:13, fontWeight:700, borderRadius:8, border:"1.5px solid #E2E8F0", fontFamily:"Nunito" }} />
            </div>
          ))}
        </div>
      </Card>

      {/* Selector de local */}
      <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:12, color:"#475569", marginBottom:8, textTransform:"uppercase", letterSpacing:.5 }}>
        📍 Metas por local
      </div>
      <div style={{ display:"flex", gap:5, marginBottom:12, overflowX:"auto", paddingBottom:2 }}>
        {LOCALES.map(l => {
          const tieneConfig = Object.keys(metasLocal[l]||{}).some(k => metasLocal[l][k] !== "" && metasLocal[l][k] !== undefined);
          return (
            <button key={l} onClick={()=>setLocalSel(l)}
              style={{ whiteSpace:"nowrap", background: localSel===l ? "#6C63FF" : "#fff", color: localSel===l ? "#fff" : "#475569", border:`1.5px solid ${localSel===l?"#6C63FF":"#E2E8F0"}`, borderRadius:10, padding:"6px 10px", fontFamily:"Nunito", fontWeight:700, fontSize:10, cursor:"pointer", position:"relative" }}>
              {l.split(" - ")[1] || l}
              {tieneConfig && <span style={{ position:"absolute", top:-4, right:-4, width:8, height:8, background:"#22C55E", borderRadius:"50%", border:"1.5px solid #fff" }} />}
            </button>
          );
        })}
      </div>

      {/* Editor del local seleccionado */}
      <Card>
        <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:13, color:"#1A1D2E", marginBottom:4 }}>{localSel}</div>
        <div style={{ fontSize:10, color:"#94A3B8", marginBottom:14 }}>
          Deja en blanco para usar el valor por defecto de la red.
        </div>

        <Divider label="Labor y Food Cost" color="#6C63FF" />
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:14 }}>
          <Field label={`Labor/Venta % (default: ${metaLaborPct||28}%)`}>
            <input type="number" placeholder={String(metaLaborPct||28)} min="0" max="100" step="0.5"
              value={lv.labor_pct ?? ""}
              onChange={e=>setLocalField(localSel,"labor_pct",e.target.value)} />
          </Field>
          <Field label={`Food Cost % (default: ${metaFoodCostPct||40}%)`}>
            <input type="number" placeholder={String(metaFoodCostPct||40)} min="0" max="100" step="0.5"
              value={lv.foodcost_pct ?? ""}
              onChange={e=>setLocalField(localSel,"foodcost_pct",e.target.value)} />
          </Field>
        </div>

        <Divider label="KPI y Mermas" color="#22C55E" />
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:10 }}>
          <Field label={`Merma % (default: ${metaMermasPct||2}%)`}>
            <input type="number" placeholder={String(metaMermasPct||2)} min="0" max="20" step="0.1"
              value={lv.merma_pct ?? ""}
              onChange={e=>setLocalField(localSel,"merma_pct",e.target.value)} />
          </Field>
          <Field label={`Colaciones % (default: ${metaColacionesPct||3}%)`}>
            <input type="number" placeholder={String(metaColacionesPct||3)} min="0" max="20" step="0.1"
              value={lv.col_pct ?? ""}
              onChange={e=>setLocalField(localSel,"col_pct",e.target.value)} />
          </Field>
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:14 }}>
          <Field label={`KDS máx min (default: ${metaKdsMin||4})`}>
            <input type="number" placeholder={String(metaKdsMin||4)} min="1" max="60"
              value={lv.kds_min ?? ""}
              onChange={e=>setLocalField(localSel,"kds_min",e.target.value)} />
          </Field>
          <Field label={`NPS mín (default: ${metaNpsMins||80})`}>
            <input type="number" placeholder={String(metaNpsMins||80)} min="0" max="100"
              value={lv.nps_min ?? ""}
              onChange={e=>setLocalField(localSel,"nps_min",e.target.value)} />
          </Field>
        </div>

        <Divider label="Semáforos Food Cost" color="#FF6B00" />
        <div style={{ background:"#FFF8F0", border:"1px solid #FED7AA", borderRadius:10, padding:"10px 12px", marginBottom:10 }}>
          <div style={{ fontSize:11, color:"#92400E", fontFamily:"Nunito", marginBottom:8, fontWeight:700 }}>
            🚦 Rangos de semaforización Food Cost (% costo real)
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8, marginBottom:8 }}>
            <div>
              <div style={{ fontSize:9, color:"#16A34A", fontWeight:800, textTransform:"uppercase", marginBottom:3 }}>🟢 Verde ≤</div>
              <div style={{ display:"flex", alignItems:"center", gap:3 }}>
                <input type="number" placeholder={String(metaFoodCostPct||40)} min="0" max="100" step="0.5"
                  value={lv.fc_verde ?? ""}
                  onChange={e=>setLocalField(localSel,"fc_verde",e.target.value)}
                  style={{ flex:1, padding:"5px 8px", fontSize:13, fontWeight:700, borderRadius:8, border:"1.5px solid #86EFAC", fontFamily:"Nunito" }} />
                <span style={{ fontSize:11, color:"#64748B" }}>%</span>
              </div>
              <div style={{ fontSize:9, color:"#94A3B8", marginTop:2 }}>Óptimo / En meta</div>
            </div>
            <div>
              <div style={{ fontSize:9, color:"#D97706", fontWeight:800, textTransform:"uppercase", marginBottom:3 }}>🟡 Amarillo ≤</div>

                  onChange={e=>setLocalField(localSel,"fc_amarillo",e.target.value)}
                  style={{ flex:1, padding:"5px 8px", fontSize:13, fontWeight:700, borderRadius:8, border:"1.5px solid #FCD34D", fontFamily:"Nunito" }} />
                <span style={{ fontSize:11, color:"#64748B" }}>%</span>
              </div>
              <div style={{ fontSize:9, color:"#94A3B8", marginTop:2 }}>Alerta / Precaución</div>
            </div>
            <div>
              <div style={{ fontSize:9, color:"#DC2626", fontWeight:800, textTransform:"uppercase", marginBottom:3 }}>🔴 Rojo &gt;</div>
              <div style={{ display:"flex", alignItems:"center", gap:3 }}>
                <input type="number" placeholder={String((metaFoodCostPct||40)*1.1|0)} min="0" max="100" step="0.5"

                  onChange={e=>setLocalField(localSel,"fc_rojo",e.target.value)}

                <span style={{ fontSize:11, color:"#64748B" }}>%</span>
              </div>
              <div style={{ fontSize:9, color:"#94A3B8", marginTop:2 }}>Crítico</div>
            </div>
          </div>
          {/* Preview semáforo FC */}
          <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
            {[
              { label:"🟢 Óptimo",    val: NF(lv.fc_verde,    metaFoodCostPct||40),        color:"#16A34A" },

// Helpers para metas — fuera de componentes para evitar problemas de scope
const readMetaLS  = (key, def) => { try { const v = parseFloat(localStorage.getItem(key)); return isNaN(v) ? def : v; } catch { return def; } };
const writeMetaLS = (key, val) => { try { localStorage.setItem(key, String(val)); } catch(e) { console.warn("[Hórreo]", e?.message ?? e); } };

// Obtiene la meta efectiva de un local (propia > default global)
const getMetaLocal = (local, campo, defGlobalKey, defVal) => {
  try {
    const locales = JSON.parse(localStorage.getItem("horreo_metas_kpi_local") || "{}");
    const v = locales[local]?.[campo];
    if (v !== undefined && v !== "" && !isNaN(parseFloat(v))) return parseFloat(v);
    return readMetaLS(defGlobalKey, defVal);
  } catch { return defVal; }
};

function ContactoRapidoForm() {
  // useCloudSetting sincroniza con Supabase automáticamente, con fallback localStorage
  const [contacto, setContacto] = useCloudSetting("horreo_contacto_rapido", { telefono: "", email: "" });
  const [waNum, setWaNum] = useState(contacto.telefono || "");
  const [mail,  setMail]  = useState(contacto.email   || "");
  const [ok, setOk] = useState(false);

  // Sincronizar campos cuando llegan datos de Supabase
  useEffect(() => {
    setWaNum(contacto.telefono || "");
    setMail(contacto.email   || "");
  }, [contacto.telefono, contacto.email]);

  const guardar = () => {
    const nuevo = { telefono: waNum.replace(/\D/g,""), email: mail.trim() };

              ["📶","Funciona sin conexión — los datos quedan guardados localmente"],
              ["🔔","Sin barra del navegador — más espacio para ver la información"],
              ["🔄","Se actualiza automáticamente al conectarte"],
            ].map(([icon, text]) => (
              <div key={text} style={{ display:"flex", gap:10, marginBottom:8, alignItems:"flex-start" }}>
                <span style={{ fontSize:18, flexShrink:0 }}>{icon}</span>
                <div style={{ fontFamily:"Nunito", fontSize:12, color:"var(--text-2)", lineHeight:1.5 }}>{text}</div>
              </div>
            ))}
          </Card>
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// HISTORIAL — con useMemo, ConfirmModal con detalle
// ══════════════════════════════════════════════════════════════════════════════
function Historial({ ventas, kpis, inventarios, setVentas, setKpis, setInventarios, marca, semanas, setSemanas, planillas, setPlanillas, session, costoTeorico, setCostoTeorico }) {
  const [tab, setTab]           = useState("ventas");
  const [filtroLocal, setFiltroLocal] = useState("Todos");
  const [confirmDel, setConfirmDel]   = useState(null);
  const [editReg, setEditReg]         = useState(null); // registro en edición
  const [editForm, setEditForm]       = useState({});
  const m = MARCAS[marca] || MARCAS[Object.keys(MARCAS)[0]] || { color: "#6C63FF", bg: "#F0EEFF", emoji: "🌭", textColor: "#fff", nombre: "—" };
  const localesMarca = LOCALES_POR_MARCA[marca] || LOCALES;

  const isAdmin = session?.rol === "admin";

  const openEdit = (r) => {
    setEditReg(r);
    setEditForm({
      venta_bruta: r.venta_bruta ?? "",
      boletas:     r.boletas     ?? "",
      merma:       r.merma       ?? "",
      colaciones:  r.colaciones  ?? "",
      obs:         r.obs         ?? "",
      // KPI fields
      kds_desayuno: r.kds_desayuno ?? "",
      kds_almuerzo: r.kds_almuerzo ?? "",
      kds_tarde:    r.kds_tarde    ?? "",
      kds_noche:    r.kds_noche    ?? "",
      nota_uber:    r.nota_uber    ?? "",
      nota_pya:     r.nota_pya     ?? "",
      pedidos_uber: r.pedidos_uber ?? "",
      pedidos_pya:  r.pedidos_pya  ?? "",
      nps_promotores:  r.nps_promotores  ?? "",
      nps_pasivos:     r.nps_pasivos     ?? "",
      nps_detractores: r.nps_detractores ?? "",
    });
  };

  const handleSaveEdit = () => {
    if (!editReg) return;
    const nv = parseFloat(editForm.venta_bruta || 0);
    const nb = parseFloat(editForm.boletas || 0);
    const updated = {
      ...editReg,
      ...editForm,
      venta_bruta: nv, boletas: nb,
      ticket: nb > 0 ? Math.round(nv / nb) : editReg.ticket,
      ts_editado: new Date().toISOString(),
    };
    if (tab === "ventas") {
      setVentas(v => v.map(x => x.id === editReg.id ? updated : x));
      getSB()?.from("ventas").upsert(updated, {onConflict:"id"}).then(({error})=>error&&console.warn("edit ventas",error.message));
    }
    if (tab === "kpi") {
      setKpis(k => k.map(x => x.id === editReg.id ? updated : x));
      getSB()?.from("kpis").upsert(updated, {onConflict:"id"}).then(({error})=>error&&console.warn("edit kpis",error.message));
    }
    setEditReg(null);
  };

  const data     = tab === "ventas" ? ventas : tab === "kpi" ? kpis : inventarios;
  const filtered = useMemo(() =>
    (filtroLocal === "Todos" ? data : data.filter(r => r.local === filtroLocal)).filter(r => r.marca === marca),
    [data, filtroLocal, marca]);
  const sorted   = useMemo(() => [...filtered].sort((a, b) => b.ts > a.ts ? 1 : -1).slice(0, 40), [filtered]);

  // Labor: semanas de esta marca
  const semanasMarca = useMemo(() => (semanas || []).filter(s => s.marca === marca).sort((a,b) => b.inicio > a.inicio ? 1 : -1), [semanas, marca]);
  // Planillas: agrupadas por local+mes
  const planillasMarca = useMemo(() => {
    const grupos = {};
    (planillas || []).filter(p => p.marca === marca).forEach(p => {
      const key = p.local + "__" + (p.fecha_carga || "").slice(0,7);
      if (!grupos[key]) grupos[key] = { local: p.local, mes: (p.fecha_carga || "").slice(0,7), count: 0, ids: [] };
      grupos[key].count++;
      grupos[key].ids.push(p.id);
    });
    return Object.values(grupos).sort((a,b) => b.mes > a.mes ? 1 : -1);
  }, [planillas, marca]);

  const handleConfirmDel = () => {
    if (!confirmDel) return;
    if (tab === "ventas") {
      setVentas(v => v.filter(x => x.id !== confirmDel.id));
      sbDelete("ventas", confirmDel.id);
    }
    if (tab === "kpi") {
      setKpis(k => k.filter(x => x.id !== confirmDel.id));
      sbDelete("kpis", confirmDel.id);
    }
    if (tab === "inventario") setInventarios(i => i.filter(x => x.id !== confirmDel.id));
    if (tab === "labor" && setSemanas) {
      setSemanas(ss => ss.filter(s => !(s.marca === marca && s.inicio === confirmDel.inicio && s.fin === confirmDel.fin && (s.uploadLocal || s.sucursal) === (confirmDel.uploadLocal || confirmDel.sucursal))));
      if (confirmDel.id) {
        sbDelete("labor_semanas", confirmDel.id);
      } else {
        // Fallback: eliminar por filtro compuesto si no hay id
        sbDeleteWhere("labor_semanas", { marca, inicio: confirmDel.inicio, fin: confirmDel.fin });
      }
    }
    if (tab === "planillas" && setPlanillas) {
      (confirmDel.ids || []).forEach(id => sbDelete("planillas_costos", id));
      setPlanillas(ps => ps.filter(p => !(confirmDel.ids || []).includes(p.id)));
    }
    setConfirmDel(null);
  };

  // Estado edición costo teórico dentro de Historial
  const [ctEditId, setCtEditId]     = useState(null);
  const [ctEditForm, setCtEditForm] = useState({});
  const [ctConfirmDel, setCtConfirmDel] = useState(null);

  const ctRegistrosMarca = useMemo(() =>
    (costoTeorico || []).filter(r => r.marca === marca).sort((a,b) => b.periodo > a.periodo ? 1 : -1),
    [costoTeorico, marca]);

  const ctIniciarEdicion = (r) => { setCtEditId(r.id); setCtEditForm({ mermas: r.mermas, colaciones: r.colaciones, totalVenta: r.totalVenta }); };
  const ctGuardar = () => {
    setCostoTeorico && setCostoTeorico(prev => prev.map(r => r.id === ctEditId
      ? { ...r, mermas: parseFloat(ctEditForm.mermas)||0, colaciones: parseFloat(ctEditForm.colaciones)||0, totalVenta: parseFloat(ctEditForm.totalVenta)||0 }
      : r));
    setCtEditId(null);
  };
  const ctEliminar = (id) => {
    setCostoTeorico && setCostoTeorico(prev => id === "__ALL__" ? prev.filter(r => r.marca !== marca) : prev.filter(r => r.id !== id));
    setCtConfirmDel(null);
  };

  const tabsDisponibles = [
    { id: "ventas",    label: "🛒 Ventas"   },
    { id: "kpi",       label: "⚡ KPI"       },
    { id: "inventario",label: "📦 Inv."      },
    ...(isAdmin ? [{ id: "labor",     label: "🏭 Labor"     }] : []),
    ...(isAdmin ? [{ id: "planillas", label: "💰 Planillas" }] : []),
    ...(isAdmin && costoTeorico ? [{ id: "teorico", label: "📈 C.Teórico" }] : []),
  ];

  return (
    <div className="fade" style={{ paddingBottom: 90 }}>
      {confirmDel && <ConfirmModal
        msg={tab === "labor"
          ? `Semana ${confirmDel.semana}: ${confirmDel.inicio} → ${confirmDel.fin}`
          : tab === "planillas"
          ? `${confirmDel.local} — ${confirmDel.mes}`
          : `${confirmDel.local} — ${confirmDel.fecha}`}
        detalle={tab === "labor"
          ? `${confirmDel.empleados} empleados · ${nombreCortoLocal(confirmDel.uploadLocal || confirmDel.sucursal || "")}`
          : tab === "planillas"
          ? `${confirmDel.count} registros serán eliminados`
          : confirmDel.turno ? `Turno: ${confirmDel.turno}` : undefined}
        onConfirm={handleConfirmDel}
        onCancel={() => setConfirmDel(null)}
      />}
      <LogoHeader marca={marca} />
      <SectionTitle color={m.color}>📋 Historial</SectionTitle>
      <div style={{ display: "flex", gap: 6, marginBottom: 12, flexWrap: "wrap" }}>
        {tabsDisponibles.map(t => (<Btn key={t.id} onClick={() => setTab(t.id)} color={m.color} outline={tab !== t.id} small>{t.label}</Btn>))}
      </div>

      {/* Filtro local — solo para ventas/kpi/inventario */}
      {["ventas","kpi","inventario"].includes(tab) && (
        <div style={{ marginBottom: 12 }}>
          <select value={filtroLocal} onChange={e => setFiltroLocal(e.target.value)} style={{ width: "auto", minWidth: 140 }}>
            <option>Todos</option>{localesMarca.map(l => <option key={l}>{l}</option>)}
          </select>
        </div>
      )}

      {/* ── Modal de edición ── */}
      {editReg && (
        <div style={{ position:"fixed", inset:0, zIndex:999, background:"rgba(0,0,0,0.45)", display:"flex", alignItems:"flex-end", justifyContent:"center" }}
          onClick={() => setEditReg(null)}>
          <div onClick={e => e.stopPropagation()}
            style={{ background:"#fff", borderRadius:"20px 20px 0 0", padding:20, width:"100%", maxWidth:520, maxHeight:"85vh", overflowY:"auto" }}>
            <div style={{ width:36, height:4, background:"#E2E8F0", borderRadius:2, margin:"0 auto 16px" }} />
            <div style={{ fontFamily:"Nunito", fontWeight:900, fontSize:16, marginBottom:2 }}>✏️ Editar registro</div>
            <div style={{ fontFamily:"Nunito", fontSize:11, color:"#94A3B8", marginBottom:14 }}>
              {nombreCortoLocal(editReg.local)} · {editReg.fecha} · {editReg.turno}
            </div>

            {tab === "ventas" && (
              <>
                {[["Venta Bruta $","venta_bruta","number"],["N° Boletas","boletas","number"],
                  ["Merma $","merma","number"],["Colaciones $","colaciones","number"]].map(([l,k,t]) => (
                  <div key={k} style={{ marginBottom:10 }}>
                    <div style={{ fontFamily:"Nunito", fontSize:11, color:"#64748B", fontWeight:700, marginBottom:3 }}>{l}</div>
                    <input type={t} value={editForm[k]} onChange={e => setEditForm(f=>({...f,[k]:e.target.value}))}
                      style={{ width:"100%", border:"1.5px solid #E2E8F0", borderRadius:9, padding:"8px 10px", fontFamily:"Nunito", fontSize:13, boxSizing:"border-box" }} />
                  </div>
                ))}
                {editReg.corte_16_ref && (
                  <div style={{ background:"#EFF6FF", border:"1px solid #BFDBFE", borderRadius:8, padding:"8px 10px", marginBottom:10, fontFamily:"Nunito", fontSize:11, color:"#1D4ED8" }}>
                    ℹ️ Este registro es el delta de un cierre con corte 16:00. Edita la venta bruta con cuidado.
                  </div>
                )}
              </>
            )}

            {tab === "kpi" && (
              <>
                <div style={{ fontFamily:"Nunito", fontWeight:700, fontSize:11, color:"#64748B", marginBottom:6 }}>KDS (min)</div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:10 }}>
                  {[["Desayuno","kds_desayuno"],["Almuerzo","kds_almuerzo"],["Tarde","kds_tarde"],["Noche","kds_noche"]].map(([l,k])=>(
                    <div key={k}>
                      <div style={{ fontFamily:"Nunito", fontSize:10, color:"#94A3B8", marginBottom:2 }}>{l}</div>
                      <input type="number" value={editForm[k]} onChange={e=>setEditForm(f=>({...f,[k]:e.target.value}))}
                        style={{ width:"100%", border:"1.5px solid #E2E8F0", borderRadius:8, padding:"6px 8px", fontFamily:"Nunito", fontSize:12, boxSizing:"border-box" }} />
                    </div>
                  ))}
                </div>
                <div style={{ fontFamily:"Nunito", fontWeight:700, fontSize:11, color:"#64748B", marginBottom:6 }}>Delivery</div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:10 }}>
                  {[["Nota Uber","nota_uber"],["Nota PYA","nota_pya"],["Pedidos Uber","pedidos_uber"],["Pedidos PYA","pedidos_pya"]].map(([l,k])=>(
                    <div key={k}>
                      <div style={{ fontFamily:"Nunito", fontSize:10, color:"#94A3B8", marginBottom:2 }}>{l}</div>
                      <input type="number" value={editForm[k]} onChange={e=>setEditForm(f=>({...f,[k]:e.target.value}))}
                        style={{ width:"100%", border:"1.5px solid #E2E8F0", borderRadius:8, padding:"6px 8px", fontFamily:"Nunito", fontSize:12, boxSizing:"border-box" }} />
                    </div>
                  ))}
                </div>
                <div style={{ fontFamily:"Nunito", fontWeight:700, fontSize:11, color:"#64748B", marginBottom:6 }}>NPS</div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8, marginBottom:10 }}>
                  {[["Promotores","nps_promotores"],["Pasivos","nps_pasivos"],["Detractores","nps_detractores"]].map(([l,k])=>(
                    <div key={k}>
                      <div style={{ fontFamily:"Nunito", fontSize:10, color:"#94A3B8", marginBottom:2 }}>{l}</div>
                      <input type="number" value={editForm[k]} onChange={e=>setEditForm(f=>({...f,[k]:e.target.value}))}
                        style={{ width:"100%", border:"1.5px solid #E2E8F0", borderRadius:8, padding:"6px 8px", fontFamily:"Nunito", fontSize:12, boxSizing:"border-box" }} />
                    </div>
                  ))}
                </div>
              </>
            )}

            <div style={{ fontFamily:"Nunito", fontSize:11, color:"#64748B", fontWeight:700, marginBottom:3 }}>Observaciones</div>
            <textarea rows={2} value={editForm.obs} onChange={e=>setEditForm(f=>({...f,obs:e.target.value}))}
              style={{ width:"100%", border:"1.5px solid #E2E8F0", borderRadius:9, padding:"8px 10px", fontFamily:"Nunito", fontSize:12, resize:"none", boxSizing:"border-box", marginBottom:14 }} />

            <div style={{ display:"flex", gap:8 }}>
              <Btn onClick={handleSaveEdit} color={m.color} full>💾 Guardar cambios</Btn>
              <Btn onClick={() => setEditReg(null)} color="#94A3B8">Cancelar</Btn>
            </div>
          </div>
        </div>
      )}

      {/* ── Ventas / KPI / Inventario ── */}
      {["ventas","kpi","inventario"].includes(tab) && (
        <>
          {sorted.length === 0 && <Card><div style={{ textAlign: "center", color: "#94A3B8", padding: 30, fontFamily: "Nunito", fontWeight: 700 }}>Sin registros aún</div></Card>}
          {sorted.map(r => (
            <Card key={r.id} style={{ marginBottom: 10 }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8, alignItems: "center" }}>
                <div style={{ display: "flex", gap: 6, flexWrap: "wrap", alignItems: "center" }}>
                  <Badge text={r.local} color={m.color} small />
                  {r.turno && <Badge text={r.turno} color="#F59E0B" small />}
                  <span style={{ fontSize: 11, color: "#94A3B8" }}>{r.fecha}</span>
                  {r.ts_editado && <span style={{ fontSize:9, color:"#94A3B8", fontStyle:"italic" }}>editado</span>}
                </div>
                <div style={{ display:"flex", gap:6, alignItems:"center" }}>
                  {["ventas","kpi"].includes(tab) && (
                    <button onClick={() => openEdit(r)}
                      style={{ background:"#EFF6FF", border:"1px solid #BFDBFE", borderRadius:7, padding:"4px 8px",
                        color:"#2563EB", fontFamily:"Nunito", fontWeight:700, fontSize:11, cursor:"pointer" }}>
                      ✏️
                    </button>
                  )}
                  <DeleteBtn onDelete={() => setConfirmDel({ id: r.id, fecha: r.fecha, local: r.local, turno: r.turno })} />
                </div>
              </div>
              {tab === "ventas" && (
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
                  {[["Venta Bruta", fmtCLP(r.venta_bruta), m.color], ["Boletas", r.boletas, "#1A1D2E"], ["Cumpl.", fmtPct(r.cumpl_venta), r.cumpl_venta >= 1 ? "#22C55E" : "#F59E0B"]].map(([l, v, c]) => (
                    <div key={l}><div style={{ fontSize: 10, color: "#94A3B8" }}>{l}</div><div style={{ fontSize: 13, fontWeight: 800, fontFamily: "Nunito", color: c }}>{v}</div></div>
                  ))}
                </div>
              )}
              {tab === "kpi" && (
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
                  {[["KDS", r.kds_prom + " min", "#06B6D4"], ["Pedidos", r.total_pedidos, "#6C63FF"], ["NPS", r.nps_score, "#22C55E"]].map(([l, v, c]) => (
                    <div key={l}><div style={{ fontSize: 10, color: "#94A3B8" }}>{l}</div><div style={{ fontSize: 13, fontWeight: 800, fontFamily: "Nunito", color: c }}>{v}</div></div>
                  ))}
                </div>
              )}
              {tab === "inventario" && (
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                  {[["Dif. Consumo", r.dif_consumo, "#1A1D2E"], ["Dif. Total $", fmtCLP(r.dif_total), "#F59E0B"]].map(([l, v, c]) => (
                    <div key={l}><div style={{ fontSize: 10, color: "#94A3B8" }}>{l}</div><div style={{ fontSize: 13, fontWeight: 800, fontFamily: "Nunito", color: c }}>{v}</div></div>
                  ))}
                </div>
              )}
            </Card>
          ))}
        </>
      )}

      {/* ── Labor: semanas cargadas (solo admin) ── */}
      {tab === "labor" && isAdmin && (
        <>
          {semanasMarca.length === 0 && <Card><div style={{ textAlign:"center", color:"#94A3B8", padding:30, fontFamily:"Nunito", fontWeight:700 }}>Sin horarios cargados para esta marca</div></Card>}
          {semanasMarca.map((s, i) => (
            <Card key={i} style={{ marginBottom:10 }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
                <div style={{ display:"flex", gap:6, flexWrap:"wrap", alignItems:"center" }}>
                  <Badge text={`Sem ${s.semana}`} color={m.color} small />
                  <span style={{ fontSize:11, color:"#64748B", fontWeight:700 }}>{s.inicio} → {s.fin}</span>
                </div>
                <DeleteBtn onDelete={() => setConfirmDel({ id: s.id, inicio: s.inicio, fin: s.fin, semana: s.semana, empleados: s.empleados?.length || 0, uploadLocal: s.uploadLocal, sucursal: s.sucursal })} />
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8 }}>
                <div><div style={{ fontSize:10, color:"#94A3B8" }}>Tienda</div><div style={{ fontSize:12, fontWeight:700, color:"#1A1D2E" }}>{nombreCortoLocal(s.uploadLocal || s.sucursal || "—")}</div></div>
                <div><div style={{ fontSize:10, color:"#94A3B8" }}>Empleados</div><div style={{ fontSize:13, fontWeight:800, fontFamily:"Nunito", color:m.color }}>{s.empleados?.length || 0}</div></div>
                <div><div style={{ fontSize:10, color:"#94A3B8" }}>Horas tot.</div><div style={{ fontSize:13, fontWeight:800, fontFamily:"Nunito", color:"#64748B" }}>{s.empleados?.reduce((t,e) => t + (e.horas_calc||0), 0).toFixed(1)}</div></div>
              </div>
            </Card>
          ))}
        </>
      )}

      {/* ── Planillas de costos (solo admin) ── */}
      {tab === "planillas" && isAdmin && (
        <>
          {planillasMarca.length === 0 && <Card><div style={{ textAlign:"center", color:"#94A3B8", padding:30, fontFamily:"Nunito", fontWeight:700 }}>Sin planillas de costos cargadas</div></Card>}
          {planillasMarca.map((g, i) => (
            <Card key={i} style={{ marginBottom:10 }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
                <div style={{ display:"flex", gap:6, flexWrap:"wrap", alignItems:"center" }}>
                  <Badge text={g.mes} color="#6C63FF" small />
                  <span style={{ fontSize:11, color:"#64748B", fontWeight:700 }}>{nombreCortoLocal(g.local)}</span>
                </div>
                <DeleteBtn onDelete={() => setConfirmDel({ local: g.local, mes: g.mes, count: g.count, ids: g.ids })} />
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
                <div><div style={{ fontSize:10, color:"#94A3B8" }}>Local</div><div style={{ fontSize:12, fontWeight:700, color:"#1A1D2E", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{g.local}</div></div>
                <div><div style={{ fontSize:10, color:"#94A3B8" }}>Registros</div><div style={{ fontSize:13, fontWeight:800, fontFamily:"Nunito", color:"#6C63FF" }}>{g.count}</div></div>
              </div>
            </Card>
          ))}
        </>
      )}

      {/* ── TAB COSTO TEÓRICO ── */}
      {tab === "teorico" && isAdmin && (
        <>
          {ctConfirmDel && (
            <ConfirmModal
              msg={ctConfirmDel.id === "__ALL__"
                ? `¿Eliminar TODOS los registros de costo teórico de ${MARCAS[marca]?.nombre}?`
                : `¿Eliminar registro de ${(ctConfirmDel.local||"").split(" - ")[1]||ctConfirmDel.local}?`}
              detalle={ctConfirmDel.id === "__ALL__"
                ? "Se eliminarán todos los períodos cargados. Esta acción no se puede deshacer."
                : `Período ${ctConfirmDel.periodo}`}
              onConfirm={() => ctEliminar(ctConfirmDel.id)}
              onCancel={() => setCtConfirmDel(null)}
            />
          )}

          {ctRegistrosMarca.length === 0
            ? <Card><div style={{ textAlign:"center", color:"#94A3B8", padding:30, fontFamily:"Nunito", fontWeight:700 }}>Sin registros de costo teórico cargados para {MARCAS[marca]?.nombre}</div></Card>
            : (
              <Card>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
                  <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:13, color:"#1A1D2E" }}>📈 Costo Teórico ERP</div>
                  <div style={{ fontFamily:"Nunito", fontSize:10, color:"#94A3B8" }}>{ctRegistrosMarca.length} registro{ctRegistrosMarca.length!==1?"s":""}</div>
                </div>

                {ctRegistrosMarca.map(r => {
                  const localCorto = (r.local||"").split(" - ")[1] || r.local;
                  const editando   = ctEditId === r.id;
                  return (
                    <div key={r.id} style={{
                      borderBottom:"1px solid #F1F5F9", paddingBottom:12, marginBottom:12,
                      background: editando ? "#F0FDF4" : "transparent",
                      borderRadius: editando ? 10 : 0,
                      padding: editando ? "10px 12px" : "0 0 12px 0",
                    }}>
                      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                        <div>

function generarCSV(headers, rows) {
  const esc = v => typeof v === "string" && (v.includes(",") || v.includes("\n") || v.includes('"')) ? '"' + v.replace(/"/g, '""') + '"' : String(v ?? "");
  return [headers, ...rows].map(r => r.map(esc).join(",")).join("\n");
}

      { key: "meta_mermas",      label: "Meta Mermas $",      req: false },
    ],
  };

  const cols = COLS[tab] || [];

  const parseDate = val => {
    if (!val) return "";
    const s = String(val).trim();
    if (/^\d{5}$/.test(s)) { const d = new Date((parseInt(s) - 25569) * 86400000); return d.toISOString().split("T")[0]; }
    const m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
    if (m) return `${m[3]}-${m[2].padStart(2,"0")}-${m[1].padStart(2,"0")}`;
    if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
    const d = new Date(s); if (!isNaN(d)) return d.toISOString().split("T")[0];
    return s;
  };
  const parseNum = val => { if (val == null || val === "") return 0; return parseFloat(String(val).replace(/[.$\s]/g,"").replace(",",".")) || 0; };

  const handleFile = async e => {
    const file = e.target.files[0]; if (!file) return;
    setLoading(true); setStatus(null); setHeaders([]); setRawRows([]); setPreview([]); setMapping({}); setProgress(null);
    try {
      const XLSX = await loadXLSX();
      const wb   = XLSX.read(await file.arrayBuffer(), { type: "array" });
      const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1, defval: "" });
      if (json.length < 2) throw new Error("Archivo vacío o sin datos");
      const hdrs = json[0].map(h => String(h).trim());
      const rows = json.slice(1).filter(r => r.some(c => c !== ""));
      setHeaders(hdrs); setRawRows(rows); setPreview(rows.slice(0, 5));
      const autoMap = {};
      cols.forEach(col => {
        const idx = hdrs.findIndex(h => {
          const hl = h.toLowerCase().replace(/[\s_$]/g,"");
          const kl = col.key.toLowerCase().replace(/[\s_$]/g,"");
          const ll = col.label.toLowerCase().replace(/[\s_$]/g,"");
          return hl === kl || hl === ll || hl.includes(kl);
        });
        if (idx >= 0) autoMap[col.key] = idx;
      });
      setMapping(autoMap);
    } catch (err) { setStatus("error"); setMsg("Error al leer: " + err.message); }
    setLoading(false);
  };

  const handleImport = () => {
    const missing = cols.filter(c => c.req && mapping[c.key] === undefined);
    if (missing.length) { setStatus("error"); setMsg("Faltan columnas: " + missing.map(c => c.label).join(", ")); return; }
    const get = (row, key) => { const i = mapping[key]; return i !== undefined ? row[i] : ""; };
    setProgress({ done: 0, total: rawRows.length });
    try {
      if (tab === "ventas") {
        const detectarMarca = localNombre => {
          const ln = localNombre.toLowerCase();
          for (const [mk, locales] of Object.entries(LOCALES_POR_MARCA)) {
            if (locales.some(l => l.toLowerCase() === ln)) return mk;
          }
          // Fallback: buscar nombre de marca en el nombre del local
          for (const [mk, m] of Object.entries(MARCAS)) {
            if (ln.includes(m.nombre.toLowerCase()) || ln.includes(mk)) return mk;
          }
          return marca;
        };
        const rows = rawRows.map((row, i) => { setProgress({ done: i + 1, total: rawRows.length }); const localNombre = String(get(row,"local")).trim(); return { id: uid(), marca: detectarMarca(localNombre), fecha: parseDate(get(row,"fecha")), local: localNombre, turno: String(get(row,"turno") || "Cierre").trim(), usuario: "Importado", venta_bruta: parseNum(get(row,"venta_bruta")), boletas: parseNum(get(row,"boletas")), horas_reales: parseNum(get(row,"horas_reales")), horas_extra: parseNum(get(row,"horas_extra")), labor_real: parseNum(get(row,"labor_real")), merma: parseNum(get(row,"merma")), colaciones: parseNum(get(row,"colaciones")), obs: String(get(row,"obs") || ""), cumpl_venta: 0, ts: new Date().toISOString() }; }).filter(r => r.fecha && r.local && r.venta_bruta > 0);
        setVentas(v => { const ex = new Set(v.map(x => x.local+"_"+x.fecha+"_"+x.turno)); return [...v, ...rows.filter(r => !ex.has(r.local+"_"+r.fecha+"_"+r.turno))]; });
        const porMarca = rows.reduce((acc, r) => { acc[r.marca] = (acc[r.marca]||0)+1; return acc; }, {});
        const resumen = Object.entries(porMarca).map(([mk,n]) => `${MARCAS[mk]?.nombre||mk}: ${n}`).join(", ");
        setStatus("ok"); setMsg(`✅ ${rows.length} registros importados (${resumen})`);
      }
      if (tab === "metas") {
        const rows = rawRows.map(row => ({ id: uid(), local: String(get(row,"local")).trim(), mes: String(get(row,"mes")).trim(), meta_venta_bruta: parseNum(get(row,"meta_venta_bruta")), meta_boletas: parseNum(get(row,"meta_boletas")), meta_kds: parseNum(get(row,"meta_kds")), meta_mermas: parseNum(get(row,"meta_mermas")), meta_horas: parseNum(get(row,"meta_horas")), meta_labor: parseNum(get(row,"meta_labor")), aa_venta_bruta: parseNum(get(row,"aa_venta_bruta")), aa_boletas: parseNum(get(row,"aa_boletas")), valor_hora: parseNum(get(row,"valor_hora")), valor_hora_extra: parseNum(get(row,"valor_hora_extra")) })).filter(r => r.local && r.mes && r.meta_venta_bruta > 0);
        setMetas(ms => { const next = [...ms]; rows.forEach(nm => { const i = next.findIndex(x => x.local === nm.local && x.mes === nm.mes); i >= 0 ? next[i] = { ...next[i], ...nm } : next.push(nm); }); return next; });
        const localesM = [...new Set(rows.map(r => r.local))];
        setStatus("ok"); setMsg(`✅ ${rows.length} metas importadas para ${localesM.length} local(es): ${localesM.join(", ")}`);
      }
      if (tab === "metasd") {
        const rows = rawRows.map(row => ({ id: uid(), local: String(get(row,"local")).trim(), fecha: parseDate(get(row,"fecha")), meta_venta_bruta: parseNum(get(row,"meta_venta_bruta")), meta_boletas: parseNum(get(row,"meta_boletas")), meta_horas: parseNum(get(row,"meta_horas")), meta_mermas: parseNum(get(row,"meta_mermas")) })).filter(r => r.local && r.fecha && r.meta_venta_bruta > 0);
        setMetasd(ms => { const next = [...ms]; rows.forEach(nm => { const i = next.findIndex(x => x.local === nm.local && x.fecha === nm.fecha); i >= 0 ? next[i] = { ...next[i], ...nm } : next.push(nm); }); return next; });
        const localesD = [...new Set(rows.map(r => r.local))];
        setStatus("ok"); setMsg(`✅ ${rows.length} metas diarias importadas para ${localesD.length} local(es): ${localesD.join(", ")}`);
      }
    } catch (err) { setStatus("error"); setMsg("Error al importar: " + err.message); }
    setProgress(null);
  };

  const tabColor = { ventas: m.color, metas: "#F59E0B", metasd: "#6C63FF", toteat: "#FF6B00" };
  const tc = tabColor[tab] || m.color;

  return (
    <div className="fade" style={{ paddingBottom: onDone ? 20 : 90 }}>
      {!onDone && <LogoHeader marca={marca} />}
      {!onDone && <SectionTitle color={m.color}>📥 Importar desde Excel</SectionTitle>}
      <div style={{ display: "flex", gap: 6, marginBottom: 14, flexWrap: "wrap" }}>
        {[["ventas","🛒 Ventas"],["metas","🎯 Metas Mens."],["metasd","📆 Metas Diarias"],["toteat","🍿 Toteat"]].map(([k,l]) => (
          <Btn key={k} onClick={() => { setTab(k); setHeaders([]); setRawRows([]); setStatus(null); setMapping({}); }} color={tabColor[k]} outline={tab !== k} small>{l}</Btn>
        ))}
      </div>

      {/* ── TOTEAT — módulo pendiente ── */}
      {tab === "toteat" && (
        <Card style={{ border:"2px solid #FF6B0033", background:"linear-gradient(135deg,#FFF4ED,#fff)" }}>
          <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:12 }}>
            <span style={{ fontSize:28 }}>🍿</span>
            <div>
              <div style={{ fontFamily:"Nunito", fontWeight:900, fontSize:16, color:"#FF6B00" }}>Importar desde Toteat</div>
              <div style={{ fontFamily:"Nunito", fontSize:11, color:"#94A3B8" }}>ERP de Pop Corn</div>
            </div>
          </div>
          <div style={{ background:"#FFF4ED", border:"1px solid #FF6B0033", borderRadius:10, padding:"12px 14px", marginBottom:14 }}>
            <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:13, color:"#FF6B00", marginBottom:6 }}>📋 Módulo en preparación</div>
            <div style={{ fontFamily:"Nunito", fontSize:12, color:"#92400E", lineHeight:1.7 }}>
              Para conectar Toteat necesitamos el formato de exportación. Por favor comparte:<br/>
              <strong>1.</strong> Un archivo de ejemplo exportado desde Toteat (ventas, inventario o costos)<br/>
              <strong>2.</strong> Las columnas que entrega el sistema<br/>
              <strong>3.</strong> Si Toteat tiene API o solo exporta Excel/CSV
            </div>
          </div>
          <div style={{ fontFamily:"Nunito", fontSize:11, color:"#64748B", lineHeight:1.7, marginBottom:12 }}>
            Una vez tengamos el formato, construiremos el parser equivalente al del ERP actual, con:<br/>
            ✅ Ventas y boletas · ✅ Costos e inventario · ✅ KPIs operacionales · ✅ Sync automático
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
            <div style={{ background:"#F8FAFC", borderRadius:10, padding:"10px 12px", textAlign:"center" }}>
              <div style={{ fontSize:20, marginBottom:4 }}>📁</div>
              <div style={{ fontFamily:"Nunito", fontWeight:700, fontSize:11, color:"#64748B" }}>Exporta desde Toteat<br/>y súbelo aquí</div>
            </div>
            <div style={{ background:"#F8FAFC", borderRadius:10, padding:"10px 12px", textAlign:"center" }}>
              <div style={{ fontSize:20, marginBottom:4 }}>🔌</div>
              <div style={{ fontFamily:"Nunito", fontWeight:700, fontSize:11, color:"#64748B" }}>O conéctalo vía API<br/>cuando esté disponible</div>
            </div>
          </div>
        </Card>
      )}

      {tab !== "toteat" && (<>
      <Card style={{ marginBottom: 12, background: "#F0FDF4", border: "1.5px solid #86EFAC" }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: "#166534", marginBottom: 6 }}>📋 Columnas esperadas</div>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
          {cols.map(c => (<span key={c.key} style={{ background: c.req ? "#DCFCE7" : "#F1F5F9", border: `1px solid ${c.req ? "#86EFAC" : "#E2E8F0"}`, borderRadius: 6, padding: "2px 8px", fontSize: 11, fontWeight: 600, color: c.req ? "#166534" : "#64748B" }}>{c.label}{c.req ? " *" : ""}</span>))}
        </div>
        <div style={{ fontSize: 10, color: "#64748B", marginTop: 6 }}>* Obligatorio — El orden de columnas no importa</div>
      </Card>

      <Card style={{ marginBottom: 12 }}>
        <Label>Seleccionar archivo .xlsx / .xls / .csv</Label>
        <div style={{ border: `2px dashed ${tc}55`, borderRadius: 12, padding: 24, textAlign: "center", background: tc + "08", position: "relative", cursor: "pointer" }}>
          <input type="file" accept=".xlsx,.xls,.csv" onChange={handleFile}
            style={{ position: "absolute", inset: 0, opacity: 0, cursor: "pointer", width: "100%", height: "100%" }} />
          <div style={{ fontSize: 36, marginBottom: 8 }}>📂</div>
          <div style={{ fontSize: 13, fontWeight: 700, color: tc, fontFamily: "Nunito" }}>
            {loading ? <span className="pulse">⏳ Leyendo archivo...</span> : "Toca para seleccionar"}
          </div>
          <div style={{ fontSize: 11, color: "#94A3B8", marginTop: 4 }}>Excel (.xlsx, .xls) o CSV</div>
        </div>
      </Card>

      {headers.length > 0 && (
        <Card style={{ marginBottom: 12 }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: "#1A1D2E", marginBottom: 10 }}>🔗 Mapeo de columnas ({rawRows.length} filas)</div>
          {cols.map(col => (
            <div key={col.key} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
              <div style={{ width: 130, fontSize: 11, fontWeight: 700, flexShrink: 0, color: col.req ? "#1A1D2E" : "#64748B" }}>{col.label}{col.req && <span style={{ color: "#EF4444" }}> *</span>}</div>
              <select value={mapping[col.key] ?? "-1"} onChange={e => setMapping(mp => ({ ...mp, [col.key]: parseInt(e.target.value) }))}
                style={{ flex: 1, fontSize: 12, padding: "6px 10px", borderColor: mapping[col.key] !== undefined ? "#22C55E" : "#E2E8F0" }}>
                <option value="-1">— No incluir —</option>
                {headers.map((h, i) => <option key={i} value={i}>{h || `Col. ${i + 1}`}</option>)}
              </select>
            </div>
          ))}

          {preview.length > 0 && (
            <div style={{ marginTop: 12, overflowX: "auto" }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: "#64748B", marginBottom: 6 }}>Vista previa (5 filas):</div>
              <table style={{ fontSize: 10, borderCollapse: "collapse", width: "100%" }}>
                <thead><tr>{cols.filter(c => mapping[c.key] !== undefined).map(c => (<th key={c.key} style={{ background: "#F8FAFC", padding: "4px 8px", textAlign: "left", border: "1px solid #E2E8F0", fontFamily: "Nunito", whiteSpace: "nowrap" }}>{c.label}</th>))}</tr></thead>
                <tbody>{preview.map((row, ri) => (<tr key={ri}>{cols.filter(c => mapping[c.key] !== undefined).map(c => (<td key={c.key} style={{ padding: "4px 8px", border: "1px solid #F0F4F8" }}>{String(row[mapping[c.key]] ?? "")}</td>))}</tr>))}</tbody>
              </table>
            </div>
          )}

          {progress && (
            <div style={{ marginTop: 12 }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                <span style={{ fontSize: 11, color: "#64748B" }}>Importando...</span>
                <span style={{ fontSize: 11, fontWeight: 700, color: tc, fontFamily: "Nunito" }}>{progress.done}/{progress.total}</span>
              </div>
              <div style={{ height: 7, background: "#E2E8F0", borderRadius: 7 }}>
                <div style={{ height: "100%", width: `${(progress.done / progress.total) * 100}%`, background: tc, borderRadius: 7, transition: "width .15s" }} />
              </div>
            </div>
          )}

          <div style={{ marginTop: 14 }}>
            <Btn onClick={handleImport} color={tc} full disabled={!!progress}>📥 Importar {rawRows.length} registros</Btn>
          </div>
        </Card>
      )}

      {status && (
        <Card style={{ border: `2px solid ${status === "ok" ? "#86EFAC" : "#FCA5A5"}`, background: status === "ok" ? "#F0FDF4" : "#FEF2F2" }}>
          <div style={{ fontSize: 14, fontWeight: 700, fontFamily: "Nunito", color: status === "ok" ? "#166534" : "#991B1B", marginBottom: status === "ok" ? 10 : 0 }}>{msg}</div>
          {status === "ok" && onDone && (
            <button onClick={onDone} style={{ background:"#22C55E", border:"none", borderRadius:10, padding:"10px 0", width:"100%", fontFamily:"Nunito", fontWeight:800, fontSize:14, color:"#fff", cursor:"pointer" }}>
              ✅ Ver Dashboard actualizado
            </button>
          )}
        </Card>
      )}
      </>)}

      {/* ── PLANTILLAS DESCARGABLES ── */}
      {tab !== "toteat" && <PlantillaDescarga tab={tab} />}

      {tab !== "toteat" && <Card style={{ marginTop: 12, background: "#FFFBEB", border: "1.5px solid #FDE68A" }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: "#92400E", marginBottom: 6 }}>💡 Preparar el Excel</div>
        <div style={{ fontSize: 11, color: "#78350F", lineHeight: 1.8 }}>1. Primera fila = nombres de columnas<br />2. Una fila por registro (día y local)<br />3. Fechas: DD/MM/YYYY o YYYY-MM-DD<br />4. Montos sin puntos ni símbolo $<br />5. Nombre del local debe coincidir exactamente</div>
      </Card>}
    </div>
  );
}
