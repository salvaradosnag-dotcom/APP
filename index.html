          {periodo === "semana" && <Field label="Semana (cualquier día)"><input type="date" value={semFilter} onChange={e=>setSemFilter(e.target.value)} style={{ fontSize:12 }}/></Field>}
          {periodo === "dia"    && <Field label="Día"><input type="date" value={diaFilter} onChange={e=>setDiaFilter(e.target.value)} style={{ fontSize:12 }}/></Field>}
          {periodo === "rango"  && <>
            <Field label="Desde"><input type="date" value={rangoIni} onChange={e=>setRangoIni(e.target.value)} style={{ fontSize:12 }}/></Field>
            <Field label="Hasta"><input type="date" value={rangoFin} onChange={e=>setRangoFin(e.target.value)} style={{ fontSize:12 }}/></Field>
          </>}
          <Field label="Local">
            <select value={localFilter} onChange={e=>setLocalFilter(e.target.value)} style={{ fontSize:12 }}>
              <option>Todos</option>{localesMarca.map(l=><option key={l}>{l}</option>)}
            </select>
          </Field>
        </div>
        {/* Comparar con */}
        <div style={{ marginBottom: 6 }}>
          <Label>Comparar con</Label>
          <div style={{ display: "flex", gap: 5, flexWrap: "wrap" }}>
            {[["none","Sin comparar"],["aa","Año anterior"],periodo==="semana"?["semana_anterior","Sem anterior"]:["mes_anterior","Mes anterior"]].map(([k,l])=>(
              <button key={k} onClick={()=>setComparar(k)} style={{ flexShrink:0, background:comparar===k?"#1A1D2E":"#F8FAFC", border:`1.5px solid ${comparar===k?"#1A1D2E":"#E2E8F0"}`, borderRadius:8, padding:"4px 10px", fontSize:10, fontWeight:700, fontFamily:"Nunito", color:comparar===k?"#fff":"#64748B", cursor:"pointer" }}>{l}</button>
            ))}
          </div>
        </div>
        {/* Acciones */}
        <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
          <button onClick={handleExport} style={{ flex:1, background:"#22C55E", border:"none", borderRadius:10, padding:"8px 0", fontFamily:"Nunito", fontWeight:700, fontSize:12, color:"#fff", cursor:"pointer" }}>⬇️ Exportar Excel</button>
          <button onClick={handleShare}  style={{ flex:1, background:"#6C63FF", border:"none", borderRadius:10, padding:"8px 0", fontFamily:"Nunito", fontWeight:700, fontSize:12, color:"#fff", cursor:"pointer" }}>📤 Compartir</button>
        </div>
      </Card>

      {/* ── KPIs PRINCIPALES ────────────────────────────────────────────────── */}
      {/* Indicador de período activo */}
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:8 }}>
        <div style={{ display:"flex", alignItems:"center", gap:6 }}>
          <div style={{ background:m.color+"22", borderRadius:8, padding:"4px 10px", fontFamily:"Nunito", fontWeight:800, fontSize:12, color:m.color }}>
            📅 {rango.label}
          </div>
          {localFilter !== "Todos" && (
            <div style={{ background:"#F1F5F9", borderRadius:8, padding:"4px 10px", fontFamily:"Nunito", fontWeight:700, fontSize:11, color:"#64748B" }}>
              📍 {localFilter}
            </div>
          )}
        </div>
        <div style={{ fontSize:10, color:"var(--text-4)", fontFamily:"Nunito" }}>
          {periodo === "mes" ? "Mes completo" : periodo === "semana" ? "Semana" : periodo === "dia" ? "Día" : "Rango"}
        </div>
      </div>

      {/* Bloque principal: Venta Bruta + Neta + Cumpl */}
      <Card style={{ marginBottom:10, padding:"14px 16px" }}>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:10 }}>
          <div>
            <div style={{ fontSize:9, color:"#94A3B8", fontWeight:700, textTransform:"uppercase", letterSpacing:.8 }}>💰 Venta Bruta Red</div>
            <div style={{ fontFamily:"Nunito", fontWeight:900, fontSize:24, color:m.color, lineHeight:1.1 }}>{fmtCLP(red.vt)}</div>
            {red.mv > 0 && <div style={{ fontSize:11, color:"#94A3B8" }}>Meta: {fmtCLP(red.mv)}</div>}
          </div>
          <div>
            <div style={{ fontSize:9, color:"#94A3B8", fontWeight:700, textTransform:"uppercase", letterSpacing:.8 }}>💵 Venta Neta Red</div>
            <div style={{ fontFamily:"Nunito", fontWeight:900, fontSize:20, color:"#6C63FF", lineHeight:1.1 }}>{fmtCLP(red.vn)}</div>
            {red.mvn > 0 && <div style={{ fontSize:11, color:"#94A3B8" }}>Meta: {fmtCLP(red.mvn)}</div>}
          </div>
        </div>
        {/* Barra cumplimiento */}
        {red.mv > 0 && (
          <div>
            <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4 }}>
              <span style={{ fontSize:11, color:"#64748B", fontWeight:700 }}>🎯 Cumplimiento meta red</span>
              <span style={{ fontFamily:"Nunito", fontWeight:900, fontSize:13, color:redCumpl>=1?"#22C55E":redCumpl>=0.8?"#F59E0B":"#EF4444" }}>
                {(redCumpl*100).toFixed(1)}%
              </span>
            </div>
            <div style={{ height:8, background:"#E2E8F0", borderRadius:8 }}>
              <div style={{ height:"100%", width:`${Math.min(100,redCumpl*100)}%`, background:redCumpl>=1?"#22C55E":redCumpl>=0.8?"#F59E0B":"#EF4444", borderRadius:8, transition:"width .6s" }}/>
            </div>
            <div style={{ display:"flex", justifyContent:"space-between", marginTop:3 }}>
              <span style={{ fontSize:9, color:"#94A3B8" }}>{fmtCLP(red.vt)} real</span>
              {varComp !== null && (
                <span style={{ fontSize:9, fontWeight:700, color:varComp>=0?"#22C55E":"#EF4444" }}>
                  {varComp>=0?"+":""}{(varComp*100).toFixed(1)}% vs {rangoComp?.label}
                </span>
              )}
              <span style={{ fontSize:9, color:"#94A3B8" }}>{fmtCLP(red.mv)} meta</span>
            </div>
          </div>
        )}
      </Card>

      {/* Fila: Boletas + Ticket + Venta Hoy */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8, marginBottom:10 }}>
        {(() => {
          const totalBoletas = resumen.reduce((s,r)=>s+r.bt, 0);
          const ticketProm   = totalBoletas > 0 ? red.vt / totalBoletas : 0;
          return [
            { icon:"🧾", label:"Boletas", value: totalBoletas > 0 ? totalBoletas.toLocaleString("es-CL") : "—", color:"#1A1D2E" },
            { icon:"🎫", label:"Ticket prom.", value: ticketProm > 0 ? fmtCLP(ticketProm) : "—", color:"#6C63FF" },
            { icon:"🛒", label:"Venta hoy",  value: ventaHoy > 0 ? fmtCLP(ventaHoy) : "—", color:"#94A3B8" },
          ].map(k => (
            <Card key={k.label} style={{ padding:"10px 10px", position:"relative", overflow:"hidden" }}>
              <div style={{ position:"absolute", top:0, left:0, right:0, height:3, background:k.color }}/>
              <div style={{ fontSize:14, marginBottom:2 }}>{k.icon}</div>
              <div style={{ fontSize:9, color:"#94A3B8", fontWeight:700, textTransform:"uppercase", letterSpacing:.5 }}>{k.label}</div>
              <div style={{ fontFamily:"Nunito", fontWeight:900, fontSize:14, color:k.color, lineHeight:1.2 }}>{k.value}</div>
            </Card>
          ));
        })()}
      </div>

      {/* Ratios sobre Venta Neta */}
      {red.vn > 0 && (
        <div style={{ marginBottom:10 }}>
          <div style={{ fontSize:10, color:"#94A3B8", fontWeight:700, textTransform:"uppercase", letterSpacing:.6, marginBottom:6 }}>Ratios sobre Venta Neta</div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8, marginBottom:4 }}>
            {[
              { label:"Labor", value: red.lab, pct: red.lab/red.vn, icon:"👷", warn:0.30,
                fuente: red.lab > 0 ? (resumen.some(r=>r.labVentas>0) ? "desde ventas" : "desde horarios") : null },
              { label:"Mermas", value: red.mr, pct: red.mr/red.vn, icon:"🗑️", warn:0.05 },
              { label:"Colaciones", value: red.col, pct: red.col/red.vn, icon:"🍽️", warn:0.04 },
            ].map(k=>{
              const over = k.pct > k.warn;
              const c = over ? "#EF4444" : k.value > 0 ? "#22C55E" : "#94A3B8";
              return (
                <Card key={k.label} style={{ position:"relative", overflow:"hidden", padding:"10px 10px" }}>
                  <div style={{ position:"absolute", top:0, left:0, right:0, height:3, background:c, borderRadius:"16px 16px 0 0" }}/>
                  <div style={{ fontSize:16, marginBottom:2 }}>{k.icon}</div>
                  <div style={{ fontSize:9, color:"#94A3B8", textTransform:"uppercase", letterSpacing:.5, marginBottom:2, fontWeight:700, lineHeight:1.2 }}>{k.label}</div>
                  <div style={{ fontSize:18, fontFamily:"Nunito", fontWeight:900, color:c, lineHeight:1 }}>
                    {k.value > 0 ? (k.pct*100).toFixed(1)+"%" : "—"}
                  </div>
                  <div style={{ fontSize:9, color:"#94A3B8", marginTop:2 }}>{k.value > 0 ? fmtCLP(k.value) : "Sin datos"}</div>
                  {/* Meta indicator */}
                  {k.value > 0 && (
                    <div style={{ fontSize:8, color: over?"#EF4444":"#22C55E", fontWeight:700, marginTop:1 }}>
                      {over ? `▲ sobre meta ${(k.warn*100).toFixed(0)}%` : `✓ bajo meta ${(k.warn*100).toFixed(0)}%`}
                    </div>
                  )}
                </Card>
              );
            })}
          </div>
          <div style={{ fontSize:9, color:"var(--text-5)", textAlign:"right", fontFamily:"Nunito" }}>
            Período: {rango.ini} → {rango.fin}
          </div>
        </div>
      )}

      {/* Comparación con período anterior */}
      {varComp !== null && (
        <Card style={{ marginBottom:14, border:`2px solid ${varComp>=0?"#86EFAC":"#FCA5A5"}`, background:varComp>=0?"#F0FDF4":"#FEF2F2" }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <div>
              <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:13 }}>vs {rangoComp?.label}</div>
              <div style={{ fontSize:11, color:"#64748B" }}>{fmtCLP(red.vtComp)} período anterior</div>
            </div>
            <div style={{ textAlign:"right" }}>
              <div style={{ fontSize:26, fontFamily:"Nunito", fontWeight:900, color:varComp>=0?"#22C55E":"#EF4444" }}>{varComp>=0?"+":""}{(varComp*100).toFixed(1)}%</div>
              <div style={{ fontSize:11, fontWeight:700, color:varComp>=0?"#22C55E":"#EF4444" }}>{varComp>=0?"+":""}{fmtCLP(red.vt-red.vtComp)}</div>
            </div>
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:6, marginTop:10 }}>
            {[["Período actual",red.vt,m.color],["Período comp.",red.vtComp,"#94A3B8"]].map(([l,v,c])=>(
              <div key={l}>
                <div style={{ fontSize:10, color:"#64748B", marginBottom:3 }}>{l}</div>
                <div style={{ height:6, background:"#E2E8F0", borderRadius:4 }}>
                  <div style={{ height:"100%", width:`${(v/Math.max(red.vt,red.vtComp,1))*100}%`, background:c, borderRadius:4, transition:"width .5s" }}/>
                </div>
                <div style={{ fontSize:10, fontWeight:700, color:c, fontFamily:"Nunito", marginTop:2 }}>{fmtCLP(v)}</div>
              </div>
            ))}
          </div>
        </Card>
      )}

      {/* ── TABS: KPIs / Ranking / Tendencia / Mes a Mes ─────────────────────── */}
      <div style={{ display:"flex", gap:5, marginBottom:12, overflowX:"auto" }}>
        {[["kpis","📊 KPIs"],["ranking","🏆 Ranking"],["tendencia","📈 Tendencia"],["meses","📅 Mes a Mes"]].map(([k,l])=>(
          <button key={k} onClick={()=>setVerTab(k)} style={{ flexShrink:0, background:verTab===k?m.color:"#F8FAFC", border:`1.5px solid ${verTab===k?m.color:"#E2E8F0"}`, borderRadius:8, padding:"6px 12px", fontSize:11, fontWeight:700, fontFamily:"Nunito", color:verTab===k?"#fff":"#64748B", cursor:"pointer" }}>{l}</button>
        ))}
      </div>

      {/* KPIs por local */}
      {verTab === "kpis" && resumen.filter(r=>localFilter==="Todos"||r.local===localFilter).map(r=>{
        const ri = ranking.findIndex(x=>x.local===r.local);
        const rComp = resComp?.find(x=>x.local===r.local);
        const varL = rComp && rComp.vt>0 ? (r.vt-rComp.vt)/rComp.vt : null;
        const laborPct  = r.vn > 0 ? r.lab / r.vn : 0;
        const mermasPct = r.vn > 0 ? r.mr  / r.vn : 0;
        const colPct    = r.vn > 0 ? r.col / r.vn : 0;
        return (
          <Card key={r.local} style={{ marginBottom:12, borderTop:`3px solid ${m.color}` }}>
            {/* Header local */}
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:10 }}>
              <div>
                <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:13, lineHeight:1.2 }}>{r.local}</div>
                <Badge text={`#${ri+1}`} color={medalColors[ri]} small />
              </div>
              <div style={{ textAlign:"right" }}>
                {varL!==null && <div style={{ fontSize:10, fontWeight:700, color:varL>=0?"#22C55E":"#EF4444", marginBottom:2 }}>{varL>=0?"+":""}{(varL*100).toFixed(1)}% vs {rangoComp?.label}</div>}
              </div>
            </div>

            {/* Ventas bruta / neta */}
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:10, background:"#F8FAFC", borderRadius:10, padding:"8px 10px" }}>
              <div>
                <div style={{ fontSize:9, color:"#94A3B8", fontWeight:700, textTransform:"uppercase", letterSpacing:.5 }}>Venta Bruta</div>
                <div style={{ fontSize:18, fontFamily:"Nunito", fontWeight:900, color:m.color, lineHeight:1.1 }}>{fmtCLP(r.vt)}</div>
                {r.mv > 0 && <div style={{ fontSize:10, color:"#94A3B8" }}>Meta: {fmtCLP(r.mv)}</div>}
              </div>
              <div>
                <div style={{ fontSize:9, color:"#94A3B8", fontWeight:700, textTransform:"uppercase", letterSpacing:.5 }}>Venta Neta</div>
                <div style={{ fontSize:18, fontFamily:"Nunito", fontWeight:900, color:"#6C63FF", lineHeight:1.1 }}>{fmtCLP(r.vn)}</div>
                {r.mvn > 0 && <div style={{ fontSize:10, color:"#94A3B8" }}>Meta: {fmtCLP(r.mvn)}</div>}
              </div>
            </div>

            {/* Cumplimiento */}
            {r.mv > 0 && (
              <div style={{ marginBottom:10 }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:4 }}>
                  <span style={{ fontSize:10, color:"#64748B", fontWeight:700 }}>Cumplimiento meta</span>
                  <SemaforoChip small {...getSemaforo(r.vt, r.mv, { verde:100, amarillo:90 })} />
                </div>
                <PctBar value={r.cumpl} />
              </div>
            )}

            {/* Ratios sobre venta neta */}
            {r.vn > 0 && (
              <>
                <div style={{ fontSize:9, color:"#94A3B8", fontWeight:700, textTransform:"uppercase", letterSpacing:.5, marginBottom:6 }}>Ratios sobre Venta Neta</div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:6, marginBottom:10 }}>
                  {[
                    { label:"Labor", value:r.lab, pct:laborPct,  icon:"👷", warn:0.30 },
                    { label:"Mermas", value:r.mr, pct:mermasPct, icon:"🗑️", warn:0.05 },
                    { label:"Colaciones", value:r.col, pct:colPct, icon:"🍽️", warn:0.04 },
                  ].map(k=>{
                    const over = k.pct > k.warn;
                    const c = over ? "#EF4444" : (k.pct > 0 ? "#F59E0B" : "#94A3B8");
                    return (
                      <div key={k.label} style={{ background: over?"#FEF2F2":"#F8FAFC", borderRadius:8, padding:"6px 8px", border:`1px solid ${over?"#FECACA":"#F0F4F8"}` }}>
                        <div style={{ fontSize:12 }}>{k.icon}</div>
                        <div style={{ fontSize:9, color:"#94A3B8", fontWeight:600 }}>{k.label}</div>
                        <div style={{ fontSize:13, fontFamily:"Nunito", fontWeight:900, color:c }}>{k.pct>0?(k.pct*100).toFixed(1)+"%":"—"}</div>
                        <div style={{ fontSize:9, color:"#94A3B8" }}>{fmtCLP(k.value)}</div>
                      </div>
                    );
                  })}
                </div>
              </>
            )}

            {/* KPIs operacionales */}
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr 1fr", gap:6 }}>
              {[["Boletas",r.bt,"#1A1D2E"],["KDS",r.kp>0?r.kp.toFixed(1)+" m":"—","#06B6D4"],["NPS",r.np>0?r.np.toFixed(0):"—","#22C55E"]].map(([l,v,c])=>(
                <div key={l} style={{ background:"#F8FAFC", borderRadius:8, padding:"5px 8px" }}>
                  <div style={{ fontSize:9, color:"#94A3B8" }}>{l}</div>
                  <div style={{ fontSize:12, fontWeight:800, fontFamily:"Nunito", color:c }}>{v}</div>
                </div>
              ))}
            </div>
          </Card>
        );
      })}

      {/* Ranking */}
      {verTab === "ranking" && (
        <Card>
          <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:14, marginBottom:14 }}>🏆 Ranking — {rango.label}</div>
          {ranking.map((r,i)=>(
            <div key={r.local} style={{ marginBottom:12 }}>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4, alignItems:"center" }}>
                <div style={{ display:"flex", alignItems:"center", gap:8 }}><span style={{ fontSize:18 }}>{medals[i]}</span><span style={{ fontSize:13, fontWeight:700, fontFamily:"Nunito" }}>{r.local}</span></div>
                <div style={{ textAlign:"right" }}><div style={{ fontSize:14, fontWeight:800, fontFamily:"Nunito", color:medalColors[i] }}>{fmtCLP(r.vt)}</div><div style={{ fontSize:10, color:"#94A3B8" }}>{r.mv>0?fmtPct(r.cumpl)+" meta":""}</div></div>
              </div>
              <div style={{ height:6, background:"#F0F4F8", borderRadius:4 }}><div style={{ height:"100%", width:`${(r.vt/maxVt)*100}%`, background:medalColors[i], borderRadius:4, transition:"width .6s" }}/></div>
            </div>
          ))}
        </Card>
      )}

      {/* Tendencia diaria */}
      {verTab === "tendencia" && (
        <Card>
          <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:14, marginBottom:12 }}>📈 Tendencia diaria — {rango.label}</div>
          {tendencia.length === 0 && <div style={{ color:"#94A3B8", textAlign:"center", padding:20 }}>Sin datos en este período</div>}
          {tendencia.map((t,i)=>{
            const maxTv = Math.max(...tendencia.map(x=>x.vt),1);
            return (
              <div key={t.fecha} style={{ display:"flex", alignItems:"center", gap:8, marginBottom:6 }}>
                <div style={{ fontSize:10, color:"#64748B", width:60, flexShrink:0 }}>{t.fecha.slice(5)}</div>
                <div style={{ flex:1, height:20, background:"#F8FAFC", borderRadius:4, position:"relative", overflow:"hidden" }}>
                  <div style={{ height:"100%", width:`${(t.vt/maxTv)*100}%`, background:m.color+"88", borderRadius:4, transition:"width .4s" }}/>
                  <div style={{ position:"absolute", top:0, left:6, right:0, height:"100%", display:"flex", alignItems:"center" }}>
                    <span style={{ fontSize:9, fontWeight:700, fontFamily:"Nunito", color:"#1A1D2E" }}>{fmtCLP(t.vt)}</span>
                  </div>
                </div>
                <div style={{ fontSize:10, color:"#94A3B8", width:28, textAlign:"right", flexShrink:0 }}>{t.bt}</div>
              </div>
            );
          })}
          {tendencia.length > 0 && (
            <div style={{ marginTop:10, paddingTop:8, borderTop:"1px solid #F0F4F8", display:"flex", justifyContent:"space-between" }}>
              <span style={{ fontSize:11, fontWeight:700, color:"#64748B" }}>Total período</span>
              <span style={{ fontSize:13, fontWeight:900, fontFamily:"Nunito", color:m.color }}>{fmtCLP(tendencia.reduce((s,t)=>s+t.vt,0))}</span>
            </div>
          )}
        </Card>
      )}

      {/* Mes a mes */}
      {verTab === "meses" && (
        <Card>
          <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:14, marginBottom:14 }}>📅 Últimos 6 meses</div>
          {mesesRecientes.map((mes,i)=>{
            const maxM = Math.max(...mesesRecientes.map(x=>x.vt),1);
            const prev = i > 0 ? mesesRecientes[i-1] : null;
            const varM = prev && prev.vt > 0 ? (mes.vt-prev.vt)/prev.vt : null;
            return (
              <div key={mes.mes} style={{ marginBottom:14 }}>
                <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4 }}>
                  <span style={{ fontFamily:"Nunito", fontWeight:800, fontSize:13 }}>{mes.mes}</span>
                  <div style={{ textAlign:"right" }}>
                    <span style={{ fontFamily:"Nunito", fontWeight:800, fontSize:14, color:m.color }}>{fmtCLP(mes.vt)}</span>
                    {varM!==null && <span style={{ fontSize:10, marginLeft:6, fontWeight:700, color:varM>=0?"#22C55E":"#EF4444" }}>{varM>=0?"+":""}{(varM*100).toFixed(1)}%</span>}
                  </div>
                </div>
                <div style={{ height:8, background:"#F0F4F8", borderRadius:4 }}>
                  <div style={{ height:"100%", width:`${(mes.vt/maxM)*100}%`, background:m.color, borderRadius:4, transition:"width .6s" }}/>
                </div>
                {mes.mv > 0 && <div style={{ fontSize:9, color:"#94A3B8", marginTop:2 }}>Meta: {fmtCLP(mes.mv)} · Cumpl: {((mes.vt/mes.mv)*100).toFixed(0)}%</div>}
              </div>
            );
          })}
        </Card>
      )}
    </div>
  );
}

// CONFIG — con indicador de uso localStorage
// ══════════════════════════════════════════════════════════════════════════════
// ── MigracionSB — migrar datos de localStorage a Supabase ────────────────────
function MigracionSB() {
  const [estado, setEstado] = useState(null); // null | 'running' | 'done' | 'error'
  const [detalle, setDetalle] = useState([]);

  const migrar = async () => {
    const sb = getSB();
    if (!sb) { setEstado("error"); setDetalle(["No hay conexión Supabase configurada."]); return; }
    setEstado("running"); setDetalle([]);

    const tablas = [
      { key: "horreo_v2_ventas",        tabla: "ventas" },
      { key: "horreo_v2_kpi",           tabla: "kpis" },
      { key: "horreo_v2_metas",         tabla: "metas" },
      { key: "horreo_v2_metasd",        tabla: "metas_diarias" },
      { key: "horreo_desviaciones",     tabla: "desviaciones" },
      { key: "horreo_planillas_costos", tabla: "planillas_costos" },
      { key: "horreo_he_solicitudes",   tabla: "he_solicitudes" },
      { key: "horreo_labor_semanas",    tabla: "labor_semanas" },
    ];

    const log = [];
    for (const { key, tabla } of tablas) {
      try {
        const raw = localStorage.getItem(key);
        if (!raw) { log.push(`⏭ ${tabla}: sin datos locales`); continue; }
        const rows = JSON.parse(raw);
        if (!Array.isArray(rows) || rows.length === 0) { log.push(`⏭ ${tabla}: vacío`); continue; }
        // Serializar jsonb
        const prepared = rows.map(r => {
          const row = { ...r };
          if (row.empleados && typeof row.empleados !== "string") row.empleados = JSON.stringify(row.empleados);
          return row;
        });
        const { error } = await sb.from(tabla).upsert(prepared, { onConflict: "id" });
        if (error) { log.push(`❌ ${tabla}: ${error.message}`); }
        else { log.push(`✅ ${tabla}: ${rows.length} registros migrados`); }
      } catch (e) {
        log.push(`❌ ${tabla}: ${e.message}`);
      }
      setDetalle([...log]);
    }
    setEstado("done");
  };

  if (!getSB() && estado === null) return (
    <div style={{ marginTop:10, fontSize:11, color:"#94A3B8", fontFamily:"Nunito" }}>
      Guarda la URL y clave de Supabase para habilitar la migración.
    </div>
  );

  return (
    <div style={{ marginTop:12, borderTop:"1px solid #E2E8F0", paddingTop:12 }}>
      <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:12, color:"#1A1D2E", marginBottom:8 }}>
        📦 Migrar datos locales a Supabase
      </div>
      <div style={{ fontSize:11, color:"#64748B", marginBottom:10, fontFamily:"Nunito" }}>
        Sube todos los datos almacenados en este dispositivo a la nube. Solo necesitas hacerlo una vez.
      </div>
      <Btn onClick={migrar} color="#10B981" full disabled={estado==="running"}>
        {estado === "running" ? "⏳ Migrando..." : estado === "done" ? "🔄 Migrar de nuevo" : "🚀 Iniciar migración"}
      </Btn>
      {detalle.length > 0 && (
        <div style={{ marginTop:10, background:"#1A1D2E", borderRadius:10, padding:"10px 12px", fontFamily:"monospace", fontSize:11, color:"#E2E8F0", lineHeight:1.9 }}>
          {detalle.map((l,i) => <div key={i}>{l}</div>)}
          {estado === "done" && <div style={{ marginTop:6, color:"#22C55E", fontWeight:700 }}>✅ Migración completada</div>}
        </div>
      )}
    </div>
  );
}

// GESTIÓN USUARIOS — solo admin puede crear/editar/eliminar

function GestionUsuarios({ session }) {
  const esAdmin = session?.rol === "admin";
  const [usuarios, setUsuarios] = useStorage("horreo_usuarios_extra", []);
  // Combinar base + extra (los base no se eliminan)
  const todosUsuarios = [
    ...USUARIOS.map(u => ({ ...u, _base: true })),
    ...usuarios.filter(u => !USUARIOS.find(b => b.user === u.user)),
  ];

  const [form, setForm] = useState({ user:"", pass:"", nombre:"", rol:"operador", marcas:[] });
  const [editId, setEditId] = useState(null);
  const [msg, setMsg]       = useState(null);
  const [confirmDel, setConfirmDel] = useState(null);
  const setF = (k,v) => setForm(p => ({...p,[k]:v}));

  const rolesDisp = ["admin","gerente","operador"];
  const marcasDisp = Object.keys(MARCAS);

  const toggleMarca = (mk) => setF("marcas", form.marcas.includes(mk) ? form.marcas.filter(m=>m!==mk) : [...form.marcas, mk]);

  const handleGuardar = () => {
    if (!form.user.trim() || !form.pass.trim() || !form.nombre.trim()) {
      setMsg({ ok:false, text:"Completa usuario, contraseña y nombre." }); return;
    }
    if (form.marcas.length === 0) {
      setMsg({ ok:false, text:"Selecciona al menos una marca." }); return;
    }
    if (!editId && todosUsuarios.find(u => u.user === form.user.trim())) {
      setMsg({ ok:false, text:"Ya existe un usuario con ese nombre." }); return;
    }
    const nuevo = { ...form, user: form.user.trim().toLowerCase(), _base: false };
    if (editId) {
      setUsuarios(prev => prev.map(u => u.user === editId ? nuevo : u));
      setMsg({ ok:true, text:`✅ Usuario "${nuevo.user}" actualizado.` });
    } else {
      setUsuarios(prev => [...prev, nuevo]);
      setMsg({ ok:true, text:`✅ Usuario "${nuevo.user}" creado.` });
    }
    setForm({ user:"", pass:"", nombre:"", rol:"operador", marcas:[] });
    setEditId(null);
  };

  const handleEditar = (u) => {
    setForm({ user: u.user, pass: u.pass, nombre: u.nombre, rol: u.rol, marcas: u.marcas || [] });
    setEditId(u.user);
    setMsg(null);
  };

  const handleEliminar = (u) => {
    setUsuarios(prev => prev.filter(x => x.user !== u.user));
    setConfirmDel(null);
  };

  if (!esAdmin) return (
    <Card>
      <div style={{ textAlign:"center", padding:"24px 0", fontFamily:"Nunito", color:"#94A3B8" }}>
        🔒 Solo el administrador puede gestionar usuarios.
      </div>
    </Card>
  );

  return (
    <div style={{ paddingBottom:10 }}>
      {confirmDel && (
        <ConfirmModal
          msg={`¿Eliminar usuario "${confirmDel.user}"?`}
          detalle="Esta acción no se puede deshacer."
          onConfirm={() => handleEliminar(confirmDel)}
          onCancel={() => setConfirmDel(null)}
        />
      )}

      {/* Lista de usuarios */}
      <Card style={{ marginBottom:14 }}>
        <div style={{ fontFamily:"Nunito", fontWeight:900, fontSize:14, color:"#6C63FF", marginBottom:12 }}>👥 Usuarios activos</div>
        {todosUsuarios.map(u => (
          <div key={u.user} style={{ display:"flex", alignItems:"center", gap:8, padding:"8px 0", borderBottom:"1px solid #F1F5F9" }}>
            <div style={{ width:32, height:32, borderRadius:"50%", background: u.rol==="admin"?"#6C63FF":u.rol==="gerente"?"#F59E0B":"#22C55E", display:"flex", alignItems:"center", justifyContent:"center", color:"#fff", fontFamily:"Nunito", fontWeight:900, fontSize:14, flex:"none" }}>
              {u.nombre[0]?.toUpperCase()}
            </div>
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:12, color:"#1A1D2E" }}>{u.nombre}</div>
              <div style={{ fontSize:10, color:"#94A3B8" }}>
                <code style={{ background:"#F1F5F9", padding:"1px 5px", borderRadius:4 }}>{u.user}</code>
                &nbsp;· {u.rol}
                &nbsp;· {(u.marcas||[]).map(mk => MARCAS[mk]?.emoji).join(" ")}
                {u._base && <span style={{ color:"#CBD5E1" }}> · base</span>}
              </div>
            </div>
            <div style={{ display:"flex", gap:4, flex:"none" }}>
              <button onClick={() => handleEditar(u)}
                style={{ background:"#EEF2FF", border:"none", borderRadius:6, padding:"4px 8px", fontFamily:"Nunito", fontWeight:700, fontSize:11, color:"#6C63FF", cursor:"pointer" }}>
                ✏️
              </button>
              {!u._base && (
                <button onClick={() => setConfirmDel(u)}
                  style={{ background:"#FEF2F2", border:"none", borderRadius:6, padding:"4px 8px", fontFamily:"Nunito", fontWeight:700, fontSize:11, color:"#DC2626", cursor:"pointer" }}>
                  🗑️
                </button>
              )}
            </div>
          </div>
        ))}
      </Card>

      {/* Formulario crear/editar */}
      <Card>
        <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:13, color:"#6C63FF", marginBottom:12 }}>
          {editId ? `✏️ Editar usuario: ${editId}` : "➕ Nuevo usuario"}
        </div>

        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:10 }}>
          <Field label="Usuario (login)">
            <input placeholder="ej: maria" value={form.user} disabled={!!editId}

          </Field>
          <Field label="Contraseña">
            <input type="text" placeholder="mínimo 6 caracteres" value={form.pass}
              onChange={e=>setF("pass", e.target.value)} />
          </Field>
        </div>

        <Field label="Nombre completo">
          <input placeholder="Nombre que aparece en la app" value={form.nombre}
            onChange={e=>setF("nombre", e.target.value)} />
        </Field>

        <div style={{ marginTop:10 }}>
          <div style={{ fontFamily:"Nunito", fontSize:11, fontWeight:700, color:"#64748B", marginBottom:6 }}>ROL</div>
          <div style={{ display:"flex", gap:6 }}>
            {rolesDisp.map(r => (
              <button key={r} onClick={()=>setF("rol",r)}
                style={{ flex:1, padding:"8px 0", borderRadius:10, border:`2px solid ${form.rol===r?"#6C63FF":"#E2E8F0"}`, background:form.rol===r?"#6C63FF":"#fff", color:form.rol===r?"#fff":"#64748B", fontFamily:"Nunito", fontWeight:800, fontSize:12, cursor:"pointer", textTransform:"capitalize" }}>
                {r==="admin"?"🔑 Admin":r==="gerente"?"📊 Gerente":"🏪 Operador"}
              </button>
            ))}
          </div>
          <div style={{ fontSize:10, color:"#94A3B8", marginTop:4 }}>
            {form.rol==="admin"?"Acceso completo + gestión de usuarios y red":form.rol==="gerente"?"Ve todo, no puede configurar":"Solo registra en sus locales asignados"}
          </div>
        </div>

        <div style={{ marginTop:10 }}>
          <div style={{ fontFamily:"Nunito", fontSize:11, fontWeight:700, color:"#64748B", marginBottom:6 }}>MARCAS CON ACCESO</div>
          <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
            {marcasDisp.map(mk => {
              const m = MARCAS[mk];
              const sel = form.marcas.includes(mk);
              return (
                <button key={mk} onClick={()=>toggleMarca(mk)}
                  style={{ padding:"6px 12px", borderRadius:10, border:`2px solid ${sel?m.color:"#E2E8F0"}`, background:sel?m.color:"#fff", color:sel?m.textColor:"#64748B", fontFamily:"Nunito", fontWeight:700, fontSize:11, cursor:"pointer" }}>
                  {m.emoji} {m.nombre}
                </button>
              );
            })}
          </div>
        </div>

        {msg && <div style={{ marginTop:10, padding:"8px 12px", borderRadius:8, background:msg.ok?"#F0FDF4":"#FEF2F2", color:msg.ok?"#166534":"#DC2626", fontFamily:"Nunito", fontSize:12, fontWeight:700 }}>{msg.text}</div>}

        <div style={{ marginTop:12, display:"flex", gap:8 }}>
          <Btn color="#6C63FF" full onClick={handleGuardar}>
            {editId ? "💾 Guardar cambios" : "➕ Crear usuario"}
          </Btn>
          {editId && (
            <Btn color="#94A3B8" outline small onClick={() => { setEditId(null); setForm({ user:"", pass:"", nombre:"", rol:"operador", marcas:[] }); setMsg(null); }}>
              Cancelar
            </Btn>
          )}
        </div>
      </Card>
    </div>
  );
}

// ── MetasEditor — metas por local + defaults globales ────────────────────────

                       metaNpsMins, setMetaNpsMins }) {

    if (!val && val !== 0) return null;
    const ok = inv ? val >= meta : val <= meta;
    const warn = inv ? val >= meta * 0.9 : val <= meta * 1.15;
    const c = ok ? "#16A34A" : warn ? "#D97706" : "#DC2626";

          <Field label={`Food Cost % (default: ${metaFoodCostPct||40}%)`}>
            <input type="number" placeholder={String(metaFoodCostPct||40)} min="0" max="100" step="0.5"

        </div>

        <Divider label="KPI y Mermas" color="#22C55E" />

          <Field label={`Merma % (default: ${metaMermasPct||2}%)`}>

          <Field label={`NPS mín (default: ${metaNpsMins||80})`}>

              onChange={e=>setLocalField(localSel,"nps_min",e.target.value)} />

        <div style={{ background:"#F8FAFF", borderRadius:10, padding:"10px 12px", marginBottom:12 }}>

              ["Merma %",   NF(lv.merma_pct,     metaMermasPct||2),    false],
              ["KDS",       NF(lv.kds_min,       metaKdsMin||4),       false],
              ["NPS",       NF(lv.nps_min,       metaNpsMins||80),     true ],

                <span style={{ color:"#64748B" }}>{label}: </span>

        <Btn color={saved?"#22C55E":"#6C63FF"} full onClick={handleSave}>

      </Card>

      {/* Resumen de locales configurados */}
      {Object.keys(metasLocal).some(l => Object.keys(metasLocal[l]||{}).length > 0) && (
        <Card style={{ marginTop:12 }}>
          <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:12, color:"#6C63FF", marginBottom:10 }}>📋 Resumen configuración por local</div>

            <table style={{ width:"100%", borderCollapse:"collapse", fontSize:10, fontFamily:"Nunito" }}>
              <thead>
                <tr style={{ background:"#F8FAFF" }}>
                  {["Local","Labor%","FC%","Merma%","KDS","NPS"].map(h=>(
                    <th key={h} style={{ padding:"5px 6px", textAlign:"right", fontWeight:800, color:"#475569", borderBottom:"1.5px solid #E2E8F0", whiteSpace:"nowrap" }}>{h}</th>

              <tbody>
                {LOCALES.map(l => {
                  const lv2 = metasLocal[l] || {};
                  const hasAny = Object.keys(lv2).some(k => lv2[k] !== "" && lv2[k] !== undefined);
                  if (!hasAny) return null;
                  const show = (v, def) => v !== undefined && v !== "" ? <span style={{ fontWeight:800, color:"#6C63FF" }}>{v}</span> : <span style={{ color:"#CBD5E1" }}>{def}</span>;
                  return (

                      <td style={{ padding:"5px 6px", fontWeight:700, color:"#1A1D2E", fontSize:9 }}>{l.split(" - ")[1]||l}</td>

                      <td style={{ padding:"5px 6px", textAlign:"right" }}>{show(lv2.merma_pct,    metaMermasPct||2)}</td>
                      <td style={{ padding:"5px 6px", textAlign:"right" }}>{show(lv2.kds_min,      metaKdsMin||4)}</td>
                      <td style={{ padding:"5px 6px", textAlign:"right" }}>{show(lv2.nps_min,      metaNpsMins||80)}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </Card>
      )}
    </div>
  );
}

// Helpers para metas — fuera de componentes para evitar problemas de scope
const readMetaLS  = (key, def) => { try { const v = parseFloat(localStorage.getItem(key)); return isNaN(v) ? def : v; } catch { return def; } };
const writeMetaLS = (key, val) => { try { localStorage.setItem(key, String(val)); } catch {} };

// Obtiene la meta efectiva de un local (propia > default global)
const getMetaLocal = (local, campo, defGlobalKey, defVal) => {
  try {
    const locales = JSON.parse(localStorage.getItem("horreo_metas_kpi_local") || "{}");
    const v = locales[local]?.[campo];
    if (v !== undefined && v !== "" && !isNaN(parseFloat(v))) return parseFloat(v);
    return readMetaLS(defGlobalKey, defVal);
  } catch { return defVal; }
};

            </div>
          </Card>

          {/* Valores por cargo */}
          <Card>
            <div style={{ fontFamily:"Nunito", fontWeight:900, fontSize:14, color:"#6C63FF", marginBottom:8 }}>💼 Valores por cargo</div>
            <div style={{ background:"#FFFBEB", border:"1px solid #FDE68A", borderRadius:8, padding:"8px 12px", marginBottom:14, fontSize:11, color:"#92400E" }}>
              Ingresa valor hora <strong>O</strong> sueldo mensual. Los bonos son monto fijo mensual adicional (colación, movilización, etc.) y se suman al costo total de labor.
            </div>

            {Object.keys(valoresCargo).map(cargo => {
              const cc = cargoColor(cargo);
              const vc = valoresCargo[cargo] || { hora:0, mes:0, bono:0 };
              const upd = (k,v) => setValoresCargo(prev=>({...prev,[cargo]:{...prev[cargo],[k]:parseFloat(v)||0}}));
              const costoBase = vc.mes > 0 ? vc.mes : (vc.hora * 8 * diasHabiles);
              const costoTotal = costoBase + (vc.bono || 0);
              return (
                <div key={cargo} style={{ background:cc.bg, border:`1.5px solid ${cc.color}33`, borderRadius:12, padding:"12px 14px", marginBottom:10 }}>
                  <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:13, color:cc.color, marginBottom:10 }}>{cargo}</div>
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8 }}>
                    <Field label="Valor hora $">
                      <input type="number" placeholder="0" value={vc.hora||""} onChange={e=>upd("hora",e.target.value)} />
                    </Field>
                    <Field label="Sueldo mensual $">
                      <input type="number" placeholder="0" value={vc.mes||""} onChange={e=>upd("mes",e.target.value)} />
                    </Field>
                    <Field label="Bonos mensuales $">
                      <input type="number" placeholder="0" value={vc.bono||""} onChange={e=>upd("bono",e.target.value)} />
                    </Field>
                  </div>
                  {(costoBase > 0 || vc.bono > 0) && (
                    <div style={{ fontSize:10, color:cc.color, marginTop:6, fontWeight:700, display:"flex", gap:10, flexWrap:"wrap" }}>
                      <span>Base: {fmtCLP(costoBase)}/mes</span>
                      {vc.bono > 0 && <span>+ Bonos: {fmtCLP(vc.bono)}</span>}
                      {(vc.bono > 0 || costoBase > 0) && <span style={{ fontWeight:900 }}>= Total: {fmtCLP(costoTotal)}/mes</span>}
                    </div>
                  )}
                </div>
              );
            })}

            {/* Agregar cargo */}
            <div style={{ fontSize:11, color:"#94A3B8", marginBottom:6 }}>¿Tienes otro cargo?</div>
            <div style={{ display:"flex", gap:8 }}>
              <input id="cfg-nuevo-cargo" placeholder="Ej: Supervisor" style={{ flex:1 }} />
              <Btn color="#6C63FF" small onClick={() => {
                const input = document.getElementById("cfg-nuevo-cargo");
                const nombre = input?.value?.trim();
                if (nombre && !valoresCargo[nombre]) {
                  setValoresCargo(prev=>({...prev,[nombre]:{hora:0,mes:0,bono:0}}));
                  if(input) input.value="";
                }
              }}>+ Agregar</Btn>
            </div>
          </Card>
        </div>
      )}

      {/* ═══ TAB METAS ═══ */}
      {tab === "metas" && (
        <MetasEditor
          metaLaborPct={metaLaborPct}      setMetaLaborPct={setMetaLaborPct}
          metaFoodCostPct={metaFoodCostPct} setMetaFoodCostPct={setMetaFoodCostPct}
          metaMermasPct={metaMermasPct}    setMetaMermasPct={setMetaMermasPct}
          metaKdsMin={metaKdsMin}          setMetaKdsMin={setMetaKdsMin}
          metaNpsMins={metaNpsMins}        setMetaNpsMins={setMetaNpsMins}
        />
      )}

      {tab === "red" && <GestionRedAdmin session={getSession()} />}
      {tab === "usuarios" && <GestionUsuarios session={getSession()} />}

      {/* ═══ TAB CONEXIONES ═══ */}
      {tab === "conexiones" && (
        <div>
          <Card style={{ marginBottom:14 }}>
            <SectionTitle>📊 Google Sheets</SectionTitle>
            <div style={{ background:"#FFF8E7", border:"1.5px solid rgba(245,158,11,0.27)", borderRadius:10, padding:12, marginBottom:14, fontSize:12, color:"#92400E", lineHeight:1.6 }}>
              <strong>Cómo conectar:</strong><br/>
              1. Abre tu Google Sheet → <strong>Extensiones → Apps Script</strong><br/>
              2. Pega el código de abajo, guarda e implementa como App Web<br/>
              3. Copia la URL generada y pégala aquí
            </div>
            <Field label="URL Apps Script (Web App)">
              <input placeholder="https://script.google.com/macros/s/..." value={form.appsScriptUrl} onChange={e=>setF("appsScriptUrl",e.target.value)} />
            </Field>
            <div style={{ height:8 }} />
            <Field label="ID del Google Sheet (opcional)">
              <input placeholder="1abc...xyz" value={form.sheetId} onChange={e=>setF("sheetId",e.target.value)} />
            </Field>
            <div style={{ marginTop:12 }}>
              <Btn onClick={saveConn} color={saved?"#22C55E":"#6C63FF"} full>{saved?"✅ Guardado":"💾 Guardar"}</Btn>
            </div>
          </Card>

          <Card style={{ marginBottom:14, border:"2px solid rgba(62,207,142,0.25)", background:"linear-gradient(135deg,rgba(62,207,142,0.05),rgba(99,102,241,0.05))" }}>
            <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:10 }}>
              <span style={{ fontSize:18 }}>🗄️</span>
              <div style={{ fontFamily:"Nunito", fontWeight:900, fontSize:15, color:"#1A1D2E" }}>Supabase</div>
            </div>
            <div style={{ fontSize:11, color:"#64748B", marginBottom:12, lineHeight:1.6 }}>
              Base de datos en la nube para multi-usuario en tiempo real. Datos disponibles desde cualquier dispositivo con respaldo automático.
            </div>
            <Field label="URL del proyecto">
              <input placeholder="https://xxxx.supabase.co" value={form.supabaseUrl||""} onChange={e=>setF("supabaseUrl",e.target.value)} />
            </Field>
            <div style={{ height:8 }} />
            <Field label="Anon Key">
              <input placeholder="eyJhbGci..." value={form.supabaseKey||""} onChange={e=>setF("supabaseKey",e.target.value)} />
            </Field>
            <div style={{ marginTop:10, background:"#F0FDF4", borderRadius:8, padding:"8px 12px", fontSize:11, color:"#166534" }}>
              ✅ Cuando configures Supabase, los datos se sincronizarán en tiempo real entre todos los usuarios.
            </div>
            <div style={{ marginTop:10 }}>
              <Btn onClick={saveConn} color={saved?"#22C55E":"#10B981"} full>{saved?"✅ Guardado":"💾 Guardar conexión Supabase"}</Btn>
            </div>
            <MigracionSB />
          </Card>

          <Card>
            <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:13, marginBottom:10 }}>📋 Código Apps Script</div>
            <div style={{ background:"#1A1D2E", borderRadius:10, padding:14, fontSize:11, color:"#E2E8F0", fontFamily:"monospace", lineHeight:1.7, overflowX:"auto", whiteSpace:"pre" }}>{`function doPost(e) {
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  const data = JSON.parse(e.postData.contents);
  const sheet = ss.getSheetByName(data.tabla)
    || ss.insertSheet(data.tabla);
  if (sheet.getLastRow() === 0)
    sheet.appendRow(Object.keys(data.rows[0]));
  data.rows.forEach(row =>
    sheet.appendRow(Object.values(row)));
  return ContentService
    .createTextOutput(JSON.stringify({ message: "OK" }))
    .setMimeType(ContentService.MimeType.JSON);
}
function doGet() {
  return ContentService
    .createTextOutput("El Hórreo API OK")
    .setMimeType(ContentService.MimeType.TEXT);
}`}</div>
            <div style={{ marginTop:8, fontSize:11, color:"#94A3B8" }}>⚠️ Al implementar: <strong>Quién tiene acceso → Cualquier usuario</strong></div>
          </Card>
        </div>
      )}

      {/* ═══ TAB APP ═══ */}
      {tab === "app" && (
        <div>
          <Card style={{ marginBottom:12 }}>
            <div style={{ fontFamily:"Nunito", fontWeight:900, fontSize:15, color:"#6C63FF", marginBottom:14, display:"flex", alignItems:"center", gap:8 }}>
              📲 Instalar El Hórreo
            </div>

            {/* Estado actual */}
            {(() => {
              const isStandalone = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;
              if (isStandalone) return (
                <div style={{ background:"#F0FDF4", border:"1.5px solid #86EFAC", borderRadius:12, padding:"14px 16px", marginBottom:12, textAlign:"center" }}>
                  <div style={{ fontSize:32, marginBottom:6 }}>✅</div>
                  <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:14, color:"#166534" }}>App instalada</div>
                  <div style={{ fontFamily:"Nunito", fontSize:12, color:"#16A34A", marginTop:4 }}>Estás usando El Hórreo como app instalada.</div>
                </div>
              );
              return null;
            })()}

            {/* Android/Chrome */}
            <div style={{ marginBottom:14 }}>
              <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:13, color:"var(--text-1)", marginBottom:8, display:"flex", alignItems:"center", gap:6 }}>
                <span>🤖</span> Android / Chrome
              </div>
              <div style={{ fontFamily:"Nunito", fontSize:12, color:"var(--text-3)", lineHeight:1.7, marginBottom:10 }}>
                Aparecerá un banner automático en la parte inferior. Si no aparece, usa el menú ⋮ de Chrome → "Instalar app".
              </div>
              <button
                onClick={async () => {
                  if (window._installPrompt) {
                    window._installPrompt.prompt();
                    const { outcome } = await window._installPrompt.userChoice;
                    if (outcome === "accepted") window._installPrompt = null;
                  } else {
                    alert("El navegador no ha habilitado la instalación aún. Intenta desde Chrome en Android o usa el menú ⋮ → Instalar app.");
                  }
                }}
                style={{ background:"#6C63FF", color:"#fff", border:"none", borderRadius:10, padding:"10px 18px", fontFamily:"Nunito", fontWeight:800, fontSize:13, cursor:"pointer", width:"100%" }}>
                📲 Instalar ahora
              </button>
            </div>

            <div style={{ height:1, background:"var(--border)", margin:"14px 0" }} />

            {/* iOS */}
            <div style={{ marginBottom:14 }}>
              <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:13, color:"var(--text-1)", marginBottom:8, display:"flex", alignItems:"center", gap:6 }}>
                <span>🍎</span> iPhone / iPad (Safari)
              </div>
              <div style={{ background:"var(--bg)", borderRadius:12, padding:"12px 14px" }}>
                {[
                  ["1", "Abre esta página en Safari (no Chrome ni otro navegador)"],
                  ["2", `Toca el botón Compartir ${String.fromCodePoint(0x1F4E4)} en la barra inferior`],
                  ["3", "Desplázate y toca 'Agregar a pantalla de inicio'"],
                  ["4", "Confirma tocando 'Agregar' — aparecerá el ícono en tu inicio"],
                ].map(([n, t]) => (
                  <div key={n} style={{ display:"flex", gap:10, marginBottom:10, alignItems:"flex-start" }}>
                    <div style={{ background:"#6C63FF", color:"#fff", borderRadius:"50%", width:22, height:22, display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"Nunito", fontWeight:900, fontSize:11, flexShrink:0 }}>{n}</div>
                    <div style={{ fontFamily:"Nunito", fontSize:12, color:"var(--text-2)", lineHeight:1.5 }}>{t}</div>
                  </div>
                ))}
              </div>
            </div>

            <div style={{ height:1, background:"var(--border)", margin:"14px 0" }} />

            {/* Desktop */}
            <div>
              <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:13, color:"var(--text-1)", marginBottom:8, display:"flex", alignItems:"center", gap:6 }}>
                <span>🖥️</span> Windows / Mac / Linux (Chrome o Edge)
              </div>
              <div style={{ fontFamily:"Nunito", fontSize:12, color:"var(--text-3)", lineHeight:1.7 }}>
                En la barra de dirección aparece un ícono 🖥️ o ➕ a la derecha. Haz clic y selecciona "Instalar". La app abrirá en su propia ventana sin barra del navegador.
              </div>
            </div>
          </Card>

          {/* Ventajas */}
          <Card>
            <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:13, color:"var(--text-1)", marginBottom:10 }}>¿Qué gano al instalarla?</div>
            {[
              ["⚡","Acceso directo desde pantalla de inicio — sin abrir el navegador"],
              ["📶","Funciona sin conexión — los datos quedan guardados localmente"],
              ["🔔","Sin barra del navegador — más espacio para ver la información"],
              ["🔄","Se actualiza automáticamente al conectarte"],
            ].map(([icon, text]) => (
              <div key={text} style={{ display:"flex", gap:10, marginBottom:8, alignItems:"flex-start" }}>
                <span style={{ fontSize:18, flexShrink:0 }}>{icon}</span>
                <div style={{ fontFamily:"Nunito", fontSize:12, color:"var(--text-2)", lineHeight:1.5 }}>{text}</div>
              </div>
            ))}
          </Card>
        </div>
      )}
    </div>
  );
}

// HISTORIAL — con useMemo, ConfirmModal con detalle
// ══════════════════════════════════════════════════════════════════════════════
function Historial({ ventas, kpis, inventarios, setVentas, setKpis, setInventarios, marca, semanas, setSemanas, planillas, setPlanillas, session }) {
  const [tab, setTab]           = useState("ventas");
  const [filtroLocal, setFiltroLocal] = useState("Todos");
  const [confirmDel, setConfirmDel]   = useState(null);
  const [editReg, setEditReg]         = useState(null); // registro en edición
  const [editForm, setEditForm]       = useState({});
  const m = MARCAS[marca] || MARCAS[Object.keys(MARCAS)[0]] || { color: "#6C63FF", bg: "#F0EEFF", emoji: "🌭", textColor: "#fff", nombre: "—" };
  const localesMarca = LOCALES_POR_MARCA[marca] || LOCALES;

  const isAdmin = session?.rol === "admin";

  const openEdit = (r) => {
    setEditReg(r);
    setEditForm({
      venta_bruta: r.venta_bruta ?? "",
      boletas:     r.boletas     ?? "",
      merma:       r.merma       ?? "",
      colaciones:  r.colaciones  ?? "",
      obs:         r.obs         ?? "",
      // KPI fields
      kds_desayuno: r.kds_desayuno ?? "",
      kds_almuerzo: r.kds_almuerzo ?? "",
      kds_tarde:    r.kds_tarde    ?? "",
      kds_noche:    r.kds_noche    ?? "",
      nota_uber:    r.nota_uber    ?? "",
      nota_pya:     r.nota_pya     ?? "",
      pedidos_uber: r.pedidos_uber ?? "",
      pedidos_pya:  r.pedidos_pya  ?? "",
      nps_promotores:  r.nps_promotores  ?? "",
      nps_pasivos:     r.nps_pasivos     ?? "",
      nps_detractores: r.nps_detractores ?? "",
    });
  };

  const handleSaveEdit = () => {
    if (!editReg) return;
    const nv = parseFloat(editForm.venta_bruta || 0);
    const nb = parseFloat(editForm.boletas || 0);
    const updated = {
      ...editReg,
      ...editForm,
      venta_bruta: nv, boletas: nb,
      ticket: nb > 0 ? Math.round(nv / nb) : editReg.ticket,
      ts_editado: new Date().toISOString(),
    };
    if (tab === "ventas") {
      setVentas(v => v.map(x => x.id === editReg.id ? updated : x));
      getSB()?.from("ventas").upsert(updated, {onConflict:"id"}).then(({error})=>error&&console.warn("edit ventas",error.message));
    }
    if (tab === "kpi") {
      setKpis(k => k.map(x => x.id === editReg.id ? updated : x));
      getSB()?.from("kpis").upsert(updated, {onConflict:"id"}).then(({error})=>error&&console.warn("edit kpis",error.message));
    }
    setEditReg(null);
  };

  const data     = tab === "ventas" ? ventas : tab === "kpi" ? kpis : inventarios;
  const filtered = useMemo(() =>
    (filtroLocal === "Todos" ? data : data.filter(r => r.local === filtroLocal)).filter(r => r.marca === marca),
    [data, filtroLocal, marca]);
  const sorted   = useMemo(() => [...filtered].sort((a, b) => b.ts > a.ts ? 1 : -1).slice(0, 40), [filtered]);

  // Labor: semanas de esta marca
  const semanasMarca = useMemo(() => (semanas || []).filter(s => s.marca === marca).sort((a,b) => b.inicio > a.inicio ? 1 : -1), [semanas, marca]);
  // Planillas: agrupadas por local+mes
  const planillasMarca = useMemo(() => {
    const grupos = {};
    (planillas || []).filter(p => p.marca === marca).forEach(p => {
      const key = p.local + "__" + (p.fecha_carga || "").slice(0,7);
      if (!grupos[key]) grupos[key] = { local: p.local, mes: (p.fecha_carga || "").slice(0,7), count: 0, ids: [] };
      grupos[key].count++;
      grupos[key].ids.push(p.id);
    });
    return Object.values(grupos).sort((a,b) => b.mes > a.mes ? 1 : -1);
  }, [planillas, marca]);

  const handleConfirmDel = () => {
    if (!confirmDel) return;
    if (tab === "ventas") {
      setVentas(v => v.filter(x => x.id !== confirmDel.id));
      sbDelete("ventas", confirmDel.id);
    }
    if (tab === "kpi") {
      setKpis(k => k.filter(x => x.id !== confirmDel.id));
      sbDelete("kpis", confirmDel.id);
    }
    if (tab === "inventario") setInventarios(i => i.filter(x => x.id !== confirmDel.id));
    if (tab === "labor" && setSemanas) {
      setSemanas(ss => ss.filter(s => !(s.marca === marca && s.inicio === confirmDel.inicio && s.fin === confirmDel.fin)));
    }
    if (tab === "planillas" && setPlanillas) {
      (confirmDel.ids || []).forEach(id => sbDelete("planillas_costos", id));
      setPlanillas(ps => ps.filter(p => !(confirmDel.ids || []).includes(p.id)));
    }
    setConfirmDel(null);
  };

  const tabsDisponibles = [
    { id: "ventas",    label: "🛒 Ventas"   },
    { id: "kpi",       label: "⚡ KPI"       },
    { id: "inventario",label: "📦 Inv."      },
    ...(isAdmin ? [{ id: "labor",     label: "🏭 Labor"     }] : []),
    ...(isAdmin ? [{ id: "planillas", label: "💰 Planillas" }] : []),
  ];

  return (
    <div className="fade" style={{ paddingBottom: 90 }}>
      {confirmDel && <ConfirmModal
        msg={tab === "labor"
          ? `Semana ${confirmDel.semana}: ${confirmDel.inicio} → ${confirmDel.fin}`
          : tab === "planillas"
          ? `${confirmDel.local} — ${confirmDel.mes}`
          : `${confirmDel.local} — ${confirmDel.fecha}`}
        detalle={tab === "labor"
          ? `${confirmDel.empleados} empleados · ${nombreCortoLocal(confirmDel.uploadLocal || confirmDel.sucursal || "")}`
          : tab === "planillas"
          ? `${confirmDel.count} registros serán eliminados`
          : confirmDel.turno ? `Turno: ${confirmDel.turno}` : undefined}
        onConfirm={handleConfirmDel}
        onCancel={() => setConfirmDel(null)}
      />}
      <LogoHeader marca={marca} />
      <SectionTitle color={m.color}>📋 Historial</SectionTitle>
      <div style={{ display: "flex", gap: 6, marginBottom: 12, flexWrap: "wrap" }}>
        {tabsDisponibles.map(t => (<Btn key={t.id} onClick={() => setTab(t.id)} color={m.color} outline={tab !== t.id} small>{t.label}</Btn>))}
      </div>

      {/* Filtro local — solo para ventas/kpi/inventario */}
      {["ventas","kpi","inventario"].includes(tab) && (
        <div style={{ marginBottom: 12 }}>
          <select value={filtroLocal} onChange={e => setFiltroLocal(e.target.value)} style={{ width: "auto", minWidth: 140 }}>
            <option>Todos</option>{localesMarca.map(l => <option key={l}>{l}</option>)}
          </select>
        </div>
      )}

      {/* ── Modal de edición ── */}
      {editReg && (
        <div style={{ position:"fixed", inset:0, zIndex:999, background:"rgba(0,0,0,0.45)", display:"flex", alignItems:"flex-end", justifyContent:"center" }}
          onClick={() => setEditReg(null)}>
          <div onClick={e => e.stopPropagation()}
            style={{ background:"#fff", borderRadius:"20px 20px 0 0", padding:20, width:"100%", maxWidth:520, maxHeight:"85vh", overflowY:"auto" }}>
            <div style={{ width:36, height:4, background:"#E2E8F0", borderRadius:2, margin:"0 auto 16px" }} />
            <div style={{ fontFamily:"Nunito", fontWeight:900, fontSize:16, marginBottom:2 }}>✏️ Editar registro</div>
            <div style={{ fontFamily:"Nunito", fontSize:11, color:"#94A3B8", marginBottom:14 }}>
              {nombreCortoLocal(editReg.local)} · {editReg.fecha} · {editReg.turno}
            </div>

            {tab === "ventas" && (
              <>
                {[["Venta Bruta $","venta_bruta","number"],["N° Boletas","boletas","number"],
                  ["Merma $","merma","number"],["Colaciones $","colaciones","number"]].map(([l,k,t]) => (
                  <div key={k} style={{ marginBottom:10 }}>
                    <div style={{ fontFamily:"Nunito", fontSize:11, color:"#64748B", fontWeight:700, marginBottom:3 }}>{l}</div>
                    <input type={t} value={editForm[k]} onChange={e => setEditForm(f=>({...f,[k]:e.target.value}))}
                      style={{ width:"100%", border:"1.5px solid #E2E8F0", borderRadius:9, padding:"8px 10px", fontFamily:"Nunito", fontSize:13, boxSizing:"border-box" }} />
                  </div>
                ))}
                {editReg.corte_16_ref && (
                  <div style={{ background:"#EFF6FF", border:"1px solid #BFDBFE", borderRadius:8, padding:"8px 10px", marginBottom:10, fontFamily:"Nunito", fontSize:11, color:"#1D4ED8" }}>
                    ℹ️ Este registro es el delta de un cierre con corte 16:00. Edita la venta bruta con cuidado.
                  </div>
                )}
              </>
            )}

            {tab === "kpi" && (
              <>
                <div style={{ fontFamily:"Nunito", fontWeight:700, fontSize:11, color:"#64748B", marginBottom:6 }}>KDS (min)</div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:10 }}>
                  {[["Desayuno","kds_desayuno"],["Almuerzo","kds_almuerzo"],["Tarde","kds_tarde"],["Noche","kds_noche"]].map(([l,k])=>(
                    <div key={k}>
                      <div style={{ fontFamily:"Nunito", fontSize:10, color:"#94A3B8", marginBottom:2 }}>{l}</div>
                      <input type="number" value={editForm[k]} onChange={e=>setEditForm(f=>({...f,[k]:e.target.value}))}
                        style={{ width:"100%", border:"1.5px solid #E2E8F0", borderRadius:8, padding:"6px 8px", fontFamily:"Nunito", fontSize:12, boxSizing:"border-box" }} />
                    </div>
                  ))}
                </div>
                <div style={{ fontFamily:"Nunito", fontWeight:700, fontSize:11, color:"#64748B", marginBottom:6 }}>Delivery</div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:10 }}>
                  {[["Nota Uber","nota_uber"],["Nota PYA","nota_pya"],["Pedidos Uber","pedidos_uber"],["Pedidos PYA","pedidos_pya"]].map(([l,k])=>(

function generarCSV(headers, rows) {
  const esc = v => typeof v === "string" && (v.includes(",") || v.includes("\n") || v.includes('"')) ? '"' + v.replace(/"/g, '""') + '"' : String(v ?? "");
  return [headers, ...rows].map(r => r.map(esc).join(",")).join("\n");
}

// csvModal: estado global para mostrar CSV en pantalla
let _csvModalSetter = null;
function showCSVModal(filename, csv) {
  if (_csvModalSetter) _csvModalSetter({ filename, csv });
}

function CSVModal() {
  const [data, setData] = useState(null);
  const [copied, setCopied] = useState(false);
  _csvModalSetter = setData;
  if (!data) return null;
  const handleCopy = () => {
    // Seleccionar el textarea y copiar
    const ta = document.getElementById("csv-preview-ta");
    if (ta) { ta.select(); ta.setSelectionRange(0, 99999); }
    try { document.execCommand("copy"); setCopied(true); setTimeout(() => setCopied(false), 2000); } catch(e) {}
  };
  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 9998, background: "rgba(0,0,0,0.55)", display: "flex", alignItems: "flex-end", justifyContent: "center" }} onClick={() => setData(null)}>

        <div style={{ fontSize: 11, color: "#64748B" }}>Copia este contenido y pégalo en un archivo .csv (o en Excel)</div>

        <div style={{ display: "flex", gap: 10 }}>

    if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
    const d = new Date(s); if (!isNaN(d)) return d.toISOString().split("T")[0];

  const parseNum = val => { if (val == null || val === "") return 0; return parseFloat(String(val).replace(/[.$\s]/g,"").replace(",",".")) || 0; };

  const handleFile = async e => {

        setVentas(v => { const ex = new Set(v.map(x => x.local+"_"+x.fecha+"_"+x.turno)); return [...v, ...rows.filter(r => !ex.has(r.local+"_"+r.fecha+"_"+r.turno))]; });

          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>

// HISTÓRICO DE DESVIACIONES — acumulado mensual por material
// ══════════════════════════════════════════════════════════════════════════════
function ComparativoDesviaciones({ dataMarca, marca, m, fmtVal, fmtNum }) {
  // Fechas disponibles ordenadas desc
  const fechasDisp = useMemo(() =>
    [...new Set(dataMarca.map(d => d.fecha))].sort().reverse(),
  [dataMarca]);

  const localesDisp = useMemo(() =>
    [...new Set(dataMarca.map(d => d.local))],
  [dataMarca]);

  const [localSel,  setLocalSel]  = useState("Todos");
  const [fechaA,    setFechaA]    = useState(fechasDisp[0] || today());
  const [fechaB,    setFechaB]    = useState(fechasDisp[1] || today());
  const [catSel,    setCatSel]    = useState("todas");
  const [soloGrandes, setSoloGrandes] = useState(false);
  const [ordenar,   setOrdenar]   = useState("impacto"); // impacto | variacion | material

  // Sincronizar fechas cuando cambia la data
  useEffect(() => {
    if (fechasDisp.length > 0 && !fechasDisp.includes(fechaA)) setFechaA(fechasDisp[0]);
    if (fechasDisp.length > 1 && !fechasDisp.includes(fechaB)) setFechaB(fechasDisp[1]);
  }, [fechasDisp]);

  const categorias = useMemo(() => ["todas", ...new Set(dataMarca.map(d => d.jerarquia))], [dataMarca]);

  // Datos de cada período, filtrados por local
  const filtrar = (fecha) => dataMarca.filter(d =>
    d.fecha === fecha &&
    (localSel === "Todos" || d.local === localSel) &&
    (catSel === "todas" || d.jerarquia === catSel)
  );

  const datA = useMemo(() => filtrar(fechaA), [dataMarca, fechaA, localSel, catSel]);
  const datB = useMemo(() => filtrar(fechaB), [dataMarca, fechaB, localSel, catSel]);

  // Cruzar materiales entre ambas fechas
  const cruzado = useMemo(() => {
    const mapA = {}, mapB = {};
    datA.forEach(d => { mapA[d.material] = d; });
    datB.forEach(d => { mapB[d.material] = d; });
    const todos = new Set([...Object.keys(mapA), ...Object.keys(mapB)]);
    return [...todos].map(mat => {
      const a = mapA[mat] || null;
      const b = mapB[mat] || null;
      const dvalA = a?.desv_valor ?? null;
      const dvalB = b?.desv_valor ?? null;
      const variacion = dvalA !== null && dvalB !== null ? dvalA - dvalB : null;
      const crealA = a?.cons_real ?? null;
      const crealB = b?.cons_real ?? null;
      const varCreal = crealA !== null && crealB !== null ? crealA - crealB : null;
      return {
        material: mat,
        jerarquia: (a || b).jerarquia,
        unidad: (a || b).unidad,
        a, b,
        dvalA, dvalB, variacion,
        crealA, crealB, varCreal,
        soloEnA: !b, soloEnB: !a,
        maxImpacto: Math.max(Math.abs(dvalA||0), Math.abs(dvalB||0)),
        severA: a ? severidad(a.desv_valor) : null,
        severB: b ? severidad(b.desv_valor) : null,
      };
    });
  }, [datA, datB]);

  const filtrados = useMemo(() => {
    let arr = [...cruzado];
    if (soloGrandes) arr = arr.filter(r => r.maxImpacto >= 15000);
    if (ordenar === "impacto")   arr.sort((a,b) => b.maxImpacto - a.maxImpacto);
    if (ordenar === "variacion") arr.sort((a,b) => Math.abs(b.variacion||0) - Math.abs(a.variacion||0));
    if (ordenar === "material")  arr.sort((a,b) => a.material.localeCompare(b.material));
    if (ordenar === "empeorado") arr.sort((a,b) => (a.variacion||0) - (b.variacion||0)); // más negativo = empeoró (faltante creció)
    return arr;
  }, [cruzado, soloGrandes, ordenar]);

  // Resumen del comparativo
  const resumen = useMemo(() => {
    const totalA = datA.reduce((s,d)=>s+d.desv_valor,0);
    const totalB = datB.reduce((s,d)=>s+d.desv_valor,0);
    const empeorados = cruzado.filter(r => r.variacion !== null && r.variacion < -5000).length;
    const mejoraron  = cruzado.filter(r => r.variacion !== null && r.variacion > 5000).length;
    const nuevosA    = cruzado.filter(r => r.soloEnA).length;
    return { totalA, totalB, delta: totalA - totalB, empeorados, mejoraron, nuevosA };
  }, [cruzado, datA, datB]);

  const FechaBtn = ({label, fecha, setFecha, activas}) => (
    <div>
      <div style={{fontFamily:"Nunito",fontSize:10,color:"#64748B",fontWeight:700,marginBottom:3}}>{label}</div>
      <select value={fecha} onChange={e=>setFecha(e.target.value)}
        style={{border:"1.5px solid #E2E8F0",borderRadius:9,padding:"6px 10px",fontFamily:"Nunito",fontSize:12,fontWeight:700,background:"#fff"}}>
        {activas.map(f=><option key={f} value={f}>{f}</option>)}
        {!activas.includes(fecha) && <option value={fecha}>{fecha}</option>}
      </select>
    </div>
  );

  if (fechasDisp.length === 0) return (
    <Card><div style={{textAlign:"center",color:"#94A3B8",padding:30,fontFamily:"Nunito"}}>
      Sin informes cargados — sube al menos un Informe de Desviaciones desde la pestaña 📂 Cargar.
    </div></Card>
  );

  const BAR_W = 120; // px barra comparativa

  return (
    <div style={{paddingBottom:20}}>
      {/* Filtros */}
      <Card style={{marginBottom:12}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
          <FechaBtn label={`📅 Período A (base)`} fecha={fechaA} setFecha={setFechaA} activas={fechasDisp} />
          <FechaBtn label={`📅 Período B (comparar)`} fecha={fechaB} setFecha={setFechaB} activas={fechasDisp} />
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
          <div>
            <div style={{fontFamily:"Nunito",fontSize:10,color:"#64748B",fontWeight:700,marginBottom:3}}>Local</div>
            <select value={localSel} onChange={e=>setLocalSel(e.target.value)}
              style={{width:"100%",border:"1.5px solid #E2E8F0",borderRadius:9,padding:"6px 8px",fontFamily:"Nunito",fontSize:12}}>
              <option value="Todos">🌐 Todos</option>
              {localesDisp.map(l=><option key={l} value={l}>{nombreCortoLocal(l)}</option>)}
            </select>
          </div>
          <div>
            <div style={{fontFamily:"Nunito",fontSize:10,color:"#64748B",fontWeight:700,marginBottom:3}}>Categoría</div>
            <select value={catSel} onChange={e=>setCatSel(e.target.value)}
              style={{width:"100%",border:"1.5px solid #E2E8F0",borderRadius:9,padding:"6px 8px",fontFamily:"Nunito",fontSize:12}}>
              {categorias.map(c=><option key={c} value={c}>{c==="todas"?"Todas":c}</option>)}
            </select>
          </div>
        </div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>

      {/* Lista comparativa */}
      {filtrados.length === 0 ? (

            <div style={{display:"flex",gap:16}}>
              <span style={{fontFamily:"Nunito",fontSize:10,color:m.color,fontWeight:800}}>📅 {fechaA}</span>

            return (
              <details key={i} style={{marginBottom:8}}>
                <summary style={{
                  background: r.soloEnA ? "#F0FDF4" : r.soloEnB ? "#EFF6FF" :
                    (r.variacion !== null && r.variacion < -10000) ? "#FEF2F2" : "#fff",
                  border:`1.5px solid ${r.variacion!==null&&r.variacion<-10000?"#FECACA":r.soloEnA?"#86EFAC":r.soloEnB?"#BFDBFE":"#E2E8F0"}`,

                  <div style={{flex:1,minWidth:0}}>

                    <div style={{fontFamily:"Nunito",fontSize:9,color:"#94A3B8",marginTop:1}}>

                      {r.soloEnB && <span style={{marginLeft:4,color:"#2563EB",fontWeight:700}}>· Solo en {fechaB}</span>}
                    </div>

                    <div style={{display:"flex",gap:8,alignItems:"center"}}>
                      <span style={{fontFamily:"Nunito",fontWeight:800,fontSize:11,color:r.dvalA!==null?(r.dvalA<0?"#EF4444":"#22C55E"):"#94A3B8"}}>

                      <span style={{color:"#CBD5E1",fontSize:10}}>→</span>

                      </span>
                    </div>
                    <span style={{fontFamily:"Nunito",fontSize:10,fontWeight:800,color:varColor}}>{varDir}</span>
                  </div>
                </summary>

                {/* Detalle expandido */}
                <div style={{background:"#F8FAFF",borderRadius:"0 0 12px 12px",padding:"12px 12px 10px",border:"1px solid #E2E8F0",borderTop:"none"}}>
                  {/* Barra comparativa visual */}
                  <div style={{marginBottom:10}}>
                    <div style={{display:"flex",justifyContent:"space-between",fontFamily:"Nunito",fontSize:9,color:"#94A3B8",fontWeight:700,marginBottom:4}}>
                      <span>DESVIACIÓN VALORIZADA</span>
                      {r.variacion!==null && <span style={{color:varColor}}>Δ {fmtVal(Math.abs(r.variacion))} {r.variacion<0?"empeora":"mejora"}</span>}
                    </div>
                    {/* Barra A */}
                    {r.dvalA !== null && (
                      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
                        <span style={{fontFamily:"Nunito",fontSize:9,fontWeight:700,color:m.color,width:60,textAlign:"right"}}>{fechaA}</span>
                        <div style={{flex:1,height:12,background:"#F1F5F9",borderRadius:6,overflow:"hidden"}}>
                          <div style={{height:"100%",borderRadius:6,
                            width:`${Math.min(100,Math.abs(r.dvalA)/maxBar*100)}%`,
                            background:r.dvalA<0?"#EF444480":"#22C55E80",
                            marginLeft:r.dvalA>=0?"0":"auto"}}/>
                        </div>
                        <span style={{fontFamily:"Nunito",fontSize:9,fontWeight:800,color:r.dvalA<0?"#EF4444":"#22C55E",width:60}}>{fmtVal(r.dvalA)}</span>
                      </div>
                    )}
                    {/* Barra B */}
                    {r.dvalB !== null && (
                      <div style={{display:"flex",alignItems:"center",gap:6}}>
                        <span style={{fontFamily:"Nunito",fontSize:9,fontWeight:700,color:"#6C63FF",width:60,textAlign:"right"}}>{fechaB}</span>
                        <div style={{flex:1,height:12,background:"#F1F5F9",borderRadius:6,overflow:"hidden"}}>
                          <div style={{height:"100%",borderRadius:6,
                            width:`${Math.min(100,Math.abs(r.dvalB)/maxBar*100)}%`,
                            background:r.dvalB<0?"#6C63FF80":"#6C63FF40"}}/>
                        </div>
                        <span style={{fontFamily:"Nunito",fontSize:9,fontWeight:800,color:"#6C63FF",width:60}}>{fmtVal(r.dvalB)}</span>
                      </div>
                    )}
                  </div>

                  {/* Grid métricas */}
                  <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6}}>
                    {[
                      {l:"Consumo Real A", vA:r.crealA, vB:r.crealB, u:r.unidad, tipo:"consumo"},
                      {l:"Consumo Teórico A", vA:r.a?.cons_teo??null, vB:r.b?.cons_teo??null, u:r.unidad, tipo:"neutro"},
                      {l:"Desviación qty", vA:r.a?.desviacion??null, vB:r.b?.desviacion??null, u:r.unidad, tipo:"desv"},

                      <div key={l} style={{background:"#fff",borderRadius:8,padding:"6px 8px"}}>
