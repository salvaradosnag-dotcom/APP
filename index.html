// NAV — incluye Metas, scrollable horizontal
// ══════════════════════════════════════════════════════════════════════════════

// ══════════════════════════════════════════════════════════════════════════════
// HORAS EXTRA — solicitudes y registro
// ══════════════════════════════════════════════════════════════════════════════
function HorasExtra({ ventas, marca, solicitudes, setSolicitudes, session }) {
  const esAdmin = session?.rol === "admin";
  const m = MARCAS[marca] || MARCAS[Object.keys(MARCAS)[0]] || { color: "#6C63FF", bg: "#F0EEFF", emoji: "🌭", textColor: "#fff", nombre: "—" };
  const localesMarca = LOCALES_POR_MARCA[marca] || LOCALES;
  const [form, setForm] = useState({ fecha: today(), local: localesMarca[0], usuario: "", horas: "", motivo: "", turno: TURNOS[0] });
  const [tab, setTab] = useState("nueva");
  const [saved, setSaved] = useState(false);
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  useEffect(() => { setForm(f => ({ ...f, local: (LOCALES_POR_MARCA[marca] || LOCALES)[0] })); }, [marca]);

  // ── KPIs basados en solicitudes (no en formulario ventas) ──────────────────
  const mes = today().slice(0, 7);
  const solMarca = useMemo(() => solicitudes.filter(s => s.marca === marca), [solicitudes, marca]);
  const solMes   = useMemo(() => solMarca.filter(s => s.fecha.slice(0,7) === mes), [solMarca, mes]);

  const heTotalMes = useMemo(() =>
    solMes.filter(s => s.estado !== "rechazada").reduce((sum, s) => sum + parseFloat(s.horas || 0), 0),
    [solMes]);
  const heCostoMes = useMemo(() =>
    solMes.filter(s => s.estado !== "rechazada").reduce((sum, s) => sum + parseFloat(s.costo_estimado || 0), 0),
    [solMes]);

  // Historial completo = todas las solicitudes de esta marca ordenadas por fecha
  const heHistorial = useMemo(() =>
    [...solMarca].sort((a, b) => b.fecha > a.fecha ? 1 : -1),
    [solMarca]);



  // Valor hora extra = valor hora del cargo × recargo HE (desde config Labor)
  const laborValores  = (() => { try { return JSON.parse(localStorage.getItem("horreo_labor_valores") || "{}"); } catch { return {}; } })();
  const laborRecargos = (() => { try { return JSON.parse(localStorage.getItem("horreo_labor_recargos") || "{}"); } catch { return {}; } })();
  const recHE = laborRecargos.horasextra?.activo ? (1 + (laborRecargos.horasextra?.pct || 50) / 100) : 1.5;
  const valorHE = (() => {
    // Find cargo of employee from semanas
    const emp = getEmpleadosDeMarca(marca).find(e => e.nombre === form.usuario);
    const cargo = emp?.cargo || "";
    const vc = laborValores[cargo] || {};
    if (vc.hora > 0) return vc.hora * recHE;
    // Fallback: highest valor hora × recargo
    const vals = Object.values(laborValores).map(v => parseFloat(v.hora || 0)).filter(v => v > 0);
    return vals.length ? Math.max(...vals) * recHE : 0;
  })();
  const costoEstimado = parseFloat(form.horas || 0) * valorHE;

  const handleSave = () => {
    const sol = { id: uid(), marca, ...form, costo_estimado: costoEstimado, estado: "pendiente", ts: new Date().toISOString() };
    setSolicitudes(s => [...s, sol]);
    setSaved(true);
    // Show mail modal
    const cuerpo = `SOLICITUD HORAS EXTRA
====================
Marca   : ${m.nombre}
Local   : ${sol.local}
Fecha   : ${sol.fecha}  Turno: ${sol.turno}
Usuario : ${sol.usuario || "-"}

Horas extra solicitadas : ${sol.horas}h
Costo estimado          : ${costoEstimado > 0 ? "$" + Math.round(costoEstimado).toLocaleString("es-CL") : "Sin valor hora configurado"}
Motivo: ${sol.motivo || "-"}

---
El Hórreo · Adm. Franquicias`;
    showMailModal(`[El Hórreo] Solicitud HE ${m.nombre} — ${sol.local} — ${sol.fecha}`, cuerpo);
    setTimeout(() => setSaved(false), 2500);
    setForm(f => ({ ...f, horas: "", motivo: "", usuario: "" }));
    setTab("solicitudes");
  };

  const g2 = { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 };

  return (
    <div className="fade" style={{ paddingBottom: 90 }}>
      <LogoHeader marca={marca} />
      <SectionTitle color={m.color}>⏱️ Horas Extra</SectionTitle>

      {/* KPIs del mes */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 14 }}>
        <Card style={{ position: "relative", overflow: "hidden" }}>
          <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 3, background: "#F59E0B" }} />
          <div style={{ fontSize: 10, color: "#94A3B8", textTransform: "uppercase", letterSpacing: .8, fontWeight: 700 }}>HE mes actual</div>
          <div style={{ fontSize: 26, fontFamily: "Nunito", fontWeight: 900, color: "#F59E0B" }}>{heTotalMes.toFixed(1)}h</div>
          {heCostoMes > 0
            ? <div style={{ fontSize: 12, color: "#EF4444", fontWeight: 800, fontFamily: "Nunito" }}>{fmtCLP(heCostoMes)}</div>
            : heTotalMes > 0 && <div style={{ fontSize: 10, color: "#94A3B8" }}>Configura valor/hora en Metas</div>}
        </Card>
        <Card style={{ position: "relative", overflow: "hidden" }}>
          <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 3, background: "#EF4444" }} />
          <div style={{ fontSize: 10, color: "#94A3B8", textTransform: "uppercase", letterSpacing: .8, fontWeight: 700 }}>Solicitudes pendientes</div>
          <div style={{ fontSize: 26, fontFamily: "Nunito", fontWeight: 900, color: "#EF4444" }}>{solicitudes.filter(s => s.estado === "pendiente").length}</div>
          <div style={{ fontSize: 11, color: "#94A3B8" }}>{solicitudes.length} total</div>
        </Card>
      </div>

      {/* Tabla HE por local */}


      {/* Tabs */}
      <div style={{ display: "flex", gap: 6, marginBottom: 14 }}>
        {[["nueva","➕ Nueva solicitud"],["solicitudes","📋 Solicitudes"],["historial","📅 Historial"]].map(([k,l]) => (
          <Btn key={k} onClick={() => setTab(k)} color={m.color} outline={tab !== k} small>{l}
            {k === "solicitudes" && solicitudes.filter(s => s.estado === "pendiente").length > 0 &&
              <span style={{ marginLeft: 4, background: "#EF4444", color: "#fff", borderRadius: 10, padding: "1px 6px", fontSize: 9 }}>{solicitudes.filter(s => s.estado === "pendiente").length}</span>}
          </Btn>
        ))}
      </div>

      {tab === "nueva" && (
        <Card>
          <div style={{ ...g2, marginBottom: 12 }}>
            <Field label="Fecha"><input type="date" value={form.fecha} onChange={e => set("fecha", e.target.value)} /></Field>
            <Field label="Local"><select value={form.local} onChange={e => set("local", e.target.value)}>{localesMarca.map(l => <option key={l}>{l}</option>)}</select></Field>
            <Field label="Turno"><select value={form.turno} onChange={e => set("turno", e.target.value)}>{TURNOS.map(t => <option key={t}>{t}</option>)}</select></Field>
            <Field label="Trabajador">
            <EmpleadoSelector marca={marca} value={form.usuario} onChange={v=>set("usuario",v)} placeholder="Seleccionar trabajador"/>
          </Field>
          </div>
          <Field label="N° Horas Extra">
            <input type="number" step="0.5" placeholder="0" value={form.horas} onChange={e => set("horas", e.target.value)} style={{ fontSize: 18, fontWeight: 700 }} />
          </Field>
          {form.horas > 0 && (
            <div style={{ background: "#FFF8E7", border: "1px solid #FDE68A", borderRadius: 10, padding: "8px 12px", marginTop: 8, marginBottom: 8 }}>
              <span style={{ fontSize: 12, color: "#92400E" }}>
                {valorHE > 0
                  ? <>Costo estimado: <strong>{fmtCLP(costoEstimado)}</strong> ({fmtCLP(valorHE)}/h)</>
                  : "⚠️ Configura el valor hora extra en Metas para ver el costo"}
              </span>
            </div>
          )}
          <Field label="Motivo / Justificación">
            <textarea rows={3} placeholder="Ej: Alta demanda fin de semana, cobertura turno enfermo..." value={form.motivo} onChange={e => set("motivo", e.target.value)} style={{ resize: "none" }} />
          </Field>
          <div style={{ marginTop: 14 }}>
            <Btn onClick={handleSave} color={saved ? "#22C55E" : m.color} disabled={!form.horas} full>
              {saved ? "✅ Solicitud enviada" : "📤 Enviar Solicitud"}
            </Btn>
          </div>
          <div style={{ fontSize: 10, color: "#94A3B8", marginTop: 8, textAlign: "center" }}>
            Al enviar se abrirá el modal para copiar el correo a {MAIL_OPS}
          </div>
        </Card>
      )}

      {tab === "solicitudes" && (
        solicitudes.length === 0
          ? <Card><div style={{ textAlign: "center", color: "#94A3B8", padding: 30 }}>Sin solicitudes aún</div></Card>
          : solicitudes.map(sol => (
            <Card key={sol.id} style={{ marginBottom: 10, border: `1.5px solid ${sol.estado === "aprobada" ? "#86EFAC" : sol.estado === "rechazada" ? "#FECACA" : "#FDE68A"}` }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8, alignItems: "center" }}>
                <div>
                  <div style={{ fontFamily: "Nunito", fontWeight: 800, fontSize: 13 }}>{sol.local}</div>
                  <div style={{ fontSize: 11, color: "#94A3B8" }}>{sol.fecha} · {sol.turno} · {sol.usuario || "-"}</div>
                </div>
                <Badge text={sol.estado === "aprobada" ? "✅ Aprobada" : sol.estado === "rechazada" ? "❌ Rechazada" : "⏳ Pendiente"}
                  color={sol.estado === "aprobada" ? "#22C55E" : sol.estado === "rechazada" ? "#EF4444" : "#F59E0B"} small />
              </div>
              <div style={{ display: "flex", gap: 16, marginBottom: sol.motivo ? 8 : 0 }}>
                <div><div style={{ fontSize: 10, color: "#94A3B8" }}>Horas</div><div style={{ fontSize: 18, fontWeight: 900, fontFamily: "Nunito", color: "#F59E0B" }}>{sol.horas}h</div></div>
                {sol.costo_estimado > 0 && <div><div style={{ fontSize: 10, color: "#94A3B8" }}>Costo est.</div><div style={{ fontSize: 18, fontWeight: 900, fontFamily: "Nunito", color: "#EF4444" }}>{fmtCLP(sol.costo_estimado)}</div></div>}
              </div>
              {sol.motivo && <div style={{ fontSize: 11, color: "#64748B", background: "#F8FAFC", borderRadius: 8, padding: "6px 10px", marginBottom: 8 }}>{sol.motivo}</div>}
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap", alignItems: "center" }}>
                {esAdmin ? (<>
                  <Btn color="#22C55E" small onClick={() => setSolicitudes(ss => ss.map(s => s.id === sol.id ? { ...s, estado: "aprobada" } : s))}>✅ Aprobar</Btn>

        <>

            {heHistorial.length} solicitud{heHistorial.length !== 1 ? "es" : ""} registrada{heHistorial.length !== 1 ? "s" : ""}
          </div>
          {heHistorial.length === 0
            ? <Card><div style={{ textAlign: "center", color: "#94A3B8", padding: 20 }}>Sin solicitudes de HE aún</div></Card>
            : heHistorial.map(sol => {
              const estadoColor = sol.estado === "aprobada" ? "#22C55E" : sol.estado === "rechazada" ? "#EF4444" : "#F59E0B";
              return (
                <Card key={sol.id} style={{ marginBottom: 8, border:`1.5px solid ${estadoColor}33` }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 12, fontWeight: 700, fontFamily: "Nunito" }}>
                        {sol.usuario || "Sin nombre"}
                      </div>
                      <div style={{ fontSize: 10, color: "#94A3B8" }}>
                        {nombreCortoLocal(sol.local)} · {sol.fecha} · {sol.turno || ""}
                      </div>
                      {sol.motivo && <div style={{ fontSize: 10, color: "#64748B", marginTop: 2, fontStyle: "italic" }}>{sol.motivo}</div>}
                    </div>
                    <div style={{ textAlign: "right", flexShrink: 0, marginLeft: 8 }}>
                      <div style={{ fontSize: 20, fontWeight: 900, fontFamily: "Nunito", color: "#F59E0B" }}>{parseFloat(sol.horas || 0).toFixed(1)}h</div>
                      {parseFloat(sol.costo_estimado || 0) > 0 && <div style={{ fontSize: 12, color: "#EF4444", fontWeight: 800 }}>{fmtCLP(sol.costo_estimado)}</div>}
                      <Badge text={sol.estado === "aprobada" ? "✅ Aprobada" : sol.estado === "rechazada" ? "❌ Rechazada" : "⏳ Pendiente"} color={estadoColor} small />
                    </div>
                  </div>
                </Card>
              );
            })
          }
        </>
      )}
    </div>
  );
}

// Parsea la planilla ERP y devuelve array de períodos
function parsePlanillaCostos(wb, local, marca) {
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });
  if (!rows || rows.length < 10) throw new Error("Planilla sin datos suficientes");

  // Fila 2 (índice 1) = encabezados de períodos
  const headerRow = rows[1] || [];
  // Extraer rangos de fecha: cols 1,3,5,7,9 (valor $), col 11 = ACUMULADO
  const periodos = [];
  for (let c = 1; c < headerRow.length; c += 2) {
    const label = headerRow[c];
    if (!label || label === "%" ) continue;
    if (String(label).toUpperCase().includes("ACUMULADO")) continue;
    periodos.push({ col: c, label: String(label).trim() });
  }
  // Columna acumulado: última col $ antes de fin
  const colAcum = headerRow.length >= 12 ? headerRow.length - 2 : null;

  // Helper: obtener valor numérico de fila/col
  const n = (rowIdx, col) => {
    const v = rows[rowIdx] ? rows[rowIdx][col] : null;
    return typeof v === "number" ? v : parseFloat(String(v || "").replace(/[^0-9.-]/g, "")) || 0;
  };

  // Mapeo de filas (índice 0-based)
  // F3=venta(2), F5=invIni(4), F6=compras(5), F7=traspIn(6), F8=traspOut(7),
  // F9=invFin(8), F10=costoReal$(9), F10%=col+1, F11=costoTeo$(10), F11%=col+1
  // F12=consumoP$(11), F13=desvOp$(12), F14=declarada$(13), F15=noDeclarada$(14)
  const R = { venta:2, invIni:4, compras:5, traspIn:6, traspOut:7, invFin:8,
              costoReal:9, costoTeo:10, consumoP:11, desvOp:12, decl:13, noDecl:14 };

  const result = periodos.map(p => {
    const c = p.col;
    return {
      id: uid(),
      local, marca,
      periodo: p.label,
      fecha_carga: new Date().toISOString().split("T")[0],
      ts: new Date().toISOString(),
      venta_neta:       n(R.venta, c),
      inv_inicial:      n(R.invIni, c),
      compras:          n(R.compras, c),
      trasp_in:         n(R.traspIn, c),
      trasp_out:        n(R.traspOut, c),
      inv_final:        n(R.invFin, c),
      costo_real:       n(R.costoReal, c),
      costo_real_pct:   n(R.costoReal, c+1),
      costo_teo:        n(R.costoTeo, c),
      costo_teo_pct:    n(R.costoTeo, c+1),
      consumo_personal: n(R.consumoP, c),
      consumo_pers_pct: n(R.consumoP, c+1),
      desv_op:          n(R.desvOp, c),
      desv_op_pct:      n(R.desvOp, c+1),
      desv_declarada:   n(R.decl, c),
      desv_no_decl:     n(R.noDecl, c),
      es_acumulado:     false,
    };
  });

  // Acumulado
  if (colAcum !== null) {
    const c = colAcum;
    result.push({
      id: uid(), local, marca,
      periodo: "ACUMULADO",
      fecha_carga: new Date().toISOString().split("T")[0],
      ts: new Date().toISOString(),
      venta_neta:       n(R.venta, c),
      inv_inicial:      n(R.invIni, c),
      compras:          n(R.compras, c),
      trasp_in:         n(R.traspIn, c),
      trasp_out:        n(R.traspOut, c),
      inv_final:        n(R.invFin, c),
      costo_real:       n(R.costoReal, c),
      costo_real_pct:   n(R.costoReal, c+1),
      costo_teo:        n(R.costoTeo, c),
      costo_teo_pct:    n(R.costoTeo, c+1),
      consumo_personal: n(R.consumoP, c),
      consumo_pers_pct: n(R.consumoP, c+1),
      desv_op:          n(R.desvOp, c),
      desv_op_pct:      n(R.desvOp, c+1),
      desv_declarada:   n(R.decl, c),
      desv_no_decl:     n(R.noDecl, c),
      es_acumulado:     true,
    });
  }
  return result;
}

// ── Cargar Planilla de Costos ─────────────────────────────────────────────────
function CargarPlanillaCostos({ marca, planillas, setPlanillas }) {
  const m = MARCAS[marca] || MARCAS[Object.keys(MARCAS)[0]] || { color: "#6C63FF", bg: "#F0EEFF", emoji: "🌭", textColor: "#fff", nombre: "—" };
  const localesMarca = LOCALES_POR_MARCA[marca] || LOCALES;
  const [local, setLocal]   = useState(localesMarca[0] || "");
  const [loading, setLoading] = useState(false);
  const [msg, setMsg]         = useState(null); // {ok, text}
  const [preview, setPreview] = useState(null);

  const handleFile = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setLoading(true); setMsg(null); setPreview(null);
    try {
      const XLSX = await loadXLSX();
      const buf  = await file.arrayBuffer();
      const wb   = XLSX.read(buf, { type: "array" });
      const parsed = parsePlanillaCostos(wb, local, marca);
      setPreview(parsed);
      setMsg({ ok: true, text: `✅ ${parsed.length - 1} períodos + acumulado detectados. Revisa y confirma.` });
    } catch(err) {
      setMsg({ ok: false, text: "❌ Error: " + err.message });
    }
    setLoading(false);
    e.target.value = "";
  };

  const handleConfirm = () => {
    if (!preview) return;
    // Reemplazar períodos del mismo local+mes (fecha_carga igual mes)
    const mesActual = preview[0]?.fecha_carga?.slice(0,7);
    setPlanillas(prev => {
      const sinEsteLocal = prev.filter(p => !(p.local === local && p.marca === marca && p.fecha_carga?.slice(0,7) === mesActual));
      return [...sinEsteLocal, ...preview];
    });
    setMsg({ ok: true, text: `💾 ${preview.length} registros guardados para ${local}` });
    setPreview(null);
  };

  const semanasPreview = preview ? preview.filter(p => !p.es_acumulado) : [];
  const acumPreview    = preview ? preview.find(p => p.es_acumulado) : null;

  return (
    <div style={{ paddingBottom: 20 }}>
      <Card style={{ marginBottom: 14 }}>
        <div style={{ fontFamily:"Nunito", fontWeight:900, fontSize:15, color:m.color, marginBottom:12 }}>📤 Cargar Planilla de Costos ERP</div>

        <Field label="Local">
          <select value={local} onChange={e=>setLocal(e.target.value)}>
            {localesMarca.map(l => <option key={l} value={l}>{l}</option>)}
          </select>
        </Field>

        <div style={{ marginTop:12 }}>
          <label style={{ display:"block", background: m.color, color:"#fff", borderRadius:12, padding:"11px 0", textAlign:"center", fontFamily:"Nunito", fontWeight:800, fontSize:14, cursor:"pointer" }}>
            {loading ? "⏳ Procesando..." : "📂 Seleccionar Planilla de Costos (.xlsx)"}
            <input type="file" accept=".xlsx,.xls" onChange={handleFile} style={{ display:"none" }} />
          </label>
        </div>

        {msg && (
          <div style={{ marginTop:10, padding:"10px 12px", borderRadius:10, background: msg.ok ? "#F0FDF4" : "#FEF2F2", color: msg.ok ? "#166534" : "#DC2626", fontFamily:"Nunito", fontSize:13, fontWeight:700 }}>
            {msg.text}
          </div>
        )}
      </Card>

      {/* Preview */}
      {preview && (
        <Card style={{ marginBottom:14 }}>
          <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:14, marginBottom:10 }}>👁 Vista previa — {local}</div>
          <div style={{ overflowX:"auto" }}>
            <table style={{ width:"100%", borderCollapse:"collapse", fontSize:11, fontFamily:"Nunito" }}>
              <thead>
                <tr style={{ background:"#F1F5F9" }}>
                  {["Período","Venta Neta","Costo Real","% CR","Costo Teórico","% CT","Gap pp","Desv. Op."].map(h => (
                    <th key={h} style={{ padding:"6px 8px", textAlign:"right", fontWeight:700, color:"#475569", whiteSpace:"nowrap", borderBottom:"2px solid #E2E8F0" }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {semanasPreview.map((p,i) => {
                  const gap = (p.costo_real_pct - p.costo_teo_pct).toFixed(2);
                  const gapColor = parseFloat(gap) > 2 ? "#DC2626" : parseFloat(gap) > 0 ? "#D97706" : "#16A34A";
                  return (
                    <tr key={i} style={{ borderBottom:"1px solid #F1F5F9" }}>
                      <td style={{ padding:"6px 8px", fontWeight:700, color:"#1A1D2E", whiteSpace:"nowrap" }}>{p.periodo}</td>
                      <td style={{ padding:"6px 8px", textAlign:"right" }}>{fmtCLP(p.venta_neta)}</td>
                      <td style={{ padding:"6px 8px", textAlign:"right" }}>{fmtCLP(p.costo_real)}</td>
                      <td style={{ padding:"6px 8px", textAlign:"right", color: p.costo_real_pct > 42 ? "#DC2626" : "#1A1D2E", fontWeight:700 }}>{p.costo_real_pct.toFixed(1)}%</td>
                      <td style={{ padding:"6px 8px", textAlign:"right" }}>{fmtCLP(p.costo_teo)}</td>
                      <td style={{ padding:"6px 8px", textAlign:"right" }}>{p.costo_teo_pct.toFixed(1)}%</td>
                      <td style={{ padding:"6px 8px", textAlign:"right", color:gapColor, fontWeight:700 }}>{gap > 0 ? "+" : ""}{gap} pp</td>
                      <td style={{ padding:"6px 8px", textAlign:"right", color: p.desv_op < 0 ? "#DC2626" : "#16A34A", fontWeight:700 }}>{fmtCLP(p.desv_op)}</td>
                    </tr>
                  );
                })}
                {acumPreview && (() => {
                  const gap = (acumPreview.costo_real_pct - acumPreview.costo_teo_pct).toFixed(2);
                  return (
                    <tr style={{ background:"#F8FAFF", borderTop:"2px solid #E2E8F0", fontWeight:800 }}>
                      <td style={{ padding:"7px 8px", fontWeight:900, color:m.color }}>ACUMULADO</td>
                      <td style={{ padding:"7px 8px", textAlign:"right" }}>{fmtCLP(acumPreview.venta_neta)}</td>
                      <td style={{ padding:"7px 8px", textAlign:"right" }}>{fmtCLP(acumPreview.costo_real)}</td>
                      <td style={{ padding:"7px 8px", textAlign:"right", color:"#DC2626", fontWeight:800 }}>{acumPreview.costo_real_pct.toFixed(1)}%</td>
                      <td style={{ padding:"7px 8px", textAlign:"right" }}>{fmtCLP(acumPreview.costo_teo)}</td>
                      <td style={{ padding:"7px 8px", textAlign:"right" }}>{acumPreview.costo_teo_pct.toFixed(1)}%</td>
                      <td style={{ padding:"7px 8px", textAlign:"right", color: parseFloat(gap)>2?"#DC2626":"#D97706", fontWeight:800 }}>+{gap} pp</td>
                      <td style={{ padding:"7px 8px", textAlign:"right", color: acumPreview.desv_op<0?"#DC2626":"#16A34A", fontWeight:800 }}>{fmtCLP(acumPreview.desv_op)}</td>
                    </tr>
                  );
                })()}
              </tbody>
            </table>
          </div>
          <div style={{ marginTop:12, display:"flex", gap:8 }}>
            <Btn onClick={handleConfirm} color={m.color} full>💾 Confirmar e importar</Btn>
            <Btn onClick={()=>{setPreview(null);setMsg(null);}} color="#94A3B8" outline small>✕ Cancelar</Btn>
          </div>
        </Card>
      )}
    </div>
  );
}

// ── Dashboard Food Cost ───────────────────────────────────────────────────────
function DashboardFoodCost({ marca, planillas }) {
  const m = MARCAS[marca] || MARCAS[Object.keys(MARCAS)[0]] || { color: "#6C63FF", bg: "#F0EEFF", emoji: "🌭", textColor: "#fff", nombre: "—" };
  const localesMarca = LOCALES_POR_MARCA[marca] || LOCALES;
  const [localSel, setLocalSel] = useState("Todos");
  const META_FC = 40; // % meta food cost

  const datos = useMemo(() => {
    let d = planillas.filter(p => p.marca === marca);
    if (localSel !== "Todos") d = d.filter(p => p.local === localSel);
    return d;
  }, [planillas, marca, localSel]);

  const semanas   = useMemo(() => datos.filter(p => !p.es_acumulado).sort((a,b)=>a.periodo>b.periodo?1:-1), [datos]);
  const acums     = useMemo(() => datos.filter(p => p.es_acumulado), [datos]);

  // Consolidado acumulado (suma si hay varios locales)
  const acum = useMemo(() => {
    if (!acums.length) return null;
    return acums.reduce((acc, p) => ({
      venta_neta:       (acc.venta_neta||0)       + p.venta_neta,
      costo_real:       (acc.costo_real||0)        + p.costo_real,
      costo_teo:        (acc.costo_teo||0)         + p.costo_teo,
      consumo_personal: (acc.consumo_personal||0)  + p.consumo_personal,
      desv_op:          (acc.desv_op||0)           + p.desv_op,
      desv_declarada:   (acc.desv_declarada||0)    + p.desv_declarada,
      desv_no_decl:     (acc.desv_no_decl||0)      + p.desv_no_decl,
    }), {});
  }, [acums]);

  const acumCrPct = acum && acum.venta_neta > 0 ? (acum.costo_real / acum.venta_neta * 100) : null;
  const acumCtPct = acum && acum.venta_neta > 0 ? (acum.costo_teo  / acum.venta_neta * 100) : null;

  // Agrupar semanas por período para el gráfico
  const semanasAgrup = useMemo(() => {
    const map = {};
    semanas.forEach(p => {
      if (!map[p.periodo]) map[p.periodo] = { venta:0, cr:0, ct:0, desv:0, n:0 };
      map[p.periodo].venta += p.venta_neta;
      map[p.periodo].cr    += p.costo_real;
      map[p.periodo].ct    += p.costo_teo;
      map[p.periodo].desv  += p.desv_op;
      map[p.periodo].n     += 1;
    });
    return Object.entries(map).map(([periodo, v]) => ({
      periodo,
      cr_pct: v.venta > 0 ? v.cr/v.venta*100 : 0,
      ct_pct: v.venta > 0 ? v.ct/v.venta*100 : 0,
      desv:   v.desv,
      venta:  v.venta,
    })).sort((a,b) => a.periodo > b.periodo ? 1 : -1);
  }, [semanas]);

  if (!datos.length) return (
    <Card><div style={{ textAlign:"center", color:"#94A3B8", padding:24, fontFamily:"Nunito" }}>
      Sin datos de planilla de costos para {localSel === "Todos" ? "esta marca" : localSel}.<br/>
      <span style={{ fontSize:12 }}>Carga una planilla desde la pestaña "Cargar".</span>
    </div></Card>
  );

  const SemCard = ({ label, val, sub, color, small }) => (
    <div style={{ background:"#fff", borderRadius:12, padding: small?"10px 12px":"12px 14px", boxShadow:"0 2px 8px rgba(0,0,0,0.05)", textAlign:"center" }}>
      <div style={{ fontFamily:"Nunito", fontSize:10, color:"#94A3B8", fontWeight:700, marginBottom:4, textTransform:"uppercase" }}>{label}</div>
      <div style={{ fontFamily:"Nunito", fontWeight:900, fontSize: small?16:20, color: color||"#1A1D2E" }}>{val}</div>
      {sub && <div style={{ fontFamily:"Nunito", fontSize:10, color:"#94A3B8", marginTop:2 }}>{sub}</div>}
    </div>
  );

  return (
    <div style={{ paddingBottom:20 }}>
      {/* Filtro local */}
      <div style={{ display:"flex", gap:6, marginBottom:14, overflowX:"auto", paddingBottom:2 }}>
        {["Todos", ...localesMarca].map(l => (
          <button key={l} onClick={()=>setLocalSel(l)}
            style={{ whiteSpace:"nowrap", background: localSel===l ? m.color : "#fff", color: localSel===l ? "#fff" : "#64748B", border:`1.5px solid ${localSel===l?m.color:"#E2E8F0"}`, borderRadius:10, padding:"6px 12px", fontFamily:"Nunito", fontWeight:700, fontSize:11, cursor:"pointer" }}>
            {l === "Todos" ? "🌐 Todos" : l.split(" - ")[1] || l}
          </button>
        ))}
      </div>

      {/* KPIs acumulados */}
      {acum && (
        <>
          <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:12, color:"#64748B", marginBottom:8, textTransform:"uppercase", letterSpacing:.5 }}>Acumulado del período</div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(2,1fr)", gap:10, marginBottom:14 }}>
            <SemCard label="Venta Neta" val={fmtCLP(acum.venta_neta)} color="#1A1D2E" />
            <SemCard label="Costo Real" val={acumCrPct != null ? acumCrPct.toFixed(1)+"%" : "—"} sub={fmtCLP(acum.costo_real)} color={acumCrPct > META_FC+2 ? "#DC2626" : acumCrPct > META_FC ? "#D97706" : "#16A34A"} />
            <SemCard label="Costo Teórico" val={acumCtPct != null ? acumCtPct.toFixed(1)+"%" : "—"} sub={fmtCLP(acum.costo_teo)} color="#6C63FF" />

          <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:10, marginBottom:18 }}>
            <SemCard label="Desv. Operacional" val={fmtCLP(acum.desv_op)} color={acum.desv_op < 0 ? "#DC2626" : "#16A34A"} small />
            <SemCard label="Declarada" val={fmtCLP(acum.desv_declarada)} color="#6C63FF" small />
            <SemCard label="No Declarada" val={fmtCLP(acum.desv_no_decl)} color="#D97706" small />
          </div>
        </>
      )}

      {/* Tabla semanas */}
      {semanasAgrup.length > 0 && (
        <>
          <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:12, color:"#64748B", marginBottom:8, textTransform:"uppercase", letterSpacing:.5 }}>Evolución semanal</div>
          <Card style={{ marginBottom:14, padding:"10px 8px" }}>
            <div style={{ overflowX:"auto" }}>
              <table style={{ width:"100%", borderCollapse:"collapse", fontSize:11, fontFamily:"Nunito" }}>
                <thead>
                  <tr style={{ background:"#F8FAFF" }}>
                    {["Período","Venta Neta","CR%","CT%","Gap","Desv. Op.","Sem."].map(h => (
                      <th key={h} style={{ padding:"6px 7px", textAlign:"right", fontWeight:800, color:"#475569", whiteSpace:"nowrap", borderBottom:"2px solid #E2E8F0", fontSize:10 }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {semanasAgrup.map((p, i) => {
                    const gap = p.cr_pct - p.ct_pct;
                    const semaforo = p.cr_pct <= META_FC ? "🟢" : p.cr_pct <= META_FC + 2 ? "🟡" : "🔴";
                    return (
                      <tr key={i} style={{ borderBottom:"1px solid #F1F5F9" }}>
                        <td style={{ padding:"6px 7px", fontWeight:700, color:"#1A1D2E", whiteSpace:"nowrap", fontSize:10 }}>{p.periodo}</td>
                        <td style={{ padding:"6px 7px", textAlign:"right" }}>{fmtCLP(p.venta)}</td>
                        <td style={{ padding:"6px 7px", textAlign:"right", color: p.cr_pct > META_FC+2?"#DC2626":p.cr_pct>META_FC?"#D97706":"#16A34A", fontWeight:800 }}>{p.cr_pct.toFixed(1)}%</td>
                        <td style={{ padding:"6px 7px", textAlign:"right", color:"#6C63FF" }}>{p.ct_pct.toFixed(1)}%</td>
                        <td style={{ padding:"6px 7px", textAlign:"right", fontWeight:800, color: gap>2?"#DC2626":gap>0?"#D97706":"#16A34A" }}>{gap>0?"+":""}{gap.toFixed(2)}</td>
                        <td style={{ padding:"6px 7px", textAlign:"right", color: p.desv<0?"#DC2626":"#16A34A", fontWeight:700 }}>{fmtCLP(p.desv)}</td>
                        <td style={{ padding:"6px 7px", textAlign:"center", fontSize:14 }}>{semaforo}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </Card>

          {/* Ranking semanas críticas */}
          {(() => {
            const criticas = [...semanasAgrup].sort((a,b) => b.cr_pct - a.cr_pct).slice(0,3);
            return (
              <Card style={{ marginBottom:14, background:"linear-gradient(135deg,#FFF5F5,#FFF)" }}>
                <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:13, color:"#DC2626", marginBottom:10 }}>🔴 Semanas con mayor costo real</div>
                {criticas.map((p,i) => (
                  <div key={i} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"7px 0", borderBottom: i<2?"1px solid #FEE2E2":"none" }}>
                    <div style={{ fontFamily:"Nunito", fontSize:12 }}>
                      <span style={{ fontWeight:800, color:"#1A1D2E" }}>{i+1}. </span>
                      <span style={{ color:"#475569" }}>{p.periodo}</span>
                    </div>
                    <div style={{ display:"flex", gap:10, alignItems:"center" }}>
                      <span style={{ fontFamily:"Nunito", fontWeight:900, fontSize:14, color:"#DC2626" }}>{p.cr_pct.toFixed(1)}%</span>
                      <span style={{ fontFamily:"Nunito", fontSize:10, color:"#94A3B8" }}>meta {META_FC}%</span>
                      <span style={{ fontFamily:"Nunito", fontWeight:700, fontSize:11, color:"#D97706" }}>+{(p.cr_pct-META_FC).toFixed(1)} pp</span>
                    </div>
                  </div>
                ))}
              </Card>
            );
          })()}
        </>
      )}

      {/* Historial de cargas */}
      {(() => {
        const ultimas = [...datos].sort((a,b)=>b.ts>a.ts?1:-1).slice(0,1);
        if (!ultimas.length) return null;
        return (
          <div style={{ fontFamily:"Nunito", fontSize:11, color:"#94A3B8", textAlign:"center", marginTop:4 }}>
            Última carga: {ultimas[0].fecha_carga} · {datos.filter(p=>!p.es_acumulado).length} períodos almacenados
          </div>
        );
      })()}
    </div>
  );
}

  "Verdura": "#22C55E", "Aceites": "#A16207",
};

function parseInventarioERP(wb) {
  // Parsea el Inventario General del ERP
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:null });
  const items = [];
  let categoriaActual = "";
  for (let i = 0; i < rows.length; i++) {
    const r = rows[i];
    if (!r || !r[0] && !r[1]) continue;
    // Detectar fila de categoría (columna 2 tiene texto, cols 3+ vacías)
    if (!r[0] && r[2] && !r[3] && !r[4]) { categoriaActual = String(r[2]).trim(); continue; }
    // Fila de material: col0=ID, col1=nombre, col2=unidad, col3=cantidad, col4=valorUnit, col5=valorTotal
    const id = r[0]; const nombre = r[1]; const unidad = r[2];
    const cantidad = typeof r[3]==="number" ? r[3] : parseFloat(String(r[3]||"").replace(/[^0-9.-]/g,""))||0;
    const valorUnit = typeof r[4]==="number" ? r[4] : parseFloat(String(r[4]||"").replace(/[^0-9.-]/g,""))||0;
    const valorTotal = typeof r[5]==="number" ? r[5] : parseFloat(String(r[5]||"").replace(/[^0-9.-]/g,""))||0;
    if (!nombre || typeof nombre !== "string" || nombre.trim().length < 3) continue;
    if (!unidad) continue;
    // Solo unidades reales (no embalaje duplicado)
    const unidadesIgnorar = ["BIDON","CAJA","PQT","BOLSA","DISPLAY","FRASCO","BOTELLA","ROLLO","BANDEJA"];
    if (unidadesIgnorar.includes(String(unidad).trim().toUpperCase()) && valorUnit > 10000) {
      // Podría ser unidad de compra con precio alto → incluir pero marcar
    }
    items.push({ id: String(id||""), nombre: String(nombre).trim(), unidad: String(unidad).trim(),
      cantidad, valorUnit, valorTotal, categoria: categoriaActual });
  }
  return items;
}

function parseDesviacionesERP(wb) {
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:null });
  const items = [];
  let cat = "";
  for (let i = 2; i < rows.length; i++) {
    const r = rows[i];
    if (!r) continue;
    // Fila de categoría si col1 vacía y col0 tiene texto
    const material = r[1]; const unidad = r[2];
    if (!material) { if(r[0]) cat = String(r[0]).trim(); continue; }
    const n = (v) => typeof v==="number"?v:parseFloat(String(v||"").replace(/[^0-9.-]/g,""))||0;
    items.push({
      categoria: cat, material: String(material).trim(), unidad: String(unidad||"").trim(),
      invInicial: n(r[3]), compras: n(r[4]), traspIn: n(r[5]), traspOut: n(r[6]),
      invFinal: n(r[7]), consumoReal: n(r[8]), consumoTeo: n(r[9]),
      desviacion: n(r[10]), desvValorizada: n(r[11]),
    });
  }
  return items;
}

function parseBackOfficeERP(wb) {
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:null });
  const items = [];
  for (let i = 1; i < rows.length; i++) {
    const r = rows[i];
    if (!r || !r[14]) continue; // col14 = MATERIAL
    if (String(r[11]||"").includes("TOTAL")) continue;
    const n = (v) => typeof v==="number"?v:parseFloat(String(v||"").replace(/[^0-9.-]/g,""))||0;
    items.push({
      local: String(r[3]||"").trim(),
      fecha: String(r[6]||"").trim(),
      proveedor: String(r[9]||"").trim(),
      factura: String(r[10]||"").trim(),
      idMaterial: String(r[13]||"").trim(),
      material: String(r[14]||"").trim(),
      unidad: String(r[15]||"").trim(),
      paraCosto: String(r[16]||"").trim().toUpperCase() === "SI",
      cantFact: n(r[17]), cantRecep: n(r[18]),
      precioPactado: n(r[20]), precioFacturado: n(r[21]),
      diferenciaP: n(r[22]),
      netoFacturado: n(r[23]),
    });
  }
  return items;
}

function InsumosCriticos({ marca }) {
  const m = MARCAS[marca] || MARCAS[Object.keys(MARCAS)[0]] || { color: "#6C63FF", bg: "#F0EEFF", emoji: "🌭", textColor: "#fff", nombre: "—" };
  const localesMarca = LOCALES_POR_MARCA[marca] || LOCALES;
  const [local, setLocal] = useState(localesMarca[0]||"");
  const [registros, setRegistros] = useSupabase("horreo_insumos_criticos_v2", []);
  const [insumos, setInsumos] = useStorage("horreo_insumos_config_v2", INSUMOS_CRITICOS_DEFAULT);

  // Vista: diario | comparativo | ranking
  const [vista, setVista] = useState("comparativo");
  const [fechaSel, setFechaSel] = useState(today());

  // Estado formulario ingreso diario
  const [formDia, setFormDia] = useState({});
  const [msgGuardar, setMsgGuardar] = useState(null);

  // Importar desde Desviaciones ERP
  const [loadingERP, setLoadingERP] = useState(false);
  const [msgERP, setMsgERP] = useState(null);

  // Datos filtrados por local+marca
  const datosMarca = useMemo(() =>
    registros.filter(r => r.marca === marca && r.local === local),
  [registros, marca, local]);

  // Fechas únicas disponibles
  const fechasDisp = useMemo(() => {
    const s = new Set(datosMarca.map(r => r.fecha));
    return [...s].sort().reverse();
  }, [datosMarca]);

  // Datos de la fecha seleccionada
  const datosFecha = useMemo(() =>
    datosMarca.filter(r => r.fecha === fechaSel),
  [datosMarca, fechaSel]);

  // Comparativo: últimas 7 fechas por insumo
  const comparativo = useMemo(() => {
    const ultimas7 = fechasDisp.slice(0, 7).reverse();
    return insumos.map(ins => {
      const serie = ultimas7.map(f => {
        const reg = datosMarca.find(r => r.fecha === f && r.insumoId === ins.id);
        return { fecha: f, consumo: reg?.consumo ?? null, precio: reg?.precio ?? null,
                 stock: reg?.stock ?? null, costo: reg ? (reg.consumo||0)*(reg.precio||0) : null };
      });
      const costos = serie.filter(s=>s.costo!==null).map(s=>s.costo);
      const promCosto = costos.length ? costos.reduce((a,b)=>a+b,0)/costos.length : 0;
      const tendencia = costos.length >= 2 ? (costos[costos.length-1] > costos[0] ? "▲" : costos[costos.length-1] < costos[0] ? "▼" : "→") : "—";
      return { ...ins, serie, ultimas7, promCosto, tendencia };
    });
  }, [insumos, datosMarca, fechasDisp]);

  // Importar desde Desviaciones ERP
  const handleImportDesv = async (e) => {
    const file = e.target.files[0]; if (!file) return;
    setLoadingERP(true); setMsgERP(null);
    try {
      const XLSX2 = await loadXLSX();
      const buf = await file.arrayBuffer();
      const wb = XLSX2.read(buf, { type:"array" });
      const items = parseDesviacionesERP(wb);
      // Cruzar con insumos críticos y crear registros
      const fecha = today();
      const nuevos = [];
      for (const ins of insumos) {
        const match = items.find(it =>
          it.material.toLowerCase().includes(ins.nombre.split(" ")[0].toLowerCase()) ||
          ins.nombre.toLowerCase().includes(it.material.split(" ")[0].toLowerCase())
        );
        if (match) {
          nuevos.push({
            id: uid(), marca, local, insumoId: ins.id, insumoNombre: ins.nombre,
            unidad: ins.unidad, fecha,
            consumo: match.consumoReal,
            consumoTeo: match.consumoTeo,
            desviacion: match.desviacion,
            desvValorizada: match.desvValorizada,
            precio: match.desvValorizada && match.desviacion ? Math.abs(match.desvValorizada / (match.desviacion||1)) : 0,
            stock: match.invFinal,
            compras: match.compras,
            fuente: "ERP",
            ts: new Date().toISOString(),
          });
        }
      }
      if (nuevos.length === 0) throw new Error("No se encontraron coincidencias con los insumos configurados.");
      setRegistros(prev => {
        const sinFecha = prev.filter(r => !(r.marca===marca && r.local===local && r.fecha===fecha));
        return [...sinFecha, ...nuevos];
      });
      setFechaSel(fecha);
      setMsgERP({ ok:true, text:`✅ ${nuevos.length} insumos importados desde Desviaciones ERP (${fecha})` });
    } catch(err) {
      setMsgERP({ ok:false, text:"❌ " + err.message });
    }
    setLoadingERP(false); e.target.value="";
  };

  const handleGuardarDia = () => {
    const nuevos = [];
    for (const ins of insumos) {
      const consumo = parseFloat(formDia[ins.id+"_c"]||"") || null;
      const precio  = parseFloat(formDia[ins.id+"_p"]||"") || null;
      const stock   = parseFloat(formDia[ins.id+"_s"]||"") || null;
      if (consumo===null && precio===null && stock===null) continue;
      nuevos.push({
        id: uid(), marca, local, insumoId:ins.id, insumoNombre:ins.nombre,
        unidad:ins.unidad, fecha:fechaSel, consumo, precio, stock, fuente:"manual",
        ts: new Date().toISOString()
      });
    }
    if (!nuevos.length) { setMsgGuardar({ok:false,text:"Ingresa al menos un valor."});return; }
    setRegistros(prev => {
      const sin = prev.filter(r => !(r.marca===marca && r.local===local && r.fecha===fechaSel &&
        nuevos.some(n=>n.insumoId===r.insumoId)));
      return [...sin, ...nuevos];
    });
    setFormDia({});
    setMsgGuardar({ok:true, text:`✅ ${nuevos.length} insumos guardados para ${fechaSel}`});
    setTimeout(()=>setMsgGuardar(null), 3000);
  };

  const Chip = ({label, color}) => (
    <span style={{background:color+"22",color,borderRadius:6,padding:"2px 7px",fontSize:10,fontWeight:800,fontFamily:"Nunito"}}>
      {label}
    </span>
  );

  return (
    <div style={{paddingBottom:20}}>
      {/* Header */}
      <Card style={{marginBottom:14}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
          <div style={{fontFamily:"Nunito",fontWeight:900,fontSize:15,color:m.color}}>🔥 Insumos Críticos</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {["comparativo","diario","ranking"].map(v=>(
              <button key={v} onClick={()=>setVista(v)}
                style={{background:vista===v?m.color:"#F1F5F9",color:vista===v?"#fff":"#475569",border:"none",borderRadius:9,padding:"6px 12px",fontFamily:"Nunito",fontWeight:800,fontSize:11,cursor:"pointer"}}>
                {v==="comparativo"?"📅 Comparativo":v==="diario"?"✏️ Ingreso Diario":"🏆 Ranking Costo"}
              </button>
            ))}
          </div>
        </div>
        <div style={{display:"flex",gap:8,marginTop:10,flexWrap:"wrap",alignItems:"center"}}>
          <select value={local} onChange={e=>setLocal(e.target.value)}
            style={{borderRadius:9,border:"1.5px solid #E2E8F0",padding:"6px 10px",fontFamily:"Nunito",fontSize:12,fontWeight:700}}>
            {localesMarca.map(l=><option key={l} value={l}>{l.split(" - ")[1]||l}</option>)}
          </select>
          <input type="date" value={fechaSel} onChange={e=>setFechaSel(e.target.value)}
            style={{borderRadius:9,border:"1.5px solid #E2E8F0",padding:"6px 10px",fontFamily:"Nunito",fontSize:12}} />
          <label style={{background:m.color,color:"#fff",borderRadius:9,padding:"6px 12px",fontFamily:"Nunito",fontWeight:800,fontSize:11,cursor:"pointer"}}>
            {loadingERP?"⏳":"📥 Importar Desviaciones ERP"}
            <input type="file" accept=".xlsx,.xls" onChange={handleImportDesv} style={{display:"none"}} />
          </label>
        </div>
        {msgERP && <div style={{marginTop:8,padding:"8px 12px",borderRadius:9,background:msgERP.ok?"#F0FDF4":"#FEF2F2",color:msgERP.ok?"#166534":"#DC2626",fontFamily:"Nunito",fontSize:12,fontWeight:700}}>{msgERP.text}</div>}
      </Card>

      {/* ── VISTA COMPARATIVO DÍA A DÍA ── */}
      {vista === "comparativo" && (
        <div>
          {comparativo.filter(ins=>ins.serie.some(s=>s.costo!==null)).length === 0 ? (
            <Card><div style={{textAlign:"center",color:"#94A3B8",padding:20,fontFamily:"Nunito",fontSize:13}}>
              Sin datos comparativos aún.<br/>
              <span style={{fontSize:11}}>Importa un Informe de Desviaciones ERP o usa Ingreso Diario.</span>
            </div></Card>
          ) : (
            comparativo.filter(ins=>ins.serie.some(s=>s.costo!==null)).map(ins => (
              <Card key={ins.id} style={{marginBottom:12,borderLeft:`4px solid ${CAT_COLORS[ins.categoria]||"#6C63FF"}`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                  <div>
                    <div style={{fontFamily:"Nunito",fontWeight:900,fontSize:13,color:"#1A1D2E"}}>{ins.nombre}</div>
                    <div style={{display:"flex",gap:5,marginTop:3}}>
                      <Chip label={ins.categoria} color={CAT_COLORS[ins.categoria]||"#6C63FF"} />
                      <Chip label={ins.unidad} color="#64748B" />
                    </div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontFamily:"Nunito",fontWeight:900,fontSize:16,color:ins.tendencia==="▲"?"#DC2626":ins.tendencia==="▼"?"#16A34A":"#D97706"}}>{ins.tendencia}</div>
                    <div style={{fontFamily:"Nunito",fontSize:10,color:"#94A3B8"}}>prom. {fmtCLP(ins.promCosto)}/día</div>
                  </div>
                </div>
                {/* Mini tabla día a día */}
                <div style={{overflowX:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:10,fontFamily:"Nunito"}}>
                    <thead>
                      <tr style={{background:"#F8FAFF"}}>
                        <th style={{padding:"4px 6px",textAlign:"left",color:"#475569",fontWeight:800}}>Fecha</th>
                        <th style={{padding:"4px 6px",textAlign:"right",color:"#475569",fontWeight:800}}>Consumo</th>
                        <th style={{padding:"4px 6px",textAlign:"right",color:"#475569",fontWeight:800}}>Consumo Teórico</th>
                        <th style={{padding:"4px 6px",textAlign:"right",color:"#475569",fontWeight:800}}>Precio Unit.</th>
                        <th style={{padding:"4px 6px",textAlign:"right",color:"#475569",fontWeight:800}}>Costo Total</th>
                        <th style={{padding:"4px 6px",textAlign:"right",color:"#475569",fontWeight:800}}>Stock</th>
                        <th style={{padding:"4px 6px",textAlign:"center",color:"#475569",fontWeight:800}}>Desv.</th>
                      </tr>
                    </thead>
                    <tbody>
                      {ins.serie.map((s,i) => {
                        const prev = ins.serie[i-1];
                        const varCosto = prev?.costo && s.costo ? ((s.costo-prev.costo)/prev.costo*100) : null;
                        const rec = datosMarca.find(r=>r.fecha===s.fecha&&r.insumoId===ins.id);
                        const desv = rec?.desviacion ?? null;
                        const consTeo = rec?.consumoTeo ?? null;
                        return (
                          <tr key={i} style={{borderBottom:"1px solid #F1F5F9",background:i%2===0?"#fff":"#FAFBFF"}}>
                            <td style={{padding:"5px 6px",fontWeight:700,color:"#1A1D2E",whiteSpace:"nowrap"}}>{s.fecha||"—"}</td>
                            <td style={{padding:"5px 6px",textAlign:"right",color:s.consumo!==null?"#1A1D2E":"#CBD5E1"}}>
                              {s.consumo!==null?`${s.consumo.toFixed(2)} ${ins.unidad}`:"—"}
                            </td>
                            <td style={{padding:"5px 6px",textAlign:"right",color:"#6C63FF"}}>
                              {consTeo!==null?`${consTeo.toFixed(2)} ${ins.unidad}`:"—"}
                            </td>
                            <td style={{padding:"5px 6px",textAlign:"right",color:s.precio!==null?"#475569":"#CBD5E1"}}>
                              {s.precio!==null?fmtCLP(s.precio):"—"}
                            </td>
                            <td style={{padding:"5px 6px",textAlign:"right",fontWeight:800,
                              color:varCosto>5?"#DC2626":varCosto<-5?"#16A34A":"#1A1D2E"}}>
                              {s.costo!==null?fmtCLP(s.costo):"—"}
                              {varCosto!==null&&<span style={{fontSize:9,marginLeft:3,color:varCosto>0?"#DC2626":"#16A34A"}}>{varCosto>0?"+":""}{varCosto.toFixed(1)}%</span>}
                            </td>
                            <td style={{padding:"5px 6px",textAlign:"right",color:s.stock!==null?(s.stock<5?"#DC2626":"#16A34A"):"#CBD5E1"}}>
                              {s.stock!==null?`${s.stock.toFixed(2)} ${ins.unidad}`:"—"}
                            </td>
                            <td style={{padding:"5px 6px",textAlign:"center",fontSize:12}}>
                              {desv===null?"—":desv<0?"🔴":desv>0?"🟢":"⚪"}
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </Card>
            ))
          )}
        </div>
      )}

      {/* ── VISTA INGRESO DIARIO ── */}
      {vista === "diario" && (
        <Card>
          <div style={{fontFamily:"Nunito",fontWeight:900,fontSize:14,color:m.color,marginBottom:12}}>
            ✏️ Ingreso Diario — {fechaSel} — {local.split(" - ")[1]||local}
          </div>
          {insumos.map(ins => {
            const reg = datosFecha.find(r=>r.insumoId===ins.id);
            return (
              <div key={ins.id} style={{marginBottom:12,padding:"10px 12px",background:"#F8FAFF",borderRadius:10,borderLeft:`3px solid ${CAT_COLORS[ins.categoria]||"#6C63FF"}`}}>
                <div style={{fontFamily:"Nunito",fontWeight:800,fontSize:12,color:"#1A1D2E",marginBottom:6}}>
                  {ins.nombre} <span style={{fontSize:10,color:"#94A3B8"}}>({ins.unidad})</span>
                  {reg && <span style={{marginLeft:6,fontSize:10,color:"#16A34A",fontWeight:700}}>✓ guardado</span>}
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
                  {[{k:"_c",lbl:"Consumo Real",ph:reg?.consumo?.toFixed(2)||""},
                    {k:"_p",lbl:"Precio Unit.",ph:reg?.precio?.toFixed(0)||""},
                    {k:"_s",lbl:"Stock Final", ph:reg?.stock?.toFixed(2)||""}].map(({k,lbl,ph})=>(
                    <div key={k}>
                      <div style={{fontFamily:"Nunito",fontSize:9,color:"#64748B",fontWeight:700,marginBottom:2}}>{lbl}</div>
                      <input type="number" step="0.01" placeholder={ph||"0"}
                        value={formDia[ins.id+k]||""}
                        onChange={e=>setFormDia(p=>({...p,[ins.id+k]:e.target.value}))}
                        style={{width:"100%",border:"1.5px solid #E2E8F0",borderRadius:8,padding:"6px 8px",fontFamily:"Nunito",fontSize:12,boxSizing:"border-box"}}/>
                    </div>
                  ))}
                </div>
              </div>
            );
          })}
          {msgGuardar && <div style={{marginBottom:10,padding:"8px 12px",borderRadius:9,background:msgGuardar.ok?"#F0FDF4":"#FEF2F2",color:msgGuardar.ok?"#166534":"#DC2626",fontFamily:"Nunito",fontSize:12,fontWeight:700}}>{msgGuardar.text}</div>}
          <Btn onClick={handleGuardarDia} color={m.color} full>💾 Guardar ingreso del día</Btn>
        </Card>
      )}

      {/* ── VISTA RANKING COSTO ── */}
      {vista === "ranking" && (
        <div>
          <Card style={{marginBottom:12}}>
            <div style={{fontFamily:"Nunito",fontWeight:900,fontSize:14,color:m.color,marginBottom:10}}>🏆 Ranking por Costo Promedio Diario</div>
            {[...comparativo].filter(i=>i.promCosto>0).sort((a,b)=>b.promCosto-a.promCosto).map((ins,idx)=>(
              <div key={ins.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid #F1F5F9"}}>
                <div style={{fontFamily:"Nunito",fontWeight:900,fontSize:16,color:"#CBD5E1",minWidth:24}}>{idx+1}</div>
                <div style={{flex:1}}>
                  <div style={{fontFamily:"Nunito",fontWeight:800,fontSize:12,color:"#1A1D2E"}}>{ins.nombre}</div>
                  <div style={{display:"flex",gap:4,marginTop:2}}>
                    <Chip label={ins.categoria} color={CAT_COLORS[ins.categoria]||"#6C63FF"} />
                  </div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontFamily:"Nunito",fontWeight:900,fontSize:14,color:idx<3?"#DC2626":"#1A1D2E"}}>{fmtCLP(ins.promCosto)}</div>
                  <div style={{fontFamily:"Nunito",fontSize:9,color:"#94A3B8"}}>prom. / período {ins.tendencia}</div>
                </div>
              </div>
            ))}
            {comparativo.filter(i=>i.promCosto>0).length===0 && (
              <div style={{textAlign:"center",color:"#94A3B8",padding:16,fontFamily:"Nunito",fontSize:12}}>Sin datos suficientes para el ranking.</div>
            )}
          </Card>
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// COSTO REAL — inventario + compras vs ventas
// ══════════════════════════════════════════════════════════════════════════════
function CostoRealModule({ marca, ventas }) {
  const m = MARCAS[marca] || MARCAS[Object.keys(MARCAS)[0]] || { color: "#6C63FF", bg: "#F0EEFF", emoji: "🌭", textColor: "#fff", nombre: "—" };
  const localesMarca = LOCALES_POR_MARCA[marca] || LOCALES;
  const [local, setLocal] = useState(localesMarca[0]||"");
  const [periodos, setPeriodos] = useSupabase("horreo_costo_real_periodos", []);
  const [vista, setVista] = useState("resumen");
  const [loading, setLoading] = useState(false);
  const [msg, setMsg] = useState(null);

  // Form período manual
  const [form, setForm] = useState({
    fechaDesde: today(), fechaHasta: today(),
    invInicial: "", compras: "", traspIn: "0", traspOut: "0", invFinal: ""
  });

  const periodosMarca = useMemo(() =>
    periodos.filter(p=>p.marca===marca && p.local===local).sort((a,b)=>b.fechaDesde>a.fechaDesde?1:-1),
  [periodos, marca, local]);

  // Calcular venta neta del período desde el estado de ventas
  const calcVentaPeriodo = (desde, hasta) => {
    const ventasMarca = ventas.filter(v => v.marca===marca && v.local===local);
    return ventasMarca
      .filter(v => v.fecha >= desde && v.fecha <= hasta)
      .reduce((s,v) => s + (parseFloat(v.venta_neta)||parseFloat(v.venta_bruta)||0), 0);
  };

  // Importar inventario ERP
  const handleImportInv = async (e) => {
    const file = e.target.files[0]; if (!file) return;
    setLoading(true); setMsg(null);
    try {
      const XLSX2 = await loadXLSX();
      const buf = await file.arrayBuffer();
      const wb = XLSX2.read(buf, { type:"array" });
      const items = parseInventarioERP(wb);
      const totalValor = items.filter(i=>i.valorTotal>0).reduce((s,i)=>s+i.valorTotal, 0);
      const totalItems = items.filter(i=>i.cantidad>0).length;
      // Extraer fecha del nombre del archivo o usar hoy
      const fechaMatch = file.name.match(/(\d{2})-(\d{2})-(\d{4})/);
      const fechaInv = fechaMatch ? `${fechaMatch[3]}-${fechaMatch[2]}-${fechaMatch[1]}` : today();
      setForm(prev=>({...prev, invFinal: String(totalValor.toFixed(0)) }));
      setMsg({ ok:true, text:`✅ Inventario importado: ${totalItems} ítems con stock. Valor total: ${fmtCLP(totalValor)}. Fecha: ${fechaInv}. El valor se cargó como Inventario Final.` });
    } catch(err) {
      setMsg({ ok:false, text:"❌ " + err.message });
    }
    setLoading(false); e.target.value="";
  };

  // Importar compras desde Back Office
  const handleImportBackOffice = async (e) => {
    const file = e.target.files[0]; if (!file) return;
    setLoading(true); setMsg(null);
    try {
      const XLSX2 = await loadXLSX();
      const buf = await file.arrayBuffer();
      const wb = XLSX2.read(buf, { type:"array" });
      const items = parseBackOfficeERP(wb);
      // Filtrar por local y solo items "para costo"
      const itemsLocal = items.filter(i => i.paraCosto &&
        (local.toLowerCase().includes(i.local.toLowerCase().split(" - ").pop()) ||
         i.local.toLowerCase().includes(local.toLowerCase().split(" - ").pop()) ||
         i.local === "" || items.length < 20));
      const totalCompras = itemsLocal.reduce((s,i)=>s+(i.netoFacturado||0), 0) ||
                           items.filter(i=>i.paraCosto).reduce((s,i)=>s+(i.netoFacturado||0), 0);
      const nFacturas = new Set(items.map(i=>i.factura)).size;
      setForm(prev=>({...prev, compras: String(totalCompras.toFixed(0)) }));
      setMsg({ ok:true, text:`✅ Back Office importado: ${nFacturas} facturas procesadas. Compras para costo: ${fmtCLP(totalCompras)}. Cargado en campo Compras.` });
    } catch(err) {
      setMsg({ ok:false, text:"❌ " + err.message });
    }
    setLoading(false); e.target.value="";
  };

  const n = k => parseFloat(form[k]||"") || 0;

  const costoReal = n("invInicial") + n("compras") + n("traspIn") - n("traspOut") - n("invFinal");
  const ventaPeriodo = calcVentaPeriodo(form.fechaDesde, form.fechaHasta);
  const pctCostoReal = ventaPeriodo > 0 ? (costoReal / ventaPeriodo * 100) : 0;

  const handleGuardar = () => {
    if (!costoReal || !form.fechaDesde) { setMsg({ok:false,text:"Completa los campos mínimos."});return; }
    const reg = {
      id: uid(), marca, local,
      fechaDesde: form.fechaDesde, fechaHasta: form.fechaHasta,
      invInicial: n("invInicial"), compras: n("compras"),
      traspIn: n("traspIn"), traspOut: n("traspOut"),
      invFinal: n("invFinal"),
      costoReal, ventaPeriodo,
      pctCostoReal: parseFloat(pctCostoReal.toFixed(2)),
      ts: new Date().toISOString(),
    };
    setPeriodos(prev => [...prev.filter(p=>!(p.marca===marca&&p.local===local&&p.fechaDesde===form.fechaDesde)), reg]);
    setMsg({ok:true, text:`✅ Período guardado. Costo Real: ${fmtCLP(costoReal)} (${pctCostoReal.toFixed(1)}% de venta)`});
    setVista("resumen");
  };

  const Field2 = ({label, name, placeholder, pre}) => (
    <div style={{marginBottom:10}}>
      <div style={{fontFamily:"Nunito",fontSize:11,color:"#64748B",fontWeight:700,marginBottom:3}}>{label}</div>
      <div style={{display:"flex",alignItems:"center",gap:5}}>
        {pre && <span style={{fontFamily:"Nunito",fontSize:12,color:"#94A3B8"}}>{pre}</span>}
        <input type="number" step="1" placeholder={placeholder||"0"}
          value={form[name]||""}
          onChange={e=>setForm(p=>({...p,[name]:e.target.value}))}
          style={{flex:1,border:"1.5px solid #E2E8F0",borderRadius:9,padding:"8px 10px",fontFamily:"Nunito",fontSize:13,boxSizing:"border-box"}} />
      </div>
    </div>
  );

  const META_FC = 40;

  return (
    <div style={{paddingBottom:20}}>
      <Card style={{marginBottom:14}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8,marginBottom:10}}>
          <div style={{fontFamily:"Nunito",fontWeight:900,fontSize:15,color:m.color}}>💰 Costo Real del Período</div>
          <div style={{display:"flex",gap:6}}>
            {["resumen","nuevo"].map(v=>(
              <button key={v} onClick={()=>setVista(v)}
                style={{background:vista===v?m.color:"#F1F5F9",color:vista===v?"#fff":"#475569",border:"none",borderRadius:9,padding:"6px 12px",fontFamily:"Nunito",fontWeight:800,fontSize:11,cursor:"pointer"}}>
                {v==="resumen"?"📊 Historial":"➕ Nuevo Período"}
              </button>
            ))}
          </div>
        </div>
        <select value={local} onChange={e=>setLocal(e.target.value)}
          style={{borderRadius:9,border:"1.5px solid #E2E8F0",padding:"6px 10px",fontFamily:"Nunito",fontSize:12,fontWeight:700}}>
          {localesMarca.map(l=><option key={l} value={l}>{l.split(" - ")[1]||l}</option>)}
        </select>
      </Card>

      {/* ── NUEVO PERÍODO ── */}
      {vista === "nuevo" && (
        <Card>
          <div style={{fontFamily:"Nunito",fontWeight:800,fontSize:14,color:"#1A1D2E",marginBottom:12}}>
            📋 Ingresar / Importar Período
          </div>

          {/* Importar desde ERP */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
            <label style={{background:"#EFF6FF",color:"#1D4ED8",border:"1.5px dashed #BFDBFE",borderRadius:10,padding:"10px 8px",textAlign:"center",fontFamily:"Nunito",fontWeight:800,fontSize:11,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
              {loading?"⏳":"📦"} Importar Inventario ERP
              <span style={{fontSize:9,fontWeight:600,color:"#93C5FD"}}>Inventario General .xlsx</span>
              <input type="file" accept=".xlsx,.xls" onChange={handleImportInv} style={{display:"none"}} />
            </label>
            <label style={{background:"#FFF7ED",color:"#C2410C",border:"1.5px dashed #FED7AA",borderRadius:10,padding:"10px 8px",textAlign:"center",fontFamily:"Nunito",fontWeight:800,fontSize:11,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
              {loading?"⏳":"🧾"} Importar Compras Back Office
              <span style={{fontSize:9,fontWeight:600,color:"#FDBA74"}}>Back Office .xlsx</span>
              <input type="file" accept=".xlsx,.xls" onChange={handleImportBackOffice} style={{display:"none"}} />
            </label>
          </div>

          {msg && <div style={{marginBottom:12,padding:"10px 12px",borderRadius:9,background:msg.ok?"#F0FDF4":"#FEF2F2",color:msg.ok?"#166534":"#DC2626",fontFamily:"Nunito",fontSize:12,fontWeight:700}}>{msg.text}</div>}

          {/* Período */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
            <div>
              <div style={{fontFamily:"Nunito",fontSize:11,color:"#64748B",fontWeight:700,marginBottom:3}}>Fecha Desde</div>
              <input type="date" value={form.fechaDesde} onChange={e=>setForm(p=>({...p,fechaDesde:e.target.value}))}
                style={{width:"100%",border:"1.5px solid #E2E8F0",borderRadius:9,padding:"8px 10px",fontFamily:"Nunito",fontSize:13,boxSizing:"border-box"}} />
            </div>
            <div>
              <div style={{fontFamily:"Nunito",fontSize:11,color:"#64748B",fontWeight:700,marginBottom:3}}>Fecha Hasta</div>
              <input type="date" value={form.fechaHasta} onChange={e=>setForm(p=>({...p,fechaHasta:e.target.value}))}
                style={{width:"100%",border:"1.5px solid #E2E8F0",borderRadius:9,padding:"8px 10px",fontFamily:"Nunito",fontSize:13,boxSizing:"border-box"}} />
            </div>
          </div>

          <Field2 label="Inventario Inicial ($)" name="invInicial" />
          <Field2 label="Compras del Período ($)" name="compras" />
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <Field2 label="Traspaso Entrada ($)" name="traspIn" />
            <Field2 label="Traspaso Salida ($)" name="traspOut" />
          </div>
          <Field2 label="Inventario Final ($)" name="invFinal" />

          {/* Preview cálculo */}
          <div style={{background:"linear-gradient(135deg,#F0FDF4,#ECFDF5)",borderRadius:12,padding:"12px 14px",marginBottom:14}}>
            <div style={{fontFamily:"Nunito",fontSize:11,color:"#64748B",fontWeight:700,marginBottom:6}}>PREVIEW CÁLCULO</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:8}}>
              {[
                {l:"Costo Real", v:fmtCLP(costoReal), c:"#1A1D2E", big:true},
                {l:"Venta del Período", v:ventaPeriodo>0?fmtCLP(ventaPeriodo):"(ingresa ventas)", c:"#475569", big:true},
                {l:"% Costo Real", v:ventaPeriodo>0?pctCostoReal.toFixed(1)+"%":"—",
                  c:pctCostoReal>META_FC+2?"#DC2626":pctCostoReal>META_FC?"#D97706":"#16A34A", big:true},
                {l:"Meta Food Cost", v:META_FC+"%", c:"#6C63FF", big:false},
              ].map(({l,v,c,big})=>(
                <div key={l} style={{background:"#fff",borderRadius:9,padding:"8px 10px",textAlign:"center"}}>
                  <div style={{fontFamily:"Nunito",fontSize:9,color:"#94A3B8",fontWeight:700,textTransform:"uppercase"}}>{l}</div>
                  <div style={{fontFamily:"Nunito",fontWeight:900,fontSize:big?16:13,color:c,marginTop:2}}>{v}</div>
                </div>
              ))}
            </div>
          </div>

          <Btn onClick={handleGuardar} color={m.color} full>💾 Guardar Período</Btn>
        </Card>
      )}

      {/* ── HISTORIAL ── */}
      {vista === "resumen" && (
        <div>
          {periodosMarca.length === 0 ? (
            <Card><div style={{textAlign:"center",color:"#94A3B8",padding:24,fontFamily:"Nunito",fontSize:13}}>
              Sin períodos registrados para {local.split(" - ")[1]||local}.<br/>
              <span style={{fontSize:11}}>Usa "Nuevo Período" para ingresar o importar datos del ERP.</span>
            </div></Card>
          ) : (
            <>
              {/* KPIs resumen */}
              {(() => {
                const ult = periodosMarca[0];
                const pen = periodosMarca[1];
                const varPct = pen?.pctCostoReal ? ult.pctCostoReal - pen.pctCostoReal : null;
                return (
                  <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10,marginBottom:14}}>
                    {[
                      {l:"Último Costo Real",v:fmtCLP(ult.costoReal),c:"#1A1D2E"},
                      {l:"% Costo Real",v:ult.pctCostoReal.toFixed(1)+"%",
                        c:ult.pctCostoReal>META_FC+2?"#DC2626":ult.pctCostoReal>META_FC?"#D97706":"#16A34A"},
                      {l:"Venta Período",v:ult.ventaPeriodo>0?fmtCLP(ult.ventaPeriodo):"—",c:"#475569"},
                      {l:"vs Período Ant.",v:varPct!==null?(varPct>0?"+":"")+varPct.toFixed(1)+" pp":"—",
                        c:varPct===null?"#94A3B8":varPct>0?"#DC2626":"#16A34A"},
                    ].map(({l,v,c})=>(
                      <div key={l} style={{background:"#fff",borderRadius:12,padding:"12px",textAlign:"center",boxShadow:"0 2px 8px rgba(0,0,0,0.05)"}}>
                        <div style={{fontFamily:"Nunito",fontSize:9,color:"#94A3B8",fontWeight:700,textTransform:"uppercase",marginBottom:4}}>{l}</div>
                        <div style={{fontFamily:"Nunito",fontWeight:900,fontSize:18,color:c}}>{v}</div>
                      </div>
                    ))}
                  </div>
                );
              })()}

              {/* Tabla historial */}
              <Card style={{padding:"10px 8px"}}>
                <div style={{overflowX:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:11,fontFamily:"Nunito"}}>
                    <thead>
                      <tr style={{background:"#F8FAFF"}}>
                        {["Período","Inv. Inicial","Compras","Inv. Final","Costo Real","Venta","% CR","Sem."].map(h=>(
                          <th key={h} style={{padding:"6px 7px",textAlign:"right",fontWeight:800,color:"#475569",whiteSpace:"nowrap",borderBottom:"2px solid #E2E8F0",fontSize:10}}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {periodosMarca.map((p,i)=>{
                        const sem = p.pctCostoReal<=META_FC?"🟢":p.pctCostoReal<=META_FC+2?"🟡":"🔴";
                        return (
                          <tr key={i} style={{borderBottom:"1px solid #F1F5F9"}}>
                            <td style={{padding:"5px 7px",fontWeight:700,color:"#1A1D2E",whiteSpace:"nowrap",fontSize:10}}>
                              {p.fechaDesde.slice(5)}<br/>
                              <span style={{fontSize:9,color:"#94A3B8"}}>{p.fechaHasta.slice(5)}</span>
                            </td>
                            <td style={{padding:"5px 7px",textAlign:"right"}}>{fmtCLP(p.invInicial)}</td>
                            <td style={{padding:"5px 7px",textAlign:"right"}}>{fmtCLP(p.compras)}</td>
                            <td style={{padding:"5px 7px",textAlign:"right"}}>{fmtCLP(p.invFinal)}</td>
                            <td style={{padding:"5px 7px",textAlign:"right",fontWeight:800,color:"#1A1D2E"}}>{fmtCLP(p.costoReal)}</td>
                            <td style={{padding:"5px 7px",textAlign:"right"}}>{p.ventaPeriodo>0?fmtCLP(p.ventaPeriodo):"—"}</td>
                            <td style={{padding:"5px 7px",textAlign:"right",fontWeight:900,
                              color:p.pctCostoReal>META_FC+2?"#DC2626":p.pctCostoReal>META_FC?"#D97706":"#16A34A"}}>
                              {p.ventaPeriodo>0?p.pctCostoReal.toFixed(1)+"%":"—"}
                            </td>
                            <td style={{padding:"5px 7px",textAlign:"center"}}>{p.ventaPeriodo>0?sem:"—"}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </Card>
            </>
