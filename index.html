// Devuelve los ítems de consumo para el local activo
function getErpLocal(localNombre) {
  // Busca coincidencia exacta o parcial
  if (ERP_HISTORICO[localNombre]) return ERP_HISTORICO[localNombre];
  const key = Object.keys(ERP_HISTORICO).find(k => localNombre && localNombre.includes(k.split(" - ")[0]));
  return key ? ERP_HISTORICO[key] : [];
}

// ── Par de Producción ─────────────────────────────────────────────────────────
// Soporta: datos ERP (inventario importado) + ingreso manual de stock
function ParProduccion({ marca }) {
  const m = MARCAS[marca] || MARCAS[Object.keys(MARCAS)[0]] || { color:"#6C63FF", bg:"#F0EEFF", emoji:"🌭", textColor:"#fff", nombre:"—" };
  const localesMarca = LOCALES_POR_MARCA[marca] || LOCALES;
  const [local, setLocal]         = useState(localesMarca[0] || "");
  const [diasCoverage, setDias]   = useState(1);
  const [filtro, setFiltro]       = useState("");
  const [stockMap, setStockMap]   = useStorage("horreo_stock_manual_" + marca, {});
  const [editStock, setEditStock] = useState(null);
  // ERP inventario importado
  const [erpInv, setErpInv]       = useStorage("horreo_erp_inv_" + marca, null); // {local, fecha, items:[{id,nombre,unidad,cantidad,valorUnit,valorTotal,categoria}]}
  const [loadingERP, setLoadingERP] = useState(false);
  const [erpError, setErpError]   = useState("");
  const [modoStock, setModoStock] = useState("erp"); // "erp" | "manual"

  const items = useMemo(() => getErpLocal(local), [local]);
  const diasStr = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
  const hoy = new Date();
  const diasSem = Array.from({length:7},(_,i)=>{ const d=new Date(hoy); d.setDate(hoy.getDate()+i); return d; });

  const filtered = useMemo(() => {
    if (!filtro) return items;
    return items.filter(it => it.m.toLowerCase().includes(filtro.toLowerCase()));
  }, [items, filtro]);

  // Obtener stock: primero ERP si disponible, luego manual
  const calcStock = (mat, unidad) => {
    if (modoStock === "erp" && erpInv && erpInv.items) {
      const found = erpInv.items.find(i =>
        i.nombre.toLowerCase() === mat.toLowerCase() ||
        i.nombre.toLowerCase().includes(mat.toLowerCase().slice(0, 12))
      );
      if (found) return found.cantidad;
    }
    return parseFloat(stockMap[local + "||" + mat] || 0);
  };

  const calcNeeded  = (it) => Math.ceil(it.pd * diasCoverage * 10) / 10;
  const calcFaltante = (it) => Math.max(0, calcNeeded(it) - calcStock(it.m, it.u));

  const saveStock = () => {
    if (!editStock) return;
    setStockMap(prev => ({ ...prev, [local + "||" + editStock.material]: parseFloat(editStock.value) || 0 }));
    setEditStock(null);
  };

  const urgencia = (it) => {
    const stock = calcStock(it.m, it.u); const needed = calcNeeded(it);
    if (stock === 0) return "critico";
    if (stock < needed * 0.3) return "bajo";
    if (stock < needed) return "ok";
    return "suficiente";
  };
  const urg_color = { critico:"#EF4444", bajo:"#F97316", ok:"#EAB308", suficiente:"#22C55E" };
  const urg_label = { critico:"🔴 Sin stock", bajo:"🟠 Stock bajo", ok:"🟡 Stock parcial", suficiente:"🟢 OK" };

  const resumen = useMemo(() => ({
    criticos: filtered.filter(it=>urgencia(it)==="critico").length,
    bajos:    filtered.filter(it=>urgencia(it)==="bajo").length,
  }), [filtered, stockMap, erpInv, diasCoverage, local, modoStock]);

  // Importar inventario ERP
  const handleErpFile = async e => {
    const file = e.target.files[0]; if (!file) return;
    setLoadingERP(true); setErpError("");
    try {
      const XLSX = await loadXLSX();
      const wb = XLSX.read(await file.arrayBuffer(), { type:"array" });
      const parsed = parseInventarioERP(wb);
      setErpInv({ local, fecha: today(), items: parsed, archivo: file.name });
    } catch(err) { setErpError("Error al leer archivo: " + err.message); }
    finally { setLoadingERP(false); e.target.value = ""; }
  };

  return (
    <div style={{paddingBottom:80}}>
      <Card style={{marginBottom:12}}>
        <div style={{fontFamily:"Nunito",fontWeight:900,fontSize:15,color:m.color,marginBottom:12}}>🍳 Par de Producción</div>

        {/* Local y cobertura */}
        <Field label="Local">
          <select value={local} onChange={e=>setLocal(e.target.value)}>
            {localesMarca.map(l=><option key={l} value={l}>{nombreCortoLocal(l)}</option>)}
          </select>
        </Field>
        <Field label="Cobertura (días)">
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:4}}>
            {[1,2,3,5,7].map(d=>(
              <button key={d} onClick={()=>setDias(d)}
                style={{background:diasCoverage===d?m.color:"#F1F5F9",color:diasCoverage===d?"#fff":"#475569",border:"none",borderRadius:8,padding:"6px 14px",fontFamily:"Nunito",fontWeight:800,fontSize:12,cursor:"pointer"}}>
                {d}d
              </button>
            ))}
          </div>
        </Field>

        {/* Toggle fuente de stock */}
        <Field label="Fuente de stock">
          <div style={{display:"flex",gap:6,marginTop:4}}>
            <button onClick={()=>setModoStock("erp")}
              style={{background:modoStock==="erp"?m.color:"#F1F5F9",color:modoStock==="erp"?"#fff":"#475569",border:"none",borderRadius:8,padding:"6px 14px",fontFamily:"Nunito",fontWeight:800,fontSize:12,cursor:"pointer"}}>
              📤 Inventario ERP
            </button>
            <button onClick={()=>setModoStock("manual")}
              style={{background:modoStock==="manual"?m.color:"#F1F5F9",color:modoStock==="manual"?"#fff":"#475569",border:"none",borderRadius:8,padding:"6px 14px",fontFamily:"Nunito",fontWeight:800,fontSize:12,cursor:"pointer"}}>
              ✏️ Manual
            </button>
          </div>
        </Field>

        {/* Importar ERP */}
        {modoStock === "erp" && (
          <div style={{marginTop:10,background:"#F8FAFC",borderRadius:10,padding:12}}>
            {erpInv ? (
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{fontSize:11,fontWeight:800,color:m.color,fontFamily:"Nunito"}}>✅ Inventario ERP cargado</div>
                  <div style={{fontSize:10,color:"#64748B"}}>{erpInv.archivo} · {erpInv.fecha} · {erpInv.items?.length} ítems</div>
                </div>
                <label style={{background:m.color+"20",color:m.color,borderRadius:8,padding:"5px 10px",fontSize:11,fontWeight:800,fontFamily:"Nunito",cursor:"pointer"}}>
                  🔄 Actualizar
                  <input type="file" accept=".xlsx,.xls" style={{display:"none"}} onChange={handleErpFile}/>
                </label>
              </div>
            ) : (
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:12,color:"#64748B",marginBottom:8,fontFamily:"Nunito"}}>
                  Importa el <b>Inventario General</b> del ERP para usar stock real
                </div>
                {loadingERP ? <div style={{color:m.color,fontSize:12,fontFamily:"Nunito"}}>⏳ Procesando...</div> : (
                  <label style={{display:"inline-block",background:m.color,color:"#fff",borderRadius:10,padding:"8px 18px",fontFamily:"Nunito",fontWeight:800,fontSize:12,cursor:"pointer"}}>
                    📤 Importar Inventario ERP
                    <input type="file" accept=".xlsx,.xls" style={{display:"none"}} onChange={handleErpFile}/>
                  </label>
                )}
                {erpError && <div style={{color:"#EF4444",fontSize:11,marginTop:8}}>{erpError}</div>}
              </div>
            )}
          </div>
        )}

        {/* Resumen */}
        <div style={{display:"flex",gap:8,marginTop:10}}>
          <div style={{flex:1,background:resumen.criticos>0?"#FEF2F2":"#F0FDF4",borderRadius:10,padding:"8px 12px",textAlign:"center"}}>
            <div style={{fontSize:20,fontWeight:900,fontFamily:"Nunito",color:resumen.criticos>0?"#EF4444":"#22C55E"}}>{resumen.criticos}</div>
            <div style={{fontSize:10,color:"#64748B"}}>Sin stock</div>
          </div>
          <div style={{flex:1,background:resumen.bajos>0?"#FFF7ED":"#F0FDF4",borderRadius:10,padding:"8px 12px",textAlign:"center"}}>
            <div style={{fontSize:20,fontWeight:900,fontFamily:"Nunito",color:resumen.bajos>0?"#F97316":"#22C55E"}}>{resumen.bajos}</div>
            <div style={{fontSize:10,color:"#64748B"}}>Stock bajo</div>
          </div>
          <div style={{flex:2,background:"#F8FAFC",borderRadius:10,padding:"8px 12px",textAlign:"center"}}>
            <div style={{fontSize:11,fontWeight:700,color:"#64748B",fontFamily:"Nunito"}}>Período</div>
            <div style={{fontSize:11,color:m.color,fontWeight:800,fontFamily:"Nunito"}}>
              {diasSem[0].toLocaleDateString("es-CL",{day:"numeric",month:"short"})} →{" "}
              {diasSem[Math.min(diasCoverage,6)].toLocaleDateString("es-CL",{day:"numeric",month:"short"})}
            </div>
          </div>
        </div>
      </Card>

      {/* Buscador */}
      <div style={{background:"#F1F5F9",borderRadius:12,padding:"8px 12px",marginBottom:10,display:"flex",alignItems:"center",gap:8}}>
        <span style={{color:"#94A3B8"}}>🔍</span>
        <input value={filtro} onChange={e=>setFiltro(e.target.value)} placeholder="Buscar insumo..."
          style={{border:"none",background:"transparent",fontFamily:"Nunito",fontSize:13,flex:1,outline:"none",color:"#334155"}}/>
        {filtro && <span style={{cursor:"pointer",color:"#94A3B8"}} onClick={()=>setFiltro("")}>✕</span>}
      </div>

      {/* Modal stock manual */}
      {editStock && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{background:"#fff",borderRadius:16,padding:24,width:"100%",maxWidth:340}}>
            <div style={{fontFamily:"Nunito",fontWeight:900,fontSize:14,marginBottom:8,color:"#1E293B"}}>📦 Ingresar Stock Manual</div>
            <div style={{fontSize:12,color:"#64748B",marginBottom:12}}>{editStock.material}</div>
            <input type="number" min="0" step="0.1" value={editStock.value}
              onChange={e=>setEditStock(s=>({...s,value:e.target.value}))}
              style={{width:"100%",border:"2px solid "+m.color,borderRadius:10,padding:"10px 14px",fontFamily:"Nunito",fontSize:16,fontWeight:700,color:"#1E293B",outline:"none",marginBottom:14}}
              autoFocus onKeyDown={e=>e.key==="Enter"&&saveStock()}/>
            <div style={{display:"flex",gap:8}}>
              <Btn full color={m.color} onClick={saveStock}>✅ Guardar</Btn>
              <Btn full outline color={m.color} onClick={()=>setEditStock(null)}>Cancelar</Btn>
            </div>
          </div>
        </div>
      )}

      {/* Lista de insumos */}
      {items.length === 0 ? (
        <Card><div style={{textAlign:"center",color:"#94A3B8",padding:20,fontFamily:"Nunito"}}>Sin datos ERP para este local</div></Card>
      ) : (
        filtered.map(it => {
          const needed = calcNeeded(it);
          const stock  = calcStock(it.m, it.u);
          const urg    = urgencia(it);
          const falta  = calcFaltante(it);
          const pct    = needed > 0 ? Math.min(1, stock / needed) : 1;
          const erpMatch = modoStock==="erp" && erpInv?.items?.find(i =>
            i.nombre.toLowerCase().includes(it.m.toLowerCase().slice(0,12))
          );
          return (
            <Card key={it.m} style={{marginBottom:8,borderLeft:"3px solid "+urg_color[urg]}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
                <div style={{fontFamily:"Nunito",fontWeight:800,fontSize:13,color:"#1E293B",flex:1,paddingRight:8}}>{it.m}</div>
                <div style={{fontSize:10,color:urg_color[urg],fontWeight:700,whiteSpace:"nowrap"}}>{urg_label[urg]}</div>
              </div>
              <div style={{display:"flex",gap:6,marginBottom:6,flexWrap:"wrap"}}>
                <span style={{background:"#F1F5F9",borderRadius:6,padding:"2px 8px",fontSize:10,color:"#64748B",fontFamily:"Nunito"}}>
                  Prom: <b>{it.pd.toFixed(2)} {it.u}/día</b>
                </span>
                <span style={{background:"#EFF6FF",borderRadius:6,padding:"2px 8px",fontSize:10,color:"#3B82F6",fontFamily:"Nunito"}}>
                  Necesita: <b>{needed} {it.u}</b>
                </span>
                {erpMatch && <span style={{background:"#F0FDF4",borderRadius:6,padding:"2px 8px",fontSize:10,color:"#16A34A",fontFamily:"Nunito"}}>📤 ERP</span>}
              </div>
              <div style={{background:"#F1F5F9",borderRadius:6,height:8,marginBottom:6,overflow:"hidden"}}>
                <div style={{width:(pct*100)+"%",height:"100%",background:urg_color[urg],borderRadius:6,transition:"width .3s"}}/>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{fontSize:11,color:"#64748B",fontFamily:"Nunito"}}>
                  Stock: <b style={{color:urg_color[urg]}}>{stock} {it.u}</b>
                  {falta > 0 && <span style={{color:"#EF4444",marginLeft:8}}>· Faltan: <b>{falta.toFixed(2)} {it.u}</b></span>}
                </div>
                {modoStock === "manual" && (
                  <button onClick={()=>setEditStock({material:it.m,value:stock||""})}
                    style={{background:m.color+"20",color:m.color,border:"none",borderRadius:8,padding:"4px 10px",fontFamily:"Nunito",fontWeight:800,fontSize:11,cursor:"pointer"}}>
                    ✏️ Stock
                  </button>
                )}
              </div>
            </Card>
          );
        })
      )}
    </div>
  );
}

// ── Sugerencia de Pedidos a Proveedores ───────────────────────────────────────
// Usa: inventario ERP + historial de compras ERP (Back Office) + promedio diario
function SugerenciaPedidos({ marca }) {
  const m = MARCAS[marca] || MARCAS[Object.keys(MARCAS)[0]] || { color:"#6C63FF", bg:"#F0EEFF", emoji:"🌭", textColor:"#fff", nombre:"—" };
  const localesMarca = LOCALES_POR_MARCA[marca] || LOCALES;
  const [local, setLocal]         = useState(localesMarca[0] || "");
  const [diasRuta, setDiasRuta]   = useState(3);
  const [diasBuffer, setBuffer]   = useState(1);
  const [filtroMat, setFiltroMat] = useState("");
  const [provExpanded, setProvExpanded] = useState({});
  const [stockMap]                = useStorage("horreo_stock_manual_" + marca, {});
  const [erpInv]                  = useStorage("horreo_erp_inv_" + marca, null);
  const [comprasERP, setComprasERP] = useStorage("horreo_compras_erp_" + marca, null);
  const [loadingComp, setLoadingComp] = useState(false);
  const [compError, setCompError] = useState("");

  const items = useMemo(() => getErpLocal(local), [local]);

  const calcStock = (mat) => {
    if (erpInv && erpInv.items) {
      const found = erpInv.items.find(i =>
        i.nombre.toLowerCase() === mat.toLowerCase() ||
        i.nombre.toLowerCase().includes(mat.toLowerCase().slice(0,12))
      );
      if (found) return found.cantidad;
    }
    return parseFloat(stockMap[local + "||" + mat] || 0);
  };

  const diasTotal = diasRuta + diasBuffer;

  // Historial de compras ERP: resumen por material
  const historialCompras = useMemo(() => {
    if (!comprasERP || !comprasERP.items) return {};
    const map = {};
    comprasERP.items
      .filter(c => c.local && c.local.includes(local.split(" - ")[0]))
      .forEach(c => {
        if (!map[c.material]) map[c.material] = { total:0, facturas:0, ultimaFecha:"", ultimoPrecio:0 };
        map[c.material].total += c.cantRecep;
        map[c.material].facturas += 1;
        if (c.fecha > map[c.material].ultimaFecha) {
          map[c.material].ultimaFecha = c.fecha;
          map[c.material].ultimoPrecio = c.precioFacturado || c.precioPactado;
        }
      });
    return map;
  }, [comprasERP, local]);

  // Genera sugerencias
  const sugerencias = useMemo(() => {
    return items.map(it => {
      const stock  = calcStock(it.m);
      const needed = Math.ceil(it.pd * diasTotal * 10) / 10;
      const pedir  = Math.max(0, Math.ceil((needed - stock) * 10) / 10);
      const prov   = it.p && it.p.length > 0 ? it.p[0] : { n:"Sin proveedor asignado", r:"" };
      const hist   = historialCompras[it.m] || null;
      return { ...it, stock, needed, pedir, prov, hist };
    }).filter(it => it.pedir > 0 && (!filtroMat || it.m.toLowerCase().includes(filtroMat.toLowerCase())));
  }, [items, stockMap, erpInv, comprasERP, diasTotal, local, filtroMat]);

  // Agrupa por proveedor
  const porProveedor = useMemo(() => {
    const map = {};
    sugerencias.forEach(s => {
      const key = s.prov.n;
      if (!map[key]) map[key] = { nombre:s.prov.n, rut:s.prov.r, items:[] };
      map[key].items.push(s);
    });
    return Object.values(map);
  }, [sugerencias]);

  // Importar Back Office ERP
  const handleComprasFile = async e => {
    const file = e.target.files[0]; if (!file) return;
    setLoadingComp(true); setCompError("");
    try {
      const XLSX = await loadXLSX();
      const wb = XLSX.read(await file.arrayBuffer(), { type:"array" });
      const parsed = parseBackOfficeERP(wb);
      setComprasERP({ fecha: today(), items: parsed, archivo: file.name, total: parsed.length });
    } catch(err) { setCompError("Error al leer archivo: " + err.message); }
    finally { setLoadingComp(false); e.target.value = ""; }
  };

  return (
    <div style={{paddingBottom:80}}>
      <Card style={{marginBottom:12}}>
        <div style={{fontFamily:"Nunito",fontWeight:900,fontSize:15,color:m.color,marginBottom:12}}>🚚 Sugerencia de Pedidos</div>

        <Field label="Local">
          <select value={local} onChange={e=>setLocal(e.target.value)}>
            {localesMarca.map(l=><option key={l} value={l}>{nombreCortoLocal(l)}</option>)}
          </select>
        </Field>

        <div style={{display:"flex",gap:8,marginTop:8}}>
          <Field label={`Días ruta (${diasRuta})`} style={{flex:1}}>
            <input type="range" min="1" max="14" value={diasRuta} onChange={e=>setDiasRuta(+e.target.value)}
              style={{width:"100%",accentColor:m.color}}/>
          </Field>
          <Field label={`Buffer (${diasBuffer}d)`} style={{flex:1}}>
            <input type="range" min="0" max="7" value={diasBuffer} onChange={e=>setBuffer(+e.target.value)}
              style={{width:"100%",accentColor:m.color}}/>
          </Field>
        </div>

        {/* Importar Back Office compras */}
        <div style={{marginTop:10,background:"#F8FAFC",borderRadius:10,padding:10}}>
          <div style={{fontSize:11,fontWeight:800,color:"#475569",fontFamily:"Nunito",marginBottom:6}}>📦 Historial de Compras ERP (Back Office)</div>
          {comprasERP ? (
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{fontSize:10,color:"#64748B"}}>{comprasERP.archivo} · {comprasERP.fecha} · {comprasERP.total} registros</div>
              <label style={{background:m.color+"20",color:m.color,borderRadius:8,padding:"4px 10px",fontSize:11,fontWeight:800,fontFamily:"Nunito",cursor:"pointer"}}>
                🔄 Actualizar<input type="file" accept=".xlsx,.xls" style={{display:"none"}} onChange={handleComprasFile}/>
              </label>
            </div>
          ) : (
            <div style={{textAlign:"center"}}>
              {loadingComp ? <div style={{color:m.color,fontSize:12,fontFamily:"Nunito"}}>⏳ Procesando...</div> : (
                <label style={{display:"inline-block",background:m.color,color:"#fff",borderRadius:10,padding:"7px 16px",fontFamily:"Nunito",fontWeight:800,fontSize:12,cursor:"pointer"}}>
                  📤 Importar Back Office ERP
                  <input type="file" accept=".xlsx,.xls" style={{display:"none"}} onChange={handleComprasFile}/>
                </label>
              )}
              {compError && <div style={{color:"#EF4444",fontSize:11,marginTop:6}}>{compError}</div>}
            </div>
          )}
        </div>

        <div style={{marginTop:8,display:"flex",gap:8,background:"#EFF6FF",borderRadius:10,padding:"8px 12px"}}>
          <span style={{fontSize:12,color:"#3B82F6",fontFamily:"Nunito"}}>
            📋 Cobertura total: <b>{diasTotal} días</b> · {sugerencias.length} ítems a pedir
          </span>
        </div>
      </Card>

      {/* Buscador */}
      <div style={{background:"#F1F5F9",borderRadius:12,padding:"8px 12px",marginBottom:10,display:"flex",alignItems:"center",gap:8}}>
        <span style={{color:"#94A3B8"}}>🔍</span>
        <input value={filtroMat} onChange={e=>setFiltroMat(e.target.value)} placeholder="Buscar material..."
          style={{border:"none",background:"transparent",fontFamily:"Nunito",fontSize:13,flex:1,outline:"none",color:"#334155"}}/>
        {filtroMat && <span style={{cursor:"pointer",color:"#94A3B8"}} onClick={()=>setFiltroMat("")}>✕</span>}
      </div>

      {sugerencias.length === 0 ? (
        <Card><div style={{textAlign:"center",color:"#94A3B8",padding:20,fontFamily:"Nunito"}}>✅ Sin pedidos pendientes para el período indicado</div></Card>
      ) : (
        porProveedor.map(pv => {
          const key = pv.nombre;
          const exp = provExpanded[key] !== false;
          return (
            <Card key={key} style={{marginBottom:10}}>
              <div onClick={()=>setProvExpanded(p=>({...p,[key]:!exp}))}
                style={{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer",marginBottom: exp?8:0}}>
                <div>
                  <div style={{fontFamily:"Nunito",fontWeight:900,fontSize:13,color:"#1E293B"}}>{pv.nombre}</div>
                  {pv.rut && <div style={{fontSize:10,color:"#94A3B8"}}>RUT: {pv.rut}</div>}
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{background:m.color+"20",color:m.color,borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:800,fontFamily:"Nunito"}}>{pv.items.length} ítems</span>
                  <span style={{color:"#94A3B8",fontSize:14}}>{exp?"▲":"▼"}</span>
                </div>
              </div>
              {exp && pv.items.map(s => (
                <div key={s.m} style={{borderTop:"1px solid #F1F5F9",paddingTop:8,paddingBottom:8}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                    <div style={{fontFamily:"Nunito",fontWeight:700,fontSize:12,color:"#334155",flex:1}}>{s.m}</div>
                    <div style={{fontFamily:"Nunito",fontWeight:900,fontSize:13,color:m.color,whiteSpace:"nowrap"}}>
                      {s.pedir} {s.u}
                    </div>
                  </div>
                  <div style={{display:"flex",gap:6,marginTop:4,flexWrap:"wrap"}}>
                    <span style={{background:"#F1F5F9",borderRadius:5,padding:"1px 7px",fontSize:10,color:"#64748B"}}>Stock: {s.stock} {s.u}</span>
                    <span style={{background:"#EFF6FF",borderRadius:5,padding:"1px 7px",fontSize:10,color:"#3B82F6"}}>Necesita: {s.needed} {s.u}</span>
                    {s.hist && <span style={{background:"#F0FDF4",borderRadius:5,padding:"1px 7px",fontSize:10,color:"#16A34A"}}>Últ. compra: {s.hist.ultimaFecha}</span>}
                  </div>
                </div>
              ))}
            </Card>
          );
        })
      )}
    </div>
  );
}

// ── Mermas & Colaciones ───────────────────────────────────────────────────────
// Lee desde informe de costo teórico ERP; fallback a ingreso manual
function MermasColaciones({ marca }) {
  const m = MARCAS[marca] || MARCAS[Object.keys(MARCAS)[0]] || { color:"#6C63FF", bg:"#F0EEFF", emoji:"🌭", textColor:"#fff", nombre:"—" };
  const localesMarca = LOCALES_POR_MARCA[marca] || LOCALES;
  const [local, setLocal]     = useState(localesMarca[0] || "");
  const [tab, setTab]         = useState("mermas"); // mermas | colaciones
  const [costoTeo, setCostoTeo] = useStorage("horreo_costo_teo_" + marca, null);
  const [loadingCT, setLoadingCT] = useState(false);
  const [ctError, setCtError] = useState("");
  const [manualMermas, setManualMermas]   = useStorage("horreo_mermas_manual_" + marca, []);
  const [manualColac, setManualColac]     = useStorage("horreo_colac_manual_" + marca, []);
  const [editItem, setEditItem] = useState(null); // { tipo, idx, material, cantidad, unidad, valorNeto }
  const [showAddForm, setShowAddForm] = useState(false);
  const [newItem, setNewItem] = useState({ material:"", cantidad:"", unidad:"UNI", valorNeto:"" });
  const [filtro, setFiltro]   = useState("");
  const [ordenar, setOrdenar] = useState("valor"); // valor | material

  // Parser del informe de costo teórico
  const parseCostoTeoERP = (wb) => {
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:null });
    const mermas = []; const colaciones = [];
    const n = v => typeof v==="number"?v:parseFloat(String(v||"").replace(/[^0-9.-]/g,""))||0;
    // Encabezado en fila 1: MARCA|MARCA ASOCIADA|ID LOCAL|NOMBRE LOCAL|TIPO SALIDA|CANAL|ID MATERIAL|MATERIAL|TIPO MATERIAL|CANTIDAD|UNIDAD|VALOR NETO UNITARIO|VALOR NETO TOTAL|% VENTA NETA
    for (let i = 2; i < rows.length; i++) {
      const r = rows[i];
      if (!r || !r[7]) continue;
      const tipoSalida = String(r[4]||"").trim();
      const nombreLocal = String(r[3]||"").trim();
      if (!tipoSalida) continue;
      const item = {
        id: String(r[6]||""), material: String(r[7]||"").trim(),
        tipoMaterial: String(r[8]||""), cantidad: n(r[9]),
        unidad: String(r[10]||""), valorUnit: n(r[11]), valorTotal: n(r[12]),
        local: nombreLocal, canal: String(r[5]||""),
      };
      if (tipoSalida === "Merma") mermas.push(item);
      else if (tipoSalida === "Consumo Interno") colaciones.push(item);
    }
    return { mermas, colaciones };
  };

  const handleCostoTeoFile = async e => {
    const file = e.target.files[0]; if (!file) return;
    setLoadingCT(true); setCtError("");
    try {
      const XLSX = await loadXLSX();
      const wb = XLSX.read(await file.arrayBuffer(), { type:"array" });
      const parsed = parseCostoTeoERP(wb);
      setCostoTeo({ fecha: today(), archivo: file.name, ...parsed });
    } catch(err) { setCtError("Error al leer: " + err.message); }
    finally { setLoadingCT(false); e.target.value=""; }
  };

  // Datos activos: ERP filtrado por local, o manual
  const dataMermasERP = useMemo(() => {
    if (!costoTeo?.mermas) return [];
    return costoTeo.mermas.filter(i => !local || i.local.toLowerCase().includes(local.split(" - ")[0].toLowerCase()));
  }, [costoTeo, local]);

  const dataColacERP = useMemo(() => {
    if (!costoTeo?.colaciones) return [];
    return costoTeo.colaciones.filter(i => !local || i.local.toLowerCase().includes(local.split(" - ")[0].toLowerCase()));
  }, [costoTeo, local]);

  const tieneERP = costoTeo && (dataMermasERP.length > 0 || dataColacERP.length > 0);

  // Vista activa (ERP o manual)
  const itemsActivos = tab === "mermas"
    ? (tieneERP && dataMermasERP.length > 0 ? dataMermasERP : manualMermas)
    : (tieneERP && dataColacERP.length > 0 ? dataColacERP : manualColac);

  const setManual = tab === "mermas" ? setManualMermas : setManualColac;

  const filtered = useMemo(() => {
    const base = [...itemsActivos];
    const f = filtro.toLowerCase();
    const data = f ? base.filter(i => i.material.toLowerCase().includes(f)) : base;
    if (ordenar === "valor") return data.sort((a,b) => (b.valorTotal||b.valorNeto||0) - (a.valorTotal||a.valorNeto||0));
    return data.sort((a,b) => a.material.localeCompare(b.material));
  }, [itemsActivos, filtro, ordenar]);

  const totalValor = filtered.reduce((s,i) => s+((i.valorTotal||i.valorNeto)||0), 0);

  const fmtM = v => "$" + Math.round(v).toLocaleString("es-CL");

  const addManual = () => {
    if (!newItem.material) return;
    const item = { material: newItem.material, cantidad: parseFloat(newItem.cantidad)||0, unidad: newItem.unidad||"UNI", valorNeto: parseFloat(newItem.valorNeto)||0, valorTotal: parseFloat(newItem.valorNeto)||0, local, id:"M"+Date.now() };
    setManual(prev => [...prev, item]);
    setNewItem({ material:"", cantidad:"", unidad:"UNI", valorNeto:"" });
    setShowAddForm(false);
  };

  const deleteManual = (idx) => {
    setManual(prev => prev.filter((_,i)=>i!==idx));
  };

  const fuenteLabel = tieneERP
    ? (tab==="mermas" && dataMermasERP.length>0 ? "📤 Desde ERP" : (tab==="colaciones" && dataColacERP.length>0 ? "📤 Desde ERP" : "✏️ Ingreso manual"))
    : "✏️ Ingreso manual";
  const esERP = fuenteLabel.includes("ERP");

  return (
    <div style={{paddingBottom:80}}>
      {/* Header */}
      <Card style={{marginBottom:12}}>
        <div style={{fontFamily:"Nunito",fontWeight:900,fontSize:15,color:m.color,marginBottom:12}}>📉 Mermas & Colaciones</div>
        <Field label="Local">
          <select value={local} onChange={e=>setLocal(e.target.value)}>
            {localesMarca.map(l=><option key={l} value={l}>{nombreCortoLocal(l)}</option>)}
          </select>
        </Field>

        {/* Importar informe costo teórico */}
        <div style={{marginTop:10,background:"#F8FAFC",borderRadius:10,padding:10}}>
          <div style={{fontSize:11,fontWeight:800,color:"#475569",fontFamily:"Nunito",marginBottom:4}}>📊 Informe Costo Teórico ERP</div>
          {costoTeo ? (
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontSize:10,color:"#16A34A",fontWeight:700,fontFamily:"Nunito"}}>✅ {costoTeo.archivo}</div>
                <div style={{fontSize:10,color:"#64748B"}}>{costoTeo.fecha} · {(costoTeo.mermas?.length||0)} mermas · {(costoTeo.colaciones?.length||0)} colaciones</div>
              </div>
              <label style={{background:m.color+"20",color:m.color,borderRadius:8,padding:"4px 10px",fontSize:11,fontWeight:800,fontFamily:"Nunito",cursor:"pointer"}}>
                🔄<input type="file" accept=".xlsx,.xls,.xls" style={{display:"none"}} onChange={handleCostoTeoFile}/>
              </label>
            </div>
          ) : (
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:11,color:"#64748B",marginBottom:6,fontFamily:"Nunito"}}>
                Importa el <b>Informe de Costo Teórico con Detalle</b> para cargar mermas y colaciones automáticamente
              </div>
              {loadingCT ? <div style={{color:m.color,fontSize:12}}>⏳ Procesando...</div> : (
                <label style={{display:"inline-block",background:m.color,color:"#fff",borderRadius:10,padding:"7px 16px",fontFamily:"Nunito",fontWeight:800,fontSize:12,cursor:"pointer"}}>
                  📤 Importar Costo Teórico ERP
                  <input type="file" accept=".xlsx,.xls" style={{display:"none"}} onChange={handleCostoTeoFile}/>
                </label>
              )}
              {ctError && <div style={{color:"#EF4444",fontSize:11,marginTop:6}}>{ctError}</div>}
            </div>
          )}
        </div>
      </Card>

      {/* Tabs mermas / colaciones */}
      <div style={{display:"flex",gap:6,marginBottom:12}}>
        {[{id:"mermas",icon:"📉",label:"Mermas"},{id:"colaciones",icon:"🍽️",label:"Colaciones"}].map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)}
            style={{flex:1,background:tab===t.id?m.color:"#F1F5F9",color:tab===t.id?"#fff":"#475569",border:"none",borderRadius:10,padding:"9px 0",fontFamily:"Nunito",fontWeight:800,fontSize:12,cursor:"pointer"}}>
            {t.icon} {t.label}
          </button>
        ))}
      </div>

      {/* Resumen */}
      <Card style={{marginBottom:10,background:m.bg}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:11,color:"#64748B",fontFamily:"Nunito"}}>{tab==="mermas"?"Total mermas":"Total colaciones"} · {fuenteLabel}</div>
            <div style={{fontSize:20,fontWeight:900,fontFamily:"Nunito",color:m.color}}>{fmtM(totalValor)}</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:11,color:"#64748B",fontFamily:"Nunito"}}>Ítems</div>
            <div style={{fontSize:20,fontWeight:900,fontFamily:"Nunito",color:"#1E293B"}}>{filtered.length}</div>
          </div>
        </div>
      </Card>

      {/* Controles */}
      <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap"}}>
        <div style={{flex:1,background:"#F1F5F9",borderRadius:10,padding:"7px 12px",display:"flex",alignItems:"center",gap:6}}>
          <span style={{color:"#94A3B8"}}>🔍</span>
          <input value={filtro} onChange={e=>setFiltro(e.target.value)} placeholder="Buscar material..."
            style={{border:"none",background:"transparent",fontFamily:"Nunito",fontSize:12,flex:1,outline:"none"}}/>
        </div>
        <select value={ordenar} onChange={e=>setOrdenar(e.target.value)}
          style={{border:"1px solid #E2E8F0",borderRadius:10,padding:"7px 12px",fontFamily:"Nunito",fontSize:12,color:"#475569",background:"#fff"}}>
          <option value="valor">Ordenar: Mayor impacto</option>
          <option value="material">Ordenar: A-Z</option>
        </select>
      </div>

      {/* Agregar manual */}
      {!esERP && (
        <div style={{marginBottom:10}}>
          {!showAddForm ? (
            <button onClick={()=>setShowAddForm(true)}
              style={{width:"100%",background:m.color+"15",color:m.color,border:"2px dashed "+m.color+"40",borderRadius:12,padding:"10px",fontFamily:"Nunito",fontWeight:800,fontSize:12,cursor:"pointer"}}>
              + Agregar {tab==="mermas"?"merma":"colación"} manual
            </button>
          ) : (
            <Card style={{border:"2px solid "+m.color+"30"}}>
              <div style={{fontFamily:"Nunito",fontWeight:800,fontSize:13,color:m.color,marginBottom:10}}>➕ Nuevo registro</div>
              <Field label="Material"><input value={newItem.material} onChange={e=>setNewItem(p=>({...p,material:e.target.value}))} placeholder="Nombre del material" style={{width:"100%",border:"1px solid #E2E8F0",borderRadius:8,padding:"7px 10px",fontFamily:"Nunito",fontSize:12}}/></Field>
              <div style={{display:"flex",gap:8}}>
                <Field label="Cantidad" style={{flex:1}}><input type="number" value={newItem.cantidad} onChange={e=>setNewItem(p=>({...p,cantidad:e.target.value}))} style={{width:"100%",border:"1px solid #E2E8F0",borderRadius:8,padding:"7px 10px",fontFamily:"Nunito",fontSize:12}}/></Field>
                <Field label="Unidad" style={{flex:1}}><input value={newItem.unidad} onChange={e=>setNewItem(p=>({...p,unidad:e.target.value}))} placeholder="UNI" style={{width:"100%",border:"1px solid #E2E8F0",borderRadius:8,padding:"7px 10px",fontFamily:"Nunito",fontSize:12}}/></Field>
              </div>
              <Field label="Valor neto ($)"><input type="number" value={newItem.valorNeto} onChange={e=>setNewItem(p=>({...p,valorNeto:e.target.value}))} placeholder="0" style={{width:"100%",border:"1px solid #E2E8F0",borderRadius:8,padding:"7px 10px",fontFamily:"Nunito",fontSize:12}}/></Field>
              <div style={{display:"flex",gap:8,marginTop:8}}>
                <Btn full color={m.color} onClick={addManual}>✅ Guardar</Btn>
                <Btn full outline color={m.color} onClick={()=>setShowAddForm(false)}>Cancelar</Btn>
              </div>
            </Card>
          )}
        </div>
      )}

      {/* Lista */}
      {filtered.length === 0 ? (
        <Card><div style={{textAlign:"center",color:"#94A3B8",padding:20,fontFamily:"Nunito",fontSize:12}}>
          {costoTeo ? "Sin datos para este local en el período cargado" : "Sin datos. Importa el informe ERP o agrega registros manualmente."}
        </div></Card>
      ) : (
        filtered.map((it, idx) => {
          const valor = it.valorTotal || it.valorNeto || 0;
          const pct = totalValor > 0 ? valor / totalValor : 0;
          return (
            <Card key={it.id||idx} style={{marginBottom:6}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
                <div style={{flex:1}}>
                  <div style={{fontFamily:"Nunito",fontWeight:800,fontSize:12,color:"#1E293B"}}>{it.material}</div>
                  {it.canal && <div style={{fontSize:10,color:"#94A3B8"}}>{it.canal}</div>}
                </div>
                <div style={{textAlign:"right",flexShrink:0,marginLeft:8}}>
                  <div style={{fontFamily:"Nunito",fontWeight:900,fontSize:13,color:valor>0?"#EF4444":"#64748B"}}>{fmtM(valor)}</div>
                  <div style={{fontSize:10,color:"#94A3B8"}}>{it.cantidad} {it.unidad}</div>
                </div>
              </div>
              {/* Barra impacto */}
              <div style={{background:"#F1F5F9",borderRadius:4,height:4,marginBottom:4}}>
                <div style={{width:(pct*100)+"%",height:"100%",background: tab==="mermas"?"#EF4444":m.color,borderRadius:4}}/>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{fontSize:10,color:"#94A3B8"}}>{(pct*100).toFixed(1)}% del total</div>
                {!esERP && (
                  <button onClick={()=>deleteManual(idx)}
                    style={{background:"#FEF2F2",color:"#EF4444",border:"none",borderRadius:6,padding:"3px 8px",fontSize:10,cursor:"pointer",fontFamily:"Nunito",fontWeight:700}}>
                    🗑️
                  </button>
                )}
              </div>
            </Card>
          );
        })
      )}
    </div>
  );
}

// ── Food Cost Section (contenedor principal) ──────────────────────────────────
function FoodCostSection({ marca, desviaciones, setDesviaciones, planillas, setPlanillas, ventas }) {
  const [tab, setTab] = useState("dashboard");
  const m = MARCAS[marca] || MARCAS[Object.keys(MARCAS)[0]] || { color: "#6C63FF", bg: "#F0EEFF", emoji: "🌭", textColor: "#fff", nombre: "—" };
  const tabs = [
    { id: "dashboard",    icon: "📊", label: "Dashboard"      },
    { id: "costoreal",    icon: "💰", label: "Costo Real"     },
    { id: "cargar",       icon: "📤", label: "Cargar"         },
    { id: "produccion",   icon: "🍳", label: "Producción"     },
    { id: "pedidos",      icon: "🚚", label: "Pedidos"        },
    { id: "mermas",       icon: "📉", label: "Mermas"         },
    { id: "desviaciones", icon: "📋", label: "Desviaciones"   },
    { id: "inventario",   icon: "📦", label: "Inventario IA"  },
  ];
  return (
    <div>
      <div style={{ display:"flex", gap:5, marginBottom:14, background:"#fff", borderRadius:14, padding:5, boxShadow:"0 2px 8px rgba(0,0,0,0.06)", overflowX:"auto" }}>
        {tabs.map(t => (
          <button key={t.id} onClick={()=>setTab(t.id)}
            style={{ flex:"0 0 auto", background: tab===t.id ? m.color : "transparent", color: tab===t.id ? "#fff" : "#64748B", border:"none", borderRadius:10, padding:"8px 12px", fontFamily:"Nunito", fontWeight:800, fontSize:12, cursor:"pointer", transition:"all .18s", display:"flex", alignItems:"center", gap:5, whiteSpace:"nowrap" }}>
            {t.icon} {t.label}
          </button>
        ))}
      </div>
      {tab === "dashboard"    && <DashboardFoodCost    marca={marca} planillas={planillas} />}
      {tab === "costoreal"    && <CostoRealModule      marca={marca} ventas={ventas} />}
      {tab === "cargar"       && <CargarPlanillaCostos marca={marca} planillas={planillas} setPlanillas={setPlanillas} />}
      {tab === "produccion"   && <ParProduccion        marca={marca} />}
      {tab === "pedidos"      && <SugerenciaPedidos    marca={marca} />}
      {tab === "mermas"       && <MermasColaciones     marca={marca} />}
      {tab === "desviaciones" && <Desviaciones         marca={marca} desviaciones={desviaciones} setDesviaciones={setDesviaciones} />}
      {tab === "inventario"   && <InventarioIA         marca={marca} />}
    </div>
  );
}



// ══════════════════════════════════════════════════════════════════════════════
// APP ROOT
// ══════════════════════════════════════════════════════════════════════════════
function App() {
  const [page, setPage]         = useState("dashboard");
  const [marca, setMarca]       = useStorage(KEYS.marca, "doggis");
  const [dark, setDark]         = useDarkMode();
  const [ventas, setVentas]     = useSupabase(KEYS.ventas, []);
  const [kpis, setKpis]         = useSupabase(KEYS.kpi, []);
  const [invs, setInvs]         = useStorage(KEYS.inv, []);
  const [metas, setMetas]       = useSupabase(KEYS.metas, []);
  const [metasd, setMetasd]     = useSupabase(KEYS.metasd, []);
  const [desviaciones, setDesv] = useSupabase("horreo_desviaciones", []);
  const [planillas, setPlanillas] = useSupabase("horreo_planillas_costos", []);
  const [syncLog, setSyncLog]   = useStorage(KEYS.syncLog, []);
  const [config, setConfig]     = useStorage("horreo_config", { appsScriptUrl: "", sheetId: "", supabaseUrl: "", supabaseKey: "" });
  const [semanas, setSemanas]   = useStorage("horreo_labor_semanas", []);
  const [heSolicitudes, setHeSolicitudes] = useSupabase(KEYS.heSol, []);
  const [importOpen, setImportOpen] = useState(false);
  const [session, setSession]   = useState(() => getSession());
  const [syncing, setSyncing]   = useState(false);
  const sbActivo                = useSBStatus();

  // Setters para sync manual
  const syncSetters = {
    [KEYS.ventas]:             setVentas,
    [KEYS.kpi]:                setKpis,
    [KEYS.metas]:              setMetas,
    [KEYS.metasd]:             setMetasd,
    "horreo_desviaciones":     setDesv,
    "horreo_planillas_costos": setPlanillas,
    [KEYS.heSol]:              setHeSolicitudes,
  };

  const handleSync = async () => {
    if (!sbActivo) return;
    setSyncing(true);
    await syncDesdeSupabase(syncSetters);
    setSyncing(false);
  };

  // Cuando se guarda config nueva con Supabase, resetear el cliente
  const handleSetConfig = useCallback(cfg => {
    setConfig(cfg);
    resetSB();
  }, []);

  // Si la marca del usuario no incluye la marca actual, cambiar a la primera permitida
  useEffect(() => {
    if (session && session.marcas && !session.marcas.includes(marca)) {
      setMarca(session.marcas[0]);
    }
  }, [session]);

  // Normalizar marca: si el valor guardado no existe en MARCAS, resetear a la primera válida
  useEffect(() => {
    if (!MARCAS[marca]) {
      const fallback = (session?.marcas || []).find(m => MARCAS[m]) || Object.keys(MARCAS)[0];
      if (fallback) setMarca(fallback);
    }
  }, [marca]);

  // Reparar marca en ventas y kpis cuyos registros tengan marca incorrecta o faltante
  // (puede ocurrir si los datos fueron importados con una versión anterior)
  useEffect(() => {
    // Construir mapa local -> marca desde LOCALES_DATA
    const localAMarca = {};
    LOCALES_DATA.forEach(l => { if (l.marca) localAMarca[l.nombre.toLowerCase()] = l.marca; });
    const reparar = (registros) => {
      let cambios = false;
      const reparados = registros.map(r => {
        const marcaCorrecta = localAMarca[r.local?.toLowerCase()];
        if (marcaCorrecta && r.marca !== marcaCorrecta) { cambios = true; return { ...r, marca: marcaCorrecta }; }
        return r;
      });
      return cambios ? reparados : null;
    };
    const ventasRep = reparar(ventas);
    if (ventasRep) { console.log("[Reparar] Corrigiendo marca en ventas"); setVentas(ventasRep); }
    const kpisRep = reparar(kpis);
    if (kpisRep) { console.log("[Reparar] Corrigiendo marca en kpis"); setKpis(kpisRep); }
  }, []); // solo al montar

  const handleLogin = (u) => { setSession(u); };
  const handleLogout = () => { clearSession(); setSession(null); setPage("dashboard"); };

  if (!session) return <Login onLogin={handleLogin} />;

  const permisos = ROL_PERMISOS[session.rol] || ROL_PERMISOS.operador;
  const navVisible = NAVITEMS.filter(n => permisos.includes(n.id));
  const pageActual = permisos.includes(page) ? page : "dashboard";

  const totalRegistros = ventas.length + kpis.length;

  const renderPage = () => {
    switch(pageActual) {
      case "dashboard":  return <Dashboard ventas={ventas} kpis={kpis} inventarios={invs} metas={metas} metasDiarias={metasd} marca={marca} planillas={planillas} semanas={semanas} />;
      case "ventas":     return <FormVentas ventas={ventas} setVentas={setVentas} metasDiarias={metasd} metas={metas} syncLog={syncLog} setSyncLog={setSyncLog} marca={marca} config={config} />;
      case "he":         return <HorasExtra ventas={ventas} marca={marca} solicitudes={heSolicitudes} setSolicitudes={setHeSolicitudes} session={session} />;
      case "labor":      return <ControlLabor marca={marca} ventas={ventas} solicitudes={heSolicitudes} semanas={semanas} setSemanas={setSemanas} />;
      case "foodcost":   return <FoodCostSection marca={marca} desviaciones={desviaciones} setDesviaciones={setDesv} planillas={planillas} setPlanillas={setPlanillas} ventas={ventas} />;
      case "kpi":        return <FormKPI kpis={kpis} setKpis={setKpis} syncLog={syncLog} setSyncLog={setSyncLog} marca={marca} config={config} />;
      case "importar":   return <Importar setVentas={setVentas} setMetas={setMetas} setMetasd={setMetasd} setKpis={setKpis} marca={marca} />;
      case "historial":  return <Historial ventas={ventas} kpis={kpis} inventarios={invs} setVentas={setVentas} setKpis={setKpis} setInventarios={setInvs} marca={marca} semanas={semanas} setSemanas={setSemanas} planillas={planillas} setPlanillas={setPlanillas} session={session} />;
      case "config":     return <Config config={config} setConfig={handleSetConfig} />;
      default:           return <Dashboard ventas={ventas} kpis={kpis} inventarios={invs} metas={metas} metasDiarias={metasd} marca={marca} planillas={planillas} semanas={semanas} />;
    }
  };

  const mc = MARCAS[marca] || MARCAS[Object.keys(MARCAS)[0]] || { color: "#6C63FF", bg: "#F0EEFF", emoji: "🌭", textColor: "#fff" };

  return (
    <>
      <GS />
      <MailModal />
      <CSVModal />
      <ShareModal />

      {/* ── Modal Importar centralizado ── */}
      {importOpen && (
        <div style={{ position:"fixed", inset:0, zIndex:500, background:"rgba(0,0,0,0.5)", display:"flex", alignItems:"flex-end", justifyContent:"center" }}
          onClick={e => { if(e.target===e.currentTarget) setImportOpen(false); }}>
          <div style={{ background:"#F4F6FA", borderRadius:"20px 20px 0 0", width:"100%", maxWidth:680, maxHeight:"90vh", overflowY:"auto", padding:"16px 16px 0" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
              <div style={{ fontFamily:"Nunito", fontWeight:900, fontSize:16 }}>📥 Importar datos</div>
              <button onClick={()=>setImportOpen(false)} style={{ background:"#F1F5F9", border:"none", borderRadius:10, padding:"6px 14px", fontFamily:"Nunito", fontWeight:700, fontSize:13, color:"#64748B", cursor:"pointer" }}>✕ Cerrar</button>
            </div>
            <Importar setVentas={setVentas} setMetas={setMetas} setMetasd={setMetasd} setKpis={setKpis} marca={marca} onDone={()=>setImportOpen(false)} />
          </div>
        </div>
      )}

      <div style={{ maxWidth:680, margin:"0 auto", padding:"14px var(--pad-x,14px) 0", minHeight:"100vh", background:"var(--bg)", transition:"background .25s" }} className="content-safe content-wrap">
        {/* Header con usuario y logout */}
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
          <MarcaSelector marca={marca} setMarca={m => { if(session.marcas.includes(m)) setMarca(m); }} session={session} />
          <div style={{ display:"flex", alignItems:"center", gap:6, flexShrink:0 }}>
            {/* Dark mode toggle */}
            <button onClick={() => setDark(d => !d)} title={dark?"Modo claro":"Modo oscuro"}
              style={{ background:"var(--bg-card)", border:"1.5px solid var(--border)", borderRadius:8, padding:"5px 8px", fontSize:15, cursor:"pointer", lineHeight:1, minHeight:32 }}>
              {dark ? "☀️" : "🌙"}
            </button>
            <div style={{ fontFamily:"Nunito", fontWeight:700, fontSize:10, color:"var(--text-3)", textAlign:"right", lineHeight:1.3 }}>
              <div style={{ color:mc.color }}>{session.nombre}</div>
              <div style={{ textTransform:"uppercase", fontSize:9, letterSpacing:.5 }}>{session.rol}</div>
            </div>
            <button onClick={handleLogout} title="Cerrar sesión"
              style={{ background:"var(--bg-card)", border:"1.5px solid var(--border)", borderRadius:8, padding:"5px 9px", fontFamily:"Nunito", fontWeight:700, fontSize:11, color:"var(--text-3)", cursor:"pointer" }}>
              ↩
            </button>
          </div>
        </div>

        <div style={{ display: "flex", justifyContent: "space-between", alignItems:"center", gap: 6, marginBottom: 14, marginTop: -4 }}>
          <div style={{ display:"flex", gap:6 }}>
            {permisos.includes("importar") && (
              <button onClick={()=>setImportOpen(true)} style={{ background:"#F59E0B", border:"none", borderRadius:10, padding:"6px 12px", fontFamily:"Nunito", fontWeight:800, fontSize:12, color:"#fff", cursor:"pointer", display:"flex", alignItems:"center", gap:4 }}>
                📥 Importar
              </button>
            )}
            {sbActivo && (
              <button onClick={handleSync} disabled={syncing}
                style={{ background: syncing ? "#E2E8F0" : "#10B981", border:"none", borderRadius:10, padding:"6px 12px", fontFamily:"Nunito", fontWeight:800, fontSize:12, color: syncing?"#94A3B8":"#fff", cursor: syncing?"not-allowed":"pointer", display:"flex", alignItems:"center", gap:4, transition:"all .2s" }}>
                {syncing ? "⏳" : "☁️"} {syncing ? "Sync..." : "Sync"}
              </button>
            )}
          </div>
          <div style={{ display:"flex", gap:5, alignItems:"center" }}>
            <Badge text={`${totalRegistros} reg`} color="#6C63FF" small />
            <div style={{ display:"flex", alignItems:"center", gap:4, background: sbActivo?"#F0FDF4":"#F8FAFC", borderRadius:8, padding:"3px 8px", border:`1px solid ${sbActivo?"#86EFAC":"#E2E8F0"}` }}>
              <div style={{ width:6, height:6, borderRadius:"50%", background: sbActivo?"#22C55E":"#CBD5E1", boxShadow: sbActivo?"0 0 4px #22C55E":undefined }} />
              <span style={{ fontFamily:"Nunito", fontWeight:700, fontSize:9, color: sbActivo?"#16A34A":"#94A3B8" }}>{sbActivo ? "EN LÍNEA" : "LOCAL"}</span>
            </div>
          </div>
        </div>
        {renderPage()}
      </div>
      <InstallBanner />
      <Nav active={pageActual} onChange={setPage} marca={marca} items={navVisible} />
    </>
  );
}


    // ── MOUNT ──────────────────────────────────────────────────────────────────
    class ErrorBoundary extends React.Component {
      constructor(p) { super(p); this.state = { err: null }; }
      static getDerivedStateFromError(e) { return { err: e }; }
      render() {
        if (this.state.err) return React.createElement('div', {
          style: { padding: 30, fontFamily: 'monospace', background: '#FEF2F2', color: '#DC2626', margin: 20, borderRadius: 12, fontSize: 13 }
        }, '❌ Error en la app: ' + this.state.err.message + '\n\n' + this.state.err.stack);
        return this.props.children;
      }
    }
    const container = document.getElementById("root");
    const root = ReactDOM.createRoot(container);
    root.render(React.createElement(ErrorBoundary, null, React.createElement(App)));
  </script>
</body>
</html>
