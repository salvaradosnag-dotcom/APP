                        {vA!==null&&<div style={{fontFamily:"Nunito",fontSize:10,fontWeight:800,color:m.color}}>{typeof vA==="number"?vA.toFixed(2):vA} <span style={{fontWeight:400,color:"#94A3B8"}}>{u}</span></div>}
                        {vB!==null&&<div style={{fontFamily:"Nunito",fontSize:10,fontWeight:700,color:"#6C63FF"}}>{typeof vB==="number"?vB.toFixed(2):vB} <span style={{fontWeight:400,color:"#94A3B8"}}>{u}</span></div>}
                        {vA===null&&vB===null&&<div style={{fontFamily:"Nunito",fontSize:10,color:"#CBD5E1"}}>—</div>}
                      </div>
                    ))}
                  </div>

                  {/* Stock e inventarios si disponibles */}
                  {(r.a?.inv_final || r.b?.inv_final) && (
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginTop:6}}>
                      {[{l:"Inv. Final",kA:"inv_final",kB:"inv_final"},{l:"Compras",kA:"compras",kB:"compras"}].map(({l,kA,kB})=>(
                        <div key={l} style={{background:"#fff",borderRadius:8,padding:"6px 8px"}}>
                          <div style={{fontFamily:"Nunito",fontSize:8,color:"#94A3B8",fontWeight:700,marginBottom:2}}>{l}</div>
                          <div style={{display:"flex",gap:8}}>
                            {r.a?.[kA]!=null&&<span style={{fontFamily:"Nunito",fontSize:10,fontWeight:700,color:m.color}}>{r.a[kA].toFixed(2)}</span>}
                            {r.a?.[kA]!=null&&r.b?.[kB]!=null&&<span style={{color:"#CBD5E1"}}>→</span>}
                            {r.b?.[kB]!=null&&<span style={{fontFamily:"Nunito",fontSize:10,fontWeight:700,color:"#6C63FF"}}>{r.b[kB].toFixed(2)}</span>}
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </details>
            );
          })}
        </>
      )}
    </div>
  );
}

function DesviacionesHistorico({ dataMarca, marca, m, fmtVal, fmtNum }) {
  const mesesDisp = [...new Set(dataMarca.map(d => d.fecha.slice(0, 7)))].sort().reverse();
  const [mesSel, setMesSel] = useState(mesesDisp[0] || today().slice(0, 7));
  const [localSel, setLocalSel] = useState("Todos");
  const [jerarquiaSel, setJerSel] = useState("todas");
  const [ordenar, setOrdenar] = useState("impacto"); // impacto | material | tendencia

  const localesMes = useMemo(() =>
    ["Todos", ...new Set(dataMarca.filter(d => d.fecha.slice(0,7) === mesSel).map(d => d.local))],
    [dataMarca, mesSel]);

  const datosMes = useMemo(() =>
    dataMarca.filter(d =>
      d.fecha.slice(0, 7) === mesSel &&
      (localSel === "Todos" || d.local === localSel)),
    [dataMarca, mesSel, localSel]);

  // Jerarquías disponibles para ese mes
  const jerarquias = useMemo(() => ["todas", ...new Set(datosMes.map(d => d.jerarquia))], [datosMes]);

  // Agrupar por material — acumular desviaciones de distintas fechas del mes
  const acumulado = useMemo(() => {
    const map = {};
    datosMes
      .filter(d => jerarquiaSel === "todas" || d.jerarquia === jerarquiaSel)
      .forEach(d => {
        const key = d.material + "__" + d.jerarquia;
        if (!map[key]) map[key] = { material: d.material, jerarquia: d.jerarquia, unidad: d.unidad, desv_valor_total: 0, desviacion_total: 0, apariciones: 0, fechas: [], cons_real: 0, cons_teo: 0 };
        map[key].desv_valor_total += d.desv_valor;
        map[key].desviacion_total += d.desviacion;
        map[key].cons_real += d.cons_real;
        map[key].cons_teo  += d.cons_teo;
        map[key].apariciones++;
        map[key].fechas.push({ fecha: d.fecha, local: d.local, desv_valor: d.desv_valor, desviacion: d.desviacion });
      });
    return Object.values(map);
  }, [datosMes, jerarquiaSel]);

  const ordenados = useMemo(() => {
    const arr = [...acumulado];
    if (ordenar === "impacto")    return arr.sort((a, b) => Math.abs(b.desv_valor_total) - Math.abs(a.desv_valor_total));
    if (ordenar === "material")   return arr.sort((a, b) => a.material.localeCompare(b.material));
    if (ordenar === "tendencia")  return arr.sort((a, b) => b.desv_valor_total - a.desv_valor_total); // mayor sobrante arriba
    return arr;
  }, [acumulado, ordenar]);

  // Resumen del mes — usa datosMes directo para totales sin distorsión de filtro jerarquía
  const resumenMes = useMemo(() => {
    // Agrupar sin filtro de jerarquía para el total correcto
    const mapTotal = {};
    datosMes.forEach(d => {
      const k = d.material + "__" + d.jerarquia;
      if (!mapTotal[k]) mapTotal[k] = 0;
      mapTotal[k] += d.desv_valor;
    });
    const totales = Object.values(mapTotal);
    return {
      totalVal:   totales.reduce((s, v) => s + v, 0),
      criticos:   totales.filter(v => Math.abs(v) >= 50000).length,
      materiales: totales.length,
      sobrantes:  totales.filter(v => v > 0).length,
      faltantes:  totales.filter(v => v < 0).length,
      fechas:     [...new Set(datosMes.map(d => d.fecha))].sort(),
    };
  }, [datosMes]);

  const fmtV = v => (v >= 0 ? "+" : "") + "$" + Math.round(Math.abs(v)).toLocaleString("es-CL");
  const fmtN = v => (v >= 0 ? "+" : "") + (typeof v === "number" ? v.toFixed(2) : v);

  if (mesesDisp.length === 0) return (
    <Card><div style={{ textAlign: "center", color: "#94A3B8", padding: 30 }}>Sin datos históricos — carga informes primero</div></Card>
  );

  return (
    <div>
      {/* Filtros */}
      <Card style={{ marginBottom: 12 }}>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 10 }}>
          <Field label="Mes">
            <select value={mesSel} onChange={e => setMesSel(e.target.value)} style={{ fontSize: 12 }}>
              {mesesDisp.map(m => <option key={m} value={m}>{m}</option>)}
            </select>
          </Field>
          <Field label="Local">
            <select value={localSel} onChange={e => setLocalSel(e.target.value)} style={{ fontSize: 12 }}>
              {localesMes.map(l => <option key={l}>{l}</option>)}
            </select>
          </Field>
          <Field label="Categoría" col={2}>
            <select value={jerarquiaSel} onChange={e => setJerSel(e.target.value)} style={{ fontSize: 12 }}>
              {jerarquias.map(j => <option key={j} value={j}>{j === "todas" ? "Todas las categorías" : j}</option>)}
            </select>
          </Field>
        </div>
        <div style={{ display: "flex", gap: 6 }}>
          {[["impacto","💰 Mayor impacto"],["material","🔤 A-Z"],["tendencia","📈 Sobrante→Faltante"]].map(([k,l]) => (
            <button key={k} onClick={() => setOrdenar(k)} style={{ flex: 1, background: ordenar === k ? m.color : "#F8FAFC", border: `1.5px solid ${ordenar === k ? m.color : "#E2E8F0"}`, borderRadius: 8, padding: "6px 4px", fontSize: 10, fontWeight: 700, fontFamily: "Nunito", color: ordenar === k ? "#fff" : "#64748B", cursor: "pointer" }}>{l}</button>
          ))}
        </div>
      </Card>

      {/* KPIs del mes */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 12 }}>
        {[
          ["Impacto Total",  fmtV(resumenMes.totalVal),  resumenMes.totalVal < 0 ? m.color : "#22C55E", "💰"],
          ["Críticos",       resumenMes.criticos + " items", "#EF4444", "🔴"],
          ["Sobrantes",      resumenMes.sobrantes, "#22C55E", "📈"],
          ["Faltantes",      resumenMes.faltantes, "#EF4444", "📉"],
        ].map(([l,v,c,ic]) => (
          <Card key={l} style={{ position: "relative", overflow: "hidden", padding: 14 }}>
            <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 3, background: c }} />
            <div style={{ fontSize: 18, marginBottom: 2 }}>{ic}</div>
            <div style={{ fontSize: 9, color: "#94A3B8", fontWeight: 700, textTransform: "uppercase", letterSpacing: .8 }}>{l}</div>
            <div style={{ fontSize: 20, fontFamily: "Nunito", fontWeight: 900, color: c }}>{v}</div>
          </Card>
        ))}
      </div>

      {/* Fechas cargadas en el mes */}
      {resumenMes.fechas.length > 0 && (
        <div style={{ display: "flex", gap: 4, flexWrap: "wrap", marginBottom: 12 }}>
          {resumenMes.fechas.map(f => (
            <span key={f} style={{ background: m.color + "15", color: m.color, border: `1px solid ${m.color}33`, borderRadius: 8, padding: "2px 8px", fontSize: 10, fontWeight: 700, fontFamily: "Nunito" }}>{f}</span>
          ))}
          <span style={{ color: "#94A3B8", fontSize: 10, alignSelf: "center" }}>{resumenMes.fechas.length} informe{resumenMes.fechas.length > 1 ? "s" : ""} · {resumenMes.materiales} materiales</span>
        </div>
      )}

      {/* Lista acumulada */}
      {ordenados.length === 0
        ? <Card><div style={{ textAlign: "center", color: "#94A3B8", padding: 20 }}>Sin datos para este filtro</div></Card>
        : ordenados.map((item, idx) => {
          const sev = Math.abs(item.desv_valor_total) >= 50000 ? "alta" : Math.abs(item.desv_valor_total) >= 15000 ? "media" : "baja";
          const [expanded, setExpanded] = [false, () => {}]; // simple version
          return (
            <details key={item.material + idx} style={{ marginBottom: 8 }}>
              <summary style={{ background: SEV_BG[sev], border: `1.5px solid ${SEV_COLOR[sev]}44`, borderRadius: 12, padding: "10px 12px", cursor: "pointer", listStyle: "none", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 13, fontWeight: 700, fontFamily: "Nunito", color: "#1A1D2E" }}>{item.material}</div>
                  <div style={{ fontSize: 10, color: "#94A3B8" }}>{item.jerarquia} · {item.unidad} · {item.apariciones} informe{item.apariciones > 1 ? "s" : ""}</div>
                </div>
                <div style={{ textAlign: "right", flexShrink: 0, marginLeft: 8 }}>
                  <div style={{ fontSize: 14, fontWeight: 800, fontFamily: "Nunito", color: item.desv_valor_total < 0 ? m.color : "#22C55E" }}>{fmtV(item.desv_valor_total)}</div>
                  <div style={{ fontSize: 10, color: SEV_COLOR[sev], fontWeight: 700 }}>{fmtN(item.desviacion_total)} {item.unidad} total</div>
                </div>
              </summary>
              <div style={{ background: "#F8FAFC", borderRadius: "0 0 12px 12px", padding: "10px 12px", border: `1px solid ${SEV_COLOR[sev]}22`, borderTop: "none" }}>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 6, marginBottom: 8 }}>
                  {[["Cons. Real", item.cons_real.toFixed(2)+" "+item.unidad, "#1A1D2E"],["Cons. Teórico", item.cons_teo.toFixed(2)+" "+item.unidad, "#64748B"],["Diferencia", fmtN(item.desviacion_total)+" "+item.unidad, SEV_COLOR[sev]]].map(([l,v,c]) => (
                    <div key={l} style={{ background: "#fff", borderRadius: 8, padding: "6px 8px" }}>
                      <div style={{ fontSize: 9, color: "#94A3B8" }}>{l}</div>
                      <div style={{ fontSize: 11, fontWeight: 700, fontFamily: "Nunito", color: c }}>{v}</div>
                    </div>
                  ))}
                </div>
                <div style={{ fontSize: 10, color: "#64748B", fontWeight: 700, marginBottom: 4 }}>Desglose por fecha:</div>
                {item.fechas.sort((a,b) => a.fecha > b.fecha ? 1 : -1).map((f, fi) => (
                  <div key={fi} style={{ display: "flex", justifyContent: "space-between", fontSize: 11, padding: "4px 0", borderBottom: "1px solid #F0F4F8", color: "#1A1D2E" }}>
                    <span>{f.fecha}{f.local && f.local !== localSel ? <span style={{ color: "#94A3B8", marginLeft: 4 }}>· {nombreCortoLocal(f.local)}</span> : ""}</span>
                    <span style={{ fontWeight: 700, fontFamily: "Nunito", color: f.desv_valor < 0 ? m.color : "#22C55E" }}>{fmtV(f.desv_valor)}</span>
                  </div>
                ))}
              </div>
            </details>
          );
        })
      }
    </div>
  );
}

// DESVIACIONES — con useMemo y análisis IA
// ══════════════════════════════════════════════════════════════════════════════
const UMBRAL_ALTO = 50000, UMBRAL_MED = 15000;
const severidad = val => { const v = Math.abs(val); if (v >= UMBRAL_ALTO) return "alta"; if (v >= UMBRAL_MED) return "media"; return "baja"; };
const SEV_COLOR = { alta: "#EF4444", media: "#F59E0B", baja: "#22C55E" };
const SEV_BG    = { alta: "#FEF2F2", media: "#FFFBEB", baja: "#F0FDF4" };
const SEV_LABEL = { alta: "🔴 Crítica", media: "🟡 Media", baja: "🟢 Baja" };

function Desviaciones({ marca, desviaciones, setDesviaciones }) {
  const m = MARCAS[marca] || MARCAS[Object.keys(MARCAS)[0]] || { color: "#6C63FF", bg: "#F0EEFF", emoji: "🌭", textColor: "#fff", nombre: "—" };
  const [tab, setTab]           = useState("cargar");
  const [loading, setLoading]   = useState(false);
  const [error, setError]       = useState("");
  const [filtroSev, setFiltroSev]   = useState("todas");
  const [filtroJer, setFiltroJer]   = useState("todas");
  const [filtroLF, setFiltroLF]     = useState("latest"); // "latest" = último informe cargado
  const [busqueda, setBusqueda]     = useState("");
  const [seleccionadas, setSeleccionadas] = useState(new Set());
  const [solicitudes, setSolicitudes]     = useState([]);
  const [analisisIA, setAnalisisIA]       = useState("");
  const [loadingIA, setLoadingIA]         = useState(false);
  const [modalItem, setModalItem]         = useState(null);
  const [metaLocal, setMetaLocal]         = useState((LOCALES_POR_MARCA[marca] || LOCALES)[0]);
  const [metaFecha, setMetaFecha]         = useState(today());
  const [confirmDelInforme, setConfirmDelInforme] = useState(null);

  useEffect(() => { setMetaLocal((LOCALES_POR_MARCA[marca] || LOCALES)[0]); }, [marca]);

  const pn = v => parseFloat(String(v || 0).replace(",", ".")) || 0;

  const handleFile = async e => {
    const file = e.target.files[0]; if (!file) return;
    setLoading(true); setError("");
    try {
      const XLSX = await loadXLSX();
      // cellText:true + raw:false para que XLSX.js procese inlineStr correctamente
      const wb = XLSX.read(await file.arrayBuffer(), { type: "array", cellText: true, raw: false });
      const ws = wb.Sheets[wb.SheetNames[0]];

      // ── Función para leer valor de una celda (soporta inlineStr, shared strings, números) ──
      // El informe usa t="inlineStr" con <is><t> — cell.v es undefined en ese caso,
      // pero cell.w (formatted text) o cell.h (html) sí tienen el valor.
      const cellVal = cell => {
        if (!cell) return "";
        // inlineStr: el valor está en cell.v (si XLSX lo parseó) o en cell.w
        if (cell.t === "s" || cell.t === "str" || cell.t === "inlineStr") {
          return String(cell.v !== undefined && cell.v !== null ? cell.v : (cell.w || cell.h || "")).trim();
        }
        if (cell.t === "n") return cell.v;   // número
        if (cell.v !== undefined && cell.v !== null) return cell.v;
        return String(cell.w || "").trim();
      };

      const norm = s => String(s || "").toUpperCase().replace(/\s+/g, " ").trim()
                         .normalize("NFD").replace(/[\u0300-\u036f]/g, "");

      const range = ws["!ref"] ? XLSX.utils.decode_range(ws["!ref"]) : { s:{r:0,c:0}, e:{r:50,c:20} };

      // Leer grilla completa como array 2D de valores normalizados
      const grid = [];
      for (let R = range.s.r; R <= range.e.r; R++) {
        const row = [];
        for (let C2 = range.s.c; C2 <= range.e.c; C2++) {
          const cell = ws[XLSX.utils.encode_cell({ r: R, c: C2 })];
          const raw  = cellVal(cell);
          row.push(typeof raw === "number" ? raw : norm(raw));
        }
        grid.push(row);
      }

      // ── Detectar fila de encabezados ──────────────────────────────────────
      const KW = ["MATERIAL","JERARQUIA","CONSUMO","INVENTARIO","COMPRAS","TRASPASO","DESVIACION","UNIDAD","MEDIDA","INICIAL","FINAL"];
      let bestRow = -1, bestHits = 0, bestStartCol = 0;
      for (let i = 0; i < Math.min(grid.length, 20); i++) {
        let hits = 0, firstHit = -1;
        for (let j = 0; j < grid[i].length; j++) {
          const v = String(grid[i][j]);
          if (KW.some(k => v.includes(k))) { hits++; if (firstHit < 0) firstHit = j; }
        }
        if (hits > bestHits) { bestHits = hits; bestRow = i; bestStartCol = Math.max(0, firstHit); }
      }
      if (bestHits < 1) {
        // Fallback: fila 1 (índice 1), primera col no vacía
        if (grid.length >= 2) {
          bestRow = 1;
          bestStartCol = grid[1].findIndex(v => v !== "" && v !== 0) || 0;
        } else throw new Error("Archivo sin datos suficientes.");
      }
      if (bestRow < 0) throw new Error("No se encontraron encabezados en el archivo.");

      const hdrs     = grid[bestRow].slice(bestStartCol);
      const dataRows = grid.slice(bestRow + 1).map(r => r.slice(bestStartCol));

      // ── Mapear columnas ────────────────────────────────────────────────────
      const fc = (...terms) => hdrs.findIndex(h => terms.some(t => String(h).includes(t)));
      const C = {
        jer:   fc("NOMBRE JERARQUIA", "JERARQUIA", "NOMBRE"),
        mat:   fc("MATERIAL"),
        und:   fc("UNIDAD"),
        ini:   fc("INICIAL"),
        com:   fc("COMPRAS"),
        tin:   fc("TRASPASO(IN", "TRASPASO IN"),
        tout:  fc("TRASPASO(OUT", "TRASPASO OUT"),
        fin:   fc("FINAL"),
        creal: -1, cteo: -1, desv: -1, dval: -1,
      };
      // CONSUMO REAL / TEORICO: buscar 1ra y 2da ocurrencia de "CONSUMO"
      const consumoIdxs = hdrs.reduce((acc, h, i) => String(h).includes("CONSUMO") ? [...acc, i] : acc, []);
      if (consumoIdxs.length >= 2) { C.creal = consumoIdxs[0]; C.cteo = consumoIdxs[1]; }
      else if (consumoIdxs.length === 1) C.creal = consumoIdxs[0];
      // DESVIACION vs DESVIACION VALORIZADA
      const desvIdxs = hdrs.reduce((acc, h, i) => String(h).includes("DESVIACION") ? [...acc, i] : acc, []);
      if (desvIdxs.length >= 2) {
        C.desv = desvIdxs[0]; C.dval = desvIdxs[1];
      } else if (desvIdxs.length === 1) {
        if (String(hdrs[desvIdxs[0]]).includes("VALORIZ")) C.dval = desvIdxs[0];
        else C.desv = desvIdxs[0];
      }
      if (C.dval < 0) C.dval = fc("VALORIZ");
      // MATERIAL fallback: col siguiente a jerarquía
      if (C.mat < 0 && C.jer >= 0) C.mat = C.jer + 1;
      if (C.mat < 0) throw new Error(
        "No se encontró columna MATERIAL.\nHeaders: " + hdrs.slice(0,10).map(h=>'"'+h+'"').join(", ") +
        "\nFila header detectada: " + bestRow + " (hits=" + bestHits + ")"
      );

      const parsed = [];
      for (const r of dataRows) {
        const mat = String(C.mat >= 0 ? r[C.mat] : "").trim();
        if (!mat || mat.length < 2) continue;
        if (/^total/i.test(mat) || /^TOTAL/i.test(mat)) continue;
        // Saltar filas que parecen ser solo texto (jerarquía sin datos numéricos)
        const hasNumbers = r.some(c => typeof c === "number" || (typeof c === "string" && !isNaN(parseFloat(c)) && parseFloat(c) !== 0));
        if (!hasNumbers) continue;

        const dval = pn(C.dval >= 0 ? r[C.dval] : 0);
        parsed.push({
          id: uid(),
          jerarquia:   C.jer  >= 0 ? String(r[C.jer]  || "").trim() : "",
          material:    mat,
          unidad:      C.und  >= 0 ? String(r[C.und]  || "").trim() : "",
          inv_inicial: C.ini  >= 0 ? pn(r[C.ini])  : 0,
          compras:     C.com  >= 0 ? pn(r[C.com])  : 0,
          trasp_in:    C.tin  >= 0 ? pn(r[C.tin])  : 0,
          trasp_out:   C.tout >= 0 ? pn(r[C.tout]) : 0,
          inv_final:   C.fin  >= 0 ? pn(r[C.fin])  : 0,
          cons_real:   C.creal >= 0 ? pn(r[C.creal]) : 0,
          cons_teo:    C.cteo  >= 0 ? pn(r[C.cteo])  : 0,
          desviacion:  C.desv >= 0 ? pn(r[C.desv]) : 0,
          desv_valor:  dval,
          severidad:   severidad(dval),
          local: metaLocal, fecha: metaFecha, marca,
          ts: new Date().toISOString(),
        });
      }
      if (!parsed.length) throw new Error("Se encontraron 0 materiales válidos. Headers mapeados: " + JSON.stringify(C));
      setDesviaciones(d => [...d.filter(x => !(x.local === metaLocal && x.fecha === metaFecha && x.marca === marca)), ...parsed]);
      setTab("analisis");
      // Enviar por mail automáticamente al cargar informe
      enviarPorMail({ items: parsed, local: metaLocal, fecha: metaFecha, marca });
    } catch (err) { setError("Error: " + err.message); }
    setLoading(false);
  };

  const dataMarca    = useMemo(() => desviaciones.filter(d => d.marca === marca), [desviaciones, marca]);
  const jerarquias   = useMemo(() => ["todas", ...new Set(dataMarca.map(d => d.jerarquia))], [dataMarca]);
  const localesFecha = useMemo(() => [...new Set(dataMarca.map(d => d.local + "__" + d.fecha))].map(k => ({ local: k.split("__")[0], fecha: k.split("__")[1] })), [dataMarca]);

  // Último informe = el que tiene el ts más reciente
  const ultimoInforme = useMemo(() => {
    if (!dataMarca.length) return null;
    const latest = dataMarca.reduce((a, b) => a.ts > b.ts ? a : b);
    return latest.local + "__" + latest.fecha;
  }, [dataMarca]);

  const dataFiltrada = useMemo(() => {
    const lfKey = filtroLF === "latest" ? ultimoInforme : filtroLF;
    return dataMarca.filter(d => {
      if (lfKey && lfKey !== "todas" && d.local + "__" + d.fecha !== lfKey) return false;
      if (filtroSev !== "todas" && d.severidad !== filtroSev) return false;
      if (filtroJer !== "todas" && d.jerarquia !== filtroJer) return false;
      if (busqueda && !d.material.toLowerCase().includes(busqueda.toLowerCase())) return false;
      return true;
    });
  }, [dataMarca, filtroLF, filtroSev, filtroJer, busqueda, ultimoInforme]);

  const dataOrdenada = useMemo(() => [...dataFiltrada].sort((a, b) => Math.abs(b.desv_valor) - Math.abs(a.desv_valor)), [dataFiltrada]);
  const total_val    = useMemo(() => dataFiltrada.reduce((s, d) => s + d.desv_valor, 0), [dataFiltrada]);
  const criticas     = useMemo(() => dataFiltrada.filter(d => d.severidad === "alta"), [dataFiltrada]);

  const toggleSel = id => setSeleccionadas(s => { const n = new Set(s); n.has(id) ? n.delete(id) : n.add(id); return n; });

  const generarSolicitud = () => {
    const items = dataOrdenada.filter(d => seleccionadas.has(d.id));
    if (!items.length) return;
    setSolicitudes(s => [...s, { id: uid(), ts: new Date().toISOString(), local: items[0].local, fecha: items[0].fecha, items, estado: "pendiente" }]);
    setSeleccionadas(new Set()); setTab("solicitudes");
  };

  const analizarConIA = async () => {
    if (!dataOrdenada.length) return;
    setLoadingIA(true); setAnalisisIA("");
    const resumen = dataOrdenada.slice(0, 15).map(d => `${d.material} (${d.jerarquia}): desv. ${d.desviacion > 0 ? "+" : ""}${d.desviacion.toFixed(2)} ${d.unidad}, valorizado $${Math.round(d.desv_valor).toLocaleString("es-CL")}`).join("\n");
    try {
      const res  = await fetch("https://api.anthropic.com/v1/messages", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 1000, messages: [{ role: "user", content: `Eres analista experto en restaurantes de comida rápida en Chile. Analiza este informe de desviaciones del local ${dataOrdenada[0]?.local || ""} (${MARCAS[marca]?.nombre || marca}) y responde:\n1. Diagnóstico rápido (2 líneas)\n2. Top 3 problemas críticos con causa probable\n3. Ítems que probablemente son error de digitación\n4. 3 recomendaciones concretas\n\nDatos (top 15):\n${resumen}\n\nEspañol, directo y práctico.` }] }) });
      const data = await res.json();
      setAnalisisIA(data.content?.map(i => i.text || "").join("") || "Sin respuesta");
    } catch (e) { setAnalisisIA("Error IA: " + e.message); }
    setLoadingIA(false);
  };

  const fmtVal = v => (v >= 0 ? "+" : "") + "$" + Math.round(Math.abs(v)).toLocaleString("es-CL");
  const fmtNum = v => (v >= 0 ? "+" : "") + v.toFixed(2);

  return (
    <div className="fade" style={{ paddingBottom: 90 }}>
      {confirmDelInforme && (
        <ConfirmModal
          msg={`${confirmDelInforme.local} — ${confirmDelInforme.fecha}`}
          detalle={`${confirmDelInforme.count} registros serán eliminados.`}
          onConfirm={() => {
            setDesviaciones(d => d.filter(x => !(x.local === confirmDelInforme.local && x.fecha === confirmDelInforme.fecha && x.marca === marca)));
              sbDeleteWhere("desviaciones", { local: confirmDelInforme.local, fecha: confirmDelInforme.fecha, marca });
            setConfirmDelInforme(null);
          }}
          onCancel={() => setConfirmDelInforme(null)}
        />
      )}
      <LogoHeader marca={marca} />
      <SectionTitle color={m.color}>📊 Desviaciones de Inventario</SectionTitle>
      <div style={{ display: "flex", gap: 6, marginBottom: 14, overflowX: "auto", paddingBottom: 2 }}>
        {[["cargar","📂 Cargar"],["analisis","🔍 Análisis"],["comparativo","📅 Comparativo"],["solicitudes","✉️ Solicitudes"],["historico","📈 Histórico"]].map(([k,l]) => (
          <Btn key={k} onClick={() => setTab(k)} color={m.color} outline={tab !== k} small>
            {l}{k === "solicitudes" && solicitudes.length > 0 && <span style={{ marginLeft: 4, background: "#EF4444", color: "#fff", borderRadius: 10, padding: "1px 6px", fontSize: 9 }}>{solicitudes.length}</span>}
          </Btn>
        ))}
      </div>

      {tab === "cargar" && (
        <>
          <Card style={{ marginBottom: 12 }}>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              <Field label="Local"><select value={metaLocal} onChange={e => setMetaLocal(e.target.value)}>{(LOCALES_POR_MARCA[marca] || LOCALES).map(l => <option key={l}>{l}</option>)}</select></Field>
              <Field label="Fecha del informe"><input type="date" value={metaFecha} onChange={e => setMetaFecha(e.target.value)} /></Field>
            </div>
          </Card>
          <Card>
            <div style={{ border: `2px dashed ${m.color}55`, borderRadius: 12, padding: 24, textAlign: "center", background: m.color + "08", position: "relative", cursor: "pointer" }}>
              <input type="file" accept=".xlsx,.xls" onChange={handleFile} style={{ position: "absolute", inset: 0, opacity: 0, cursor: "pointer", width: "100%", height: "100%" }} />
              <div style={{ fontSize: 36, marginBottom: 8 }}>📋</div>
              <div style={{ fontSize: 14, fontWeight: 700, color: m.color, fontFamily: "Nunito" }}>{loading ? <span className="pulse">⏳ Procesando...</span> : "Subir Informe de Desviaciones"}</div>
              <div style={{ fontSize: 11, color: "#94A3B8", marginTop: 4 }}>Formato estándar .xlsx</div>
            </div>
            {error && <div style={{ marginTop: 10, background: "#FEF2F2", border: "1px solid #FCA5A5", borderRadius: 8, padding: 10, fontSize: 12, color: "#991B1B" }}>{error}</div>}
          </Card>
          {localesFecha.length > 0 && (
            <Card style={{ marginTop: 12, background: "#F0FDF4", border: "1.5px solid #86EFAC" }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: "#166534", marginBottom: 6 }}>✅ Informes cargados</div>
              {localesFecha.map((lf, i) => {
                const lfItems = dataMarca.filter(d => d.local === lf.local && d.fecha === lf.fecha);
                return (
                  <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 12, padding: "8px 0", borderBottom: "1px solid #DCFCE7", gap: 6 }}>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontWeight: 700, fontSize: 11, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{lf.local}</div>
                      <div style={{ color: "#94A3B8", fontSize: 10 }}>{lf.fecha} · {lfItems.length} ítems</div>
                    </div>
                    <div style={{ display: "flex", gap: 5, flexShrink: 0 }}>
                      <button onClick={() => enviarPorMail({ items: lfItems, local: lf.local, fecha: lf.fecha, marca })}
                        style={{ background: "#EFF6FF", border: "1.5px solid #BFDBFE", borderRadius: 8, padding: "4px 8px", fontSize: 10, fontWeight: 700, color: "#1D4ED8", cursor: "pointer", fontFamily: "Nunito", whiteSpace: "nowrap" }}>
                        📧 Mail
                      </button>
                      <button onClick={() => setConfirmDelInforme({ local: lf.local, fecha: lf.fecha, count: lfItems.length })}
                        style={{ background: "#FEF2F2", border: "1.5px solid #FECACA", borderRadius: 8, padding: "4px 8px", fontSize: 12, cursor: "pointer", lineHeight: 1 }}>
                        🗑️
                      </button>
                    </div>
                  </div>
                );
              })}
            </Card>
          )}
        </>
      )}

      {tab === "analisis" && (
        <>
          {dataOrdenada.length === 0
            ? <Card><div style={{ textAlign: "center", color: "#94A3B8", padding: 30 }}>Sin datos — carga un informe primero</div></Card>
            : <>
              <Card style={{ marginBottom: 12 }}>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 8 }}>
                  <Field label="Local / Fecha">
                    <select value={filtroLF} onChange={e => setFiltroLF(e.target.value)} style={{ fontSize: 12 }}>
                      <option value="latest">⭐ Último cargado</option>
                      <option value="todas">Todos los informes</option>
                      {localesFecha.map((lf, i) => <option key={i} value={lf.local+"__"+lf.fecha}>{nombreCortoLocal(lf.local)} · {lf.fecha}</option>)}
                    </select>
                  </Field>
                  <Field label="Severidad">
                    <select value={filtroSev} onChange={e => setFiltroSev(e.target.value)} style={{ fontSize: 12 }}>
                      <option value="todas">Todas</option>
                      <option value="alta">🔴 Crítica</option><option value="media">🟡 Media</option><option value="baja">🟢 Baja</option>
                    </select>
                  </Field>
                  <Field label="Categoría" col={2}>
                    <select value={filtroJer} onChange={e => setFiltroJer(e.target.value)} style={{ fontSize: 12 }}>
                      {jerarquias.map(j => <option key={j} value={j}>{j === "todas" ? "Todas las categorías" : j}</option>)}
                    </select>
                  </Field>
                </div>
                <input placeholder="🔍 Buscar material..." value={busqueda} onChange={e => setBusqueda(e.target.value)} style={{ fontSize: 12 }} />
              </Card>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 12 }}>
                {[["Desviación Total", fmtVal(total_val), total_val < 0 ? m.color : "#22C55E","💰"],["Ítems Críticos", criticas.length + " ítems","#EF4444","🔴"],["Con sobrante", dataFiltrada.filter(d=>d.desv_valor>0).length,"#22C55E","📈"],["Con faltante", dataFiltrada.filter(d=>d.desv_valor<0).length,"#EF4444","📉"]].map(([l,v,c,ic]) => (
                  <Card key={l} style={{ position: "relative", overflow: "hidden" }}>
                    <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 3, background: c }} />
                    <div style={{ fontSize: 18, marginBottom: 2 }}>{ic}</div>
                    <div style={{ fontSize: 10, color: "#94A3B8", textTransform: "uppercase", letterSpacing: .8, fontWeight: 700 }}>{l}</div>
                    <div style={{ fontSize: 20, fontFamily: "Nunito", fontWeight: 900, color: c }}>{v}</div>
                  </Card>
                ))}
              </div>
              <Card style={{ marginBottom: 12 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: analisisIA ? 10 : 0 }}>
                  <div><div style={{ fontSize: 13, fontWeight: 700, fontFamily: "Nunito" }}>🤖 Análisis con IA</div><div style={{ fontSize: 11, color: "#94A3B8" }}>Identifica causas y errores probables</div></div>
                  <Btn onClick={analizarConIA} color={m.color} small disabled={loadingIA}>{loadingIA ? "⏳" : "Analizar"}</Btn>
                </div>
                {loadingIA && <div style={{ fontSize: 12, color: "#94A3B8", textAlign: "center", padding: 10 }}><span className="pulse">Analizando...</span></div>}
                {analisisIA && <div style={{ background: "#F8FAFC", borderRadius: 10, padding: 12, fontSize: 12, lineHeight: 1.7, whiteSpace: "pre-wrap", marginTop: 6 }}>{analisisIA}</div>}
              </Card>
              {seleccionadas.size > 0 && (
                <div style={{ background: m.color, borderRadius: 12, padding: "10px 14px", marginBottom: 10, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <span style={{ color: "#fff", fontSize: 13, fontWeight: 700, fontFamily: "Nunito" }}>{seleccionadas.size} seleccionados</span>
                  <button onClick={generarSolicitud} style={{ background: "#fff", border: "none", borderRadius: 8, padding: "6px 12px", fontFamily: "Nunito", fontWeight: 700, fontSize: 12, color: m.color, cursor: "pointer" }}>✉️ Solicitar corrección</button>
                </div>
              )}
              <div style={{ fontSize: 11, color: "#94A3B8", marginBottom: 8 }}>{dataOrdenada.length} ítems</div>
              {dataOrdenada.map(d => (
                <div key={d.id} onClick={() => setModalItem(d)}
                  style={{ background: seleccionadas.has(d.id) ? m.color + "15" : SEV_BG[d.severidad], border: `1.5px solid ${seleccionadas.has(d.id) ? m.color : SEV_COLOR[d.severidad] + "44"}`, borderRadius: 12, padding: "10px 12px", marginBottom: 8, cursor: "pointer" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                    <div style={{ flex: 1 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 3 }}>
                        <input type="checkbox" checked={seleccionadas.has(d.id)} onChange={e => { e.stopPropagation(); toggleSel(d.id); }} style={{ width: 14, height: 14, cursor: "pointer" }} onClick={e => e.stopPropagation()} />
                        <span style={{ fontSize: 13, fontWeight: 700, fontFamily: "Nunito" }}>{d.material}</span>
                      </div>
                      <div style={{ fontSize: 10, color: "#94A3B8", marginLeft: 20 }}>{d.jerarquia} · {d.unidad}</div>
                    </div>
                    <div style={{ textAlign: "right", flexShrink: 0, marginLeft: 8 }}>
                      <div style={{ fontSize: 13, fontWeight: 800, fontFamily: "Nunito", color: d.desv_valor < 0 ? m.color : "#22C55E" }}>{fmtVal(d.desv_valor)}</div>
                      <Badge text={SEV_LABEL[d.severidad]} color={SEV_COLOR[d.severidad]} small />
                    </div>
                  </div>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 4, marginTop: 6, marginLeft: 20 }}>
                    {[["Cons. Real", d.cons_real.toFixed(2)],["Cons. Teórico", d.cons_teo.toFixed(2)],["Desviación", fmtNum(d.desviacion)+" "+d.unidad]].map(([l,v]) => (
                      <div key={l} style={{ background: "#fff", borderRadius: 6, padding: "3px 6px" }}><div style={{ fontSize: 9, color: "#94A3B8" }}>{l}</div><div style={{ fontSize: 11, fontWeight: 700 }}>{v}</div></div>
                    ))}
                  </div>

                  </div>
                  <textarea placeholder="Nota de corrección..." defaultValue={item.nota || ""}
                    onChange={e => setSolicitudes(ss => ss.map(s => s.id === sol.id ? { ...s, items: s.items.map(it => it.id === item.id ? { ...it, nota: e.target.value } : it) } : s))}
                    style={{ width: "100%", marginTop: 4, fontSize: 11, resize: "none", padding: "6px 8px", borderRadius: 6, border: "1px solid #E2E8F0", fontFamily: "Nunito Sans" }} rows={2} />

                  showMailModal(`[El Hórreo] Solicitud Corrección — ${sol.local} — ${sol.fecha}`, cuerpo);
                  setSolicitudes(ss => ss.map(s => s.id === sol.id ? { ...s, estado: "enviada" } : s));

                <Btn color="#EF4444" outline small onClick={() => setSolicitudes(ss => ss.filter(s => s.id !== sol.id))}>🗑️</Btn>

            </Card>
          ))

      {tab === "historico" && <DesviacionesHistorico dataMarca={dataMarca} marca={marca} m={m} fmtVal={fmtVal} fmtNum={fmtNum} />}

      {tab === "comparativo" && <ComparativoDesviaciones dataMarca={dataMarca} marca={marca} m={m} fmtVal={fmtVal} fmtNum={fmtNum} />}

      {modalItem && (
        <div style={{ position: "fixed", inset: 0, zIndex: 999, background: "rgba(0,0,0,0.40)", display: "flex", alignItems: "flex-end", justifyContent: "center" }} onClick={() => setModalItem(null)}>
          <div onClick={e => e.stopPropagation()} style={{ background: "#fff", borderRadius: "20px 20px 0 0", padding: 20, width: "100%", maxWidth: 480, maxHeight: "80vh", overflowY: "auto" }}>
            <div style={{ width: 36, height: 4, background: "#E2E8F0", borderRadius: 2, margin: "0 auto 16px" }} />
            <div style={{ fontFamily: "Nunito", fontWeight: 800, fontSize: 16, marginBottom: 4 }}>{modalItem.material}</div>

// GESTOR DE TRASLADOS — reasigna empleados a otras tiendas día a día
// ══════════════════════════════════════════════════════════════════════════════
// Los traslados se guardan como overrides sobre la semana: cada entrada indica
// que en un día específico, un empleado (por RUT) debe contabilizarse en
// `localDestino` en vez del local original de la semana.
// Estructura: semana.traslados = [{ rut, nombre, fecha, localOrigen, localDestino }]

function GestorTraslados({ marca, m, semana, semanas, setSemanas }) {
  const localesMarca = LOCALES_POR_MARCA[marca] || LOCALES;
  const [filtroLocal, setFiltroLocal] = useState("Todos");
  const [modalEmp, setModalEmp] = useState(null); // { emp, diasDisp }
  const [busqueda, setBusqueda] = useState("");

  // Traslados de la semana actual
  const traslados = semana?.traslados || [];

  const guardarTraslado = (rut, fecha, localDestino) => {
    setSemanas(prev => prev.map(s => {
      if (s.inicio !== semana.inicio || s.uploadLocal !== semana.uploadLocal || s.marca !== marca) return s;
      const emp = s.empleados.find(e => e.rut === rut);
      if (!emp) return s;
      const sinEste = (s.traslados || []).filter(t => !(t.rut === rut && t.fecha === fecha));
      const nuevos = localDestino === s.uploadLocal
        ? sinEste  // si destino = origen, borrar el traslado (revertir)
        : [...sinEste, { rut, nombre: emp.nombre, fecha, localOrigen: s.uploadLocal, localDestino }];
      return { ...s, traslados: nuevos };
    }));
  };

  const borrarTraslado = (rut, fecha) => guardarTraslado(rut, fecha, semana?.uploadLocal);

  const borrarTodosDelEmp = (rut) => {
    setSemanas(prev => prev.map(s => {
      if (s.inicio !== semana.inicio || s.uploadLocal !== semana.uploadLocal || s.marca !== marca) return s;
      return { ...s, traslados: (s.traslados || []).filter(t => t.rut !== rut) };
    }));
  };

  if (!semana) return (
    <Card><div style={{ textAlign:"center", color:"#94A3B8", padding:24, fontFamily:"Nunito" }}>
      Selecciona una semana primero.
    </div></Card>
  );

  const DIAS_ES = ["Lun","Mar","Mié","Jue","Vie","Sáb","Dom"];

  // Empleados con sus traslados actuales
  const empleadosConInfo = semana.empleados
    .filter(emp => !busqueda || emp.nombre.toLowerCase().includes(busqueda.toLowerCase()) || emp.cargo.toLowerCase().includes(busqueda.toLowerCase()))
    .map(emp => {
      const trasladosEmp = traslados.filter(t => t.rut === emp.rut);
      const diasTrabajados = emp.dias.filter(d => d.estado === "trabajo");
      return { ...emp, trasladosEmp, diasTrabajados };
    });

  const trasladosPorDestino = traslados.reduce((acc, t) => {
    acc[t.localDestino] = (acc[t.localDestino] || 0) + 1;
    return acc;
  }, {});

  return (
    <div style={{ paddingBottom: 20 }}>
      {/* Header */}
      <Card style={{ marginBottom: 14 }}>
        <div style={{ fontFamily:"Nunito", fontWeight:900, fontSize:15, color:m.color, marginBottom:8 }}>
          🔀 Traslados de Empleados
        </div>
        <div style={{ fontFamily:"Nunito", fontSize:12, color:"#64748B", marginBottom:10, lineHeight:1.5 }}>
          Sem {semana.semana} · {semana.inicio} → {semana.fin}<br/>
          <span style={{ color:"#94A3B8", fontSize:11 }}>
            Reasigna empleados a otra tienda en días específicos. El costo se contabiliza en la tienda destino.
          </span>
        </div>

        {/* Resumen de traslados activos */}
        {traslados.length > 0 ? (
          <div style={{ background:"#F0FDF4", border:"1.5px solid #86EFAC", borderRadius:10, padding:"10px 12px", marginBottom:10 }}>
            <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:12, color:"#166534", marginBottom:6 }}>
              ✅ {traslados.length} traslado{traslados.length > 1 ? "s" : ""} configurado{traslados.length > 1 ? "s" : ""}
            </div>
            {Object.entries(trasladosPorDestino).map(([dest, n]) => (
              <div key={dest} style={{ fontFamily:"Nunito", fontSize:11, color:"#15803D", display:"flex", justifyContent:"space-between", padding:"2px 0" }}>
                <span>→ {nombreCortoLocal(dest)}</span>
                <span style={{ fontWeight:700 }}>{n} día{n > 1 ? "s" : ""}</span>
              </div>
            ))}
          </div>
        ) : (
          <div style={{ background:"#FFFBEB", border:"1px solid #FDE68A", borderRadius:8, padding:"8px 12px", marginBottom:10 }}>
            <span style={{ fontFamily:"Nunito", fontSize:11, color:"#92400E" }}>
              Sin traslados esta semana. Toca un empleado para configurar.
            </span>
          </div>
        )}

        <input
          placeholder="🔍 Buscar empleado o cargo..."
          value={busqueda}
          onChange={e => setBusqueda(e.target.value)}
          style={{ width:"100%", border:"1.5px solid #E2E8F0", borderRadius:9, padding:"8px 10px",
            fontFamily:"Nunito", fontSize:12, boxSizing:"border-box" }}
        />
      </Card>

      {/* Lista de empleados */}
      {empleadosConInfo.map(emp => {
        const cc = cargoColor(emp.cargo);
        const tieneTras = emp.trasladosEmp.length > 0;
        return (
          <div key={emp.rut}
            style={{
              background: tieneTras ? "#F0FDF4" : "#fff",
              border: `1.5px solid ${tieneTras ? "#86EFAC" : "#E2E8F0"}`,
              borderRadius: 12, padding:"12px 14px", marginBottom:8,
              cursor:"pointer"
            }}
            onClick={() => setModalEmp(emp)}
          >
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:2 }}>
                  <span style={{ fontFamily:"Nunito", fontWeight:800, fontSize:13, color:"#1A1D2E" }}>
                    {emp.nombre.split(" ").slice(0,3).join(" ")}
                  </span>
                  {tieneTras && <span style={{ fontSize:9, background:"#DCFCE7", color:"#16A34A", borderRadius:6, padding:"1px 6px", fontWeight:800 }}>
                    {emp.trasladosEmp.length} traslado{emp.trasladosEmp.length > 1 ? "s" : ""}
                  </span>}
                </div>
                <div style={{ display:"flex", gap:5, alignItems:"center", flexWrap:"wrap" }}>
                  <span style={{ background:cc.bg, color:cc.color, borderRadius:5, padding:"1px 7px", fontSize:9, fontWeight:700 }}>{emp.cargo}</span>
                  <span style={{ fontSize:10, color:"#94A3B8" }}>{emp.diasTrabajados.length} días · {emp.horas_calc.toFixed(1)}h</span>
                </div>
              </div>
              <div style={{ textAlign:"right", flexShrink:0 }}>
                {tieneTras ? (
                  <div>
                    {/* Mini chips de traslados */}
                    {emp.trasladosEmp.slice(0,3).map((t,i) => (
                      <div key={i} style={{ fontFamily:"Nunito", fontSize:9, color:"#16A34A", fontWeight:700 }}>
                        {t.fecha.slice(5)} → {nombreCortoLocal(t.localDestino)}
                      </div>
                    ))}
                    {emp.trasladosEmp.length > 3 && (
                      <div style={{ fontSize:9, color:"#94A3B8" }}>+{emp.trasladosEmp.length - 3} más</div>
                    )}
                  </div>
                ) : (
                  <span style={{ fontSize:11, color:"#94A3B8" }}>Configurar →</span>
                )}
              </div>
            </div>
          </div>
        );
      })}

      {/* Modal de traslado por empleado */}
      {modalEmp && (
        <div style={{ position:"fixed", inset:0, zIndex:999, background:"rgba(0,0,0,0.45)",
          display:"flex", alignItems:"flex-end", justifyContent:"center" }}
          onClick={() => setModalEmp(null)}>
          <div onClick={e => e.stopPropagation()}
            style={{ background:"#fff", borderRadius:"20px 20px 0 0", padding:20,
              width:"100%", maxWidth:520, maxHeight:"85vh", overflowY:"auto" }}>
            {/* Handle */}
            <div style={{ width:36, height:4, background:"#E2E8F0", borderRadius:2, margin:"0 auto 16px" }} />

            {/* Cabecera */}
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:4 }}>
              <div>
                <div style={{ fontFamily:"Nunito", fontWeight:900, fontSize:16 }}>
                  {modalEmp.nombre.split(" ").slice(0,3).join(" ")}
                </div>
                <span style={{ background:cargoColor(modalEmp.cargo).bg, color:cargoColor(modalEmp.cargo).color,
                  borderRadius:5, padding:"2px 8px", fontSize:10, fontWeight:700 }}>
                  {modalEmp.cargo}
                </span>
              </div>
              {traslados.filter(t => t.rut === modalEmp.rut).length > 0 && (
                <button onClick={() => { borrarTodosDelEmp(modalEmp.rut); setModalEmp(null); }}
                  style={{ background:"#FEF2F2", color:"#DC2626", border:"1.5px solid #FECACA",
                    borderRadius:8, padding:"5px 10px", fontFamily:"Nunito", fontWeight:700, fontSize:11, cursor:"pointer" }}>
                  🗑 Limpiar todo
                </button>
              )}
            </div>

            <div style={{ fontFamily:"Nunito", fontSize:11, color:"#64748B", marginBottom:14 }}>
              Local origen: <strong>{nombreCortoLocal(semana.uploadLocal)}</strong>
            </div>

            <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:12, color:"#475569", marginBottom:10, textTransform:"uppercase", letterSpacing:.5 }}>
              Asignar por día
            </div>

            {modalEmp.dias.map((dia, i) => {
              if (dia.estado === "libre") return null;
              const traslado = traslados.find(t => t.rut === modalEmp.rut && t.fecha === dia.fecha);
              const localActual = traslado ? traslado.localDestino : semana.uploadLocal;
              return (
                <div key={dia.fecha} style={{
                  display:"flex", alignItems:"center", gap:8,
                  padding:"10px 12px", borderRadius:10, marginBottom:6,
                  background: traslado ? "#F0FDF4" : "#F8FAFF",
                  border:`1.5px solid ${traslado ? "#86EFAC" : "#E2E8F0"}`
                }}>
                  {/* Día info */}
                  <div style={{ minWidth:80 }}>
                    <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:12 }}>
                      {DIAS_ES[i]} <span style={{ color:"#94A3B8", fontWeight:400 }}>{dia.fecha.slice(5)}</span>
                    </div>
                    <div style={{ fontFamily:"Nunito", fontSize:10, color:"#94A3B8" }}>
                      {dia.horas > 0 ? dia.horas.toFixed(1)+"h" : dia.turno}
                    </div>
                  </div>

                  {/* Selector de local destino */}
                  <select
                    value={localActual}
                    onChange={e => guardarTraslado(modalEmp.rut, dia.fecha, e.target.value)}
                    style={{
                      flex:1, border:`1.5px solid ${traslado ? "#86EFAC" : "#E2E8F0"}`,
                      borderRadius:9, padding:"7px 8px", fontFamily:"Nunito", fontSize:12,
                      fontWeight:700, background: traslado ? "#F0FDF4" : "#fff",
                      color: traslado ? "#15803D" : "#1A1D2E"
                    }}
                  >
                    {localesMarca.map(l => (
                      <option key={l} value={l}>
                        {l === semana.uploadLocal ? `📍 ${nombreCortoLocal(l)} (origen)` : nombreCortoLocal(l)}
                      </option>
                    ))}
                  </select>

                  {/* Indicador */}
                  {traslado ? (
                    <button onClick={() => borrarTraslado(modalEmp.rut, dia.fecha)}
                      style={{ background:"#FEF2F2", border:"1px solid #FECACA", borderRadius:7,
                        padding:"5px 7px", cursor:"pointer", fontSize:12, flexShrink:0 }}>
                      ✕
                    </button>
                  ) : (
                    <span style={{ fontSize:14, color:"#CBD5E1", flexShrink:0 }}>📍</span>
                  )}
                </div>
              );
            })}

            {/* Resumen del modal */}
            {(() => {
              const trasEmp = traslados.filter(t => t.rut === modalEmp.rut);
              if (!trasEmp.length) return null;
              const porDest = trasEmp.reduce((acc, t) => { acc[t.localDestino] = (acc[t.localDestino]||[]); acc[t.localDestino].push(t.fecha); return acc; }, {});
              return (
                <div style={{ background:"#F0FDF4", border:"1.5px solid #86EFAC", borderRadius:10, padding:"10px 12px", marginTop:12 }}>
                  <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:12, color:"#166534", marginBottom:6 }}>Resumen de traslados</div>
                  {Object.entries(porDest).map(([dest, fechas]) => (
                    <div key={dest} style={{ fontFamily:"Nunito", fontSize:11, color:"#15803D", marginBottom:3 }}>
                      → {nombreCortoLocal(dest)}: {fechas.map(f=>f.slice(5)).join(", ")} ({fechas.length}d)
                    </div>
                  ))}
                  <div style={{ fontFamily:"Nunito", fontSize:10, color:"#86EFAC99", marginTop:4, fontStyle:"italic" }}>
                    El costo de esos días se carga a la tienda destino.
                  </div>
                </div>
              );
            })()}

            <Btn onClick={() => setModalEmp(null)} color={m.color} full style={{ marginTop:14 }}>
              ✓ Guardar y cerrar
            </Btn>
          </div>
        </div>
      )}
    </div>
  );
}

// CONTROL DE LABOR — parse horarios semanales y valoriza por cargo
// ══════════════════════════════════════════════════════════════════════════════

// Parsea horas trabajadas de un string de turno
// Ej: "0830_1630: 08:30 | 16:30" → 7.5h (descontando 30 min colación)
function parseTurnoHoras(val) {
  if (!val) return 0;
  const s = String(val).trim();
  if (!s || s === "Libre" || s.startsWith("Enfermedad") || s.startsWith("No Registra")) return 0;
  const m = s.match(/(\d{1,2}):(\d{2})\s*\|\s*(\d{1,2}):(\d{2})/);
  if (!m) return 0;
  const mins = (parseInt(m[3])*60 + parseInt(m[4])) - (parseInt(m[1])*60 + parseInt(m[2]));
  return Math.max(0, (mins - 30) / 60); // 30 min colación
}

function turnoEstado(val) {
  if (!val) return "libre";
  const s = String(val).trim();
  if (!s || s === "Libre") return "libre";
  if (s.startsWith("Enfermedad")) return "enfermedad";
  if (s.startsWith("No Registra")) return "no_registra";
  return "trabajo";
}

// Parsea el archivo Excel de horarios y devuelve semanas con empleados
function parseHorarioXLSX(XLSX, wb) {
  const ws = wb.Sheets[wb.SheetNames[0]];
  const range = ws["!ref"] ? XLSX.utils.decode_range(ws["!ref"]) : {s:{r:0,c:0},e:{r:100,c:20}};
  const norm = s => String(s || "").toUpperCase().replace(/\s+/g," ").trim()
                     .normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  const cellVal = cell => {
    if (!cell) return "";
    if (cell.t === "n") return cell.v;
    return String(cell.v !== undefined && cell.v !== null ? cell.v : (cell.w || "")).trim();
  };

  // Read grid
  const grid = [];
  for (let R = range.s.r; R <= range.e.r; R++) {
    const row = [];
    for (let C = range.s.c; C <= range.e.c; C++) {
      row.push(cellVal(ws[XLSX.utils.encode_cell({r:R,c:C})]));
    }
    grid.push(row);
  }

  const semanas = [];
  let currentSemana = null;

  for (let i = 0; i < grid.length; i++) {
    const row = grid[i];
    const first = String(row[0] || "").trim();

    // Detect semana title: "Semana XX: DD-MM-YYYY | DD-MM-YYYY"
    const semMatch = first.match(/Semana\s+(\d+).*?(\d{2}-\d{2}-\d{4})\s*\|\s*(\d{2}-\d{2}-\d{4})/i);
    if (semMatch) {
      const parseDate = s => { const [d,mo,y] = s.split("-"); return `${y}-${mo}-${d}`; };
      const inicio = parseDate(semMatch[2]);
      currentSemana = {
        semana: parseInt(semMatch[1]),
        inicio,
        fin: parseDate(semMatch[3]),
        // L M M J V S D → dates
        fechasDias: Array.from({length:7}, (_,k) => {
          const d = new Date(inicio); d.setDate(d.getDate()+k); return d.toISOString().split("T")[0];
        }),
        empleados: [],
        sucursal: "",
      };
      semanas.push(currentSemana);
      continue;
    }

    // Detect header row: Rut, Empleado, L, M, M...
    if (norm(first) === "RUT") continue;

    // Data row: has a RUT-like value
    if (currentSemana && first && /\d{7,}/.test(first.replace(/[.\-kK]/g,""))) {
      const nombre   = String(row[1] || "").trim().replace(/\s+/g," ");
      const cargo    = String(row[12] || "").trim();
      const sucursal = String(row[10] || "").trim();
      const horas_excel = parseFloat(row[9]) || 0;
      if (sucursal) currentSemana.sucursal = sucursal;

      const dias = [];
      for (let d = 0; d < 7; d++) {
        const turno = String(row[2+d] || "").trim();
        const horas = parseTurnoHoras(turno);
        const estado = turnoEstado(turno);
        dias.push({ fecha: currentSemana.fechasDias[d], turno, horas, estado });
      }

      currentSemana.empleados.push({
        rut: first, nombre, cargo, sucursal, horas_excel, dias,
        horas_calc: dias.reduce((s,d) => s+d.horas, 0),
      });
    }
  }
  return semanas.filter(s => s.empleados.length > 0);
}

const CARGO_COLORES = {
  "Jefe de local":   { color: "#6C63FF", bg: "#F0EEFF" },
  "Asistente local": { color: "#0891B2", bg: "#E0F7FA" },
  "Operario":        { color: "#22C55E", bg: "#F0FDF4" },
};
const cargoColor = cargo => CARGO_COLORES[cargo] || { color: "#64748B", bg: "#F8FAFC" };


const fmtH = h => h % 1 === 0 ? h+"h" : h.toFixed(1)+"h";

// ══════════════════════════════════════════════════════════════════════════════
// LABOR: SUB-COMPONENTES (evita IIFEs con useState)
// ══════════════════════════════════════════════════════════════════════════════

function LaborPorMes({ semanasMarca, ventas, marca, calcCosto, valoresCargo, m }) {
  const META_LABOR_PCT = (() => {
    try {
      // Intentar meta por local primero, luego global
      const metas = JSON.parse(localStorage.getItem("horreo_metas_kpi_local") || "{}");
      return parseFloat(metas[localSel]?.labor_pct) || parseFloat(localStorage.getItem("horreo_meta_labor_pct")) || 28;
    } catch { return 28; }
  })();

  // Locales disponibles en las semanas cargadas
  const localesDisp = useMemo(() =>
    [...new Set(semanasMarca.map(s => s.uploadLocal).filter(Boolean))].sort(),
  [semanasMarca]);

  const [localSel, setLocalSel] = useState(() => localesDisp[0] || "");
  // Sincronizar si cambian los locales
  React.useEffect(() => {
    if (localesDisp.length > 0 && !localesDisp.includes(localSel)) setLocalSel(localesDisp[0]);
  }, [localesDisp]);

  // Solo semanas del local seleccionado
  const semanasLocal = useMemo(() =>
    semanasMarca.filter(s => s.uploadLocal === localSel),
  [semanasMarca, localSel]);

  // All available months from loaded semanas of this local
  const mesesDisp = useMemo(() => {
    const mSet = new Set();
    semanasLocal.forEach(s => {
      if (s.inicio) mSet.add(s.inicio.slice(0,7));
      if (s.fin)    mSet.add(s.fin.slice(0,7));
    });
    return [...mSet].sort().reverse();
  }, [semanasLocal]);

  const [mesSel, setMesSel] = useState(() => mesesDisp[0] || today().slice(0,7));

  // Keep mesSel valid when semanas change
  React.useEffect(() => {
    if (mesesDisp.length > 0 && !mesesDisp.includes(mesSel)) setMesSel(mesesDisp[0]);
  }, [mesesDisp]);

  // Semanas that overlap with selected month (for this local only)
  const semsDelMes = useMemo(() =>
    semanasLocal.filter(s => s.inicio?.slice(0,7) === mesSel || s.fin?.slice(0,7) === mesSel),
    [semanasLocal, mesSel]);

  // Accumulate employees across all semanas of the month
  const { empMes, totalHorasMes, totalCostoMes } = useMemo(() => {
    const empMap = {};
    let totalH = 0, totalC = 0;
    semsDelMes.forEach(sem => {
      sem.empleados.forEach(emp => {
        const key = emp.rut || emp.nombre;
        if (!empMap[key]) empMap[key] = { ...emp, horas_total:0, costo_total:0, semanas_count:0 };
        const c = calcCosto(emp);
        empMap[key].horas_total += emp.horas_calc;
        empMap[key].costo_total += c;
        empMap[key].semanas_count++;
        totalH += emp.horas_calc;
        totalC += c;
      });
    });
    return { empMes: Object.values(empMap).sort((a,b)=>b.horas_total-a.horas_total), totalHorasMes:totalH, totalCostoMes:totalC };
  }, [semsDelMes, calcCosto]);

  const ventaMes  = useMemo(() =>
    ventas.filter(v=>v.marca===marca && v.local===localSel && v.fecha.slice(0,7)===mesSel).reduce((s,v)=>s+parseFloat(v.venta_bruta||0),0),
    [ventas, marca, localSel, mesSel]);

  const ratioMes   = ventaMes > 0 ? (totalCostoMes/ventaMes)*100 : 0;
  const ratioColor = ratioMes===0 ? "#94A3B8" : ratioMes<=META_LABOR_PCT ? "#22C55E" : "#EF4444";

  // Previous month comparison
  const [y,mo] = mesSel.split("-").map(Number);
  const prevMes  = mo===1 ? `${y-1}-12` : `${y}-${String(mo-1).padStart(2,"0")}`;
  const { totalHPrev, totalCPrev } = useMemo(() => {
    let h=0,c=0;
    semanasLocal.filter(s=>s.inicio?.slice(0,7)===prevMes||s.fin?.slice(0,7)===prevMes)
                .forEach(sem=>sem.empleados.forEach(emp=>{h+=emp.horas_calc;c+=calcCosto(emp);}));
    return {totalHPrev:h, totalCPrev:c};
  }, [semanasLocal, prevMes, calcCosto]);

  const varH = totalHPrev>0 ? (totalHorasMes-totalHPrev)/totalHPrev : null;
  const varC = totalCPrev>0 ? (totalCostoMes-totalCPrev)/totalCPrev : null;

  const byCargo = useMemo(() => {
    const bc = {};
    empMes.forEach(emp => {
      if (!bc[emp.cargo]) bc[emp.cargo] = { horas:0, costo:0, n:0 };
      bc[emp.cargo].horas += emp.horas_total;
      bc[emp.cargo].costo += emp.costo_total;
      bc[emp.cargo].n++;
    });
    return bc;
  }, [empMes]);

  return (
    <div>
      {/* Selector de local */}
      {localesDisp.length > 1 && (
        <div style={{ display:"flex", gap:5, marginBottom:10, overflowX:"auto" }}>
          {localesDisp.map(l => (
            <button key={l} onClick={() => setLocalSel(l)}
              style={{ flexShrink:0, background: localSel===l ? m.color : "var(--bg-card)",
                color: localSel===l ? "#fff" : "var(--text-2)",
                border: `1.5px solid ${localSel===l ? m.color : "var(--border)"}`,
                borderRadius:9, padding:"5px 10px", fontFamily:"Nunito", fontWeight:700,
                fontSize:11, cursor:"pointer", whiteSpace:"nowrap" }}>
              {nombreCortoLocal(l)}
            </button>
          ))}
        </div>
      )}
      <div style={{ display:"flex", gap:8, marginBottom:14, alignItems:"center", flexWrap:"wrap" }}>
        {mesesDisp.length > 0
          ? <select value={mesSel} onChange={e=>setMesSel(e.target.value)} style={{ flex:1, fontWeight:700, fontSize:12 }}>
              {mesesDisp.map(ms=><option key={ms} value={ms}>{ms} ({semanasLocal.filter(s=>s.inicio?.slice(0,7)===ms||s.fin?.slice(0,7)===ms).length} sem)</option>)}
            </select>
          : <input type="month" value={mesSel} onChange={e=>setMesSel(e.target.value)} style={{ flex:1, fontSize:12 }}/>
        }
        {semsDelMes.length > 0 && <Badge text={semsDelMes.length+" semanas"} color={m.color} small/>}
      </div>
      {semsDelMes.length === 0
        ? <Card><div style={{ textAlign:"center", color:"#94A3B8", padding:20 }}>Sin horarios cargados{mesesDisp.length>0?`. Meses disponibles: ${mesesDisp.join(", ")}`:""}</div></Card>
        : <>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:14 }}>
            {[
              ["Total Horas", fmtH(totalHorasMes), m.color, varH!==null?(varH>=0?"+":"")+((varH*100).toFixed(0))+"% vs mes ant.":null],
              ["Costo Labor", totalCostoMes>0?fmtCLP(totalCostoMes):"—", "#EF4444", varC!==null?(varC>=0?"+":"")+((varC*100).toFixed(0))+"% vs mes ant.":null],
              ["% Labor/Venta", ratioMes>0?ratioMes.toFixed(1)+"%":"—", ratioColor, ventaMes>0?"Venta: "+fmtCLP(ventaMes):null],
              ["Empleados", empMes.length+" activos", "#6C63FF", semsDelMes.length+" semanas"],
            ].map(([l,v,c,sub])=>(
              <Card key={l} style={{ position:"relative", overflow:"hidden" }}>
                <div style={{ position:"absolute", top:0, left:0, right:0, height:3, background:c }}/>
                <div style={{ fontSize:9, color:"#94A3B8", fontWeight:700, textTransform:"uppercase", letterSpacing:.8 }}>{l}</div>
                <div style={{ fontSize:20, fontFamily:"Nunito", fontWeight:900, color:c }}>{v}</div>
                {sub && <div style={{ fontSize:10, color:"#94A3B8" }}>{sub}</div>}
              </Card>
            ))}
          </div>
          <Card style={{ marginBottom:14 }}>
            <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:13, marginBottom:10 }}>Desglose por cargo — {mesSel}</div>
            {Object.entries(byCargo).map(([cargo, data]) => {
              const cc = cargoColor(cargo);
              return (
                <div key={cargo} style={{ display:"flex", justifyContent:"space-between", padding:"6px 0", borderBottom:"1px solid #F0F4F8" }}>
                  <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                    <span style={{ background:cc.bg, color:cc.color, borderRadius:6, padding:"1px 8px", fontSize:10, fontWeight:700 }}>{cargo}</span>
                    <span style={{ fontSize:10, color:"#94A3B8" }}>{data.n} pers.</span>
                  </div>
                  <div style={{ textAlign:"right" }}>
                    <span style={{ fontSize:12, fontWeight:800, fontFamily:"Nunito", color:cc.color }}>{fmtH(data.horas)}</span>
                    {data.costo>0 && <span style={{ fontSize:11, color:"#EF4444", marginLeft:8 }}>{fmtCLP(data.costo)}</span>}
                  </div>
                </div>
              );
            })}
          </Card>
          <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:13, marginBottom:8 }}>{empMes.length} empleados activos</div>
          {empMes.map(emp => {
            const cc = cargoColor(emp.cargo);
            return (
              <div key={emp.rut} style={{ background:"#F8FAFC", border:`1px solid ${cc.color}22`, borderRadius:10, padding:"8px 12px", marginBottom:6, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                <div>
                  <div style={{ fontSize:12, fontWeight:700, fontFamily:"Nunito" }}>{emp.nombre.split(" ").slice(0,3).join(" ")}</div>
                  <span style={{ background:cc.bg, color:cc.color, borderRadius:4, padding:"1px 6px", fontSize:9, fontWeight:700 }}>{emp.cargo}</span>
                  <span style={{ fontSize:9, color:"#94A3B8", marginLeft:6 }}>{emp.semanas_count} sem.</span>
                </div>
                <div style={{ textAlign:"right" }}>
                  <div style={{ fontSize:14, fontWeight:900, fontFamily:"Nunito", color:cc.color }}>{fmtH(emp.horas_total)}</div>
                  {emp.costo_total>0 && <div style={{ fontSize:11, color:"#EF4444", fontWeight:700 }}>{fmtCLP(emp.costo_total)}</div>}
                </div>
              </div>
            );
          })}
        </>
      }
    </div>
  );
}

function GestionLicencias({ marca, m, valoresCargo, licencias, setLicencias, diasAlerta = 5 }) {
  const localesMarca = LOCALES_POR_MARCA[marca] || LOCALES;
  const cargoOpts = [...Object.keys(valoresCargo), "Otro"];
  const TIPOS = ["Licencia médica","Permiso con goce","Permiso sin goce","Vacaciones","Accidente laboral","Otro"];
  const [form, setForm] = useState({ nombre:"", cargo:cargoOpts[0]||"Operario", local:localesMarca[0], tipo:"Licencia médica", fechaIni:today(), fechaFin:"", diasEstimados:"", obs:"" });
  const [saved, setSaved] = useState(false);
  const set = (k,v) => setForm(f=>({...f,[k]:v}));
  const licMarca = licencias.filter(l => l.marca === marca);
  const hoy = today();
  const activas  = licMarca.filter(l => l.fechaIni<=hoy && (!l.fechaFin||l.fechaFin>=hoy));
  // Próximas a vencer: terminan en los próximos `diasAlerta` días
  const proxFin = new Date(hoy+"T12:00:00"); proxFin.setDate(proxFin.getDate()+diasAlerta);
  const proxFinStr = proxFin.toISOString().split("T")[0];
  const proximasVencer = activas.filter(l => l.fechaFin && l.fechaFin>=hoy && l.fechaFin<=proxFinStr);
  // Próximas a iniciar: comienzan en los próximos `diasAlerta` días
  const proximasIniciar = licMarca.filter(l => l.fechaIni>hoy && l.fechaIni<=proxFinStr);

  // Auto-calculate fechaFin when diasEstimados changes
  const handleDias = v => {
    set("diasEstimados", v);
    if (form.fechaIni && v) {
      const d = new Date(form.fechaIni+"T12:00:00");
      d.setDate(d.getDate() + parseInt(v) - 1);
      set("fechaFin", d.toISOString().split("T")[0]);
    }
  };

  const handleAdd = () => {
    if (!form.nombre || !form.fechaIni) return;
    setLicencias(prev => [...prev, { id:uid(), marca, ...form }]);
    setForm(f=>({...f, nombre:"", obs:"", fechaFin:"", diasEstimados:""}));
    setSaved(true); setTimeout(()=>setSaved(false), 2000);
  };

  return (
    <div>
      {/* Alertas próximas a vencer / iniciar */}
      {(proximasVencer.length > 0 || proximasIniciar.length > 0) && (
        <Card style={{ marginBottom:14, background:"#FFFBEB", border:"1.5px solid #FDE68A" }}>
          <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:13, color:"#D97706", marginBottom:8 }}>
            🔔 Alertas próximas ({diasAlerta} días)
          </div>
          {proximasVencer.map(l => {
            const diasRestantes = Math.round((new Date(l.fechaFin+"T12:00:00") - new Date(hoy+"T12:00:00")) / 86400000);
            return (
              <div key={l.id} style={{ fontSize:11, padding:"4px 0", borderBottom:"1px solid #FEF3C7", display:"flex", justifyContent:"space-between" }}>
                <div>
                  <span style={{ fontWeight:700 }}>{l.nombre}</span>
                  <span style={{ background:"#FEF3C7", color:"#D97706", borderRadius:4, padding:"1px 5px", fontSize:9, fontWeight:700, marginLeft:5 }}>Vence pronto</span>
                  <div style={{ color:"#94A3B8", fontSize:10 }}>{l.tipo}</div>
                </div>
                <span style={{ color:"#D97706", fontWeight:800, fontFamily:"Nunito", fontSize:13 }}>
                  {diasRestantes === 0 ? "Hoy" : diasRestantes === 1 ? "Mañana" : `${diasRestantes}d`}
                </span>
              </div>
            );
          })}
          {proximasIniciar.map(l => {
            const diasParaIni = Math.round((new Date(l.fechaIni+"T12:00:00") - new Date(hoy+"T12:00:00")) / 86400000);
            return (
              <div key={l.id} style={{ fontSize:11, padding:"4px 0", borderBottom:"1px solid #FEF3C7", display:"flex", justifyContent:"space-between" }}>
                <div>
                  <span style={{ fontWeight:700 }}>{l.nombre}</span>
                  <span style={{ background:"#EDE9FE", color:"#7C3AED", borderRadius:4, padding:"1px 5px", fontSize:9, fontWeight:700, marginLeft:5 }}>Próxima</span>
                  <div style={{ color:"#94A3B8", fontSize:10 }}>{l.tipo}</div>
                </div>
                <span style={{ color:"#7C3AED", fontWeight:800, fontFamily:"Nunito", fontSize:13 }}>
                  en {diasParaIni}d
                </span>
              </div>
            );
          })}
        </Card>
      )}
      {activas.length > 0 && (
        <Card style={{ marginBottom:14, background:"#FEF2F2", border:"1.5px solid #FECACA" }}>
          <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:13, color:"#EF4444", marginBottom:8 }}>⚠️ Ausentismos activos hoy ({activas.length})</div>
          {activas.map(l => (
            <div key={l.id} style={{ fontSize:11, padding:"4px 0", borderBottom:"1px solid #FEE2E2", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <div>
                <span style={{ fontWeight:700 }}>{l.nombre}</span>
                <span style={{ background:"#FEE2E2", color:"#EF4444", borderRadius:4, padding:"1px 5px", fontSize:9, fontWeight:700, marginLeft:5 }}>{l.tipo}</span>
              </div>
              <span style={{ color:"#EF4444", fontSize:10, fontWeight:700 }}>{l.fechaIni}{l.fechaFin?" → "+l.fechaFin:""}</span>
            </div>
          ))}
        </Card>
      )}

        <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:14, marginBottom:10 }}>🏥 Registrar licencia / permiso</div>

              {cargoOpts.map(c=><option key={c}>{c}</option>)}
            </select>
          </Field>
          <Field label="Local">
            <select value={form.local} onChange={e=>set("local",e.target.value)}>
              {localesMarca.map(l=><option key={l}>{l}</option>)}
            </select>
          </Field>
          <Field label="Tipo de ausencia" col={2}>
            <select value={form.tipo} onChange={e=>set("tipo",e.target.value)}>
              {TIPOS.map(t=><option key={t}>{t}</option>)}
            </select>
          </Field>

        </div>

        <div style={{ marginTop:12 }}>
          <Btn color={saved?"#22C55E":m.color} full disabled={!form.nombre||!form.fechaIni} onClick={handleAdd}>
            {saved ? "✅ Registrado" : "🏥 Registrar licencia/permiso"}
          </Btn>
        </div>
      </Card>
      {licMarca.length === 0
        ? <Card><div style={{ textAlign:"center", color:"#94A3B8", padding:20 }}>Sin licencias registradas</div></Card>
        : <>

          {[...licMarca].sort((a,b)=>b.fechaIni>a.fechaIni?1:-1).map(l => {
            const isActiva = l.fechaIni<=hoy && (!l.fechaFin||l.fechaFin>=hoy);
            const dias = l.fechaFin ? Math.round((new Date(l.fechaFin+"T12:00:00")-new Date(l.fechaIni+"T12:00:00"))/(86400000))+1 : "—";
            return (
              <Card key={l.id} style={{ marginBottom:8, border:`1.5px solid ${isActiva?"#FECACA":"#E2E8F0"}`, background:isActiva?"#FEF2F2":"#fff" }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                  <div style={{ flex:1 }}>
                    <div style={{ fontFamily:"Nunito", fontWeight:800, fontSize:12 }}>{l.nombre}</div>
                    <div style={{ display:"flex", gap:5, marginTop:2, flexWrap:"wrap" }}>
                      <Badge text={l.tipo} color={isActiva?"#EF4444":"#94A3B8"} small/>
                      <span style={{ fontSize:9, color:"#94A3B8" }}>{l.cargo} · {nombreCortoLocal(l.local)}</span>
                    </div>
                  </div>
                  <DeleteBtn onDelete={()=>setLicencias(prev=>prev.filter(x=>x.id!==l.id))}/>
                </div>
                <div style={{ fontSize:10, color:"#64748B", marginTop:5 }}>
                  📅 {l.fechaIni}{l.fechaFin?" → "+l.fechaFin:""} · {dias} días
                  {l.obs && <div style={{ color:"#94A3B8", marginTop:1 }}>{l.obs}</div>}
                </div>
              </Card>
            );
          })}
        </>
      }
    </div>
  );
}

function ControlLabor({ marca, ventas = [], solicitudes = [], semanas: _semProp, setSemanas: _setSemanaProp }) {
  const m = MARCAS[marca] || MARCAS[Object.keys(MARCAS)[0]] || { color: "#6C63FF", bg: "#F0EEFF", emoji: "🌭", textColor: "#fff", nombre: "—" };
  // Use shared semanas from App if provided, else fallback to local storage

    domingo:    { pct: 30,  activo: true },

    sabado:     { pct: 0,   activo: false },
    horasextra: { pct: 50,  activo: true },
  });
  const [feriados, setFeriados] = useStorage("horreo_feriados", []);
  // Meta % labor/venta configurable
  const [metaLaborPct, setMetaLaborPct] = useStorage("horreo_meta_labor_pct", 28);
  // Personal adicional (no en horario): [{ id, nombre, cargo, local, marca, fechaIni, fechaFin, horas_dia }]
  const [personalAdicional, setPersonalAdicional] = useStorage("horreo_personal_adicional", []);
  // Licencias/permisos: [{ id, nombre, cargo, local, marca, tipo, fechaIni, fechaFin, obs }]
  const [licencias, setLicencias] = useStorage("horreo_licencias", []);
  // Vista mes (para tab "por mes")
  const [mesSel, setMesSel] = useState(today().slice(0,7));
  const [periodoVista, setPeriodoVista] = useState("semana"); // semana | mes

  // Local selector for upload
  const [uploadLocal, setUploadLocal] = useState((LOCALES_POR_MARCA[marca]||LOCALES)[0]);

  // Only show semanas for current marca
  const semanasMarcaTodas = useMemo(() => semanas.filter(s => s.marca === marca), [semanas, marca]);

  // Local actualmente visible (puede ser uno sin archivo propio, ej. Heladería)
  const localesConSemanas = useMemo(() =>
    [...new Set(semanasMarcaTodas.map(s => s.uploadLocal).filter(Boolean))],

  // Si vistaLocal no está seteado o ya no existe, defaultear al primer local con semanas
  const vistaLocalEfectiva = (vistaLocal && (LOCALES_POR_MARCA[marca]||LOCALES).includes(vistaLocal))
    ? vistaLocal
    : (localesConSemanas[0] || (LOCALES_POR_MARCA[marca]||LOCALES)[0] || "");

  // Semanas solo del local visible
  const semanasMarca = useMemo(() =>
    semanasMarcaTodas.filter(s => s.uploadLocal === vistaLocalEfectiva),
  [semanasMarcaTodas, vistaLocalEfectiva]);

  const semana = semanasMarca[Math.min(semSel, semanasMarca.length - 1)] || null;

  // ── Parsear archivo ─────────────────────────────────────────────────────────
  const handleFile = async e => {

      const parsed = parseHorarioXLSX(XLSX, wb);

      // ── Split por sucursal de empleado ────────────────────────────────────
